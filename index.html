    input, textarea, select {

    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
    @keyframes flicker { 0%,100%{opacity:1} 93%{opacity:0.8} 96%{opacity:0.9} }
    @keyframes pulse { 0%,100%{box-shadow:0 0 8px var(--cg)} 50%{box-shadow:0 0 25px var(--cg),0 0 50px var(--cg2)} }

    @media print {

"Guerreiro":{exig:"Luta; Ataque Especial ou Defesa Especial",desc:"O guerreiro supera obstáculos através de combate. Lutar não é apenas um meio — é o próprio objetivo. Alguns sonham ser o lutador mais forte do mundo; outros lutam para que outros não precisem.",poderes:[{nome:"Lutar é tudo!",desc:"Quando faz um teste de Luta, gaste 2PM para adicionar +3 ao resultado, após a rolagem (antes do oponente rolar a defesa)."},{nome:"Manobra especial",desc:"Uma vez por cena, você pode usar um Ataque ou Defesa Especial sem gastar PM."},{nome:"Sem parar",desc:"Quando reduz um oponente a 0PV de forma violenta, você pode imediatamente fazer um ataque contra outro oponente ao alcance."}]},
"Mago":{exig:"Mística; Magia",desc:"O verdadeiro mago estuda fórmulas herméticas para conseguir efeitos mágicos acurados. Para ele, magia é uma ciência tão complexa quanto física quântica. Em combate, são temidos a ponto de sempre serem atacados primeiro.",poderes:[{nome:"Aptidão mágica",desc:"Seu bônus máximo da vantagem Magia é H+2 (em vez de H)."},{nome:"Bateria de mana",desc:"Uma vez por cena, você pode usar uma ação completa para recuperar 1D+H PM."},{nome:"Preparar magias",desc:"Quando estiver com PM completos e fora de conflito, deixe magias preparadas (lista de efeitos de Magia). Gasta metade dos PM para preparar. Não pode mudar, e PM não podem ser recuperados até usá-las."}]},
"Ninja":{exig:"Manha; Mentor",desc:"Mestres da furtividade e eficiência. Alguns servem a antigos clãs, outros obedecem apenas aos ensinamentos de seus mestres. Mantêm valores tradicionais de disciplina e respeito pelas artes ancestrais.",poderes:[{nome:"Mestre ninja",desc:"Você tem Ganho em dois testes de perícia por cena pela vantagem Mentor, em vez de um."},{nome:"Ninpo de combate",desc:"Uma vez por rodada, gaste 1PM para trocar um teste de ataque ou defesa por um teste de Manha (Habilidade). Pode usar vantagens e técnicas normalmente."},{nome:"Ougi",desc:"Escolha uma vantagem ou técnica como seu ougi (técnica secreta). Custará -1PM (mínimo 1) e, no primeiro uso da sessão, o alvo tem Perda no teste resistido. Pode trocar seu ougi a cada evolução dramática."}]},
"Paladino":{exig:"Devoto; Código dos Heróis e Honestidade",desc:"Campeões de causas e ideais, paladinos podem ser cavaleiros clássicos ou usar armaduras robóticas. Heróis naturais, frequentemente assumem a liderança. Todos confiam em paladinos.",poderes:[{nome:"Bravura final",desc:"Você não faz testes de morte: qualquer dano nesse estado é descontado de seus PM. Sem PM, você cai automaticamente Quase Morto. PM perdidos assim só podem ser recuperados com descanso."},{nome:"Me dê sua força!",desc:"Quando usa Devoto para ter Ganho em um teste, some +1 ao resultado de cada dado. Não afeta críticos, mas cancela falhas críticas."},{nome:"Sétimo sentido",desc:"Quando está perto da derrota, gaste 2PM para fazer um ataque ou defesa uma escala acima."}]},
"Super-Herói":{exig:"Ágil, Carismático, Forte, Gênio, Resoluto ou Vigoroso; Código dos Heróis",desc:"Aqueles que usam seus dons especiais para proteger o planeta. O típico super-herói tem um único superpoder de destaque, mas muitos têm conjuntos de poderes relacionados. Formados na UniPotência.",poderes:[{nome:"Sobrehumano",desc:"Escolha uma vantagem das exigências que você possua. Gaste 1PM para aumentar seu bônus de atributo em +4, em vez de +2."},{nome:"Façanha épica",desc:"Uma vez por sessão, em um teste envolvendo um atributo sobrehumano, você pode aumentar esse teste uma escala."},{nome:"Herói de ação",desc:"Você tem 2 Pontos de Ação extras (Poder+2)."}]},
"Tanque":{exig:"R3, Defesa Especial (Provocação)",desc:"Especializados em defesa, tanques atuam como escudos vivos para os companheiros, atraindo ataques inimigos sobre si. São chamativos, provocadores — não existe tanque tímido ou furtivo. Quase todos são vaidosos e metidos.",poderes:[{nome:"Hoje não!",desc:"Uma vez por cena, quando recebe dano que o levaria a 0PV, você pode ignorar completamente esse dano."},{nome:"Defesa gratuita",desc:"Uma vez por cena, você pode usar uma Defesa Especial sem gastar PM."},{nome:"Último bastião",desc:"Quando você está perto da derrota, todos os seus testes de defesa têm Ganho."}]},
"Hacker":{exig:"Máquinas; Telepata",homebrew:true,autor:"Dan C. | Hao",desc:"Muito se engana aquele que olha para um hacker e vê apenas um 'especialista em informática'. Se trata de alguém que se aprofundou tanto em entender a maneira que a informação trafega pela internet e os códigos de funcionamento dos mais diversos sistemas, ao ponto de conseguir facilmente interceptar dados ou explorar as vulnerabilidades de redes e dispositivos. As motivações dos hackers são as mais variadas: alguns são contratados por grandes corporações para testar sistemas, outros focados em roubos e golpes, e mais ainda assumem ideais ferrenhos e tornam sua habilidade em arma de revolta, expondo segredos dos poderosos e opressores.",poderes:[{nome:"Encontrar rastros",desc:"Todo mundo deixa informações online, e você sabe exatamente onde estão. Gastando 3PM por uso (ao invés de apenas 1), você não é restrito a personagens presentes na cena para aplicar efeitos de Telepata; quaisquer Ganhos obtidos dessa forma deverão ser usados até o final da sessão, ou serão perdidos."},{nome:"Explorar brechas",desc:"Você vai longe com acesso à internet e algumas linhas de código. Uma vez por cena, você pode usar Máquinas para substituir qualquer outra perícia. Você pode pagar 3PM para cada nova utilização na mesma cena."},{nome:"Pane no sistema",desc:"Você desconfigurou um aparato tecnológico (ou mesmo alguém!). Quando lida com um adversário envolvendo tecnologia ou do tipo Construto, você pode atacar usando Máquinas e obtém acesso a Paralisia (caso adquira essa Vantagem, poderá usá-la por apenas 1PM)."}]}
};
window.LISTA_KITS = Object.keys(window.KITS).sort();
window.VANTAGENS = {"Aceleração":{c:"1",d:"Pode gastar 1PM para realizar um movimento extra em seu turno, ou Ganho na iniciativa."},"+Ação":{c:"1",d:"Você tem mais PA, além daqueles oferecidos por Poder. Cada compra = +2PA."},"Ágil":{c:"1",d:"Recebe H+2 em testes de agilidade, coordenação ou equilíbrio. Pode gastar 2PM para crítico com 5 ou 6."},"Ajudante":{c:"1",d:"Uma vez por rodada, gaste 2PM para invocar ajudante. Tipos: Curandeiro, Especialista, Familiar (1PM), Lutador ou Montaria (1PM)."},"Alcance":{c:"1-2",d:"1pt: alcança Longe sem penalidade. 2pt: também alcança Muito Longe sem penalidade."},"Anulação":{c:"2",d:"Gaste 1 ação e 3PM para anular uma vantagem usada em sua presença. Alvo faz teste R(9+P) para resistir."},"Arena":{c:"1",d:"Gaste 2PM para ter Ganho em testes em um tipo de terreno específico (Água, Céu, Cidades, Ermos ou Subterrâneo)."},"Ataque Especial":{c:"1",d:"Ao atacar, gaste PM para efeitos: Área(3PM), Choque(1PM), Distante(1PM), Penetrante(2PM), Perigoso(1PM), Potente(1PM/P+2), Preciso(1PM), Titânico(3PM)."},"Carismático":{c:"1",d:"Recebe P+2 em testes sociais. Pode gastar 2PM para crítico com 5 ou 6."},"Cura":{c:"1",d:"Gaste 2PM para curar 1D PV (limite = H dados). Ou gaste 2PM para alvo repetir teste de R contra efeito negativo."},"Defesa Especial":{c:"1",d:"Ao receber ataque, gaste PM para: Blindada(1PM), Bloqueio(1PM), Esquiva(1PM), Proteção(1PM), Provocação(1PM), Reflexão(1PM), Tenaz(1PM/+2R), Titânica(3PM)."},"Devoto":{c:"1",d:"Gaste 2PM para Ganho ao seguir/defender sua devoção. Máximo 2x por cena."},"Famoso":{c:"1",d:"Gaste 3PM para Ganho em testes sociais com NPCs que te reconhecem."},"Forte":{c:"1",d:"Recebe P+2 em testes de força física. Pode gastar 2PM para crítico com 5 ou 6."},"Gênio":{c:"1",d:"Recebe H+2 em testes de conhecimento e raciocínio. Pode gastar 2PM para crítico com 5 ou 6."},"Golpe Final":{c:"1",d:"Gaste 3PM para atacar alvo perto da derrota. O ataque sobe uma escala."},"Ilusão":{c:"2",d:"Cria ilusões 3D sem substância. Custo: 1PM(livro), 3PM(pessoa), 5PM(caminhão), 8PM(prédio). Criar = 1 ação."},"Imortal":{c:"1",d:"Em testes de morte, você nunca tem resultado pior que inconsciente."},"Imune":{c:"1",d:"Imune a algo específico. Opções: Abiótico, Anfíbio, Doenças, Resiliente ou Sem Mente."},"Inimigo":{c:"1-2",d:"Crítico com 5 ou 6 contra tipo escolhido (Humanos, Humanoides, Construtos, Espíritos ou Monstros)."},"Invisível":{c:"1-2",d:"Gaste 3PM: Ganho para se esconder, ataques contra você têm Perda. 1pt: interrompe ao atacar. 2pt: só ao sofrer dano."},"Maestria":{c:"1",d:"Gaste 1PM em testes da perícia escolhida para crítico com 5 ou 6."},"Magia":{c:"2",d:"Gaste 1PM para +1 em qualquer teste (máx = H). Pode usar Mística em vez de Luta para atacar/defender."},"+Mana":{c:"1",d:"Cada compra = +10PM máximo."},"Mentor":{c:"1",d:"1x por cena, Ganho em teste da perícia escolhida. Técnicas com essa perícia gastam -1PM."},"Paralisia":{c:"1",d:"Ataque + 2PM. Se vencer, alvo fica imobilizado e indefeso. Dura até fim da cena ou sofrer dano."},"Patrono":{c:"1",d:"Ganho em testes de compra para missões do Patrono. +1 item consumível de cada raridade no Inventário."},"Regeneração":{c:"1-2",d:"1pt: +1PV no início do turno. 2pt: +3PV no início do turno. Testes de morte nunca piores que inconsciente."},"Resoluto":{c:"1",d:"Recebe R+2 em testes de força de vontade. Pode gastar 2PM para crítico com 5 ou 6."},"Riqueza":{c:"2+",d:"Gaste PM para subir escala em testes de compra: 2pt/Sugoi(2PM), 4pt/Kiodai(4PM), 6pt/Kami(6PM)."},"Sentido":{c:"1",d:"Sentido especial: Aguçado, Infravisão, Intuição, Radar ou Raio X."},"Telepata":{c:"1",d:"Gaste 1PM+movimento: Ganho em perícia social, ou descubra atributo/vantagem de personagem, ou Ganho na defesa."},"Teleporte":{c:"1",d:"Gaste 1PM por movimento substituído para ir a qualquer lugar visível. Gaste 3PM para Ganho na defesa."},"Torcida":{c:"1",d:"Com torcida presente: 1 Ganho por rodada em qualquer teste. Role 1D no início da cena: com 1, há torcida."},"Transformação":{c:"1-2",d:"Crie outra forma com os mesmos pontos. 1pt: desvantagens se acumulam. 2pt: cada forma tem só as suas."},"+Vida":{c:"1",d:"Cada compra = +10PV máximo."},"Vigoroso":{c:"1",d:"Recebe R+2 em testes de saúde física. Pode gastar 2PM para crítico com 5 ou 6."},"Voo":{c:"1",d:"Você pode voar. Levantar voo usa 1 movimento e 2PM. Ignora terrenos difíceis."}};
window.LISTA_VANT = Object.keys(window.VANTAGENS).sort();
window.DESVANTAGENS = {
"Ambiente":{c:"-1",d:"Você é mais acostumado a certo ambiente (água, clima muito quente, shopping, fliperama, etc.) que não existe em abundância no local da campanha. No início de cada cena, role 1D. Com resultado 1, nada relacionado ao seu ambiente existe ali e você tem Perda em todos os testes. O mestre pode dispensar a rolagem em situações especiais."},
"Amnésia":{c:"-2",d:"Você não sabe quem é. O mestre faz sua ficha em segredo. Você pode tentar fazer coisas, e o mestre diz se conseguiu ou não — sem jamais revelar se você tem a perícia ou vantagem. O mestre pode rolar seus testes secretamente, apenas anunciando os resultados. Suas vantagens só funcionam em situações de risco real, e as desvantagens aparecem no pior momento possível."},
"Antipático":{c:"-1",d:"Você não consegue (ou não quer) se expressar bem. Timidez, deselegância, orgulho, rabugice, aura sinistra — ou você é apenas um baita chato! Quando faz um teste de Poder envolvendo interação social, você tem Perda e nunca tem acertos críticos. Incompatível com Carismático."},
"Assombrado":{c:"-1 ou -2",d:"Você é assombrado por um espírito, sentimento ruim ou lembrança amarga. Escolha a intensidade: (-1pt) Ao entrar em situação de risco, role 1D — com resultado 1, todos os testes têm Perda até o fim da cena. (-2pt) A assombração aparece com qualquer resultado ímpar."},
"Atrapalhado":{c:"-1",d:"Você se atrapalha com facilidade. Quando faz um teste de Habilidade envolvendo coordenação e agilidade, você tem Perda e nunca tem acertos críticos. Incompatível com Ágil."},
"Aura":{c:"-1 ou -2",d:"Você emana uma aura de energia negativa, estática, karma ruim ou pura uruca. Qualquer um pode senti-la. (-1pt) Qualquer teste de outras pessoas realizado Perto de você tem Perda. (-2pt) Qualquer teste Longe de você ou menos tem Perda."},
"Bateria":{c:"-1",d:"Você tem uma reserva de energia para permanecer ativo. Sempre que ficar com 0PM, você 'desliga' — fica inconsciente e indefeso. Além disso, quando está com PM abaixo de sua Habilidade, sua bateria está fraca e todos os seus testes têm Perda."},
"Código":{c:"-1",d:"Você segue um código de conduta que o impede de fazer (ou deixar de fazer) alguma coisa. Sempre que violar seu código, a culpa o deixará com Perda em todos os testes até que consiga se redimir. Você pode ter mais de um Código."},
"Dependência":{c:"-2",d:"O personagem depende de algo raro, proibido ou desumano para viver (sangue, cérebros, substância ilícita...). A Dependência deve ser satisfeita todos os dias. Se não o fizer, o personagem tem Perda em todos os testes até satisfazê-la."},
"Diferente":{c:"-1",d:"Seu corpo é muito diferente de um humanoide comum. Você tem Perda ao usar itens feitos para outros. O inverso também é válido. O mestre pode conceder Ganho em situações onde sua diferença é vantajosa (ex: goblin pequeno em furtividade)."},
"Elo Vital":{c:"-1",d:"Escolha um aliado, que também deve ter esta desvantagem. Sempre que um de vocês sofre dano, o outro também perde PV na mesma quantidade. Se os personagens pertencem a escalas diferentes, o dano é ajustado proporcionalmente. Curar um não cura o outro."},
"Fracote":{c:"-1",d:"Você é fraco — falta ódio... e força. Ao fazer um teste de Poder envolvendo esforço físico (mover pedra, derrubar porta), você tem Perda e nunca tem acertos críticos. Incompatível com Forte."},
"Frágil":{c:"-1",d:"Você tem pouco vigor físico. Ao fazer um teste de Resistência envolvendo saúde física (resistir doenças, venenos, testes de morte), você tem Perda e nunca tem acertos críticos. Incompatível com Vigoroso."},
"Fraqueza":{c:"-1 ou -2",d:"Existe um objeto, elemento ou condição à qual você é especialmente vulnerável. Enquanto Perto dessa coisa, todos os seus testes têm Perda. (-1pt) Incomum: aparece raramente (1 em 1D). (-2pt) Comum: aparece com frequência (1-3 em 1D)."},
"Fúria":{c:"-2",d:"Sempre que você sofre dano ou fica irritado, deve fazer um teste de Resistência (9 ou igual ao dano, o maior). Se falhar, entra em frenesi e ataca o alvo mais próximo. Durante a Fúria: Perda em testes que não sejam de ataque (inclusive defesa), e vantagens gastam o dobro de PM. Termina quando alguém é derrotado ou foge; você fica esgotado (PM=0, Perda até descansar)."},
"Inapto":{c:"-1",d:"Escolha uma perícia que não possua. Você é um completo incompetente quando se trata dela. Sempre que o mestre pede um teste com essa perícia, você está em Perda. Além disso, qualquer falha é considerada falha crítica."},
"Inculto":{c:"-1",d:"Você não tem familiaridade com a cultura local. Não sabe ler a língua local (ou acha muito difícil). Tem dificuldade para se comunicar, exceto com seus aliados. Testes sociais com personagens que não o entendem têm Perda."},
"Indeciso":{c:"-1",d:"Você tem pouca convicção e muita dificuldade para tomar decisões importantes. Em testes de Resistência envolvendo força de vontade, você tem Perda e nunca tem acertos críticos. Incompatível com Resoluto."},
"Infame":{c:"-1",d:"Você é muito conhecido, mas não por uma boa razão. Quando faz testes sociais com um NPC que o reconhece (normalmente 1-4 em 1D), você está sempre em Perda. Incompatível com Famoso."},
"Lento":{c:"-1",d:"Você se move devagar. Em testes de iniciativa, está sempre em Perda. Também gasta um movimento a mais para cruzar cada distância. Incompatível com Aceleração."},
"Maldição":{c:"-1 ou -2",d:"Você é vítima de uma maldição que o perturba quase o tempo inteiro. (-1pt) Suave/constrangedora: pode causar Perda em situações específicas. (-2pt) Grave: efeito mecânico severo e constante (ex: receber o mesmo dano que causa, falhas críticas em um atributo, nunca curar PV exceto com descanso)."},
"Monstruoso":{c:"-1",d:"Você tem uma aparência grotesca que causa repulsa. Exceto quando pega alguém de surpresa, você sempre tem Perda em testes de iniciativa. Você também tem Perda em testes sociais que envolvem aparência. Incompatível com Inofensivo."},
"Munição":{c:"-1",d:"Sua arma ou técnica exige recarga após cada uso. Sempre que você usa uma ação para atacar, precisa usar um movimento para recarregar. Se atacar sem recarregar, não soma Poder ao teste de ataque nem em críticos."},
"Pacifista":{c:"-1 ou -2",d:"Você rejeita conflito e violência. (-1pt) Pode se defender quando atacado, mas não faz testes de ataque. (-2pt) Não faz absolutamente nada que cause dano — até ferir com palavras é violento demais! Se violar, tem Perda até se redimir."},
"Pobreza":{c:"-1",d:"Você não tem recursos financeiros e não consegue acumulá-los de nenhuma maneira. Todos os seus testes de compra são feitos em Perda. Incompatível com Riqueza."},
"Ponto Fraco":{c:"-1",d:"Você tem uma característica que seu adversário pode explorar (desequilíbrio na postura, tique nervoso, falha de raciocínio...). Pode ser descoberto por quem já viu você em ação, por Telepatia, ou por teste resistido de Percepção. Qualquer adversário que conhece seu Ponto Fraco pode gastar 1PM para ter Ganho contra você em um teste que explora esse problema."},
"Protegido":{c:"-1",d:"Existe alguém que você precisa proteger com a própria vida. Sempre que o Protegido está desaparecido, indefeso ou ferido (qualquer PV abaixo do total), todos os seus testes têm Perda. Vilões podem e vão usá-lo como chantagem. Se o Protegido morre para sempre, você adquire Assombrado -2pt."},
"Restrição":{c:"-1 ou -2",d:"Certa condição torna mais difícil usar seus poderes. Quando ela acontece, você sempre gasta o dobro de PM para usar suas vantagens. (-1pt) Incomum: acontece raramente. (-2pt) Comum: acontece com muita frequência. Só pode ter esta desvantagem se tiver vantagens que gastam PM."},
"Sem Vida":{c:"-2",d:"Você não é um ser vivo (construto, morto-vivo, brinquedo animado...). Em testes de morte, nunca tem resultado pior que inconsciente. Porém, não recupera PV de formas normais (descanso, itens, Cura, Regeneração). Pode ser consertado/restaurado com Máquinas ou Mística (1h de trabalho, teste 9). Ainda precisa descansar para recuperar PA e PM."},
"Tapado":{c:"-1",d:"Você não é uma pessoa muito brilhante. Quando faz testes de Habilidade relacionados a inteligência e raciocínio, você tem Perda e nunca tem acertos críticos. Incompatível com Gênio."},
"Transtorno":{c:"-1",d:"Você lida com um transtorno mental. Escolha um entre: Cleptomania, Compulsão, Distração, Fantasia, Fobia, Megalomania, Mitomania ou Paranoia. Superação de transtornos exige teste de Resistência (9)."},
"Utensílio":{c:"-1 ou -2",d:"Você precisa de um item específico para usar adequadamente uma perícia ou vantagens. (-1pt) Sem o Utensílio, não consegue acertos críticos na perícia escolhida. (-2pt) Sem o Utensílio, não pode usar vantagens/técnicas com PM nem PA (exceto para recuperar o item). Se rolar falha crítica usando o Utensílio, o deixa cair e precisa de um movimento para recuperá-lo."}
};

anoides":"Crítico com 5 ou 6 contra Humanoides. Custo: 1pt.","Construtos":"Crítico com 5 ou 6 contra Construtos. Custo: 1pt.","Espíritos":"Crítico com 5 ou 6 contra Espíritos. Custo: 1pt.","Monstros":"Crítico com 5 ou 6 contra Monstros. Custo: 1pt."},"Arena":{"Água":"Gaste 2PM para Ganho em testes em ambientes aquáticos.","Céu":"Gaste 2PM para Ganho em testes no ar.","Cidades":"Gaste 2PM para Ganho em testes em ambientes urbanos.","Ermos":"Gaste 2PM para Ganho em testes em ambientes selvagens.","Subterrâneo":"Gaste 2PM para Ganho em testes em ambientes subterrâneos."},"Sentido":{"Aguçado":"Ganho em Percepção com o sentido escolhido.","Infravisão":"Percebe seres de sangue quente e enxerga no escuro.","Intuição":"Percebe intenções ocultas: mentiras, segredos, intenção de ataque.","Radar":"Percebe tudo em volta mesmo de costas ou no escuro.","Raio X":"Vê através de portas e paredes (exceto metal ou mágico)."},"Maestria":{"Animais":"Gaste 1PM para crítico com 5 ou 6 em testes de Animais.","Arte":"Gaste 1PM para crítico com 5 ou 6 em testes de Arte.","Esporte":"Gaste 1PM para crítico com 5 ou 6 em testes de Esporte.","Influência":"Gaste 1PM para crítico com 5 ou 6 em testes de Influência.","Luta":"Gaste 1PM para crítico com 5 ou 6 em testes de Luta.","Manha":"Gaste 1PM para crítico com 5 ou 6 em testes de Manha.","Máquinas":"Gaste 1PM para crítico com 5 ou 6 em testes de Máquinas.","Medicina":"Gaste 1PM para crítico com 5 ou 6 em testes de Medicina.","Mística":"Gaste 1PM para crítico com 5 ou 6 em testes de Mística.","Percepção":"Gaste 1PM para crítico com 5 ou 6 em testes de Percepção.","Saber":"Gaste 1PM para crítico com 5 ou 6 em testes de Saber.","Sobrevivência":"Gaste 1PM para crítico com 5 ou 6 em testes de Sobrevivência."},"Mentor":{"Animais":"1x por cena: Ganho em Animais. Técnicas com Animais gastam -1PM.","Arte":"1x por cena: Ganho em Arte. Técnicas com Arte gastam -1PM.","Esporte":"1x por cena: Ganho em Esporte. Técnicas com Esporte gastam -1PM.","Influência":"1x por cena: Ganho em Influência. Técnicas com Influência gastam -1PM.","Luta":"1x por cena: Ganho em Luta. Técnicas com Luta gastam -1PM.","Manha":"1x por cena: Ganho em Manha. Técnicas com Manha gastam -1PM.","Máquinas":"1x por cena: Ganho em Máquinas. Técnicas com Máquinas gastam -1PM.","Medicina":"1x por cena: Ganho em Medicina. Técnicas com Medicina gastam -1PM.","Mística":"1x por cena: Ganho em Mística. Técnicas com Mística gastam -1PM.","Percepção":"1x por cena: Ganho em Percepção. Técnicas com Percepção gastam -1PM.","Saber":"1x por cena: Ganho em Saber. Técnicas com Saber gastam -1PM.","Sobrevivência":"1x por cena: Ganho em Sobrevivência. Técnicas com Sobrevivência gastam -1PM."},"Código":{"Asimov 1ª":"Jamais causar mal a um ser humano ou, por omissão, permitir que um humano sofra qualquer mal.","Asimov 2ª":"Sempre obedecer a seres humanos, exceto quando suas ordens violam outro Código que você tenha.","Caçador":"Nunca matar (apenas derrotar) filhotes ou gestantes. Nunca abandonar uma caça abatida. Sempre escolher como oponente o inimigo mais perigoso na cena. Nunca permitir a fuga de um oponente.","Combate":"Nunca atacar um oponente em condição desfavorável (em Perda) ou de escala inferior.","Derrota":"Nunca seguir lutando depois de derrotado. Aceitar qualquer condição do vitorioso — pode ser dever um favor, tornar-se seu servo/aliado, ou tirar sua vida.","Gratidão":"Sempre que alguém presta um grande favor (salvar sua vida, libertá-lo de cativeiro...) a você ou um ente querido, você fica a serviço dessa pessoa até devolver o favor de forma equivalente.","Heróis":"Sempre cumprir sua palavra. Sempre proteger qualquer pessoa ou criatura mais fraca que você. Jamais recusar um pedido de ajuda.","Honestidade":"Nunca mentir, roubar, trapacear ou desobedecer às leis locais, nem permitir que seus companheiros o façam.","Redenção":"Nunca atacar primeiro. Sempre aceitar um pedido de rendição. Sempre poupar oponentes derrotados."},"Transtorno":{"Cleptomania":"Você rouba coisas de que não precisa, não por seu valor, apenas por serem interessantes. Sempre que surgir a chance de roubar algo, deve fazer um teste de Resistência (9) para evitar. Um cleptomaníaco nunca devolve o produto de seus roubos e lutará para evitar que isso aconteça.","Compulsão":"Existe algo que você precisa fazer várias vezes por dia: tomar banho, lavar roupa, comer lasanha, tocar harpa, roer as unhas... Cada vez que uma cena começa, você tem Perda em todos os testes até gastar uma rodada cumprindo sua compulsão.","Distração":"Você não consegue se concentrar em algo que não o interessa (qualquer coisa não relacionada a Devoto ou Código). Nestas situações você não consegue acertos críticos.","Fantasia":"Você acredita ser alguém ou alguma coisa que não é, ou acha que pode fazer algo de que não é capaz. Você fala de si mesmo o tempo todo anunciando sua fantasia para todos. Perda em todos os testes sociais.","Fobia":"Você tem medo terrível de alguma coisa (lugares altos, insetos, água, sangue...). Sempre que essa coisa está Perto, você não consegue fazer ações — apenas movimentos. Só consegue fazer uma ação se antes passar em um teste de Resistência (9).","Megalomania":"Você acredita ser invencível, imortal, destinado a realizar um grande objetivo, e ninguém conseguirá detê-lo! Você nunca se rende e segue lutando mesmo após ser derrotado.","Mitomania":"Você nunca diz a verdade sobre coisa alguma, mesmo quando quer. Precisa de um teste de Resistência (9) para dizer algo verdadeiro, até para seus aliados.","Paranoia":"Você não confia em ninguém, nem em seus aliados. Precisa de um teste de Resistência (9) para aceitar qualquer ajuda (até cura!). Além disso, não dorme direito: sua recuperação de recursos com descanso é metade do normal."},"Inapto":{"Animais":"Perda e falhas críticas em testes de Animais.","Arte":"Perda e falhas críticas em testes de Arte.","Esporte":"Perda e falhas críticas em testes de Esporte.","Influência":"Perda e falhas críticas em testes de Influência.","Luta":"Perda e falhas críticas em testes de Luta.","Manha":"Perda e falhas críticas em testes de Manha.","Máquinas":"Perda e falhas críticas em testes de Máquinas.","Medicina":"Perda e falhas críticas em testes de Medicina.","Mística":"Perda e falhas críticas em testes de Mística.","Percepção":"Perda e falhas críticas em testes de Percepção.","Saber":"Perda e falhas críticas em testes de Saber.","Sobrevivência":"Perda e falhas críticas em testes de Sobrevivência."},
"Assombrado":{"-1pt (resultado 1)":"Ao entrar em situação de risco (combate, cena de ação), role 1D. Com resultado 1, todos os seus testes têm Perda até o fim da cena.","-2pt (resultado ímpar)":"Ao entrar em situação de risco, role 1D. Com qualquer resultado ímpar, todos os seus testes têm Perda até o fim da cena."},
"Aura":{"-1pt (Perto)":"Qualquer teste de outras pessoas realizado Perto de você, seja de aliados ou inimigos, tem Perda.","-2pt (Longe ou menos)":"Qualquer teste Longe de você ou menos tem Perda — aliados e inimigos igualmente afetados."},
"Fraqueza":{"Incomum (-1pt)":"A Fraqueza aparece raramente (1 em 1D). Enquanto Perto dela, todos os seus testes têm Perda. Exemplos: livros, espelhos, gatos, objetos de bronze, cor roxa.","Comum (-2pt)":"A Fraqueza aparece com frequência (1-3 em 1D). Enquanto Perto dela, todos os seus testes têm Perda. Exemplos: lugares escuros, vento, água, plantas, cor vermelha."},
"Maldição":{"Suave (-1pt)":"A maldição é irritante ou constrangedora. Normalmente não tem efeito em regras, mas pode causar Perda em situações específicas a critério do mestre.","Grave (-2pt)":"A maldição tem efeito mecânico severo e constante. Exemplos: receber o mesmo dano que causa; falhas sempre críticas em um atributo; nunca curar PV exceto com descanso; um monstro te ataca toda noite."},
"Pacifista":{"-1pt (sem atacar)":"Você não se envolve em combate violento. Quando atacado, pode se defender, mas não fazer testes de ataque. Ainda pode derrotar oponentes de outras formas (Luta Não é Tudo).","-2pt (sem causar dano)":"Você não faz absolutamente nada que cause dano — até ferir com palavras é violento demais. Se violar, tem Perda em todos os testes até se redimir."},
"Restrição":{"Incomum (-1pt)":"A restrição acontece raramente. Quando acontece, você gasta o dobro de PM para usar suas vantagens. Exemplos: estar molhado, ter fome, lua cheia, inimigo de certo arquétipo.","Comum (-2pt)":"A restrição acontece com muita frequência. Quando acontece, você gasta o dobro de PM para usar suas vantagens. Exemplos: ser noite/dia, estar em lugar fechado/aberto, ter alguém olhando."},
"Utensílio":{"-1pt (sem críticos na perícia)":"Escolha uma perícia que você tem. Você precisa do Utensílio para usá-la adequadamente. Quando não está com ele, você não consegue acertos críticos nessa perícia.","-2pt (sem PM e PA)":"Sem o Utensílio, você não pode usar vantagens ou técnicas que gastam PM, nem usar PA (exceto para recuperar o Utensílio). Falha crítica usando o item = cai, precisa de um movimento para recuperá-lo."}};

<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useLayoutEffect,useCallback} = React;

// Hook responsivo
const useIsMobile = () => {
  const [mob, setMob] = useState(window.innerWidth <= 640);
  useEffect(()=>{
    const fn = ()=>setMob(window.innerWidth<=640);
    window.addEventListener('resize',fn);
    return ()=>window.removeEventListener('resize',fn);
  },[]);
  return mob;
};
const PERICIAS = window.PERICIAS;
const PERICIAS_DESC = window.PERICIAS_DESC || {};
const ARQUETIPOS = window.ARQUETIPOS_DATA;
const LISTA_ARQ = window.LISTA_ARQ;
const KITS = window.KITS;
const LISTA_KITS = window.LISTA_KITS;
const VANTAGENS = window.VANTAGENS;
const LISTA_VANT = window.LISTA_VANT;
const DESVANTAGENS = window.DESVANTAGENS;
const LISTA_DESV = window.LISTA_DESV;
const OPCOES = window.OPCOES;
const SUBOPCOES = window.SUBOPCOES || {};
const TECNICAS_DATA = window.TECNICAS_DATA || {};
const LISTA_TEC = window.LISTA_TEC || [];

const FIREBASE = window.FIREBASE_URL || "https://plusdistophya-default-rtdb.firebaseio.com";

const uid = () => Math.random().toString(36).substring(2, 9);
const gerarCodCamp = () => 'CAMP-' + Math.random().toString(36).substring(2,6).toUpperCase();

async function fbGet(path) {
  const r = await fetch(`${FIREBASE}/${path}.json`);
  if (r.status === 401) throw new Error('REGRAS_FIREBASE');
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}
async function fbSet(path, data) {
  const r = await fetch(`${FIREBASE}/${path}.json`, {
    method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data)
  });
  if (r.status === 401) throw new Error('REGRAS_FIREBASE');
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}
async function fbPush(path, data) {
  const r = await fetch(`${FIREBASE}/${path}.json`, {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data)
  });
  if (r.status === 401) throw new Error('REGRAS_FIREBASE');
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}
async function fbDelete(path) {
  const r = await fetch(`${FIREBASE}/${path}.json`, { method: 'DELETE' });
  if (r.status === 401) throw new Error('REGRAS_FIREBASE');
}

const MSG_REGRAS = `🔒 Banco de dados bloqueado (erro 401).\n\nPara usar a campanha, abra as regras do Firebase:\n\n1. Acesse console.firebase.google.com\n2. Projeto: plusdistophya\n3. Realtime Database → Regras\n4. Cole isso e publique:\n\n{\n  "rules": {\n    ".read": true,\n    ".write": true\n  }\n}`;

const EMPTY = {
  id:null,nome:'',arquetipo:'',arquetipoCusto:0,experiencia:0,
  pontosMax: 10,
  escala:'Ningen',foto:null,
  atributos:{poder:0,habilidade:0,resistencia:0},
  recursos:{pa:0,pm:5,pv:5},
  bonusPA:0, bonusPM:0, bonusPV:0,
  pericias:[],vantagens:[],desvantagens:[],kits:[],tecnicas:[],
  inventario:{ itens:[], dinheiro:'' },
  anotacoes:'',historia:''
};

// ── Small UI Components ────────────────────────────────────────────────────
const Icon = ({n,s='16'}) => {
  const ref = useRef(null);
  useLayoutEffect(() => {
    if(ref.current && window.lucide) {
      ref.current.innerHTML = `<i data-lucide="${n}" style="width:${s}px;height:${s}px"></i>`;
      window.lucide.createIcons({root:ref.current});
    }
  });
  return <span ref={ref} style={{display:'inline-flex',alignItems:'center',justifyContent:'center'}} />;
};

const Btn = ({onClick,children,style={},className='',disabled=false}) => (
  <button onClick={onClick} disabled={disabled} className={'cbtn '+className} style={{...style,opacity:disabled?0.5:1,cursor:disabled?'not-allowed':'pointer'}}>{children}</button>
);

const Stepper = ({value,onChange,min=0}) => (
  <div style={{display:'flex',alignItems:'center',gap:4}}>
    <button onClick={()=>onChange(Math.max(min,value-1))} className="cbtn" style={{padding:'4px 12px',fontSize:18,minWidth:36,minHeight:36}}>−</button>
    <input type="number" value={value} onChange={e=>onChange(Math.max(min,parseInt(e.target.value)||0))}
      style={{width:52,textAlign:'center',fontSize:20,fontWeight:900}} />
    <button onClick={()=>onChange(value+1)} className="cbtn" style={{padding:'4px 12px',fontSize:18,minWidth:36,minHeight:36}}>+</button>
  </div>
);

const Bar = ({label,current,max,color,icon,onChange}) => {
  const pct = max > 0 ? Math.min(100,(current/max)*100) : 0;
  const bg = color==='red' ? 'linear-gradient(90deg,#ff1744,#ff5252)' : 'linear-gradient(90deg,#00b8d4,#00e5ff)';
  const glow = color==='red' ? '0 0 10px rgba(255,23,68,0.6)' : '0 0 10px rgba(0,229,255,0.6)';
  const c = color==='red' ? '#ff5252' : '#00e5ff';
  const btnStyle = {
    width:26,height:26,background:'rgba(0,0,0,0.45)',border:'1px solid '+c+'55',
    color:c,cursor:'pointer',fontSize:16,fontWeight:900,borderRadius:4,
    display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,
    transition:'background 0.15s',lineHeight:1,padding:0
  };
  return (
    <div style={{marginBottom:8}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
        <span style={{color:c,fontFamily:'Orbitron',fontSize:11,display:'flex',alignItems:'center',gap:4}}>
          <Icon n={icon} s="14"/> {label}
        </span>
        <div style={{display:'flex',alignItems:'center',gap:4}}>
          <button style={btnStyle}
            onClick={()=>onChange(Math.max(0,current-1))}
            onMouseEnter={e=>e.currentTarget.style.background='rgba(0,0,0,0.7)'}
            onMouseLeave={e=>e.currentTarget.style.background='rgba(0,0,0,0.45)'}>−</button>
          <input type="number" value={current} onChange={e=>onChange(parseInt(e.target.value)||0)}
            style={{width:48,textAlign:'center',fontSize:14,fontWeight:700,padding:'2px 4px'}} />
          <button style={btnStyle}
            onClick={()=>onChange(current+1)}
            onMouseEnter={e=>e.currentTarget.style.background='rgba(0,0,0,0.7)'}
            onMouseLeave={e=>e.currentTarget.style.background='rgba(0,0,0,0.45)'}>+</button>
          <span style={{color:'rgba(0,229,255,0.4)',fontSize:12}}>/ {max}</span>
        </div>
      </div>
      <div style={{height:8,background:'rgba(0,0,0,0.8)',border:'1px solid rgba(0,229,255,0.15)',borderRadius:4,overflow:'hidden'}}>
        <div style={{height:'100%',width:pct+'%',background:bg,boxShadow:glow,transition:'width 0.3s'}} />
      </div>
    </div>
  );
};

const ListSection = ({title,color,items,suggestions,onAdd,onUpdate,onRemove}) => {
  const listId = 'dl-'+title.replace(/\s/g,'-');
  const total = items.reduce((a,i)=>a+(parseInt(i.custo)||0),0);
  const borderColor = color==='red'?'rgba(255,23,68,0.3)':color==='green'?'rgba(0,230,118,0.3)':'rgba(0,229,255,0.3)';
  const titleColor = color==='red'?'#ff5252':color==='green'?'#00e676':'#00e5ff';
  return (
    <div className="panel" style={{padding:16,borderColor}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,borderBottom:'1px solid rgba(0,229,255,0.15)',paddingBottom:8}}>
        <span style={{fontFamily:'Orbitron',fontSize:12,color:titleColor,textTransform:'uppercase',letterSpacing:1}}>
          {title} <span style={{color:'rgba(0,229,255,0.4)',fontSize:10}}>({total>0?'+'+total:total}pts)</span>
        </span>
        <Btn onClick={onAdd} style={{padding:'2px 8px',fontSize:11}}>+ ADD</Btn>
      </div>
      {suggestions && <datalist id={listId}>{suggestions.map(s=><option key={s} value={s}/>)}</datalist>}
      <div style={{maxHeight:320,overflowY:'auto',display:'flex',flexDirection:'column',gap:8}}>
        {items.map(item => {
          const subOpts = OPCOES[item.nome];
          const subId = 'sub-'+item.id;
          return (
            <div key={item.id} style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.12)',borderRadius:6,padding:8,position:'relative'}}>
              <div style={{display:'flex',gap:6,marginBottom:6,flexWrap:'wrap'}}>
                <input list={listId} placeholder="Nome" value={item.nome}
                  onChange={e=>onUpdate(item.id,'nome',e.target.value)}
                  style={{flex:'2 1 120px',fontSize:13,fontWeight:700,padding:'3px 6px'}} />
                {subOpts && <datalist id={subId}>{subOpts.map(o=><option key={o} value={o}/>)}</datalist>}
                <input list={subOpts?subId:undefined} placeholder="Detalhe/Opção" value={item.detalhe||''}
                  onChange={e=>onUpdate(item.id,'detalhe',e.target.value)}
                  style={{flex:'2 1 100px',fontSize:12,padding:'3px 6px',fontStyle:'italic'}} />
                <input type="number" placeholder="Pts" value={item.custo}
                  onChange={e=>onUpdate(item.id,'custo',e.target.value)}
                  style={{width:44,textAlign:'center',fontSize:13,fontWeight:700,padding:'3px 4px'}} />
                <button onClick={()=>onRemove(item.id)} className="no-print"
                  style={{background:'none',border:'none',color:'#ff1744',cursor:'pointer',padding:'2px 4px',fontSize:14}}>×</button>
              </div>
              <textarea placeholder="Descrição do efeito..." value={item.descricao||''}
                onChange={e=>onUpdate(item.id,'descricao',e.target.value)}
                rows={2} style={{width:'100%',fontSize:11,padding:'4px 6px',resize:'none',lineHeight:1.4}} />
            </div>
          );
        })}
        {items.length===0 && <p style={{color:'rgba(0,229,255,0.25)',fontSize:11,textAlign:'center',padding:8,fontStyle:'italic'}}>Vazio</p>}
      </div>
    </div>
  );
};

// ── Dice Modal ───────────────────────────────────────────────────────────────
const DiceModal = ({onClose,attrs,pericias,onRoll}) => {
  const [attr,setAttr] = useState('habilidade');
  // perícia selecionada — detecta Luta automaticamente
  const [periciaSel,setPericiaSel] = useState('');
  const [gain,setGain] = useState(0);
  const [loss,setLoss] = useState(0);
  const [crit,setCrit] = useState(6);
  const [mod,setMod] = useState(0);
  const [roll,setRoll] = useState(null);
  const [rolling,setRolling] = useState(false);
  const [hist,setHist] = useState([]);

  // tem a perícia Luta? → 2D; senão → 1D; ganhos/perdas ajustam
  const temLuta = pericias && pericias.some(p=>p.nome==='Luta');
  const baseSkill = periciaSel ? 1 : 0; // qualquer perícia selecionada dá +1D
  const dice = Math.max(1, Math.min(3, 1 + baseSkill + gain - loss));

  const doRoll = () => {
    if(rolling) return;
    setRolling(true);
    setTimeout(()=>{
      const res = Array.from({length:dice},()=>Math.floor(Math.random()*6)+1);
      const av = attrs[attr]||0;
      const crits = res.filter(r=>r>=crit).length;
      const fail = res.every(r=>r===1);
      const total = res.reduce((a,b)=>a+b,0)+av+(crits*av)+mod;
      const nr = {id:Date.now(),attr,dice,pericia:periciaSel,res,total,av,crits,fail,mod,crit};
      setRoll(nr); setHist(p=>[nr,...p].slice(0,8)); setRolling(false);
      if(onRoll) onRoll(nr);
    },500);
  };
  const colors = {poder:'#ff1744',habilidade:'#00e5ff',resistencia:'#00e676'};
  // perícias disponíveis do personagem
  const listaPericias = pericias ? pericias.map(p=>p.nome) : [];

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,5,15,0.92)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
      <div className="panel" style={{width:'100%',maxWidth:480,maxHeight:'90vh',overflowY:'auto',padding:20}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <span style={{fontFamily:'Orbitron',color:'#00e5ff',fontSize:14}}>🎲 TESTE 3DeT</span>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#ff1744',fontSize:20,cursor:'pointer'}}>×</button>
        </div>

        {/* Atributos */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:12}}>
          {['poder','habilidade','resistencia'].map(a=>(
            <button key={a} onClick={()=>setAttr(a)} style={{
              background:attr===a?colors[a]+'22':'rgba(0,0,0,0.4)',
              border:`1px solid ${attr===a?colors[a]:'rgba(0,229,255,0.2)'}`,
              color:attr===a?colors[a]:'rgba(0,229,255,0.5)',
              borderRadius:6,padding:'10px 4px',cursor:'pointer',
              fontFamily:'Orbitron',fontSize:9,textTransform:'uppercase',letterSpacing:0.5
            }}>
              <div style={{fontSize:11,marginBottom:2}}>{a.slice(0,3).toUpperCase()}</div>
              <div style={{fontSize:16,fontWeight:900}}>{attrs[a]||0}</div>
            </button>
          ))}
        </div>

        {/* Perícia — seletor ou toggle Luta */}
        <div style={{marginBottom:12}}>
          <div style={{fontFamily:'Orbitron',fontSize:9,color:'rgba(0,229,255,0.4)',marginBottom:6,textTransform:'uppercase',letterSpacing:1}}>
            Perícia <span style={{color:'rgba(0,229,255,0.25)',fontSize:8,fontFamily:'Share Tech Mono'}}>(+1D se tiver)</span>
          </div>
          {listaPericias.length > 0 ? (
            <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
              {/* Botão "Nenhuma" */}
              <button onClick={()=>setPericiaSel('')} style={{
                padding:'4px 10px',borderRadius:5,cursor:'pointer',fontFamily:'Orbitron',fontSize:8,
                border:'1px solid rgba(0,229,255,0.2)',
                background:periciaSel===''?'rgba(0,229,255,0.15)':'rgba(0,0,0,0.4)',
                color:periciaSel===''?'#00e5ff':'rgba(0,229,255,0.35)',
                textTransform:'uppercase'
              }}>Nenhuma</button>
              {listaPericias.map(p=>(
                <button key={p} onClick={()=>setPericiaSel(periciaSel===p?'':p)} style={{
                  padding:'4px 10px',borderRadius:5,cursor:'pointer',fontFamily:'Orbitron',fontSize:8,
                  border:'1px solid '+(periciaSel===p?'#00e5ff':'rgba(0,229,255,0.2)'),
                  background:periciaSel===p?'rgba(0,229,255,0.15)':'rgba(0,0,0,0.4)',
                  color:periciaSel===p?'#00e5ff':'rgba(0,229,255,0.4)',
                  textTransform:'uppercase'
                }}>{p}</button>
              ))}
            </div>
          ) : (
            /* Sem ficha carregada: toggle manual */
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>setPericiaSel(periciaSel?'':'Luta')} style={{
                flex:1,padding:8,borderRadius:6,cursor:'pointer',fontFamily:'Orbitron',fontSize:9,
                border:'1px solid '+(periciaSel?'#00e5ff':'rgba(0,229,255,0.2)'),
                background:periciaSel?'rgba(0,229,255,0.12)':'rgba(0,0,0,0.4)',
                color:periciaSel?'#00e5ff':'rgba(0,229,255,0.4)',
                textTransform:'uppercase'
              }}>{periciaSel ? '✓ COM PERÍCIA' : 'SEM PERÍCIA'}</button>
            </div>
          )}
        </div>

        {/* Dados + info */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
          <div style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.2)',borderRadius:6,padding:'8px 12px',textAlign:'center'}}>
            <div style={{fontFamily:'Orbitron',fontSize:9,color:'rgba(0,229,255,0.4)',marginBottom:4}}>DADOS</div>
            <span style={{fontFamily:'Orbitron',fontSize:24,color:'#00e5ff',fontWeight:900}}>{dice}D6</span>
            <div style={{fontSize:8,color:'rgba(0,229,255,0.3)',fontFamily:'Share Tech Mono',marginTop:2}}>
              {periciaSel ? `+1D (${periciaSel})` : '1D base'}
            </div>
          </div>
          <div style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.2)',borderRadius:6,padding:'8px 12px',textAlign:'center'}}>
            <div style={{fontFamily:'Orbitron',fontSize:9,color:'rgba(0,229,255,0.4)',marginBottom:4}}>FÓRMULA</div>
            <span style={{fontFamily:'Orbitron',fontSize:14,color:'#00e5ff',fontWeight:900}}>
              {dice}D6 + {attrs[attr]||0}
            </span>
            <div style={{fontSize:8,color:'rgba(0,229,255,0.3)',fontFamily:'Share Tech Mono',marginTop:2}}>
              {attr.slice(0,3).toUpperCase()} = {attrs[attr]||0}
            </div>
          </div>
        </div>

        {/* Ganhos / Perdas / Mod */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:12}}>
          {[['Ganhos',gain,setGain,'#00e676'],['Perdas',loss,setLoss,'#ff1744'],['Mod',mod,setMod,'#00e5ff']].map(([label,val,setter,c])=>(
            <div key={label} style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.15)',borderRadius:6,padding:8,textAlign:'center'}}>
              <div style={{fontSize:9,color:'rgba(0,229,255,0.4)',marginBottom:4,fontFamily:'Orbitron'}}>{label.toUpperCase()}</div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                <button onClick={()=>setter(label==='Mod'?val-1:Math.max(0,val-1))} style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.2)',color:'#fff',borderRadius:3,width:20,height:20,cursor:'pointer',fontSize:12}}>−</button>
                <span style={{fontFamily:'Orbitron',color:c,fontWeight:900,minWidth:20,textAlign:'center'}}>{val>0?'+'+val:val}</span>
                <button onClick={()=>setter(val+1)} style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.2)',color:'#fff',borderRadius:3,width:20,height:20,cursor:'pointer',fontSize:12}}>+</button>
              </div>
            </div>
          ))}
        </div>

        <label style={{display:'flex',alignItems:'center',gap:6,marginBottom:12,fontSize:11,color:'rgba(0,229,255,0.5)'}}>
          <input type="checkbox" checked={crit===5} onChange={()=>setCrit(crit===6?5:6)} />
          Crítico também com 5 (Maestria)
        </label>

        <button onClick={doRoll} disabled={rolling} style={{
          width:'100%',padding:14,background:'rgba(0,229,255,0.1)',border:'1px solid #00e5ff',
          color:'#00e5ff',fontFamily:'Orbitron',fontSize:12,letterSpacing:2,cursor:'pointer',
          borderRadius:6,marginBottom:12,textTransform:'uppercase'
        }}>{rolling?'ROLANDO...':`ROLAR ${dice}D6 + ${attrs[attr]||0}`}</button>

        <div style={{background:'rgba(0,0,0,0.6)',border:'1px solid rgba(0,229,255,0.15)',borderRadius:6,minHeight:100,padding:12,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
          {rolling && <div style={{width:32,height:32,border:'3px solid rgba(0,229,255,0.2)',borderTop:'3px solid #00e5ff',borderRadius:'50%',animation:'roll 0.6s linear infinite'}} />}
          {!rolling && roll && (
            <div style={{textAlign:'center',width:'100%'}}>
              {roll.fail && <div style={{background:'#ff1744',color:'#fff',fontSize:10,fontFamily:'Orbitron',padding:'2px 8px',borderRadius:3,marginBottom:8}}>FALHA CRÍTICA!</div>}
              <div style={{display:'flex',justifyContent:'center',gap:8,marginBottom:8}}>
                {roll.res.map((v,i)=>{
                  const isCrit=v>=roll.crit;
                  return <div key={i} style={{
                    width:44,height:44,display:'flex',alignItems:'center',justifyContent:'center',
                    borderRadius:8,border:'2px solid',fontSize:22,fontWeight:900,
                    background:isCrit?'rgba(255,214,0,0.2)':roll.fail?'rgba(255,23,68,0.2)':'rgba(0,229,255,0.08)',
                    borderColor:isCrit?'#ffd600':roll.fail?'#ff1744':'rgba(0,229,255,0.3)',
                    color:isCrit?'#ffd600':roll.fail?'#ff5252':'#00e5ff'
                  }}>{v}</div>;
                })}
              </div>
              {!roll.fail && (
                <div>
                  <div style={{background:'rgba(0,229,255,0.1)',border:'1px solid rgba(0,229,255,0.3)',borderRadius:20,padding:'6px 20px',display:'inline-flex',alignItems:'center',gap:8,marginBottom:4}}>
                    <span style={{fontSize:10,color:'rgba(0,229,255,0.5)',fontFamily:'Orbitron'}}>RESULTADO</span>
                    <span style={{fontSize:26,fontWeight:900,color:'#00e5ff',fontFamily:'Orbitron'}}>{roll.total}</span>
                  </div>
                  <div style={{fontSize:9,color:'rgba(0,229,255,0.35)',fontFamily:'Share Tech Mono'}}>
                    [{roll.res.join('+')}] + {roll.av}{roll.pericia?' ('+roll.pericia+')':''}
                    {roll.crits>0&&<span style={{color:'#ffd600'}}> +{roll.crits}×{roll.av} crítico</span>}
                    {roll.mod!==0&&<span> {roll.mod>0?'+':''}{roll.mod} mod</span>}
                  </div>
                </div>
              )}
            </div>
          )}
          {!rolling && !roll && <p style={{color:'rgba(0,229,255,0.25)',fontSize:11}}>Configure e role os dados...</p>}
        </div>

        {hist.length>0 && (
          <div style={{marginTop:12}}>
            <div style={{fontFamily:'Orbitron',fontSize:9,color:'rgba(0,229,255,0.4)',marginBottom:6,textTransform:'uppercase'}}>Histórico</div>
            <div style={{display:'flex',flexDirection:'column',gap:4,maxHeight:100,overflowY:'auto'}}>
              {hist.map(h=>(
                <div key={h.id} style={{display:'flex',justifyContent:'space-between',fontSize:10,padding:'3px 6px',background:'rgba(0,0,0,0.3)',borderRadius:4}}>
                  <span style={{color:'rgba(0,229,255,0.5)',fontFamily:'Orbitron'}}>{h.dice}D {h.attr.slice(0,3).toUpperCase()}{h.pericia?' +'+h.pericia.slice(0,3):''}</span>
                  <span style={{color:'rgba(0,229,255,0.4)'}}>[{h.res.join(',')}]</span>
                  <span style={{color:h.fail?'#ff1744':'#00e5ff',fontWeight:700}}>{h.fail?'FALHA':'= '+h.total}</span>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

// ── Campaign Panel ──────────────────────────────────────────────────────────
const CampaignPanel = ({char, sheets, onClose}) => {
  const [mode, setMode] = useState('menu');
  const [campNome, setCampNome] = useState('');
  const [campCode, setCampCode] = useState('');
  const [joinCode, setJoinCode] = useState('');
  const [loading, setLoading] = useState(false);
  const [erro, setErro] = useState('');
  const [campData, setCampData] = useState(null);
  const [fichas, setFichas] = useState({});
  const [rolls, setRolls] = useState([]);
  const [iniciativas, setIniciativas] = useState([]);
  const [fichaAberta, setFichaAberta] = useState(null);
  const [npcNome, setNpcNome] = useState('');
  const [npcHabil, setNpcHabil] = useState(0);
  const [npcTemLuta, setNpcTemLuta] = useState(false);
  const [diceOpen, setDiceOpen] = useState(false);
  const [tab, setTab] = useState('fichas');
  const pollingRef = useRef(null);
  const myPlayerId = useRef(char.id ? 'j-'+char.id : 'j-'+uid());
  const [fbErro, setFbErro] = useState(false);
  const [showSheetSelector, setShowSheetSelector] = useState(false);

  // estado local dos recursos para feedback imediato antes de salvar no Firebase
  const [recursosLocal, setRecursosLocal] = useState({}); // { [fichaId]: { pv, pm, pa } }

  // ── Ficha ativa do jogador: prioriza dados registrados no Firebase ──
  // Garante que atributos, nome e perícias estão sempre corretos mesmo se char local estiver vazio
  const fichaAtiva = useMemo(() => {
    const pid = myPlayerId.current;
    const remota = fichas[pid];
    if (remota && (remota.atributos?.poder || remota.atributos?.habilidade || remota.atributos?.resistencia)) {
      return { ...char, ...remota, atributos: remota.atributos, pericias: remota.pericias || char.pericias };
    }
    return char;
  }, [fichas, char]);

  useEffect(() => {
    try {
      const s = localStorage.getItem('3det_camp');
      if(s) {
        const d = JSON.parse(s);
        setCampData(d); setCampCode(d.code); setMode('sala');
        iniciarPolling(d.code);
      }
    } catch(e) {}
    return () => pararPolling();
  }, []);

  const pararPolling = () => { if(pollingRef.current) clearInterval(pollingRef.current); };
  const iniciarPolling = (code) => {
    pararPolling(); buscarTudo(code);
    pollingRef.current = setInterval(() => buscarTudo(code), 4000);
  };
  const buscarTudo = async (code) => {
    try {
      const [fichasData, rollsData, initData] = await Promise.all([
        fbGet(`campanhas/${code}/fichas`).catch(e=>{if(e.message==='REGRAS_FIREBASE')setFbErro(true);return null;}),
        fbGet(`campanhas/${code}/rolls`).catch(()=>null),
        fbGet(`campanhas/${code}/iniciativas`).catch(()=>null),
      ]);
      setFbErro(false);
      if(fichasData) setFichas(fichasData);
      if(rollsData) {
        const arr = Object.entries(rollsData).map(([k,v])=>({...v,_fbKey:k})).sort((a,b)=>b.ts-a.ts).slice(0,30);
        setRolls(arr);
      } else setRolls([]);
      if(initData) {
        const arr = Object.entries(initData).map(([k,v])=>({...v,_fbKey:k})).sort((a,b)=>b.total-a.total);
        setIniciativas(arr);
      } else setIniciativas([]);
    } catch(e) {}
  };

  const criarCampanha = async () => {
    if(!campNome.trim()){setErro('Digite o nome da campanha.');return;}
    setLoading(true); setErro('');
    try {
      const code = gerarCodCamp();
      const data = {code,nome:campNome.trim(),mestre:char.nome||'Mestre',criadoEm:Date.now()};
      await fbSet(`campanhas/${code}/info`, data);
      localStorage.setItem('3det_camp', JSON.stringify(data));
      setCampData(data); setCampCode(code); setMode('sala');
      iniciarPolling(code);
      navigator.clipboard.writeText(code).catch(()=>{});
      alert('✅ Campanha criada!\nCódigo: '+code+'\n(Já copiado para a área de transferência)');
    } catch(e){
      if(e.message==='REGRAS_FIREBASE'){alert(MSG_REGRAS);setErro('🔒 Banco bloqueado.');}
      else setErro('Erro ao criar: '+e.message);
    }
    setLoading(false);
  };

  const entrarCampanha = async () => {
    const code = joinCode.trim().toUpperCase();
    if(!code){setErro('Digite o código.');return;}
    setLoading(true); setErro('');
    try {
      const data = await fbGet(`campanhas/${code}/info`);
      if(!data||!data.code){setErro('❌ Campanha não encontrada.');setLoading(false);return;}
      localStorage.setItem('3det_camp', JSON.stringify(data));
      setCampData(data); setCampCode(code); setMode('sala');
      iniciarPolling(code);
    } catch(e){
      if(e.message==='REGRAS_FIREBASE'){alert(MSG_REGRAS);setErro('🔒 Banco bloqueado.');}
      else setErro('❌ Erro ao buscar campanha.');
    }
    setLoading(false);
  };

  // ── MUDANÇA: Registrar ficha usa char.nome sempre (não "Jogador") ──
  const buildPayload = (sheet, playerId) => ({
    id: playerId,
    nome: sheet.nome || 'Sem nome',
    arquetipo: sheet.arquetipo,
    atributos: sheet.atributos,
    recursos: sheet.recursos,
    kits: (sheet.kits||[]).map(k=>k.nome),
    pericias: (sheet.pericias||[]).slice(0,30),
    vantagens: (sheet.vantagens||[]).slice(0,30),
    desvantagens: (sheet.desvantagens||[]).slice(0,30),
    tecnicas: (sheet.tecnicas||[]).slice(0,20),
    inventario: sheet.inventario,
    anotacoes: sheet.anotacoes,
    historia: sheet.historia,
    atualizadoEm: Date.now()
  });

  const registrarFicha = async () => {
    if(!char.nome){alert('Sua ficha precisa ter um nome primeiro.');return;}
    setLoading(true);
    try {
      const payload = buildPayload(char, myPlayerId.current);
      await fbSet(`campanhas/${campCode}/fichas/${myPlayerId.current}`, payload);
      await buscarTudo(campCode);
      alert('✅ Ficha de "'+char.nome+'" registrada!');
    } catch(e){
      if(e.message==='REGRAS_FIREBASE') alert(MSG_REGRAS);
      else alert('Erro ao registrar: '+e.message);
    }
    setLoading(false);
  };

  const registrarFichaFromSheet = async (sheet) => {
    if(!sheet.nome){alert('A ficha selecionada não tem nome.');return;}
    setLoading(true);
    try {
      const pid = 'j-'+sheet.id;
      const payload = buildPayload(sheet, pid);
      await fbSet(`campanhas/${campCode}/fichas/${pid}`, payload);
      await buscarTudo(campCode);
      alert('✅ Ficha de "'+sheet.nome+'" registrada!');
    } catch(e){
      if(e.message==='REGRAS_FIREBASE') alert(MSG_REGRAS);
      else alert('Erro: '+e.message);
    }
    setLoading(false);
    setShowSheetSelector(false);
  };

  // ── publicarRolagem usa nome da ficha registrada no Firebase ──
  const publicarRolagem = async (rollObj, nomeJogador) => {
    if(!campCode) return;
    const nomeReal = fichaAtiva.nome || nomeJogador || char.nome || 'Desconhecido';
    try {
      await fbPush(`campanhas/${campCode}/rolls`, {
        player: nomeReal,
        roll: rollObj, ts: Date.now(),
        time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})
      });
      buscarTudo(campCode);
    } catch(e){}
  };

  const rolarIniciativa = async () => {
    const h = fichaAtiva.atributos?.habilidade||0;
    const temLuta = (fichaAtiva.pericias||[]).some(p=>p.nome==='Luta');
    const dados = Math.max(1, Math.min(3, 1 + (temLuta?1:0)));
    const res = Array.from({length:dados},()=>Math.floor(Math.random()*6)+1);
    const total = res.reduce((a,b)=>a+b,0)+h;
    const nomeJogador = fichaAtiva.nome || char.nome || 'Jogador';
    try {
      await fbSet(`campanhas/${campCode}/iniciativas/${myPlayerId.current}`, {
        id:myPlayerId.current, nome:nomeJogador, total, res, habil:h, temLuta, ts:Date.now(), isNpc:false
      });
      buscarTudo(campCode);
    } catch(e){}
  };

  // ── MUDANÇA: NPC — qualquer pessoa pode adicionar se ehMestre (conforme decisão) ──
  const rolarIniciativaNpc = async () => {
    if(!npcNome.trim()) return;
    const h = parseInt(npcHabil)||0;
    const dados = Math.max(1, Math.min(3, 1 + (npcTemLuta?1:0)));
    const res = Array.from({length:dados},()=>Math.floor(Math.random()*6)+1);
    const total = res.reduce((a,b)=>a+b,0)+h;
    const npcId = 'npc-'+uid();
    try {
      await fbSet(`campanhas/${campCode}/iniciativas/${npcId}`, {
        id:npcId, nome:'[NPC] '+npcNome.trim(), total, res, habil:h, temLuta:npcTemLuta, ts:Date.now(), isNpc:true
      });
      setNpcNome(''); buscarTudo(campCode);
    } catch(e){}
  };

  const removerIniciativa = async (id) => {
    try { await fbDelete(`campanhas/${campCode}/iniciativas/${id}`); buscarTudo(campCode); } catch(e){}
  };
  const limparIniciativas = async () => {
    try { await fbDelete(`campanhas/${campCode}/iniciativas`); setIniciativas([]); } catch(e){}
  };
  const removerFicha = async (fichaId) => {
    if(!window.confirm('Remover esta ficha da campanha?')) return;
    try { await fbDelete(`campanhas/${campCode}/fichas/${fichaId}`); buscarTudo(campCode); } catch(e){}
  };

  // ── Ajustar recurso com +1 / -1, com feedback local imediato ──
  const ajustarRecurso = async (fichaId, campo, delta) => {
    const fichaAtual = fichas[fichaId];
    if(!fichaAtual) return;
    const base = recursosLocal[fichaId]?.[campo] ?? fichaAtual.recursos?.[campo] ?? 0;
    const novoVal = Math.max(0, base + delta);
    // atualiza local imediatamente
    setRecursosLocal(prev => ({
      ...prev,
      [fichaId]: { ...(prev[fichaId] || fichaAtual.recursos || {}), [campo]: novoVal }
    }));
    try {
      const novosRecursos = {...(fichaAtual.recursos||{}), ...(recursosLocal[fichaId]||{}), [campo]: novoVal};
      await fbSet(`campanhas/${campCode}/fichas/${fichaId}/recursos`, novosRecursos);
    } catch(e){}
  };

  const setRecursoExato = async (fichaId, campo, valor) => {
    const fichaAtual = fichas[fichaId];
    if(!fichaAtual) return;
    const novoVal = Math.max(0, parseInt(valor)||0);
    setRecursosLocal(prev => ({
      ...prev,
      [fichaId]: { ...(prev[fichaId] || fichaAtual.recursos || {}), [campo]: novoVal }
    }));
    try {
      const novosRecursos = {...(fichaAtual.recursos||{}), ...(recursosLocal[fichaId]||{}), [campo]: novoVal};
      await fbSet(`campanhas/${campCode}/fichas/${fichaId}/recursos`, novosRecursos);
    } catch(e){}
  };

  const sairCampanha = () => {
    pararPolling();
    localStorage.removeItem('3det_camp');
    setCampData(null); setCampCode(''); setFichas({}); setRolls([]);
    setIniciativas([]); setMode('menu'); setFichaAberta(null);
  };

  if(mode==='menu') return (
    <div style={{display:'flex',flexDirection:'column',gap:12,padding:16}}>
      <p style={{color:'rgba(0,229,255,0.5)',fontSize:12,lineHeight:1.6,margin:0}}>
        Crie ou entre em uma campanha para compartilhar fichas, rolagens e iniciativa em tempo real.
      </p>
      <button onClick={()=>setMode('criar')} style={{padding:'12px 16px',background:'rgba(255,214,0,0.08)',border:'1px solid rgba(255,214,0,0.35)',color:'#ffd600',borderRadius:8,cursor:'pointer',fontFamily:'Orbitron',fontSize:11,textTransform:'uppercase',letterSpacing:1}}>
        👑 Criar Nova Campanha (Mestre)
      </button>
      <button onClick={()=>setMode('entrar')} style={{padding:'12px 16px',background:'rgba(0,229,255,0.06)',border:'1px solid rgba(0,229,255,0.25)',color:'#00e5ff',borderRadius:8,cursor:'pointer',fontFamily:'Orbitron',fontSize:11,textTransform:'uppercase',letterSpacing:1}}>
        ⚡ Entrar em Campanha (Jogador)
      </button>
    </div>
  );

  if(mode==='criar') return (
    <div style={{display:'flex',flexDirection:'column',gap:10,padding:16}}>
      <button onClick={()=>{setMode('menu');setErro('');}} style={{background:'none',border:'none',color:'rgba(0,229,255,0.5)',cursor:'pointer',fontSize:11,fontFamily:'Orbitron',textAlign:'left',padding:0,marginBottom:4}}>← Voltar</button>
      <div style={{fontFamily:'Orbitron',fontSize:12,color:'#ffd600',marginBottom:4}}>👑 CRIAR CAMPANHA</div>
      <input value={campNome} onChange={e=>setCampNome(e.target.value)} placeholder="Nome da campanha..."
        style={{fontSize:14,padding:'8px 10px'}} onKeyDown={e=>e.key==='Enter'&&criarCampanha()} />
      {erro && <div style={{color:'#ff5252',fontSize:11}}>{erro}</div>}
      <button onClick={criarCampanha} disabled={loading} style={{padding:'10px',background:'rgba(255,214,0,0.12)',border:'1px solid #ffd600',color:'#ffd600',borderRadius:6,cursor:'pointer',fontFamily:'Orbitron',fontSize:11,textTransform:'uppercase',opacity:loading?0.6:1}}>
        {loading?'Criando...':'✦ Criar'}
      </button>
    </div>
  );

  if(mode==='entrar') return (
    <div style={{display:'flex',flexDirection:'column',gap:10,padding:16}}>
      <button onClick={()=>{setMode('menu');setErro('');}} style={{background:'none',border:'none',color:'rgba(0,229,255,0.5)',cursor:'pointer',fontSize:11,fontFamily:'Orbitron',textAlign:'left',padding:0,marginBottom:4}}>← Voltar</button>
      <div style={{fontFamily:'Orbitron',fontSize:12,color:'#00e5ff',marginBottom:4}}>⚡ ENTRAR NA CAMPANHA</div>
      <input value={joinCode} onChange={e=>setJoinCode(e.target.value.toUpperCase())} placeholder="Código: CAMP-XXXX"
        style={{fontSize:14,padding:'8px 10px',fontFamily:'Share Tech Mono'}} onKeyDown={e=>e.key==='Enter'&&entrarCampanha()} />
      {erro && <div style={{color:'#ff5252',fontSize:11,padding:'4px 0'}}>{erro}</div>}
      <button onClick={entrarCampanha} disabled={loading} style={{padding:'10px',background:'rgba(0,229,255,0.1)',border:'1px solid #00e5ff',color:'#00e5ff',borderRadius:6,cursor:'pointer',fontFamily:'Orbitron',fontSize:11,textTransform:'uppercase',opacity:loading?0.6:1}}>
        {loading?'Buscando...':'⚡ Entrar'}
      </button>
    </div>
  );

  // ── Sala ──
  const fichasArr = Object.values(fichas);
  const ehMestre = campData && (campData.mestre === char.nome);

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      {fbErro && (
        <div style={{background:'rgba(255,23,68,0.12)',border:'1px solid rgba(255,23,68,0.4)',margin:'8px 12px',borderRadius:8,padding:'10px 12px',flexShrink:0}}>
          <div style={{fontFamily:'Orbitron',fontSize:10,color:'#ff5252',marginBottom:4}}>🔒 BANCO BLOQUEADO (401)</div>
          <ol style={{fontSize:10,color:'rgba(255,82,82,0.7)',lineHeight:1.7,paddingLeft:16,margin:0}}>
            <li>Abra <strong style={{color:'#ff5252'}}>console.firebase.google.com</strong></li>
            <li>Projeto <strong style={{color:'#ff5252'}}>plusdistophya</strong> → Realtime Database → Regras</li>
            <li>Cole: <code style={{background:'rgba(0,0,0,0.4)',padding:'1px 5px',borderRadius:3,color:'#ffd600',fontSize:9}}>{"{ \"rules\": { \".read\": true, \".write\": true } }"}</code></li>
            <li>Clique em <strong style={{color:'#ff5252'}}>Publicar</strong></li>
          </ol>
          <button onClick={()=>buscarTudo(campCode)} style={{marginTop:8,padding:'4px 10px',background:'rgba(255,23,68,0.1)',border:'1px solid rgba(255,23,68,0.4)',color:'#ff5252',borderRadius:4,cursor:'pointer',fontFamily:'Orbitron',fontSize:8,textTransform:'uppercase'}}>🔄 Tentar novamente</button>
        </div>
      )}

      {/* Cabeçalho campanha */}
      <div style={{padding:'10px 14px',background:'rgba(0,0,0,0.5)',borderBottom:'1px solid rgba(0,229,255,0.15)',flexShrink:0}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
          <div>
            <div style={{fontFamily:'Orbitron',fontSize:13,color:'#ffd600',fontWeight:700}}>{campData?.nome}</div>
            <div style={{fontSize:9,color:'rgba(0,229,255,0.4)',fontFamily:'Share Tech Mono',marginTop:1}}>Mestre: {campData?.mestre}</div>
          </div>
          <button onClick={()=>{navigator.clipboard.writeText(campCode).catch(()=>{});alert('Código copiado: '+campCode);}}
            style={{background:'rgba(255,214,0,0.08)',border:'1px solid rgba(255,214,0,0.3)',color:'#ffd600',borderRadius:4,padding:'3px 8px',cursor:'pointer',fontSize:9,fontFamily:'Orbitron',flexShrink:0}}>
            📋 {campCode}
          </button>
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          <button onClick={registrarFicha} disabled={loading} style={{flex:1,padding:'5px 6px',background:'rgba(0,229,255,0.06)',border:'1px solid rgba(0,229,255,0.25)',color:'#00e5ff',borderRadius:5,cursor:'pointer',fontFamily:'Orbitron',fontSize:8,textTransform:'uppercase',opacity:loading?0.6:1}}>
            {loading?'..':'📤 Registrar Minha Ficha'}
          </button>
          <button onClick={()=>setShowSheetSelector(true)} style={{flex:1,padding:'5px 6px',background:'rgba(168,85,247,0.06)',border:'1px solid rgba(168,85,247,0.25)',color:'#a855f7',borderRadius:5,cursor:'pointer',fontFamily:'Orbitron',fontSize:8,textTransform:'uppercase'}}>
            📚 Registrar da Biblioteca
          </button>
          <button onClick={()=>buscarTudo(campCode)} style={{padding:'5px 8px',background:'rgba(0,229,255,0.04)',border:'1px solid rgba(0,229,255,0.15)',color:'rgba(0,229,255,0.5)',borderRadius:5,cursor:'pointer',fontSize:10}}>🔄</button>
          <button onClick={sairCampanha} style={{padding:'5px 6px',background:'rgba(255,23,68,0.06)',border:'1px solid rgba(255,23,68,0.2)',color:'#ff5252',borderRadius:5,cursor:'pointer',fontFamily:'Orbitron',fontSize:8,textTransform:'uppercase'}}>Sair</button>
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:'flex',borderBottom:'1px solid rgba(0,229,255,0.15)',flexShrink:0}}>
        {[{id:'fichas',label:'👥 Fichas',count:fichasArr.length},{id:'rolagens',label:'🎲 Rolagens',count:rolls.length},{id:'iniciativa',label:'⚔ Turno',count:iniciativas.length}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            flex:1,padding:'8px 4px',background:tab===t.id?'rgba(0,229,255,0.08)':'transparent',
            border:'none',borderBottom:tab===t.id?'2px solid #00e5ff':'2px solid transparent',
            color:tab===t.id?'#00e5ff':'rgba(0,229,255,0.4)',
            cursor:'pointer',fontFamily:'Orbitron',fontSize:8,textTransform:'uppercase',transition:'all 0.2s'
          }}>
            {t.label}{t.count>0?` (${t.count})`:''}
          </button>
        ))}
      </div>

      {/* Conteúdo */}
      <div style={{flex:1,overflowY:'auto',padding:12}}>

        {/* ── TAB FICHAS ── */}
        {tab==='fichas' && (

                <div key={s.id} onClick={()=>registrarFichaFromSheet(s)} style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(168,85,247,0.3)',borderRadius:6,padding:10,marginBottom:8,cursor:'pointer'}}>

// ── Main App ─────────────────────────────────────────────────────────────────
const App = () => {
  const fileRef = useRef(null);
  const impRef = useRef(null);
  const [char,setChar] = useState({...EMPTY,id:Date.now()});
  const [sheets,setSheets] = useState([]);
  const [sidebar,setSidebar] = useState(false);
  const [dice,setDice] = useState(false);
  const [kitIn,setKitIn] = useState('');
  const [campPanel,setCampPanel] = useState(false);
  const [arqPreviewOpen,setArqPreviewOpen] = useState(false);
  const [emCampanha,setEmCampanha] = useState(false);
  const [listTab,setListTab] = useState('pericias'); // mobile: aba ativa das listas
  const isMobile = useIsMobile();

  useEffect(()=>{ setEmCampanha(!!localStorage.getItem('3det_camp')); },[campPanel]);
  useEffect(()=>{
    const s = localStorage.getItem('3det_v2');
    if(s) try{setSheets(JSON.parse(s))}catch(e){}
  },[]);

  const syncToCloud = async () => {
    try {
      let sid = char.syncId;
      if(!sid){sid=Math.random().toString(36).substring(2,7).toUpperCase();setChar(c=>({...c,syncId:sid}));}
      await fbSet(`fichas/${sid}`,{...char,syncId:sid});
      navigator.clipboard.writeText(sid).catch(()=>{});
      alert('☁️ Ficha salva!\nCódigo: '+sid+'\n(Já copiado!)');
    } catch(e){alert('❌ Erro: '+e.message);}
  };

  // Helper: recalcula bonusPA/PM/PV a partir das vantagens de qualquer ficha
  const recalcBonus = (fichaData) => {
    const vants = fichaData.vantagens || [];
    let bPA=0, bPM=0, bPV=0;
    vants.forEach(v => {
      if(v.nome==='+Ação') bPA+=2;
      if(v.nome==='+Mana') bPM+=10;
      if(v.nome==='+Vida') bPV+=10;
    });
    return {bonusPA:bPA, bonusPM:bPM, bonusPV:bPV};
  };

  const importFromCloud = async () => {
    const code = prompt('Código da ficha (ex: 8F2A1):');
    if(!code) return;
    try {
      const data = await fbGet(`fichas/${code.trim().toUpperCase()}`);
      if(data&&data.id){
        const s={...EMPTY,...data,pericias:data.pericias||[],vantagens:data.vantagens||[],desvantagens:data.desvantagens||[],kits:data.kits||[],tecnicas:data.tecnicas||[],inventario:data.inventario||{itens:[],dinheiro:''},...recalcBonus(data)};
        setSheets(p=>{const f=p.filter(x=>x.id!==s.id);return [...f,s];});
        alert('☁️ Ficha importada!');
      } else alert('❌ Nenhuma ficha encontrada.');
    } catch(e){alert('❌ Erro: '+e.message);}
  };

  const save = () => {
    const ns = {...char,id:char.id||Date.now(),saved:new Date().toISOString()};
    try {
      const idx = sheets.findIndex(s=>s.id===ns.id);
      const arr = [...sheets];
      if(idx>=0) arr[idx]=ns; else arr.push(ns);
      localStorage.setItem('3det_v2',JSON.stringify(arr));
      setSheets(arr); setChar(ns); alert('Ficha salva!');
    } catch(e){alert('Erro ao salvar. Tente remover a foto.');}
  };

  // ── MUDANÇA: Pontos = soma total, pontosMax = máximo definido pelo jogador ──
  const pts = useMemo(()=>{
    const a = (char.atributos.poder||0)+(char.atributos.habilidade||0)+(char.atributos.resistencia||0);
    const v = char.vantagens.reduce((x,i)=>x+(parseInt(i.custo)||0),0);
    const d = char.desvantagens.reduce((x,i)=>{
      const obrig = i.detalhe&&(i.detalhe.includes('(Kit:')||i.detalhe.includes('(Arquétipo:'));
      return obrig?x:x+(parseInt(i.custo)||0);
    },0);
    const p = char.pericias.reduce((x,i)=>x+(parseInt(i.custo)||0),0);
    const n = (char.kits||[]).length; const k = n*(n+1)/2;
    return a+v+d+p+k+(parseInt(char.arquetipoCusto)||0);
  },[char.atributos,char.vantagens,char.desvantagens,char.pericias,char.kits,char.arquetipoCusto]);

  const pontosMax = parseInt(char.pontosMax)||10;
  const pontosExcedido = pts > pontosMax;

  const addKit = () => {
    if(!kitIn.trim()) return;
    const name = kitIn.trim();
    const kit = KITS[name];
    if(!kit) return;
    const newV = [...char.vantagens,...(kit.poderes||[]).map((p,i)=>({
      id:Date.now()+i+Math.random(),nome:p.nome,detalhe:'(Kit: '+name+')',descricao:p.desc||'',custo:'0'
    }))];
    let newD = [...char.desvantagens];
    if(kit.desv&&!newD.some(d=>d.nome===kit.desv.nome)){
      newD.push({id:Date.now()+Math.random(),nome:kit.desv.nome,detalhe:'(Kit: '+name+')',descricao:kit.desv.desc||'',custo:kit.desv.custo||'-1'});
    }

  const addItem = list => setChar(c=>({...c,[list]:[...(c[list]||[]),{id:Date.now(),nome:'',detalhe:'',descricao:'',custo:list==='pericias'?'1':''}]}));

  // Recalcula bônus de +Ação/+Mana/+Vida a partir da lista de vantagens
  const calcBonus = (vantagens) => {
    let bPA=0, bPM=0, bPV=0;
    vantagens.forEach(v=>{
      if(v.nome==='+Ação') bPA+=2;
      if(v.nome==='+Mana') bPM+=10;
      if(v.nome==='+Vida') bPV+=10;
    });
    return {bonusPA:bPA, bonusPM:bPM, bonusPV:bPV};
  };

  const updItem = (list,id,f,v) => setChar(c=>{
    const nl = c[list].map(item=>{
      if(item.id!==id) return item;
      const u = {...item,[f]:v};
      if(f==='nome'){
        const info = list==='vantagens'?VANTAGENS[v]:list==='desvantagens'?DESVANTAGENS[v]:null;
        if(info){if(!u.custo||u.custo==='')u.custo=(info.c.match(/-?\d+/)||[''])[0]; u.descricao=info.d;}
        // Auto-preenche descrição da perícia ao selecionar
        if(list==='pericias'){
          const pd = PERICIAS_DESC[v];
          if(pd) u.descricao = pd;
        }
        // Auto-preenche técnica ao selecionar nome da lista
        if(list==='tecnicas'){
          const tec = TECNICAS_DATA[v];
          if(tec){
            u.custo = tec.custo + ' | ' + tec.alcance + ' | ' + tec.duracao;
            u.descricao = '[' + tec.tipo + '] Req: ' + tec.req + '\n' + tec.desc;
          }
        }
        u.detalhe='';
      }
      // Atualiza descrição ao escolher sub-opção (ex: Ataque Especial → Preciso)
      if(f==='detalhe' && v){
        const sub = SUBOPCOES[item.nome] && SUBOPCOES[item.nome][v];
        if(sub) u.descricao = sub;
      }
      return u;
    });
    const bonus = list==='vantagens' ? calcBonus(nl) : {};
    return {...c,[list]:nl,...bonus};
  });

  const remItem = (list,id) => setChar(c=>{
    const nl = c[list].filter(i=>i.id!==id);
    const bonus = list==='vantagens' ? calcBonus(nl) : {};
    return {...c,[list]:nl,...bonus};

  const maxPA = (char.atributos.poder||1) + (char.bonusPA||0);

  const maxPV = (char.atributos.resistencia===0?1:char.atributos.resistencia*5) + (char.bonusPV||0);

      if(!l.kits)l.kits=[];if(!l.id)l.id=Date.now();
      setChar({...EMPTY,...l,...recalcBonus(l)});alert('Ficha carregada!');

  };

  // ── Inventário simplificado ──

  const remInvItem = (id) => setChar(c=>({...c,inventario:{...inv,itens:inv.itens.filter(i=>i.id!==id)}}));

          {!isMobile && <div className="mono" style={{color:'rgba(0,229,255,0.4)',fontSize:8,letterSpacing:3}}>◆ FICHA 3DeT VICTORY ◆</div>}

                      style={{background:'none',border:'none',color:'#ff1744',cursor:'pointer',fontSize:14}}>×</button>
