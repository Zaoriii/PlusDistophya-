    <style>
      body {
            color-scheme: dark;
        }

        /* Ajustes para impressão */
        @media print {
            .no-print {
                display: none !important;
            }

            body {
                background: white !important;
                color: black !important;
                -webkit-print-color-adjust: exact;
                color-scheme: light;
            }

            .bg-slate-900,
            .bg-slate-800,
            .bg-slate-950 {
                background: white !important;
                color: black !important;
            }

            input,
            textarea,
            select {
                border: none !important;
                resize: none;
                overflow: hidden;
                appearance: none;
            }

            .print\:border-black {
                border-color: #000 !important;
            }

            .print\:bg-transparent {
                background: transparent !important;
            }

            .print\:text-black {
                color: #000 !important;
            }

            .max-w-6xl {
                max-width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            .min-h-screen {
                min-height: auto;
            }

            /* Esconde a barra lateral na impressão */
            #sidebar {
                display: none;
            }

            /* Esconde o modal de dados na impressão */
            #dice-modal {
                display: none !important;
            }

            /* Permite textareas expandirem na impressão */
            textarea {
                height: auto !important;
            }

            /* Remove scrollbars na impressão para mostrar tudo */
            .custom-scrollbar {
                max-height: none !important;
                overflow: visible !important;
            }
        }

        /* Remove setinhas dos inputs numéricos */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Scrollbar customizada */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        /* Animação dos dados */
        @keyframes roll {
            0% {
                transform: rotate(0deg);
            }

            25% {
                transform: rotate(90deg);
            }

            50% {
                transform: rotate(180deg);
            }

            75% {
                transform: rotate(270deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .rolling {
            animation: roll 0.5s linear infinite;
        }

        const DiceModal = ({ onClose, attributes, onRollBroadcast }) =&gt; {
            const [selectedAttribute, setSelectedAttribute] = useState(&#39;poder&#39;);
            const [hasSkill, setHasSkill] = useState(false);
            const [gainCount, setGainCount] = useState(0);
            const [lossCount, setLossCount] = useState(0);
            const [critRange, setCritRange] = useState(6);
            const [modifier, setModifier] = useState(0);

            const [history, setHistory] = useState([]);
            const [currentRoll, setCurrentRoll] = useState(null);
            const [isRolling, setIsRolling] = useState(false);

            const diceCount = useMemo(() =&gt; {
                let count = 1;
                if (hasSkill) count++;
                count += gainCount;
                count -= lossCount;
                return Math.max(1, Math.min(3, count));
            }, [hasSkill, gainCount, lossCount]);

            const roll = () =&gt; {
                if (isRolling) return;
                setIsRolling(true);

                setTimeout(() =&gt; {
                    const results = Array.from({ length: diceCount }, () =&gt; Math.floor(Math.random() * 6) + 1);

                    const attrValue = attributes[selectedAttribute] || 0;
                    const diceSum = results.reduce((a, b) =&gt; a + b, 0);

                    const criticalHits = results.filter(r =&gt; r &gt;= critRange).length;
                    const criticalBonus = criticalHits * attrValue;

                    const isCriticalFailure = results.every(r =&gt; r === 1);

                    const total = diceSum + attrValue + criticalBonus + modifier;

                    const newRoll = {
                        id: Date.now(),
                        attribute: selectedAttribute,
                        diceCount,
                        results,
                        total,
                        attrValue,
                        criticalBonus,
                        isCriticalFailure,
                        criticalHits,
                        modifier
                    };

                    setCurrentRoll(newRoll);
                    setHistory(prev =&gt; [newRoll, ...prev].slice(0, 10));
                    setIsRolling(false);
                    if (onRollBroadcast) {
                        onRollBroadcast(newRoll);
                    }
                }, 600);
            };

            const toggleAttr = (attr) =&gt; setSelectedAttribute(attr);

            return (
                &lt;div id=&#34;dice-modal&#34; className=&#34;fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center p-4&#34;&gt;

        const App = () =&gt; {
            const fileInputRef = useRef(null);
            const importInputRef = useRef(null);
            const [showSidebar, setShowSidebar] = useState(false);
            const [showDonationModal, setShowDonationModal] = useState(false);
            const [showDiceModal, setShowDiceModal] = useState(false);
            const [savedSheets, setSavedSheets] = useState([]);
            const [kitInput, setKitInput] = useState(&#39;&#39;);

            // === SISTEMA DE PASTAS E DRAG &amp; DROP ===
            const [folders, setFolders] = useState([]);
            const [dragOverId, setDragOverId] = useState(null);

            // Carrega as pastas salvas ao iniciar
            useEffect(() =&gt; {
                const savedFolders = localStorage.getItem(&#39;3det_folders&#39;);
                if (savedFolders) {
                    try { setFolders(JSON.parse(savedFolders)); }
                    catch (e) { console.error(e); }
                }
            }, []);

            // Cria uma nova pasta
            const createNewFolder = () =&gt; {
                const name = prompt(&#34;Digite o nome da nova pasta (ex: Campanha de Vectora):&#34;);
                if (name &amp;&amp; name.trim()) {
                    const newFolder = { id: `folder_${Date.now()}`, name: name.trim(), isOpen: true };
                    const updatedFolders = [...folders, newFolder];
                    setFolders(updatedFolders);
                    localStorage.setItem(&#39;3det_folders&#39;, JSON.stringify(updatedFolders));
                }
            };

            // Apaga uma pasta
            const deleteFolder = (e, folderId) =&gt; {
                e.stopPropagation();
                if (window.confirm(&#34;Apagar esta pasta? (As fichas dentro dela não serão perdidas, apenas ficarão soltas).&#34;)) {
                    const updatedFolders = folders.filter(f =&gt; f.id !== folderId);
                    setFolders(updatedFolders);
                    localStorage.setItem(&#39;3det_folders&#39;, JSON.stringify(updatedFolders));

                    // Tira o &#34;folderId&#34; das fichas que estavam lá dentro
                    setSavedSheets(prev =&gt; {
                        const newSheets = prev.map(s =&gt; s.folderId === folderId ? { ...s, folderId: null } : s);
                        localStorage.setItem(&#39;3det_sheets&#39;, JSON.stringify(newSheets));
                        return newSheets;
                    });
                }
            };

            // Abre e fecha a pasta
            const toggleFolder = (folderId) =&gt; {
                setFolders(prev =&gt; {
                    const updated = prev.map(f =&gt; f.id === folderId ? { ...f, isOpen: !f.isOpen } : f);
                    localStorage.setItem(&#39;3det_folders&#39;, JSON.stringify(updated));
                    return updated;
                });
            };

            // --- Lógica de Arrastar e Soltar (Drag &amp; Drop) ---
            const handleDragStart = (e, sheetId) =&gt; {
                e.dataTransfer.setData(&#39;sheetId&#39;, sheetId);
                e.dataTransfer.effectAllowed = &#39;move&#39;;
            };

            const handleDragOver = (e, targetId) =&gt; {
                e.preventDefault();
                setDragOverId(targetId);
            };

            const handleDrop = (e, targetFolderId, targetSheetId = null) =&gt; {
                e.preventDefault();
                e.stopPropagation();
                setDragOverId(null);

                const draggedSheetId = parseInt(e.dataTransfer.getData(&#39;sheetId&#39;));
                if (!draggedSheetId || draggedSheetId === targetSheetId) return;

                setSavedSheets(prev =&gt; {
                    let newSheets = [...prev];
                    const draggedIndex = newSheets.findIndex(s =&gt; s.id === draggedSheetId);
                    if (draggedIndex === -1) return prev;

                    // 1. Remove a ficha da posição antiga e atualiza a pasta dela
                    const [draggedSheet] = newSheets.splice(draggedIndex, 1);
                    draggedSheet.folderId = targetFolderId;

                    // 2. Se soltou em cima de outra ficha, insere logo ANTES dela
                    if (targetSheetId) {
                        const targetIndex = newSheets.findIndex(s =&gt; s.id === targetSheetId);
                        newSheets.splice(targetIndex, 0, draggedSheet);
                    } else {
                        newSheets.push(draggedSheet);
                    }

                    localStorage.setItem(&#39;3det_sheets&#39;, JSON.stringify(newSheets));
                    return newSheets;
                });
            };

            //LÓGICA DO LOBBY
            const [showLobbySidebar, setShowLobbySidebar] = useState(false);
            const [lobbyMode, setLobbyMode] = useState(null);
            const [lobbyId, setLobbyId] = useState(&#39;&#39;);
            const [joinInputId, setJoinInputId] = useState(&#39;&#39;);
            const [connectionStatus, setConnectionStatus] = useState(&#39;disconnected&#39;);
            const [sharedRolls, setSharedRolls] = useState([]);
            const [initiatives, setInitiatives] = useState([]);

            const peerRef = useRef(null);
            const connectionsRef = useRef([]);
            const clientConnectionRef = useRef(null);

            const addSharedRoll = (payload) =&gt; {
                setSharedRolls(prev =&gt; [payload, ...prev].slice(0, 50));
            };

            const broadcastInitiative = (newList) =&gt; {
                setInitiatives(newList);
                const message = { type: &#39;SYNC_INITIATIVE&#39;, payload: newList };
                if (lobbyMode === &#39;host&#39;) {
                    connectionsRef.current.forEach(conn =&gt; conn.send(message));
                } else if (lobbyMode === &#39;client&#39; &amp;&amp; clientConnectionRef.current) {
                    clientConnectionRef.current.send(message);
                }
            };

            const startHosting = () =&gt; {
                setConnectionStatus(&#39;connecting&#39;);
                const peer = new Peer();

                peer.on(&#39;open&#39;, (id) =&gt; {
                    setLobbyId(id);
                    setLobbyMode(&#39;host&#39;);
                    setConnectionStatus(&#39;connected&#39;);
                });

                peer.on(&#39;connection&#39;, (conn) =&gt; {
                    connectionsRef.current.push(conn);
                    conn.on(&#39;data&#39;, (data) =&gt; {
                        if (data.type === &#39;ROLL&#39;) {
                            addSharedRoll(data.payload);
                            connectionsRef.current.forEach(c =&gt; {
                                if (c.peer !== conn.peer) c.send(data);
                            });
                        } else if (data.type === &#39;SYNC_SHEET&#39;) {
                            handleIncomingSheet(data.payload);
                            connectionsRef.current.forEach(c =&gt; {
                                if (c.peer !== conn.peer) c.send(data);
                            });
                        }
                        if (data.type === &#39;SYNC_INITIATIVE&#39;) {
                            setInitiatives(data.payload);
                            connectionsRef.current.forEach(c =&gt; { if (c.peer !== conn.peer) c.send(data); });
                        }
                    });
                    conn.on(&#39;close&#39;, () =&gt; {
                        connectionsRef.current = connectionsRef.current.filter(c =&gt; c.peer !== conn.peer);
                    });
                });

                peer.on(&#39;error&#39;, (err) =&gt; {
                    alert(&#34;Erro no servidor P2P: &#34; + err.type);
                    setConnectionStatus(&#39;disconnected&#39;);
                });
                peerRef.current = peer;
            };

            const joinLobby = () =&gt; {
                if (!joinInputId.trim()) return;
                setConnectionStatus(&#39;connecting&#39;);
                const peer = new Peer();

                peer.on(&#39;open&#39;, () =&gt; {
                    const conn = peer.connect(joinInputId.trim());
                    conn.on(&#39;open&#39;, () =&gt; {
                        setLobbyMode(&#39;client&#39;);
                        setLobbyId(joinInputId.trim());
                        setConnectionStatus(&#39;connected&#39;);
                        clientConnectionRef.current = conn;
                    });

                    conn.on(&#39;data&#39;, (data) =&gt; {
                        if (data.type === &#39;ROLL&#39;) {
                            addSharedRoll(data.payload);
                        } else if (data.type === &#39;DELETE_ROLL&#39;) {
                            setSharedRolls(prev =&gt; prev.filter(roll =&gt; roll.id !== data.payload));
                        } else if (data.type === &#39;SYNC_SHEET&#39;) {
                            handleIncomingSheet(data.payload);
                        }

                        if (data.type === &#39;SYNC_INITIATIVE&#39;) {
                            setInitiatives(data.payload);
                        }
                    });
                    // -----------------------

                    conn.on(&#39;close&#39;, () =&gt; {
                        alert(&#34;Conexão com o Host perdida.&#34;);
                        leaveLobby();
                    });
                });

                peer.on(&#39;error&#39;, (err) =&gt; {
                    alert(&#34;Erro ao conectar. Verifique o ID. Detalhe: &#34; + err.type);
                    setConnectionStatus(&#39;disconnected&#39;);
                });
                peerRef.current = peer;
            };

            const leaveLobby = () =&gt; {
                if (peerRef.current) peerRef.current.destroy();
                peerRef.current = null;
                connectionsRef.current = [];
                clientConnectionRef.current = null;
                setLobbyMode(null);
                setLobbyId(&#39;&#39;);
                setConnectionStatus(&#39;disconnected&#39;);
                setSharedRolls([]);
            };

            const handleBroadcastRoll = (rollData) =&gt; {
                const payload = {
                    id: Date.now() + Math.random(),
                    playerName: character.nome || &#39;Jogador Anônimo&#39;,
                    rollData,
                    time: new Date().toLocaleTimeString([], { hour: &#39;2-digit&#39;, minute: &#39;2-digit&#39; })
                };

                if (connectionStatus === &#39;connected&#39;) addSharedRoll(payload);

                const message = { type: &#39;ROLL&#39;, payload };
                if (lobbyMode === &#39;host&#39;) {
                    connectionsRef.current.forEach(conn =&gt; conn.send(message));
                } else if (lobbyMode === &#39;client&#39; &amp;&amp; clientConnectionRef.current) {
                    clientConnectionRef.current.send(message);
                }
            };

            const handleDeleteRoll = (rollId) =&gt; {
                setSharedRolls(prev =&gt; prev.filter(roll =&gt; roll.id !== rollId));

                if (lobbyMode === &#39;host&#39;) {
                    const message = { type: &#39;DELETE_ROLL&#39;, payload: rollId };
                    connectionsRef.current.forEach(conn =&gt; conn.send(message));
                }
            };

            const copyLobbyId = () =&gt; {
                navigator.clipboard.writeText(lobbyId);
                alert(&#34;ID da Sala copiado!&#34;);
            };

            // Estado base
            const emptyCharacter = {
                id: null,
                nome: &#39;&#39;,
                arquetipo: &#39;&#39;,
                arquetipoCusto: 0,
                pontos: 10,
                experiencia: 0,
                escala: &#39;Ningen&#39;,
                marco: &#39;Iniciante&#39;,
                foto: null,
                atributos: { poder: 0, habilidade: 0, resistencia: 0 },
                recursos: { pa_atual: 0, pm_atual: 5, pv_atual: 5 },
                pericias: [],
                vantagens: [],
                desvantagens: [],
                kits: [],
                tecnicas: [],
                nivelInventario: 0,
                trocas: { comumParaIncomum: 0, incomumParaRaro: 0, raroParaLendario: 0 },
                inventario: { comuns: [], incomuns: [], raros: [], lendarios: [] },
                anotacoes: &#39;&#39;,
                historia: &#39;&#39;
            };

            const [character, setCharacter] = useState({ ...emptyCharacter, id: Date.now() });
            const isReceivingSync = useRef(false);
            const syncTimeoutRef = useRef(null);

            // === LÓGICA DE SINCRONIZAÇÃO EM SESSÃO (TEMPO REAL) ===

            // Função que processa a ficha recebida de outro jogador/mestre
            const handleIncomingSheet = (incomingSheet) =&gt; {
                // 1. Atualiza a Biblioteca silenciosamente no fundo
                setSavedSheets(prev =&gt; {
                    const filtered = prev.filter(s =&gt; s.id !== incomingSheet.id);
                    const updated = [...filtered, incomingSheet];
                    localStorage.setItem(&#39;3det_sheets&#39;, JSON.stringify(updated)); // Salva no PC
                    return updated;
                });

                // 2. Se a ficha que eu estou olhando na tela for a mesma que chegou atualizada:
                setCharacter(prev =&gt; {
                    if (prev.id === incomingSheet.id) {
                        isReceivingSync.current = true;
                        return incomingSheet;
                    }
                    return prev;
                });
            };

            useEffect(() =&gt; {
                if (connectionStatus !== &#39;connected&#39;) return;

                if (isReceivingSync.current) {
                    isReceivingSync.current = false;
                    return;
                }

                if (syncTimeoutRef.current) clearTimeout(syncTimeoutRef.current);

                syncTimeoutRef.current = setTimeout(() =&gt; {
                    const message = { type: &#39;SYNC_SHEET&#39;, payload: character };

                    if (lobbyMode === &#39;host&#39;) {
                        connectionsRef.current.forEach(conn =&gt; conn.send(message));
                    } else if (lobbyMode === &#39;client&#39; &amp;&amp; clientConnectionRef.current) {
                        clientConnectionRef.current.send(message);
                    }
                }, 1000);

            }, [character, connectionStatus, lobbyMode]);
            // =========================================================

            // COMPONENTE VISUAL DO CARTÃO DA FICHA NA BIBLIOTECA
            const SheetCard = ({ sheet }) =&gt; (
                &lt;div
                    draggable
                    onDragStart={(e) =&gt; handleDragStart(e, sheet.id)}

                    onDrop={(e) =&gt; handleDrop(e, sheet.folderId || null, sheet.id)}
                    onClick={() =&gt; loadFromLibrary(sheet)}
                    className={`group bg-slate-800 p-2 rounded-xl border cursor-grab active:cursor-grabbing transition-all relative

                &gt;

                            {sheet.foto ? &lt;img src={sheet.foto} className=&#34;w-full h-full object-cover&#34; /&gt; : &lt;div className=&#34;w-full h-full flex items-center justify-center text-slate-600&#34;&gt;&lt;FileText className=&#34;w-5 h-5&#34; /&gt;&lt;/div&gt;}
                        &lt;/div&gt;
                        &lt;div className=&#34;flex-1 min-w-0&#34;&gt;
                            &lt;h4 className=&#34;font-bold text-slate-200 text-sm truncate&#34;&gt;{sheet.nome || &#39;Sem Nome&#39;}&lt;/h4&gt;
                            &lt;p className=&#34;text-[10px] text-slate-500 truncate&#34;&gt;{sheet.arquetipo || &#39;Sem Arquétipo&#39;} • {sheet.pontos}pts&lt;/p&gt;
                        &lt;/div&gt;

                    &lt;button onClick={(e) =&gt; deleteFromLibrary(e, sheet.id)} className=&#34;absolute top-2 right-2 p-1 text-slate-600 hover:text-rose-500 hover:bg-rose-500/10 rounded-md transition-colors opacity-0 group-hover:opacity-100&#34;&gt;
                        &lt;Trash2 className=&#34;w-4 h-4&#34; /&gt;

            );

            // EFEITO DE AUTO-EXPANSÃO GLOBAL DAS TEXTAREAS
            useLayoutEffect(() =&gt; {
                const textareas = document.querySelectorAll(&#39;.auto-expand&#39;);
                textareas.forEach(t =&gt; {
                    t.style.height = &#39;auto&#39;;
                    t.style.height = t.scrollHeight + &#39;px&#39;;
                });
            });

            const handleArquetipoChange = (e) =&gt; {
                const novoNome = e.target.value;
                let novoCusto = character.arquetipoCusto;

                if (DB_ARQUETIPOS[novoNome]) {
                    novoCusto = DB_ARQUETIPOS[novoNome].custo;
                }

                setCharacter({
                    ...character,
                    arquetipo: novoNome,
                    arquetipoCusto: novoCusto
                });
            };

            // Adiciona um Kit e seus Poderes automaticamente
            const handleAddKit = () =&gt; {
                if (!kitInput.trim()) return;

                const kitName = kitInput.trim();
                const newKit = { id: Date.now(), nome: kitName };
                const newKits = [...(character.kits || []), newKit];

                let newVantagens = [...character.vantagens];
                let newDesvantagens = [...character.desvantagens];

                const kitData = DB_KITS[kitName];

                // Custo dos poderes adicionados pelo kit configurados para 0
                if (kitData) {
                    if (kitData.poderes) {
                        kitData.poderes.forEach((p, idx) =&gt; {
                            newVantagens.push({
                                id: Date.now() + idx + Math.random(),
                                nome: p.nome,
                                detalhe: `(Kit: ${kitName})`,
                                descricao: &#34;&#34;,
                                custo: &#34;0&#34;
                            });
                        });
                    }
                    if (kitData.desvantagens) {
                        kitData.desvantagens.forEach((d, idx) =&gt; {
                            newDesvantagens.push({
                                id: Date.now() + 100 + idx + Math.random(),
                                nome: d.nome,
                                detalhe: `(Kit: ${kitName})`,
                                descricao: &#34;&#34;,
                                custo: &#34;0&#34;
                            });
                        });
                    }
                }

                setCharacter({
                    ...character,
                    kits: newKits,
                    vantagens: newVantagens,
                    desvantagens: newDesvantagens
                });
                setKitInput(&#39;&#39;); // Limpa o input
            };

            const handleRemoveKit = (kitId) =&gt; {
                setCharacter({
                    ...character,
                    kits: character.kits.filter(k =&gt; k.id !== kitId)
                });
            };

            // CÁLCULO DE PONTOS TOTAIS
            const calculatedTotalPoints = useMemo(() =&gt; {
                const attrPoints = (character.atributos.poder || 0) + (character.atributos.habilidade || 0) + (character.atributos.resistencia || 0);
                const advPoints = character.vantagens.reduce((acc, item) =&gt; acc + (parseInt(item.custo) || 0), 0);
                const disadvPoints = character.desvantagens.reduce((acc, item) =&gt; acc + (parseInt(item.custo) || 0), 0);
                const skillPoints = character.pericias.reduce((acc, item) =&gt; acc + (parseInt(item.custo) || 0), 0);

                const nKits = (character.kits || []).length;
                const kitsPoints = (nKits * (nKits + 1)) / 2; // (1º=1pt, 2º=2pt...)

                const archPoints = parseInt(character.arquetipoCusto) || 0;

                return attrPoints + advPoints + disadvPoints + skillPoints + archPoints + kitsPoints;
            }, [character.atributos, character.vantagens, character.desvantagens, character.pericias, character.kits, character.arquetipoCusto]);



            useEffect(() =&gt; {
                const saved = localStorage.getItem(&#39;3det_sheets&#39;);
                if (saved) {
                    try {
                        setSavedSheets(JSON.parse(saved));
                    } catch (e) {
                        console.error(&#34;Erro ao carregar histórico&#34;, e);
                    }
                }
            }, []);

            const saveToLibrary = () =&gt; {
                const newSheet = {
                    ...character,
                    id: character.id || Date.now(),
                    lastModified: new Date().toISOString()
                };

                try {
                    const existingIndex = savedSheets.findIndex(s =&gt; s.id === newSheet.id);
                    let newSavedSheets = [...savedSheets];

                    if (existingIndex &gt;= 0) {
                        newSavedSheets[existingIndex] = newSheet;
                    } else {
                        newSavedSheets.push(newSheet);
                    }

                    localStorage.setItem(&#39;3det_sheets&#39;, JSON.stringify(newSavedSheets));
                    setSavedSheets(newSavedSheets);
                    setCharacter(newSheet);
                    alert(&#34;Ficha salva na biblioteca do navegador!&#34;);
                } catch (error) {
                    alert(&#34;Erro ao salvar: O armazenamento local pode estar cheio (provavelmente devido ao tamanho da imagem). Tente remover a foto antes de salvar na lista.&#34;);
                }
            };

            const FIREBASE_URL = &#34;https://ficha-editavel-3det-default-rtdb.firebaseio.com&#34;;

            const syncToCloud = async () =&gt; {
                try {
                    // Se a ficha não tem um ID curto para a nuvem, cria um agora
                    let currentSyncId = character.syncId;
                    if (!currentSyncId) {
                        currentSyncId = Math.random().toString(36).substring(2, 7).toUpperCase(); // Ex: 8F2A1
                        setCharacter(prev =&gt; ({ ...prev, syncId: currentSyncId }));
                    }

                    // Prepara os dados (incluindo o novo syncId)
                    const dataToSave = { ...character, syncId: currentSyncId };

                    // Envia para o Firebase usando REST API (PUT cria ou atualiza)
                    await fetch(`${FIREBASE_URL}/fichas/${currentSyncId}.json`, {
                        method: &#39;PUT&#39;,
                        headers: { &#39;Content-Type&#39;: &#39;application/json&#39; },
                        body: JSON.stringify(dataToSave)
                    });

                    // Copia o código para a área de transferência para facilitar
                    navigator.clipboard.writeText(currentSyncId);
                    alert(`☁️ Ficha salva na nuvem!\n\nSeu código de sincronização é: ${currentSyncId}\n\nO código já foi copiado. Envie para o Mestre!`);
                } catch (error) {
                    alert(&#34;❌ Erro ao salvar na nuvem. Verifique sua conexão.&#34;);
                    console.error(error);
                }
            };

            const importFromCloud = async () =&gt; {
                const code = prompt(&#34;Mestre, digite o código de 5 letras da ficha (ex: 8F2A1):&#34;);
                if (!code) return;

                const cleanCode = code.trim().toUpperCase();

                try {
                    // Busca a ficha no Firebase
                    const response = await fetch(`${FIREBASE_URL}/fichas/${cleanCode}.json`);
                    const parsed = await response.json();

                    if (parsed &amp;&amp; parsed.id) {

                        // === O SEGREDO ESTÁ AQUI: RECONSTRUÇÃO SEGURA ===
                        // Misturamos a ficha vazia com a ficha que veio da nuvem,
                        // forçando que as listas e objetos existam, mesmo que o Firebase tenha apagado.
                        const safeCharacter = {
                            ...emptyCharacter,
                            ...parsed,

                            // Força a existência de todas as arrays
                            pericias: parsed.pericias || [],
                            vantagens: parsed.vantagens || [],
                            desvantagens: parsed.desvantagens || [],
                            kits: parsed.kits || [],
                            tecnicas: parsed.tecnicas || [],

                            // Força a existência dos objetos e seus valores internos
                            atributos: { ...emptyCharacter.atributos, ...(parsed.atributos || {}) },
                            recursos: { ...emptyCharacter.recursos, ...(parsed.recursos || {}) },
                            inventario: { ...emptyCharacter.inventario, ...(parsed.inventario || {}) },
                            trocas: { ...emptyCharacter.trocas, ...(parsed.trocas || {}) }
                        };
                        // ================================================

                        // Salva a ficha na Biblioteca do Mestre
                        setSavedSheets(prev =&gt; {
                            const filtered = prev.filter(s =&gt; s.id !== safeCharacter.id);
                            return [...filtered, safeCharacter];
                        });
                        alert(`☁️ Sucesso! Ficha de &#34;${safeCharacter.nome || &#39;Jogador&#39;}&#34; importada da nuvem.\n\nEla já está na sua Biblioteca.`);
                    } else {
                        alert(&#34;❌ Nenhuma ficha encontrada com esse código.&#34;);
                    }
                } catch (error) {
                    alert(&#34;❌ Erro ao buscar da nuvem. O código pode estar errado.&#34;);
                    console.error(error);
                }
            };

            const loadFromLibrary = (sheet) =&gt; {
                let safeSheet = { ...sheet };

                if (typeof safeSheet.arquetipoCusto === &#39;undefined&#39;) {
                    if (safeSheet.arquetipo &amp;&amp; DB_ARQUETIPOS[safeSheet.arquetipo]) {

                    } else {

                }

                setCharacter(safeSheet);
                setShowSidebar(false);
            };

            const deleteFromLibrary = (e, id) =&gt; {
                e.stopPropagation();
                if (window.confirm(&#34;Tem certeza que deseja remover esta ficha da lista?&#34;)) {
                    const newSavedSheets = savedSheets.filter(s =&gt; s.id !== id);
                    localStorage.setItem(&#39;3det_sheets&#39;, JSON.stringify(newSavedSheets));
                    setSavedSheets(newSavedSheets);
                }
            };

            const createNewSheet = () =&gt; {
                if (window.confirm(&#34;Criar nova ficha limpará os dados atuais. Continuar?&#34;)) {
                    setCharacter({ ...emptyCharacter, id: Date.now() });
                    setShowSidebar(false);
                }
            };

            const hasPatrono = character.vantagens.some(v =&gt; v.nome.toLowerCase().includes(&#39;patrono&#39;));

            const getInventoryLimits = (level, trades) =&gt; {
                let limits = { comuns: 2, incomuns: 0, raros: 0, lendarios: 0 };
                if (level &gt;= 1) { limits.comuns = 3; limits.incomuns = 1; }
                if (level &gt;= 2) { limits.comuns = 5; limits.incomuns = 2; }
                if (level &gt;= 3) { limits.incomuns = 4; limits.raros = 1; limits.lendarios = 1; }

                if (hasPatrono) {
                    if (limits.comuns &gt; 0) limits.comuns += 1;
                    if (limits.incomuns &gt; 0) limits.incomuns += 1;
                    if (limits.raros &gt; 0) limits.raros += 1;
                    if (limits.lendarios &gt; 0) limits.lendarios += 1;
                }

                limits.comuns -= trades.comumParaIncomum * 3;
                limits.incomuns += trades.comumParaIncomum;
                limits.incomuns -= trades.incomumParaRaro * 3;
                limits.raros += trades.incomumParaRaro;
                limits.raros -= trades.raroParaLendario * 3;
                limits.lendarios += trades.raroParaLendario;

                return limits;
            };

            const limits = getInventoryLimits(character.nivelInventario, character.trocas || { comumParaIncomum: 0, incomumParaRaro: 0, raroParaLendario: 0 });

            const performTrade = (type, direction) =&gt; {
                setCharacter(prev =&gt; {
                    const currentTrades = prev.trocas || { comumParaIncomum: 0, incomumParaRaro: 0, raroParaLendario: 0 };
                    const newValue = currentTrades[type] + direction;
                    if (newValue &lt; 0) return prev;
                    return { ...prev, trocas: { ...currentTrades, [type]: newValue } };
                });
            };

            const maxPA = character.atributos.poder || 1;
            const maxPM = (character.atributos.habilidade || 0) * 5 || 5;
            const maxPV = (character.atributos.resistencia || 0) * 5 || 5;

            const updateAttr = (attr, val) =&gt; setCharacter(prev =&gt; ({ ...prev, atributos: { ...prev.atributos, [attr]: Math.max(0, parseInt(val) || 0) } }));

            const extractNumericCost = (costStr) =&gt; {
                if (!costStr) return &#34;&#34;;
                const match = costStr.match(/-?\d+/);
                return match ? match[0] : &#34;&#34;;
            };

            const addListItem = (list) =&gt; setCharacter(prev =&gt; {
                const currentList = prev[list] || [];
                let defaultCost = list === &#39;pericias&#39; ? &#39;1&#39; : &#39;&#39;;

                return {
                    ...prev,
                    [list]: [...currentList, {
                        id: Date.now(),
                        nome: &#39;&#39;,
                        detalhe: &#39;&#39;,
                        descricao: &#39;&#39;,
                        custo: defaultCost
                    }]
                };
            });

            const updateListItem = (list, id, field, value) =&gt; {
                setCharacter(prev =&gt; {
                    const newList = prev[list].map(item =&gt; {
                        if (item.id === id) {
                            const updatedItem = { ...item, [field]: value };

                            if (field === &#39;nome&#39;) {
                                let info = null;
                                if (list === &#39;vantagens&#39;) info = DB_VANTAGENS[value];
                                if (list === &#39;desvantagens&#39;) info = DB_DESVANTAGENS[value];

                                if (info) {
                                    if (!updatedItem.custo || updatedItem.custo === &#34;&#34;) {
                                        updatedItem.custo = extractNumericCost(info.custo);
                                    }
                                    // Limpamos a descrição salva para economizar espaço e evitar cópia de texto oficial
                                    updatedItem.descricao = &#34;&#34;;
                                }
                            }
                            return updatedItem;
                        }
                        return item;
                    });
                    return { ...prev, [list]: newList };
                });
            };

            const removeListItem = (list, id) =&gt; setCharacter(prev =&gt; ({ ...prev, [list]: prev[list].filter(item =&gt; item.id !== id) }));

            const addInventoryItem = (category) =&gt; setCharacter(prev =&gt; ({ ...prev, inventario: { ...prev.inventario, [category]: [...prev.inventario[category], { id: Date.now(), nome: &#39;&#39;, qtd: 1, desc: &#39;&#39; }] } }));

            const updateInventoryItem = (category, id, field, value) =&gt; setCharacter(prev =&gt; ({ ...prev, inventario: { ...prev.inventario, [category]: prev.inventario[category].map(item =&gt; item.id === id ? { ...item, [field]: value } : item) } }));

            const removeInventoryItem = (category, id) =&gt; setCharacter(prev =&gt; ({ ...prev, inventario: { ...prev.inventario, [category]: prev.inventario[category].filter(item =&gt; item.id !== id) } }));

            const handleImageUpload = (e) =&gt; {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () =&gt; setCharacter(prev =&gt; ({ ...prev, foto: reader.result }));
                    reader.readAsDataURL(file);
                }
            };

            const exportFile = () =&gt; {
                const dataStr = &#34;data:text/json;charset=utf-8,&#34; + encodeURIComponent(JSON.stringify(character));
                const downloadAnchorNode = document.createElement(&#39;a&#39;);
                downloadAnchorNode.setAttribute(&#34;href&#34;, dataStr);
                downloadAnchorNode.setAttribute(&#34;download&#34;, `${character.nome || &#39;personagem&#39;}_3det.json`);
                document.body.appendChild(downloadAnchorNode);
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
            };

            const importFile = (e) =&gt; {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) =&gt; {
                        try {
                            const loadedChar = JSON.parse(event.target.result);

                            if (!loadedChar.inventario) loadedChar.inventario = { comuns: [], incomuns: [], raros: [], lendarios: [] };
                            if (!loadedChar.inventario.comuns) loadedChar.inventario = { ...emptyCharacter.inventario, ...loadedChar.inventario };
                            if (typeof loadedChar.nivelInventario === &#39;undefined&#39;) loadedChar.nivelInventario = 0;

                            if (typeof loadedChar.arquetipoCusto === &#39;undefined&#39;) {
                                if (loadedChar.arquetipo &amp;&amp; DB_ARQUETIPOS[loadedChar.arquetipo]) {
                                    loadedChar.arquetipoCusto = DB_ARQUETIPOS[loadedChar.arquetipo].custo;
                                } else {
                                    loadedChar.arquetipoCusto = 0;
                                }
                            }

                            if (!loadedChar.kits) loadedChar.kits = [];
                            if (!loadedChar.escala) loadedChar.escala = &#39;Ningen&#39;;
                            if (!loadedChar.marco) loadedChar.marco = &#39;Iniciante&#39;;

                            if (!loadedChar.id) loadedChar.id = Date.now();

                            setCharacter(loadedChar);
                            alert(&#34;Ficha carregada com sucesso! Não esqueça de salvá-la na biblioteca se desejar.&#34;);
                        } catch (error) {
                            alert(&#34;Erro ao ler o arquivo JSON. O formato pode estar incorreto.&#34;);
                        }
                        e.target.value = null;
                    };
                    reader.readAsText(file);
                }
            };

            return (
                &lt;div className=&#34;h-screen w-full bg-slate-900 text-slate-100 font-sans print:bg-white print:text-black flex overflow-hidden&#34;&gt;

                    {/* ÁREA PRINCIPAL ROLÁVEL */}
                    &lt;div className=&#34;flex-1 h-full overflow-y-auto custom-scrollbar relative print:overflow-visible print:h-auto&#34;&gt;

                        {/* MENU SUPERIOR FIXO DENTRO DA ÁREA ROLÁVEL */}
                        &lt;div className=&#34;sticky top-0 left-0 w-full bg-slate-950/90 backdrop-blur-md border-b border-slate-800 p-3 flex justify-between items-center z-40 no-print&#34;&gt;

                            &lt;button onClick={() =&gt; setShowSidebar(true)} className=&#34;p-2 hover:bg-slate-800 rounded-lg text-slate-300 hover:text-white transition-colors flex items-center gap-2&#34;&gt;
                                &lt;Menu className=&#34;w-6 h-6&#34; /&gt;
                                &lt;span className=&#34;font-bold text-sm uppercase tracking-wide hidden md:inline&#34;&gt;Minhas Fichas&lt;/span&gt;
                            &lt;/button&gt;
                            &lt;h1 className=&#34;text-sm font-bold text-slate-500 uppercase tracking-widest&#34;&gt;3DeT Victory&lt;/h1&gt;
                            &lt;div className=&#34;flex gap-2&#34;&gt;
                                &lt;button onClick={() =&gt; setShowDonationModal(true)} className=&#34;p-2 bg-amber-600/20 border border-amber-500/50 hover:bg-amber-600/40 rounded-lg text-amber-500 transition-colors flex items-center gap-2&#34; title=&#34;Me pague um café&#34;&gt;
                                    &lt;LucideIcon name=&#34;coffee&#34; className=&#34;w-5 h-5&#34; /&gt;
                                    &lt;span className=&#34;text-xs font-bold hidden md:inline&#34;&gt;Apoiar&lt;/span&gt;
                                &lt;/button&gt;
                                {/* BOTÕES DE NUVEM */}
                                &lt;button onClick={syncToCloud} className=&#34;p-2 bg-purple-600 hover:bg-purple-500 rounded-lg text-white transition-colors flex items-center gap-1&#34; title=&#34;Salvar na Nuvem e Gerar Código&#34;&gt;
                                    &lt;CloudUpload className=&#34;w-5 h-5&#34; /&gt;
                                    &lt;span className=&#34;text-xs font-bold hidden md:inline&#34;&gt;Sincronizar&lt;/span&gt;
                                &lt;/button&gt;

                                &lt;button onClick={importFromCloud} className=&#34;p-2 bg-pink-600 hover:bg-pink-500 rounded-lg text-white transition-colors flex items-center gap-1&#34; title=&#34;Puxar ficha da Nuvem&#34;&gt;
                                    &lt;CloudDownload className=&#34;w-5 h-5&#34; /&gt;
                                    &lt;span className=&#34;text-xs font-bold hidden md:inline&#34;&gt;Baixar Ficha&lt;/span&gt;
                                &lt;/button&gt;
                                {/* BOTÃO DE LOBBY */}
                                &lt;button onClick={() =&gt; setShowLobbySidebar(!showLobbySidebar)} className={`p-2 flex items-center gap-2 rounded-lg text-white transition-colors flex-shrink-0 ${connectionStatus === &#39;connected&#39; ? &#39;bg-emerald-600 hover:bg-emerald-500&#39; : &#39;bg-amber-600 hover:bg-amber-500&#39;}`} title=&#34;Lobby Multijogador&#34;&gt;
                                    &lt;Users className=&#34;w-5 h-5&#34; /&gt;
                                    &lt;span className=&#34;text-xs font-bold uppercase hidden md:inline&#34;&gt;
                                        {showLobbySidebar ? &#39;Esconder Sala&#39; : (connectionStatus === &#39;connected&#39; ? &#39;Na Sala&#39; : &#39;Ver Sala&#39;)}
                                    &lt;/span&gt;
                                &lt;/button&gt;

                            &lt;/div&gt;
                        &lt;/div&gt;

                        {/*BOTÃO DE ROLAR DADOS*/}
                        &lt;button onClick={() =&gt; setShowDiceModal(true)} className=&#34;fixed bottom-8 right-8 z-[100] p-4 bg-indigo-600 text-white rounded-full shadow-[0_0_20px_rgba(79,70,229,0.5)] hover:scale-110 hover:bg-indigo-500 transition-all duration-200 flex items-center justify-center cursor-pointer no-print&#34; title=&#34;Rolar Dados&#34;&gt;
                            &lt;Dice className=&#34;w-8 h-8&#34; /&gt;
                        &lt;/button&gt;
                        {/* MODAL DE DADOS */}
                        {showDiceModal &amp;&amp; &lt;DiceModal onClose={() =&gt; setShowDiceModal(false)} attributes={character.atributos} onRollBroadcast={handleBroadcastRoll} /&gt;}
                        {/* MODAIS FLUTUANTES */}
                        {showDiceModal &amp;&amp; &lt;DiceModal onClose={() =&gt; setShowDiceModal(false)} attributes={character.atributos} onRollBroadcast={handleBroadcastRoll} /&gt;}
                        {showDonationModal &amp;&amp; &lt;DonationModal onClose={() =&gt; setShowDonationModal(false)} /&gt;}

                        {/* SIDEBAR / GAVETA */}
                        {showSidebar &amp;&amp; (
                            &lt;&gt;
                                &lt;div className=&#34;fixed inset-0 bg-black/60 z-40 backdrop-blur-sm transition-opacity no-print&#34; onClick={() =&gt; setShowSidebar(false)}&gt;&lt;/div&gt;
                                &lt;div className=&#34;fixed inset-y-0 left-0 w-80 bg-slate-900 border-r border-slate-700 shadow-2xl z-50 transform transition-transform no-print flex flex-col&#34;&gt;
                                    &lt;div className=&#34;p-4 border-b border-slate-800 flex justify-between items-center bg-slate-950&#34;&gt;
                                        &lt;h2 className=&#34;font-bold text-lg text-white flex items-center gap-2&#34;&gt;
                                            &lt;BookOpen className=&#34;w-5 h-5 text-indigo-400&#34; /&gt; Biblioteca
                                        &lt;/h2&gt;
                                        &lt;button onClick={() =&gt; setShowSidebar(false)} className=&#34;text-slate-400 hover:text-white&#34;&gt;&lt;X className=&#34;w-6 h-6&#34; /&gt;&lt;/button&gt;
                                    &lt;/div&gt;

                                    &lt;div className=&#34;p-4 border-b border-slate-800 grid grid-cols-3 gap-2&#34;&gt;
                                        &lt;button onClick={createNewSheet} className=&#34;flex flex-col items-center justify-center p-2 bg-slate-800 hover:bg-slate-700 rounded-xl border border-slate-700 transition-all text-[10px] font-bold text-slate-300 hover:text-white gap-1&#34;&gt;
                                            &lt;PlusCircle className=&#34;w-5 h-5 text-green-400&#34; /&gt; Nova Ficha
                                        &lt;/button&gt;
                                        &lt;button onClick={createNewFolder} className=&#34;flex flex-col items-center justify-center p-2 bg-slate-800 hover:bg-slate-700 rounded-xl border border-slate-700 transition-all text-[10px] font-bold text-slate-300 hover:text-white gap-1&#34;&gt;
                                            &lt;FolderPlus className=&#34;w-5 h-5 text-amber-400&#34; /&gt; Nova Pasta
                                        &lt;/button&gt;
                                        &lt;button onClick={() =&gt; importInputRef.current.click()} className=&#34;flex flex-col items-center justify-center p-2 bg-slate-800 hover:bg-slate-700 rounded-xl border border-slate-700 transition-all text-[10px] font-bold text-slate-300 hover:text-white gap-1&#34;&gt;
                                            &lt;Upload className=&#34;w-5 h-5 text-blue-400&#34; /&gt; Importar
                                        &lt;/button&gt;
                                        &lt;input type=&#34;file&#34; ref={importInputRef} onChange={importFile} accept=&#34;.json&#34; className=&#34;hidden&#34; /&gt;
                                    &lt;/div&gt;

                                    {/* ÁREA DE PASTAS E FICHAS COM DROP NA RAIZ */}
                                    &lt;div
                                        className={`flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar transition-colors ${dragOverId === &#39;root&#39; ? &#39;bg-indigo-950/20&#39; : &#39;&#39;}`}
                                        onDragOver={(e) =&gt; handleDragOver(e, &#39;root&#39;)}
                                        onDragLeave={() =&gt; setDragOverId(null)}
                                        onDrop={(e) =&gt; handleDrop(e, null)}
                                    &gt;

                                        {/* 1. RENDERIZA AS PASTAS */}
                                        {folders.map(folder =&gt; (
                                            &lt;div
                                                key={folder.id}
                                                className={`bg-slate-900/50 rounded-xl border transition-colors ${dragOverId === folder.id ? &#39;border-amber-500 bg-amber-900/20&#39; : &#39;border-slate-800&#39;}`}
                                                onDragOver={(e) =&gt; handleDragOver(e, folder.id)}
                                                onDragLeave={() =&gt; setDragOverId(null)}
                                                onDrop={(e) =&gt; handleDrop(e, folder.id)}
                                            &gt;
                                                &lt;div onClick={() =&gt; toggleFolder(folder.id)} className=&#34;p-3 flex items-center justify-between cursor-pointer group hover:bg-slate-800/50 rounded-xl&#34;&gt;
                                                    &lt;div className=&#34;flex items-center gap-2&#34;&gt;
                                                        {folder.isOpen ? &lt;FolderOpen className=&#34;w-4 h-4 text-amber-400&#34; /&gt; : &lt;Folder className=&#34;w-4 h-4 text-amber-400&#34; /&gt;}
                                                        &lt;span className=&#34;font-bold text-sm text-slate-200 select-none&#34;&gt;{folder.name}&lt;/span&gt;
                                                        &lt;span className=&#34;text-[10px] bg-slate-800 px-1.5 py-0.5 rounded text-slate-400&#34;&gt;{savedSheets.filter(s =&gt; s.folderId === folder.id).length}&lt;/span&gt;
                                                    &lt;/div&gt;
                                                    &lt;div className=&#34;flex items-center gap-2&#34;&gt;
                                                        &lt;button onClick={(e) =&gt; deleteFolder(e, folder.id)} className=&#34;text-slate-600 hover:text-rose-400 opacity-0 group-hover:opacity-100 transition-opacity&#34;&gt;&lt;Trash2 className=&#34;w-4 h-4&#34; /&gt;&lt;/button&gt;
                                                        {folder.isOpen ? &lt;ChevronDown className=&#34;w-4 h-4 text-slate-500&#34; /&gt; : &lt;ChevronRight className=&#34;w-4 h-4 text-slate-500&#34; /&gt;}
                                                    &lt;/div&gt;
                                                &lt;/div&gt;

                                                {folder.isOpen &amp;&amp; (
                                                    &lt;div className=&#34;p-2 pt-0 space-y-2&#34;&gt;
                                                        {savedSheets.filter(s =&gt; s.folderId === folder.id).map(sheet =&gt; (
                                                            &lt;SheetCard key={sheet.id} sheet={sheet} /&gt;
                                                        ))}
                                                        {savedSheets.filter(s =&gt; s.folderId === folder.id).length === 0 &amp;&amp; (
                                                            &lt;div className=&#34;text-center p-3 text-xs text-slate-600 italic border-2 border-dashed border-slate-700/50 rounded-lg pointer-events-none&#34;&gt;
                                                                Arraste fichas para cá
                                                            &lt;/div&gt;
                                                        )}
                                                    &lt;/div&gt;
                                                )}
                                            &lt;/div&gt;
                                        ))}

                                        {/* 2. RENDERIZA AS FICHAS SOLTAS (RAIZ) */}
                                        &lt;div className=&#34;space-y-2&#34;&gt;
                                            &lt;h3 className=&#34;text-xs font-bold text-slate-500 uppercase px-2 mb-3&#34;&gt;Fichas Soltas&lt;/h3&gt;
                                            {savedSheets.filter(s =&gt; !s.folderId).map(sheet =&gt; (
                                                &lt;SheetCard key={sheet.id} sheet={sheet} /&gt;
                                            ))}

                                            {savedSheets.length === 0 &amp;&amp; (
                                                &lt;div className=&#34;text-center py-8 text-slate-600 text-sm&#34;&gt;
                                                    Nenhuma ficha salva na biblioteca.
                                                &lt;/div&gt;
                                            )}
                                        &lt;/div&gt;

                                    &lt;/div&gt;

                                    &lt;div className=&#34;flex-1 overflow-y-auto p-4 space-y-3&#34;&gt;
                                        &lt;h3 className=&#34;text-xs font-bold text-slate-500 uppercase mb-2&#34;&gt;Fichas Salvas&lt;/h3&gt;
                                        {savedSheets.length === 0 ? (
                                            &lt;div className=&#34;text-center py-8 text-slate-600 text-sm&#34;&gt;
                                                Nenhuma ficha salva na biblioteca.
                                            &lt;/div&gt;
                                        ) : (
                                            savedSheets.map(sheet =&gt; (
                                                &lt;div key={sheet.id} onClick={() =&gt; loadFromLibrary(sheet)} className=&#34;group bg-slate-800 p-3 rounded-xl border border-slate-700 hover:border-indigo-500 cursor-pointer transition-all relative&#34;&gt;
                                                    &lt;div className=&#34;flex items-start gap-3&#34;&gt;
                                                        &lt;div className=&#34;w-10 h-10 rounded-lg bg-slate-900 overflow-hidden flex-shrink-0 border border-slate-700&#34;&gt;
                                                            {sheet.foto ? &lt;img src={sheet.foto} className=&#34;w-full h-full object-cover&#34; /&gt; : &lt;div className=&#34;w-full h-full flex items-center justify-center text-slate-600&#34;&gt;&lt;FileText className=&#34;w-5 h-5&#34; /&gt;&lt;/div&gt;}
                                                        &lt;/div&gt;
                                                        &lt;div className=&#34;flex-1 min-w-0&#34;&gt;
                                                            &lt;h4 className=&#34;font-bold text-slate-200 truncate&#34;&gt;{sheet.nome || &#39;Sem Nome&#39;}&lt;/h4&gt;
                                                            &lt;p className=&#34;text-xs text-slate-500 truncate&#34;&gt;{sheet.arquetipo || &#39;Sem Arquétipo&#39;} • {sheet.pontos}pts&lt;/p&gt;
                                                        &lt;/div&gt;
                                                    &lt;/div&gt;
                                                    &lt;button onClick={(e) =&gt; deleteFromLibrary(e, sheet.id)} className=&#34;absolute top-2 right-2 p-1.5 text-slate-600 hover:text-rose-500 hover:bg-rose-500/10 rounded-md transition-colors opacity-0 group-hover:opacity-100&#34;&gt;
                                                        &lt;Trash2 className=&#34;w-4 h-4&#34; /&gt;
                                                    &lt;/button&gt;
                                                &lt;/div&gt;
                                            ))
                                        )}
                                    &lt;/div&gt;
                                    &lt;div className=&#34;p-3 bg-slate-950 text-[10px] text-center text-slate-600&#34;&gt;
                                        Armazenado no navegador
                                    &lt;/div&gt;
                                &lt;/div&gt;
                            &lt;/&gt;
                        )}

                        {/* CONTEÚDO PRINCIPAL */}
                        &lt;div className=&#34;pt-6 pb-10 px-4 md:px-8 print:pt-0 print:pb-0&#34;&gt;
                            &lt;div className=&#34;max-w-6xl mx-auto space-y-6 print:space-y-4&#34;&gt;

                                {/* TOPO INTEGRADO COM KITS, MARCO E ESCALA */}
                                &lt;div className=&#34;bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700 print:border-black print:shadow-none print:bg-transparent&#34;&gt;
                                    &lt;div className=&#34;flex flex-col md:flex-row gap-6&#34;&gt;

                                        &lt;div className=&#34;flex-shrink-0 flex flex-col items-center gap-2 mx-auto md:mx-0&#34;&gt;
                                            &lt;div
                                                className=&#34;w-40 h-40 rounded-2xl bg-slate-900 border-2 border-dashed border-slate-600 flex items-center justify-center overflow-hidden relative group cursor-pointer print:border-black&#34;
                                                onClick={() =&gt; fileInputRef.current?.click()}
                                            &gt;
                                                {character.foto ? (
                                                    &lt;img src={character.foto} alt=&#34;Personagem&#34; className=&#34;w-full h-full object-cover&#34; /&gt;
                                                ) : (
                                                    &lt;div className=&#34;text-center p-4 text-slate-500 hover:text-slate-300 transition-colors&#34;&gt;
                                                        &lt;ImageIcon className=&#34;w-8 h-8 mx-auto mb-2&#34; /&gt;
                                                        &lt;span className=&#34;text-xs font-bold uppercase&#34;&gt;Adicionar Foto&lt;/span&gt;
                                                    &lt;/div&gt;
                                                )}
                                                &lt;div className=&#34;absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center no-print&#34;&gt;
                                                    &lt;Upload className=&#34;text-white w-6 h-6&#34; /&gt;
                                                &lt;/div&gt;
                                            &lt;/div&gt;
                                            &lt;input type=&#34;file&#34; ref={fileInputRef} className=&#34;hidden&#34; accept=&#34;image/*&#34; onChange={handleImageUpload} /&gt;
                                            {character.foto &amp;&amp; (
                                                &lt;button
                                                    onClick={(e) =&gt; { e.stopPropagation(); setCharacter(p =&gt; ({ ...p, foto: null })); }}
                                                    className=&#34;text-xs text-rose-400 hover:text-rose-300 no-print flex items-center gap-1&#34;
                                                &gt;
                                                    &lt;Trash2 className=&#34;w-3 h-3&#34; /&gt; Remover
                                                &lt;/button&gt;
                                            )}
                                        &lt;/div&gt;

                                        &lt;div className=&#34;flex-1 space-y-4&#34;&gt;
                                            &lt;div className=&#34;grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4&#34;&gt;

                                                &lt;div className=&#34;space-y-1 lg:col-span-2&#34;&gt;
                                                    &lt;label className=&#34;text-xs font-bold uppercase tracking-wider text-blue-400 print:text-black&#34;&gt;Nome&lt;/label&gt;
                                                    &lt;input
                                                        className=&#34;w-full bg-slate-900 border-none rounded-lg p-3 text-2xl font-bold focus:ring-2 focus:ring-blue-500 outline-none print:bg-transparent print:border-b print:border-black print:rounded-none print:p-1 text-white&#34;
                                                        placeholder=&#34;Nome do Personagem&#34;
                                                        value={character.nome}
                                                        onChange={(e) =&gt; setCharacter({ ...character, nome: e.target.value })}
                                                    /&gt;
                                                &lt;/div&gt;

                                                &lt;div className=&#34;space-y-1 lg:col-span-2&#34;&gt;
                                                    &lt;label className=&#34;text-xs font-bold uppercase tracking-wider text-blue-400 print:text-black&#34;&gt;
                                                        Arquétipo
                                                    &lt;/label&gt;
                                                    &lt;div className=&#34;flex gap-2&#34;&gt;
                                                        &lt;input
                                                            list=&#34;lista-arquetipos&#34;
                                                            className=&#34;flex-1 bg-slate-900 border-none rounded-lg p-3 text-xl font-bold focus:ring-2 focus:ring-blue-500 outline-none print:bg-transparent print:border-b print:border-black print:rounded-none print:p-1 text-white&#34;
                                                            placeholder=&#34;Selecione ou digite...&#34;
                                                            value={character.arquetipo}
                                                            onChange={handleArquetipoChange}
                                                        /&gt;
                                                        &lt;div className=&#34;flex flex-col items-center justify-center bg-slate-900 rounded-lg p-1 w-16 border border-slate-700 print:bg-transparent print:border-black&#34;&gt;
                                                            &lt;span className=&#34;text-[10px] text-slate-500 uppercase print:hidden&#34;&gt;Pts&lt;/span&gt;
                                                            &lt;input
                                                                type=&#34;number&#34;
                                                                className=&#34;w-full bg-transparent text-center font-bold text-lg outline-none print:text-black text-white&#34;
                                                                value={character.arquetipoCusto}
                                                                onChange={(e) =&gt; setCharacter({ ...character, arquetipoCusto: parseInt(e.target.value) || 0 })}
                                                            /&gt;
                                                        &lt;/div&gt;
                                                    &lt;/div&gt;
                                                    &lt;datalist id=&#34;lista-arquetipos&#34;&gt;
                                                        {LISTA_ARQUETIPOS.map(arq =&gt; (
                                                            &lt;option key={arq} value={arq}&gt;{arq} ({DB_ARQUETIPOS[arq].custo}pt)&lt;/option&gt;
                                                        ))}
                                                    &lt;/datalist&gt;
                                                    {character.arquetipo &amp;&amp; DB_ARQUETIPOS[character.arquetipo] &amp;&amp; (
                                                        &lt;p className=&#34;text-[10px] text-slate-400 mt-1 italic print:text-black&#34;&gt;
                                                            {DB_ARQUETIPOS[character.arquetipo].desc}
                                                        &lt;/p&gt;
                                                    )}
                                                &lt;/div&gt;

                                                &lt;div className=&#34;space-y-1 lg:col-span-2&#34;&gt;
                                                    &lt;label className=&#34;text-xs font-bold uppercase tracking-wider text-blue-400 print:text-black&#34;&gt;Marco&lt;/label&gt;
                                                    &lt;select
                                                        className=&#34;w-full bg-slate-900 border-none rounded-lg p-3 text-xl font-bold focus:ring-2 focus:ring-blue-500 outline-none print:bg-transparent print:border-b print:border-black print:rounded-none print:p-1 text-white cursor-pointer appearance-none&#34;
                                                        value={character.marco}
                                                        onChange={(e) =&gt; setCharacter({ ...character, marco: e.target.value })}
                                                    &gt;
                                                        &lt;option className=&#34;bg-slate-900&#34; value=&#34;Iniciante&#34;&gt;Iniciante&lt;/option&gt;
