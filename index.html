                  <div className="p-4 border-b border-slate-800 grid grid-cols-2 gap-2">
                    <button onClick={createNewSheet} className="cyber-btn flex flex-col items-center justify-center p-2 rounded text-[10px] font-bold gap-1"><PlusCircle className="w-5 h-5 text-green-400" /> Nova Ficha</button>
                    <button onClick={() => importInputRef.current.click()} className="cyber-btn flex flex-col items-center justify-center p-2 rounded text-[10px] font-bold gap-1"><Upload className="w-5 h-5 text-blue-400" /> Importar</button>
                    <input type="file" ref={importInputRef} onChange={importFile} accept=".json" className="hidden" />
                  </div>
                  <div className="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar">
                    {savedSheets.length === 0 ? (
                      <div className="text-center py-8 text-slate-600 text-sm">Nenhuma ficha salva.</div>
                    ) : (
                      savedSheets.map(sheet => (
                        <div key={sheet.id} onClick={() => loadFromLibrary(sheet)} className="group p-3 rounded-lg cursor-pointer transition-all relative" style={{background:"rgba(0,0,0,0.5)",border:"1px solid rgba(0,229,255,0.2)"}}>
                          <div className="flex items-start gap-3">
                            <div className="w-10 h-10 rounded-lg bg-slate-900 overflow-hidden flex-shrink-0 border border-slate-700">
                              {sheet.foto ? <img src={sheet.foto} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-slate-600"><FileText className="w-5 h-5" /></div>}
                            </div>
                            <div className="flex-1 min-w-0">
                              <h4 className="font-bold text-slate-200 truncate">{sheet.nome||'Sem Nome'}</h4>
                              <p className="text-xs text-slate-500 truncate">{sheet.arquetipo||'Sem Arquétipo'} • {sheet.pontos}pts</p>
                            </div>
                          </div>
                          <button onClick={(e) => deleteFromLibrary(e,sheet.id)} className="absolute top-2 right-2 p-1.5 text-slate-600 hover:text-rose-500 hover:bg-rose-500/10 rounded-md opacity-0 group-hover:opacity-100"><Trash2 className="w-4 h-4" /></button>
                        </div>
                      ))
                    )}
                  </div>
                  <div className="p-3 text-[10px] text-center" style={{background:"rgba(0,0,0,0.8)",borderTop:"1px solid rgba(0,229,255,0.2)",color:"rgba(0,229,255,0.3)",fontFamily:"Share Tech Mono,monospace"}}>Armazenado no navegador</div>
                </div>
              </>
            )}

            {/* MAIN CONTENT */}
            <div className="pt-6 pb-10 px-4 md:px-8 print:pt-0 print:pb-0">
              <div className="max-w-6xl mx-auto space-y-6 print:space-y-4">

                {/* HEADER */}
                <div className="cyber-panel cyber-corner p-6 rounded-lg print:border-black print:shadow-none print:bg-transparent">
                  <div className="flex flex-col md:flex-row gap-6">
                    <div className="flex-shrink-0 flex flex-col items-center gap-2 mx-auto md:mx-0">
                      <div className="w-40 h-40 rounded-lg flex items-center justify-center overflow-hidden relative group cursor-pointer print:border-black" style={{background:"rgba(0,0,0,0.7)",border:"2px dashed rgba(0,229,255,0.3)",boxShadow:"0 0 15px rgba(0,229,255,0.1)"}} onClick={() => fileInputRef.current?.click()}>
                        {character.foto ? <img src={character.foto} alt="Personagem" className="w-full h-full object-cover" /> : (
                          <div className="text-center p-4 transition-colors" style={{color:"rgba(0,229,255,0.3)"}}><ImageIcon className="w-8 h-8 mx-auto mb-2" /><span className="text-xs font-bold uppercase">Adicionar Foto</span></div>
                        )}
                        <div className="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center no-print"><Upload className="text-white w-6 h-6" /></div>
                      </div>
                      <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={handleImageUpload} />
                      {character.foto && <button onClick={(e) => { e.stopPropagation(); setCharacter(p=>({...p,foto:null})); }} className="text-xs text-rose-400 hover:text-rose-300 no-print flex items-center gap-1"><Trash2 className="w-3 h-3" /> Remover</button>}
                    </div>

                    <div className="flex-1 space-y-4">
                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div className="space-y-1 lg:col-span-2">
                          <label className="text-xs font-bold uppercase tracking-wider print:text-black" style={{color:"rgba(0,229,255,0.7)",fontFamily:"Orbitron,sans-serif",letterSpacing:"2px"}}>Nome</label>
                          <input className="w-full rounded-lg p-3 text-2xl font-bold outline-none print:bg-transparent print:border-b print:border-black print:rounded-none print:p-1" style={{background:"rgba(0,0,0,0.7)",border:"1px solid rgba(0,229,255,0.2)",color:"#e8f4f8",fontFamily:"Orbitron,sans-serif"}} placeholder="Nome do Personagem" value={character.nome} onChange={(e) => setCharacter({ ...character, nome: e.target.value })} />
                        </div>
                        <div className="space-y-1 lg:col-span-2">

                <button onClick={() => setShowLobbySidebar(false)} className="cyber-btn p-1 rounded"><X className="w-5 h-5" /></button>
              </div>

              <div className="p-4 flex flex-col flex-1 overflow-hidden">
                {connectionStatus === 'disconnected' && (
                  <div className="space-y-4">
                    <p style={{color:"rgba(0,229,255,0.6)",fontSize:"12px",fontFamily:"Rajdhani,sans-serif"}}>Conecte-se com seus amigos para ver as rolagens em tempo real.</p>
                    <div className="p-4 rounded-lg space-y-3" style={{background:"rgba(0,0,0,0.4)",border:"1px solid rgba(0,229,255,0.2)"}}>
                      <h3 style={{color:"#00e5ff",fontFamily:"Orbitron,sans-serif",fontSize:"11px",letterSpacing:"1px"}}>CRIAR SALA (MESTRE)</h3>
                      <button onClick={startHosting} className="cyber-btn w-full py-2 rounded font-bold flex items-center justify-center gap-2 text-xs" style={{fontFamily:"Orbitron,sans-serif"}}><Crown className="w-4 h-4" /> CRIAR NOVA SALA</button>
                    </div>
                    <div style={{textAlign:"center",color:"rgba(0,229,255,0.3)",fontSize:"11px",fontFamily:"Share Tech Mono,monospace"}}>— OU —</div>
                    <div className="p-4 rounded-lg space-y-3" style={{background:"rgba(0,0,0,0.4)",border:"1px solid rgba(0,229,255,0.2)"}}>
                      <h3 style={{color:"#00e5ff",fontFamily:"Orbitron,sans-serif",fontSize:"11px",letterSpacing:"1px"}}>ENTRAR (JOGADOR)</h3>
                      <input type="text" placeholder="Cole o ID da Sala aqui..." className="w-full rounded-lg p-2 text-sm outline-none" style={{background:"rgba(0,0,0,0.7)",border:"1px solid rgba(0,229,255,0.3)",color:"#e8f4f8",fontFamily:"Share Tech Mono,monospace"}} value={joinInputId} onChange={e=>setJoinInputId(e.target.value)} />
                      <button onClick={joinLobby} className="w-full py-2 rounded font-bold flex items-center justify-center gap-2 text-xs" style={{background:"rgba(0,230,118,0.15)",border:"1px solid rgba(0,230,118,0.4)",color:"#00e676",fontFamily:"Orbitron,sans-serif"}}><Zap className="w-4 h-4" /> CONECTAR</button>
                    </div>
                  </div>
                )}

                {connectionStatus === 'connecting' && (
                  <div className="flex-1 flex flex-col items-center justify-center gap-4" style={{color:"rgba(0,229,255,0.6)"}}>
                    <div style={{width:"40px",height:"40px",border:"3px solid rgba(0,229,255,0.3)",borderTop:"3px solid #00e5ff",borderRadius:"50%",animation:"roll 0.8s linear infinite"}}></div>
                    <p style={{fontFamily:"Share Tech Mono,monospace",fontSize:"12px"}}>Estabelecendo conexão...</p>
                  </div>
                )}

                {connectionStatus === 'connected' && (
                  <div className="flex flex-col h-full">
                    <div className="p-3 rounded-lg mb-3 space-y-2" style={{background:"rgba(0,230,118,0.08)",border:"1px solid rgba(0,230,118,0.3)"}}>
                      <div className="flex justify-between items-center">
                        <span style={{color:"#00e676",fontFamily:"Orbitron,sans-serif",fontSize:"10px",display:"flex",alignItems:"center",gap:"4px"}}>
                          <span style={{width:"8px",height:"8px",borderRadius:"50%",background:"#00e676",display:"inline-block",animation:"pulse-border 1.5s infinite"}}></span>
                          {lobbyMode === 'host' ? 'HOST DA SALA' : 'CONECTADO'}
                        </span>
                        <button onClick={leaveLobby} style={{color:"#ff1744",fontSize:"11px",fontFamily:"Orbitron,sans-serif",background:"none",border:"none",cursor:"pointer"}}>SAIR</button>
                      </div>
                      <div className="flex justify-between items-center rounded p-2" style={{background:"rgba(0,0,0,0.5)",border:"1px solid rgba(0,229,255,0.2)"}}>
                        <span style={{fontFamily:"Share Tech Mono,monospace",fontSize:"11px",color:"#e8f4f8",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginRight:"8px"}}>{lobbyId}</span>
                        <button onClick={copyLobbyId} className="cyber-btn p-1 rounded" style={{flexShrink:0}} title="Copiar ID"><Copy className="w-3 h-3" /></button>
                      </div>
                    </div>

                    <h3 className="text-xs font-bold uppercase mb-2 pb-1" style={{borderBottom:"1px solid rgba(0,229,255,0.2)",color:"rgba(0,229,255,0.5)",fontFamily:"Orbitron,sans-serif",letterSpacing:"1px"}}>Log de Rolagens</h3>
                    <div className="flex-1 overflow-y-auto space-y-3 pr-1 pb-4" style={{scrollbarWidth:"thin"}}>
                      {sharedRolls.length === 0 ? (
                        <p style={{textAlign:"center",color:"rgba(0,229,255,0.3)",fontSize:"11px",fontFamily:"Share Tech Mono,monospace",marginTop:"20px"}}>Faça uma rolagem para aparecer aqui.</p>
                      ) : (
                        sharedRolls.map(rollItem => (
                          <div key={rollItem.id} className="p-3 rounded-lg" style={{background:"rgba(0,0,0,0.5)",border:"1px solid rgba(0,229,255,0.2)"}}>
                            <div className="flex justify-between items-end mb-2">
                              <span style={{color:"#00e5ff",fontFamily:"Orbitron,sans-serif",fontSize:"11px"}}>{rollItem.playerName}</span>
                              <span style={{color:"rgba(0,229,255,0.4)",fontSize:"10px",fontFamily:"Share Tech Mono,monospace"}}>{rollItem.time}</span>
                            </div>
                            <div className="flex items-center gap-3">
                              <div style={{fontSize:"22px",fontWeight:900,fontFamily:"Orbitron,sans-serif",color: rollItem.rollData.isCriticalFailure?'#ff1744':'#00e5ff',textShadow: rollItem.rollData.isCriticalFailure?'0 0 10px rgba(255,23,68,0.6)':'0 0 10px rgba(0,229,255,0.6)'}}>
                                {rollItem.rollData.isCriticalFailure ? 'FALHA!' : rollItem.rollData.total}
                              </div>
                              <div>
                                <div style={{fontSize:"10px",color:"rgba(0,229,255,0.5)",fontFamily:"Orbitron,sans-serif",textTransform:"uppercase"}}>{rollItem.rollData.attribute} ({rollItem.rollData.diceCount}D)</div>
                                <div style={{display:"flex",gap:"3px",flexWrap:"wrap",marginTop:"3px"}}>
                                  {rollItem.rollData.results.map((r,i) => (
                                    <span key={i} style={{display:"inline-block",width:"18px",height:"18px",textAlign:"center",lineHeight:"18px",fontSize:"10px",fontWeight:"bold",borderRadius:"3px",background: r>=6?'rgba(255,214,0,0.3)':r===1&&rollItem.rollData.isCriticalFailure?'rgba(255,23,68,0.3)':'rgba(0,229,255,0.1)',color: r>=6?'#ffd600':r===1&&rollItem.rollData.isCriticalFailure?'#ff1744':'#00e5ff',border: r>=6?"1px solid rgba(255,214,0,0.5)":"1px solid rgba(0,229,255,0.2)"}}>{r}</span>
                                  ))}
                                </div>
                              </div>
                            </div>
                          </div>
                        ))
                      )}
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}
        );
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
