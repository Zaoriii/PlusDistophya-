    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --cyber-bg: #030810;
        --cyber-panel: #060d1a;
        --cyber-panel2: #0a1628;
        --cyber-border: #00e5ff;
        --cyber-glow: rgba(0,229,255,0.4);
        --cyber-glow2: rgba(0,229,255,0.15);
        --cyber-accent: #00e5ff;
        --cyber-accent2: #00b8d4;
        --cyber-text: #cde8f0;
        --cyber-dim: #4a7080;
        --cyber-red: #ff1744;
        --cyber-red-glow: rgba(255,23,68,0.4);
        --cyber-green: #00e676;
        --cyber-green-glow: rgba(0,230,118,0.4);
        --cyber-yellow: #ffd600;
        --cyber-yellow-glow: rgba(255,214,0,0.4);
        --cyber-purple: #aa00ff;
        --cyber-white: #e8f4f8;
      }
      * { box-sizing: border-box; }
      body { color-scheme: dark; font-family: 'Rajdhani', sans-serif; background: var(--cyber-bg); }

      /* SCANLINES */
      body::before {
        content: '';
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,229,255,0.015) 2px, rgba(0,229,255,0.015) 4px);
        pointer-events: none; z-index: 9999;
      }

      /* GRID BG */
      body::after {
        content: '';
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background-image: linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none; z-index: 0;
      }

      /* NEON GLOW UTILITY */
      .neon-text { color: var(--cyber-accent); text-shadow: 0 0 10px var(--cyber-glow), 0 0 20px var(--cyber-glow), 0 0 40px var(--cyber-glow2); }
      .neon-border { border-color: var(--cyber-border) !important; box-shadow: 0 0 8px var(--cyber-glow), inset 0 0 8px rgba(0,229,255,0.05); }
      .neon-border-red { border-color: var(--cyber-red) !important; box-shadow: 0 0 8px var(--cyber-red-glow), inset 0 0 8px rgba(255,23,68,0.05); }
      .neon-border-green { border-color: var(--cyber-green) !important; box-shadow: 0 0 8px var(--cyber-green-glow), inset 0 0 8px rgba(0,230,118,0.05); }
      .neon-border-yellow { border-color: var(--cyber-yellow) !important; box-shadow: 0 0 8px var(--cyber-yellow-glow), inset 0 0 8px rgba(255,214,0,0.05); }

      /* GLITCH ANIMATION */
      @keyframes glitch {
        0%,100% { transform: translate(0); }
        20% { transform: translate(-2px, 1px); filter: hue-rotate(90deg); }
        40% { transform: translate(2px, -1px); }
        60% { transform: translate(-1px, 2px); filter: hue-rotate(-90deg); }
        80% { transform: translate(1px, -2px); }
      }
      @keyframes flicker {
        0%,100% { opacity: 1; }
        92% { opacity: 1; }
        93% { opacity: 0.8; }
        94% { opacity: 1; }
        96% { opacity: 0.9; }
        97% { opacity: 1; }
      }
      @keyframes pulse-border {
        0%,100% { box-shadow: 0 0 8px var(--cyber-glow), inset 0 0 8px rgba(0,229,255,0.05); }
        50% { box-shadow: 0 0 20px var(--cyber-glow), 0 0 40px rgba(0,229,255,0.2), inset 0 0 12px rgba(0,229,255,0.1); }
      }
      @keyframes scanline-move {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(100vh); }
      }
      .glitch:hover { animation: glitch 0.3s linear; }
      .flicker { animation: flicker 4s infinite; }

      /* CYBER HEADER */
      .cyber-header {
        background: linear-gradient(90deg, var(--cyber-bg), var(--cyber-panel), var(--cyber-bg)) !important;
        border-bottom: 1px solid var(--cyber-border) !important;
        box-shadow: 0 0 20px var(--cyber-glow2), 0 4px 30px rgba(0,0,0,0.8) !important;
      }

      /* CYBER PANELS */
      .cyber-panel {
        background: var(--cyber-panel) !important;
        border: 1px solid rgba(0,229,255,0.3) !important;
        box-shadow: 0 0 15px rgba(0,229,255,0.08), inset 0 0 30px rgba(0,0,0,0.5) !important;
      }
      .cyber-panel:hover { border-color: rgba(0,229,255,0.6) !important; }

      /* CYBER INPUTS */
      input, textarea, select {
        background: rgba(0,0,0,0.6) !important;
        color: var(--cyber-text) !important;
        border: 1px solid rgba(0,229,255,0.2) !important;
        font-family: 'Rajdhani', sans-serif !important;
      }
      input:focus, textarea:focus, select:focus {
        border-color: var(--cyber-border) !important;
        box-shadow: 0 0 10px var(--cyber-glow2) !important;
        outline: none !important;
      }

      /* CYBER BUTTONS */
      .cyber-btn {
        background: transparent !important;
        border: 1px solid var(--cyber-border) !important;
        color: var(--cyber-accent) !important;
        font-family: 'Orbitron', sans-serif !important;
        text-transform: uppercase !important;
        letter-spacing: 1px !important;
        transition: all 0.2s !important;
        position: relative; overflow: hidden;
      }
      .cyber-btn:hover {
        background: rgba(0,229,255,0.1) !important;
        box-shadow: 0 0 20px var(--cyber-glow) !important;
      }
      .cyber-btn::before {
        content: ''; position: absolute; top: -50%; left: -50%;
        width: 200%; height: 200%;
        background: linear-gradient(45deg, transparent, rgba(0,229,255,0.05), transparent);
        transform: rotate(45deg) translateX(-100%);
        transition: transform 0.5s;
      }
      .cyber-btn:hover::before { transform: rotate(45deg) translateX(100%); }

      /* SCROLLBAR */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: var(--cyber-bg); }
      ::-webkit-scrollbar-thumb { background: var(--cyber-border); box-shadow: 0 0 6px var(--cyber-glow); }

      /* CORNER DECORATION */
      .cyber-corner { position: relative; }
      .cyber-corner::before, .cyber-corner::after {
        content: ''; position: absolute;
        width: 12px; height: 12px;
      }
      .cyber-corner::before { top: -1px; left: -1px; border-top: 2px solid var(--cyber-border); border-left: 2px solid var(--cyber-border); }
      .cyber-corner::after { bottom: -1px; right: -1px; border-bottom: 2px solid var(--cyber-border); border-right: 2px solid var(--cyber-border); }

      /* ORBITRON headings */
      h1, h2, h3, h4, .orbitron { font-family: 'Orbitron', sans-serif !important; }

      /* RESOURCE BARS */
      .cyber-bar-bg { background: rgba(0,0,0,0.8) !important; border: 1px solid rgba(0,229,255,0.2) !important; }
      
      /* DICE BUTTON */
      .cyber-dice {
        background: var(--cyber-panel) !important;
        border: 2px solid var(--cyber-border) !important;
        box-shadow: 0 0 20px var(--cyber-glow), 0 0 40px var(--cyber-glow2) !important;
        animation: pulse-border 2s ease-in-out infinite !important;
      }
      .cyber-dice:hover {
        background: rgba(0,229,255,0.15) !important;
        box-shadow: 0 0 30px var(--cyber-glow), 0 0 60px var(--cyber-glow2) !important;
      }

      /* TAG CHIPS */
      .cyber-chip {
        background: rgba(0,229,255,0.08) !important;
        border: 1px solid rgba(0,229,255,0.4) !important;
        color: var(--cyber-accent) !important;
        font-family: 'Orbitron', sans-serif !important;
        font-size: 10px !important;
      }

      /* TITLE DECORATION */
      .title-line::before, .title-line::after {
        content: '';
        display: inline-block;
        width: 40px; height: 1px;
        background: linear-gradient(90deg, transparent, var(--cyber-border));
        vertical-align: middle; margin: 0 8px;
      }
      .title-line::after { background: linear-gradient(270deg, transparent, var(--cyber-border)); }

      @media print {
        .no-print { display: none !important; }
        body::before, body::after { display: none !important; }
        body { background: white !important; color: black !important; }
        * { color: black !important; border-color: black !important; box-shadow: none !important; text-shadow: none !important; }
        input, textarea, select { border: 1px solid #ccc !important; background: white !important; color: black !important; }
      }
      input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
      @keyframes roll {
        0% { transform: rotate(0deg); } 25% { transform: rotate(90deg); }
        50% { transform: rotate(180deg); } 75% { transform: rotate(270deg); } 100% { transform: rotate(360deg); }
      }
      .rolling { animation: roll 0.5s linear infinite; }
      textarea { resize: vertical; }
    </style>
  </head>

        "Ninja":{desc:"",poderes:[{nome:"Mestre ninja",desc:"",custo:"1"},{nome:"Ninpo de combate",desc:"",custo:"1"},{nome:"Ougi",desc:"",custo:"1"}]},

        "Super-Herói":{desc:"",poderes:[{nome:"Sobrehumano",desc:"",custo:"1"},{nome:"Façanha épica",desc:"",custo:"1"},{nome:"Herói de ação",desc:"",custo:"1"}]}
      };
      window.LISTA_KITS = Object.keys(window.DB_KITS).sort();
      window.DB_VANTAGENS = {
        "Aceleração":{custo:"1",desc:"Você se move muito rápido. Pode gastar 1PM para realizar um movimento extra em seu turno. Você também pode gastar 1PM antes de rolar os dados para receber um Ganho na iniciativa, ou em testes de Habilidade para correr, fugir ou perseguir um oponente."},
        "+Ação":{custo:"1",desc:"Você tem mais Pontos de Ação, além daqueles oferecidos por seu Poder. Cada vez que compra esta vantagem você recebe +2PA. Você pode comprar esta vantagem várias vezes, para novos aumentos de +2PA."},
        "Acumulador":{custo:"1",desc:"Sempre que você acerta um ataque (causando dano), pode gastar 2PM para ganhar Poder +1 no ataque seguinte. Pode acumular até P+5 (sempre 2PM por ataque). Se você erra um ataque ou deixa de atacar, os bônus acabam."},
        "Ágil":{custo:"1",desc:"Você tem grande agilidade e coordenação motora. Recebe H+2 em testes envolvendo agilidade, coordenação ou equilíbrio, incluindo testes de iniciativa. Este bônus é incluído em acertos críticos. Você também pode gastar 2PM antes de fazer um desses testes para conseguir acerto crítico com 5 ou 6."},
        "Ajudante":{custo:"1",desc:"Você tem algo ou alguém com quem pode contar. Uma vez por rodada, você pode gastar 2PM para invocar o ajudante. Tipos: Curandeiro (cura 2D PV ou repete teste de R contra efeito), Especialista (Ganho em uma perícia, exceto atacar/defender), Familiar (custa 1PM e reduz à metade o custo de outra vantagem na rodada), Lutador (Ganho em ataque ou defesa por uma rodada), Montaria (movimento extra ou Ganho em iniciativa/perseguição, custa 1PM). Você pode ter apenas uma ajuda por rodada."},
        "Alcance":{custo:"1-2",desc:"Seus ataques acertam mais longe. 1pt: pode atingir inimigos Longe sem penalidades, e Muito Longe com Perda. 2pt: também pode atingir Muito Longe sem penalidades. O Alcance também afeta suas outras vantagens (Cura, Magia, etc.)."},
        "Anulação":{custo:"2",desc:"Após o uso de uma vantagem em sua presença (Longe ou menos), você pode gastar uma ação e 3PM para anulá-la. O alvo faz um teste de R (9 + seu Poder) para evitar. Se falhar, não pode usar essa vantagem até o fim da cena. Apenas uma vantagem pode ser anulada por vez."},
        "Arena":{custo:"1",desc:"Você se dá melhor em um certo tipo de terreno. Quando está nesse lugar, pode gastar 2PM para ter Ganho em um teste. Sugestões: Água, Céu, Cidades, Ermos (desertos, florestas, montanhas), Subterrâneo, uma categoria específica de lugar, ou um único lugar no mundo."},
        "Artefato":{custo:"1+",desc:"Você possui um item especial e único que apenas você pode utilizar. Pode ser uma espada mágica, arma experimental ou armadura robótica. Cada ponto ao comprar esta vantagem vale 10XP para adquirir uma arma, armadura ou acessório como descrito em Recompensas."},
        "Ataque Especial":{custo:"1",desc:"Ao atacar, você pode gastar PM para ativar efeitos especiais. Exemplos: Área (todos Perto do alvo, 3PM), Choque (ataca com R em vez de P, 1PM), Distante (alcance extra, 1PM), Espiritual (alvo perde PM em vez de PV, 1PM), Múltiplo (mais alvos, 1PM por extra), Penetrante (alvo tem Perda de defesa, 2PM), Perigoso (crítico com 5 ou 6, 1PM), Potente (P+2, 1PM), Preciso (ataca com H em vez de P, 1PM), Titânico (crítico automático, 3PM)."},
        "Base":{custo:"1",desc:"Você tem uma base de operações onde pode descansar e se recuperar. Pode alcançá-la em qualquer situação fora de combate, levando aliados (máximo Poder + Habilidade). É viagem de mão única. Todos os seus testes realizados na base têm Ganho."},
        "Brutal":{custo:"1",desc:"Ao atacar inimigos, você recupera suas próprias energias. Versões (1pt cada): Vida (recupera 1PV para cada 3 pontos de dano causados), Mana (recupera 1PM para cada 3 pontos de dano), Derrota (recupera 3PV e 1PM ao derrotar um oponente). Funciona apenas em combates reais."},
        "Carismático":{custo:"1",desc:"Você tem facilidade para fazer com que gostem de você. Recebe P+2 em testes sociais ou que envolvam interações com outras pessoas. Este bônus é incluído em acertos críticos. Você também pode gastar 2PM antes de fazer um desses testes para conseguir acerto crítico com 5 ou 6."},
        "Clone":{custo:"1",desc:"Você pode criar cópias exatas de si mesmo gastando 2PM por clone e um movimento. Quando recebe um ataque bem-sucedido, não sofre dano, mas uma cópia desaparece. Clones fazem o que você quiser, mas não realizam ações próprias. Um atacante com Sentido adequado pode ignorar clones com um teste de Percepção (9 + seu Poder)."},
        "Companheiro":{custo:"1",desc:"Você tem um companheiro que luta ao seu lado, com atributos e habilidades definidos pelo Mestre."},
        "Confusão":{custo:"1",desc:"Faça um ataque e gaste 2PM. Se vencer a defesa do alvo, além de sofrer dano, ele fica confuso e não consegue escolher os alvos de suas perícias ou vantagens (escolhidos ao acaso pelo mestre). Dura até o fim da cena ou até o alvo sofrer dano. A cada turno, o alvo pode fazer um teste de R (9 + seu Poder) para cancelar."},
        "Cura":{custo:"1",desc:"Você pode curar a si mesmo ou a alguém que possa tocar. Gaste 2PM para curar 1D PV, até um limite de dados igual à Habilidade. Você também pode gastar 2PM para que um personagem repita um teste de Resistência contra algum efeito negativo duradouro após ter falhado."},
        "Defesa Especial":{custo:"1",desc:"Ao receber um ataque, você pode gastar PM para ativar técnicas de defesa. Exemplos: Blindada (crítico com 5 ou 6, 1PM), Bloqueio (defende com P em vez de R, 1PM), Esquiva (defende com H em vez de R, 1PM), Proteção (usa sua defesa por um aliado, 1PM), Provocação (recebe ataque destinado a aliado, 1PM), Reflexão (se defesa > ataque, oponente sofre a diferença, 1PM), Tenaz (R+2, 1PM por +2), Titânica (crítico automático na defesa, 3PM)."},
        "Desgaste":{custo:"1",desc:"Faça um ataque e gaste 2PM. Se vencer a defesa do alvo e causar dano, ele vai sofrer o mesmo dano outra vez na próxima rodada. O dano extra pode ser evitado se o alvo gastar sua próxima ação para isso."},
        "Devoto":{custo:"1",desc:"Você serve a uma causa ou crença. Ao fazer um teste quando está seguindo ou defendendo sua devoção, você pode gastar 2PM para ter Ganho. Você pode recorrer à devoção até duas vezes por cena."},
        "Elo Mental":{custo:"1",desc:"Você tem uma ligação especial com outro personagem (que também deve ter esta vantagem). Vocês se comunicam sem sinais quando se veem, podem compartilhar PM em situações de perigo, e podem passar Ganho um ao outro antes de rolar. Quando separados, sentem emoções gerais mas sempre sabem a direção e distância do outro."},
        "Estender":{custo:"1",desc:"Ao usar uma vantagem pessoal (que afeta apenas você), pode gastar 1PM por turno para que ela também funcione com um aliado Perto. Por exemplo, Teleporte pode levar consigo outros personagens gastando mais 1PM por cada um."},
        "Famoso":{custo:"1",desc:"Você é conhecido ao redor do mundo. Quando faz um teste em situações sociais envolvendo NPCs que o reconhecem (normalmente 1-4 em 1D), pode gastar 3PM para receber Ganho."},
        "Foco":{custo:"1",desc:"Gaste 2PM e use um turno inteiro se concentrando (Perda na defesa durante esse tempo; se sofrer dano, perde a concentração). No turno seguinte, seu próximo teste recebe um crítico automático (atributo somado outra vez). Você ainda pode rolar mais críticos normalmente."},
        "Forte":{custo:"1",desc:"Você é muito forte. Recebe P+2 em testes para empreender esforço físico, como levantar peso, derrubar porta ou socar vilão. Este bônus é incluído em acertos críticos. Você também pode gastar 2PM antes de fazer um desses testes para conseguir acerto crítico com 5 ou 6."},
        "Gênio":{custo:"1",desc:"Você tem um cérebro notável. Recebe H+2 em testes para resolver problemas que envolvem conhecimento, inteligência e capacidade de raciocínio. Este bônus é incluído em acertos críticos. Você também pode gastar 2PM antes de fazer um desses testes para conseguir acerto crítico com 5 ou 6."},
        "Golpe Final":{custo:"1",desc:"Você tem um golpe poderoso que pode finalizar um alvo já enfraquecido. Gaste 3PM e faça um ataque contra um alvo que esteja perto da derrota. Esse ataque é elevado uma escala acima."},
        "Grimório":{custo:"1+",desc:"Você tem um grimório de magias ou fonte de conhecimentos contendo segredos únicos. Esta vantagem permite já começar com uma ou mais técnicas. Cada ponto de Grimório vale 10XP para adquirir truques ou técnicas comuns (mas não lendárias), com autorização do mestre."},
        "Ilusão":{custo:"2",desc:"Você consegue criar ilusões tridimensionais sem massa ou substância. Custo por tamanho: 1PM (livro ou menor), 3PM (pessoa ou menor), 5PM (caminhão), 8PM (prédio). Criar gasta uma ação; mover gasta um movimento por rodada. Você não pode recuperar PM gastos até dissipá-la."},
        "Imitar":{custo:"1",desc:"Quando alguém usa uma vantagem em sua presença (Longe ou menos), você pode fazer um teste de Percepção (9): se tiver sucesso, pode gastar 3PM para adquirir a mesma vantagem até o fim da cena. Apenas uma vantagem pode ser imitada por vez."},
        "Imortal":{custo:"1",desc:"Você pode ser derrotado, e até tirado de cena, mas não morto. Em testes de morte, você nunca tem um resultado pior que inconsciente."},
        "Improviso":{custo:"2",desc:"Você pode gastar 3PM para aprender, na hora, uma perícia que não tenha e usá-la até o fim da cena. Você pode improvisar apenas uma perícia por vez. Se improvisar uma nova, vai esquecer a anterior."},
        "Imune":{custo:"1",desc:"Você é imune a algo que normalmente afeta outras criaturas. Opções: Abiótico (sem necessidades biológicas básicas), Anfíbio (respira e move normalmente embaixo d'água), Doenças (imune a doenças naturais ou mágicas), Resiliente (não se cansa; qualquer lugar de descanso é ideal), Sem Mente (imune a magias e efeitos mentais)."},
        "Incorpóreo":{custo:"2",desc:"Ao gastar uma ação e 5PM, você pode atravessar barreiras físicas e será imune a qualquer dano por combate violento — exceto Magia ou ataques de outros seres Incorpóreos. Da mesma forma, você também não pode interagir fisicamente com objetos materiais nem causar dano, exceto com Magia. Dura até o fim da cena ou até você decidir encerrar. Mesmo intangível, você pode sofrer dano mental/emocional."},
        "Inimigo":{custo:"1-2",desc:"Você é treinado em enfrentar certo tipo de criatura. Em todos os testes contra criaturas do tipo escolhido, você consegue acerto crítico com 5 ou 6. Grupos: Humanos, Humanoides, Construtos, Espíritos, Monstros. 1pt por grupo; 2pt se o grupo existe em grande abundância na campanha. Você também pode escolher um único arquétipo ou personagem: contra ele, todos os testes recebem Ganho."},
        "Inofensivo":{custo:"1",desc:"Você não parece perigoso. Em combate, por surpreender seu oponente, você ganha uma ação extra antes do primeiro turno (não funciona com quem já viu você lutar). Mesmo contra estes, tem Ganho ao rolar iniciativa. Você também pode gastar 3PM para Ganho em testes para enganar ou passar despercebido."},
        "Instrutor":{custo:"1",desc:"Usando uma ação e gastando 2PM, você permite a um aliado fazer um teste como se ele tivesse uma perícia que você tem. Se o aliado já tem a perícia, pode usar uma vantagem que você possua e a afete. O teste deve ser feito até o próximo turno do aliado."},
        "Inventário":{custo:"1-3",desc:"Você carrega itens consumíveis. Capacidade: 0pt = sem inventário (apenas 2 itens comuns), 1pt = 3 comuns + 1 incomum, 2pt = 5 comuns + 2 incomuns, 3pt = 5 comuns + 4 incomuns + 1 raro. Você pode trocar 3 itens de nível inferior por 1 superior. O Inventário é recarregado no início de cada aventura."},
        "Invisível":{custo:"1-2",desc:"Use uma ação e gaste 3PM para ficar invisível. Quando invisível: Ganho em testes para se esconder e todos os ataques contra você têm Perda. 1pt: invisibilidade interrompida ao atacar ou sofrer dano. 2pt: interrompida apenas ao sofrer dano. Você pode desfazê-la sempre que quiser."},
        "Irresistível":{custo:"1",desc:"Quando um alvo faz um teste para evitar ser afetado por uma de suas vantagens, você pode gastar 2PM ou mais. Para cada 2PM gastos, a meta do teste para resistir aumenta um passo (+3). Deve anunciar o uso antes que o alvo faça seu teste."},
        "Maestria":{custo:"1",desc:"Escolha uma perícia que você tem. Em testes dessa perícia, você pode gastar 1PM para ter um acerto crítico com 5 ou 6. Você pode comprar esta vantagem mais vezes para outras perícias."},
        "Magia":{custo:"2",desc:"Você faz mágica. Gastando 1PM, você soma +1 em qualquer teste. O bônus máximo é igual à sua Habilidade. Quando ataca ou defende com Magia, pode usar a perícia Mística em vez de Luta. Você pode fazer testes de Mística sem gastar PM para efeitos mágicos menores (iluminar sala, limpar mesa, aquecer comida)."},
        "+Mana":{custo:"1",desc:"Você tem mais Pontos de Mana, além daqueles oferecidos por sua Habilidade. Cada vez que compra esta vantagem você recebe +10PM. Você pode comprar esta vantagem várias vezes, para novos aumentos de +10PM."},
        "+Membros":{custo:"2",desc:"Você tem um ou mais membros extras (braços, tentáculos, cauda, etc.). Pode gastar 3PM para fazer uma segunda ação em seu turno (de combate ou não). Em alguns casos, a ação extra pode conceder Ganho à sua outra ação. Você não pode fazer mais de uma ação extra por rodada."},
        "Mentor":{custo:"1",desc:"Escolha uma perícia que você tem. Uma vez por cena, você pode lembrar de um ensinamento e ter Ganho em um teste da perícia escolhida. Além disso, técnicas que tenham a perícia do Mentor como pré-requisito gastam -1PM (mínimo 1PM). Você pode comprar esta vantagem mais vezes para outras perícias."},
        "Obstinado":{custo:"1",desc:"Você pode gastar 1 ponto de P, H ou R (à sua escolha) como se fosse 1 Ponto de Ação. Quando um atributo é reduzido, o limite máximo do recurso correspondente também diminui. Pontos de atributo podem ser recuperados apenas com descanso (8 horas restauram 1 ponto em cada atributo)."},
        "Paralisia":{custo:"1",desc:"Faça um ataque e gaste 2PM. Se vencer a defesa do alvo, em vez de sofrer dano, ele fica imobilizado e indefeso. Dura até o fim da cena ou até o alvo sofrer dano. A cada turno, o alvo pode fazer um teste de R (6 + seu Poder) para cancelar."},
        "Patrono":{custo:"1",desc:"Você serve a uma pessoa, organização ou instituição com mais recursos. Quando faz um teste de compra para algo que ajude na missão para o Patrono, pode gastar 1PM para receber Ganho. Você também recebe um item consumível extra de cada raridade já disponível em seu Inventário."},
        "Punição":{custo:"1-2",desc:"Ao comprar esta vantagem, escolha também uma desvantagem de mesmo valor. Faça um ataque e gaste 2PM. Se vencer a defesa do alvo, em vez de sofrer dano, ele sofre os efeitos da desvantagem escolhida. Dura até o fim da cena ou até o alvo sofrer dano. A cada turno, o alvo pode fazer um teste de R (6 + seu Poder) para cancelar."},
        "Regeneração":{custo:"1-2",desc:"1pt: No início do seu turno, você recupera 1PV. 2pt: No início do seu turno, você recupera 3PV. Além disso, em testes de morte, você nunca tem um resultado pior que Inconsciente; neste caso, desperta no final da cena e volta a regenerar."},
        "Resoluto":{custo:"1",desc:"Sua determinação é inabalável. Você recebe R+2 em testes envolvendo força de vontade, como perceber fraudes, resistir a encantos e ilusões (isso inclui testes de morte). Este bônus é incluído em acertos críticos. Você também pode gastar 2PM antes de fazer um desses testes para conseguir acerto crítico com 5 ou 6."},
        "Riqueza":{custo:"2+",desc:"Você tem recursos financeiros de escala superior. Quando faz testes de compra, pode gastar PM para subir sua escala: 2pt/Sugoi (Ganho + crítico adicional, 2PM), 4pt/Kiodai (dois Ganhos + dois críticos, 4PM), 6pt/Kami (três Ganhos + três críticos, 6PM). PM gastos nesta vantagem não podem ser recuperados até o fim da cena."},
        "Sentido":{custo:"1",desc:"Você tem um sentido melhor ou diferente. Opções: Aguçado (escolha um sentido; Ganho em Percepção com ele), Infravisão (percebe seres de sangue quente e enxerga no escuro), Intuição (percebe intenções ocultas, mentiras, segredos), Radar (percebe tudo em volta mesmo de costas; 'ouve' rádio, TV, celular, wi-fi), Raio X (vê através de portas e paredes, exceto metal ou materiais mágicos). Você pode inventar um sentido especial único."},
        "Telepata":{custo:"1",desc:"Você pode ler ou sentir os pensamentos de outras pessoas. Use um movimento e gaste 1PM para: ter Ganho em teste de perícia social, descobrir algo sobre um personagem com teste de H (9), ou prever movimentos de um adversário em combate (Ganho em defesa contra ele até a próxima rodada). Funciona apenas em criaturas vivas que você consiga ver."},
        "Teleporte":{custo:"1",desc:"Use um movimento e gaste PM para se deslocar até qualquer lugar que possa ver. Cada movimento substituído por Teleporte custa 1PM (ex: Perto para Muito Longe = 2PM). Não é afetado por terreno difícil. Você também pode gastar 3PM para ter Ganho de defesa contra um ataque."},
        "Torcida":{custo:"1",desc:"Quando uma torcida está presente, você tem um Ganho por rodada em qualquer teste. No início de cada cena, role 1D: com resultado 1, existe algum tipo de torcida favorável a você. Na falta de torcida, um aliado pode substituí-la usando uma ação para motivá-lo."},
        "Transformação":{custo:"1-2",desc:"Faça outro personagem com o mesmo número de pontos (pode ser diferente em tudo, exceto que também deve ter esta vantagem). 1pt: todas as formas sofrem os efeitos de todas as desvantagens combinadas. 2pt: cada forma sofre apenas os efeitos de suas próprias desvantagens. Mudar de forma exige uma ação e restaura PM e PV. Pode se transformar uma vez por sessão, ou pagar 1PA por cada transformação extra."},
        "+Vida":{custo:"1",desc:"Você tem mais Pontos de Vida, além daqueles oferecidos por sua Resistência. Cada vez que compra esta vantagem você recebe +10PV. Você pode comprar esta vantagem várias vezes, para novos aumentos de +10PV."},
        "Vigoroso":{custo:"1",desc:"Você é robusto como um cavalo. Recebe R+2 em testes envolvendo saúde física, como resistir a fadiga, doenças e venenos (isso inclui testes de morte). Este bônus é incluído em acertos críticos. Você também pode gastar 2PM antes de fazer um desses testes para conseguir acerto crítico com 5 ou 6."},
        "Voo":{custo:"1",desc:"Você pode voar! Ao usar um movimento para ficar Longe ou mais distante pelo ar, apenas personagens que também possam voar poderão alcançá-lo com movimentos. Você ignora terrenos difíceis. Em combate, levantar voo do chão usa um movimento e gasta 2PM. Voar por muito tempo está sujeito a cansaço."}
      };
      window.LISTA_VANTAGENS = Object.keys(window.DB_VANTAGENS).sort();
      window.DB_DESVANTAGENS = {
        "Ambiente":{custo:"-1",desc:"Você é mais acostumado a certo ambiente. No início de cada cena, role 1D. Com resultado 1, nada relacionado a seu ambiente existe ali e você tem Perda em todos os testes. O mestre pode dispensar a rolagem em situações especiais."},
        "Amnésia":{custo:"-2",desc:"Você não sabe quem é. O mestre faz sua ficha em segredo. Você pode tentar fazer coisas e o mestre diz se conseguiu ou não — sem jamais dizer se você tem mesmo a perícia ou vantagem. Suas capacidades e limitações devem permanecer um mistério."},
        "Antipático":{custo:"-1",desc:"Você não consegue (ou não quer) se expressar bem. Quando faz um teste de Poder envolvendo interação social, você tem Perda e nunca tem acertos críticos. Você não pode ser Antipático e também Carismático."},
        "Assombrado":{custo:"-1 ou -2",desc:"-1pt: Ao entrar em uma situação em que a assombração poderia afetá-lo, role 1D. Com resultado 1, todos os seus testes têm Perda até o fim da cena. -2pt: A assombração aparece com qualquer resultado ímpar."},
        "Atrapalhado":{custo:"-1",desc:"Você se atrapalha com facilidade. Quando faz um teste de Habilidade envolvendo coordenação e agilidade, você tem Perda e nunca tem acertos críticos. Você não pode ser Atrapalhado e também Ágil."},
        "Aura":{custo:"-1 ou -2",desc:"Você emana uma aura pesada de energia negativa que causa Perda em testes sociais. -1pt: Qualquer teste de outras pessoas realizado Perto de você tem Perda. -2pt: Qualquer teste Longe de você ou menos."},
        "Bateria":{custo:"-1",desc:"Sempre que ficar com 0PM você 'desliga', ficando inconsciente e indefeso. Além disso, quando está com pouco PM (abaixo de sua H), sua bateria está fraca e todos os seus testes têm Perda."},
        "Código":{custo:"-1",desc:"Você segue um código de conduta que o impede de fazer (ou deixar de fazer) alguma coisa. Sempre que violar seu código, a culpa o deixará com Perda em todos os testes, até que consiga se redimir. Exemplos: 1ª e 2ª Lei de Asimov, Código do Caçador, do Combate, da Derrota, da Gratidão, dos Heróis, da Honestidade, da Redenção."},
        "Dependência":{custo:"-2",desc:"O personagem depende de algo raro, proibido ou desumano para viver. A Dependência deve ser satisfeita todos os dias. Se não o fizer, o personagem tem Perda em todos os testes."},
        "Diferente":{custo:"-1",desc:"Seu corpo é muito diferente de um corpo humanoide comum. Você tem problemas para usar armas, roupas, equipamentos, máquinas e veículos disponíveis — pode usar apenas aqueles feitos especialmente para você. Você tem Perda ao usar itens feitos para outros."},
        "Elo Vital":{custo:"-1",desc:"Escolha um aliado (que também deve ter esta desvantagem). Sempre que um de vocês sofre dano, o outro também perde PV na mesma quantidade. O contrário não é verdadeiro: curar um não cura o outro."},
        "Fracote":{custo:"-1",desc:"Você é fraco. Ao fazer um teste de Poder envolvendo esforço físico, como para mover uma pedra ou derrubar uma porta, você tem Perda e nunca tem acertos críticos. Você não pode ser Fracote e também Forte."},
        "Frágil":{custo:"-1",desc:"Você tem pouco vigor físico. Ao fazer um teste de Resistência envolvendo saúde física, como para resistir doenças, venenos e testes de morte, você tem Perda e nunca tem acertos críticos. Você não pode ser Frágil e também Vigoroso."},
        "Fraqueza":{custo:"-1 ou -2",desc:"Existe um objeto, elemento ou condição à qual você é especialmente vulnerável. Enquanto estiver Perto dessa coisa, todos os seus testes têm Perda. -1pt: Incomum (aparece raramente, 1 em 1D). -2pt: Comum (aparece mais frequentemente, 1-3 em 1D)."},
        "Fúria":{custo:"-2",desc:"Sempre que você sofre dano ou fica irritado (a critério do mestre), deve fazer um teste de R (9 ou igual ao dano, o que for maior). Se falhar, entra em frenesi e ataca imediatamente. Durante a Fúria todos os testes que não sejam de ataque têm Perda e todas as vantagens gastam o dobro de PM."},
        "Inapto":{custo:"-1",desc:"Escolha uma perícia que não possua. Você é um completo incompetente nela. Sempre que o mestre pede um teste com essa perícia, você está em Perda e qualquer falha é considerada falha crítica."},
        "Inculto":{custo:"-1",desc:"Você não tem familiaridade com a cultura local. Você não sabe ler a língua local, ou acha muito difícil. Testes sociais com personagens que não o entendem têm Perda."},
        "Indeciso":{custo:"-1",desc:"Você tem pouca convicção. Em testes de Resistência envolvendo força de vontade, você tem Perda e nunca tem acertos críticos. Você não pode ser Indeciso e também Resoluto."},
        "Infame":{custo:"-1",desc:"Você é muito conhecido, mas não por uma boa razão. Quando faz testes sociais relacionados a um NPC que o reconhece (normalmente 1-4 em 1D), você está sempre em Perda. Você não pode ser Infame e também Famoso."},
        "Lento":{custo:"-1",desc:"Você se move devagar. Em testes de iniciativa, está sempre em Perda, e também gasta um movimento a mais para cruzar cada distância. Você não pode ser Lento e também ter Aceleração."},
        "Maldição":{custo:"-1 ou -2",desc:"-1pt: A Maldição é suave, mais irritante ou constrangedora. Normalmente não tem efeito em regras, mas em alguns casos pode causar Perda. -2pt: A Maldição é muito grave e desafiadora, com efeito mecânico severo definido pelo mestre."},
        "Monstruoso":{custo:"-1",desc:"Você tem uma aparência grotesca. Outros personagens estão sempre de prontidão contra você: exceto quando os pega de surpresa, você sempre tem Perda em testes de iniciativa. Você também tem Perda em testes sociais que envolvem aparência. Você não pode ser Monstruoso e também Inofensivo."},
        "Munição":{custo:"-1",desc:"Sua arma ou técnica exige recarga cada vez que é utilizada. Sempre que você usa uma ação para atacar, precisa usar um movimento para recarregar. Se fizer um ataque sem recarregar, você não soma seu Poder ao teste de ataque."},
        "Pacifista":{custo:"-1 ou -2",desc:"-1pt: Você não se envolve em combate violento. Quando atacado, pode se defender, mas não fazer testes de ataque. -2pt: Você não faz absolutamente nada que cause dano. Se violar seu pacifismo, a culpa o deixará em Perda até se redimir."},
        "Pobreza":{custo:"-1",desc:"Você não tem recursos financeiros e tende a não consegui-los. Todos os seus testes de compra são feitos em Perda. Você não pode ter Pobreza e também Riqueza."},
        "Ponto Fraco":{custo:"-1",desc:"Você tem uma característica que seu adversário pode explorar. Pode ser descoberto por quem já viu você em ação, Telepatia, ou se você é Famoso/Infame. Qualquer adversário que conhece seu Ponto Fraco pode gastar 1PM para ter Ganho contra você em um teste que explora esse problema."},
        "Protegido":{custo:"-1",desc:"Existe alguém que você precisa proteger de qualquer maneira. Sempre que o Protegido está desaparecido, indefeso ou ferido, todos os seus testes têm Perda. Vilões podem usá-lo como chantagem contra você."},
        "Restrição":{custo:"-1 ou -2",desc:"Certa condição torna mais difícil usar seus poderes. Quando ela acontece, você sempre gasta o dobro de PM para usar suas vantagens. -1pt: Incomum (acontece raramente). -2pt: Comum (acontece muito frequentemente)."},
        "Sem Vida":{custo:"-2",desc:"Você não é um ser vivo. A boa notícia: em testes de morte, você nunca tem resultado pior que inconsciente. A má notícia: você não recupera PV de formas normais (nem descanso, nem itens, nem Cura/Regeneração). Pode ser consertado por outro personagem com a perícia adequada (Máquinas ou Mística) em 1 hora de trabalho com teste (9)."},
        "Tapado":{custo:"-1",desc:"Você não é muito brilhante. Quando faz testes de Habilidade relacionado a inteligência e raciocínio, você tem Perda e nunca tem acertos críticos. Você não pode ser Tapado e também Gênio."},
        "Transtorno":{custo:"-1",desc:"Você lida com um transtorno mental. Opções: Cleptomania (rouba coisas desnecessariamente), Compulsão (precisa fazer algo várias vezes por dia; Perda em todos os testes até cumprir), Distração (não consegue críticos em coisas que não o interessam), Fantasia (acredita ser algo que não é; Perda em testes sociais), Fobia (medo terrível de algo; não consegue fazer ações quando aquilo está Perto), Megalomania (nunca se rende), Mitomania (nunca diz a verdade), Paranoia (não confia em ninguém; recuperação de recursos com descanso é metade do normal)."},
        "Utensílio":{custo:"-1 ou -2",desc:"-1pt: Você precisa de um item para usar adequadamente uma perícia. Quando não está com ele, não consegue acertos críticos. -2pt: Sem o Utensílio, você não pode usar vantagens ou técnicas que gastam PM. Se o Utensílio é destruído ou perdido, você consegue outro depois da cena ou gastando 1PA para improvisá-lo."}
      };
      window.LISTA_DESVANTAGENS = Object.keys(window.DB_DESVANTAGENS).sort();
      window.DB_PERICIAS = {
        "Animais": "Você sabe lidar com animais, sejam domésticos, selvagens ou monstros. Pode acalmá-los, treiná-los, montar, identificar espécies e até se comunicar rudimentarmente. Testes típicos: montar um animal, acalmar um bicho furioso, identificar uma criatura, treinar um animal para realizar truques.",
        "Arte": "Você é talentoso em alguma forma de arte (música, pintura, dança, escultura, teatro, escrita etc.). Pode criar obras, performar e identificar estilos artísticos. Testes típicos: tocar um instrumento, pintar um quadro, dançar, escrever uma história, atuar em uma peça.",
        "Esporte": "Você pratica e conhece diversos esportes (futebol, basquete, natação, lutas olímpicas etc.). Pode participar de competições e usar conhecimentos esportivos em situações práticas. Testes típicos: jogar uma partida, realizar manobras esportivas, conhecer regras de um esporte.",
        "Influência": "Você sabe convencer, seduzir e liderar pessoas. Pode fazer com que gostem de você ou sigam suas ideias. Testes típicos: convencer alguém a fazer algo, seduzir, liderar um grupo, negociar.",
        "Luta": "Você é treinado em combate corpo a corpo (soco, chute, armas brancas etc.). Testes típicos: atacar ou defender em combate físico.",
        "Manha": "Você é esperto em truques, furtos e sobrevivência urbana. Testes típicos: roubar um objeto, abrir uma fechadura, escapar de uma prisão, encontrar atalhos na cidade.",
        "Máquinas": "Você entende e conserta máquinas, veículos, robôs e dispositivos tecnológicos. Testes típicos: consertar um carro, pilotar um veículo, desativar uma armadilha tecnológica.",
        "Medicina": "Você sabe tratar ferimentos, doenças e realizar primeiros socorros. Testes típicos: curar alguém, diagnosticar uma doença, realizar cirurgia simples.",
        "Mística": "Você entende magia, rituais e fenômenos sobrenaturais. Testes típicos: identificar uma magia, realizar um ritual, resistir a efeitos mágicos.",

                      rows={2} onInput={(e) => { e.target.style.height="auto"; e.target.style.height=e.target.scrollHeight+"px" }}

      const TradePanel = ({ from, to, type, limitFrom, limitTo, tradeCount, onTrade, fromColor, toColor }) => (

      const InventoryColumn = ({ title, items, limit, onAdd, onUpdate, onRemove, color }) => {

          <div className="flex flex-col h-full rounded-lg p-3 print:bg-transparent print:border-black print:border" style={{background:"rgba(0,0,0,0.4)",border:"1px solid rgba(0,229,255,0.2)"}}>
            <div className="flex justify-between items-center mb-3">
              <div>
                <h4 className="text-sm font-bold uppercase print:text-black" style={{color:"#00e5ff",fontFamily:"Orbitron,sans-serif",letterSpacing:"1px"}}>{title}</h4>
                {limit > 0 ? (
                  <div className="flex items-center gap-2 mt-1">
                    <div className="w-16 h-1.5 rounded-full overflow-hidden" style={{background:"rgba(0,0,0,0.8)",border:"1px solid rgba(0,229,255,0.15)"}}><div className={`h-full ${barColors[color]} transition-all`} style={{width:`${Math.min(100,(items.length/limit)*100)}%`}}></div></div>
                    <span className={`text-[10px] font-bold ${items.length>limit?'text-rose-500':'text-slate-500'} print:text-black`}>{items.length}/{limit}</span>
                  </div>
                ) : (<span className="text-[10px] text-slate-600 uppercase font-bold mt-1 block print:hidden">Indisponível</span>)}

      const DiceModal = ({ onClose, attributes, onRollBroadcast }) => {
        const [selectedAttribute, setSelectedAttribute] = useState('poder');
        const [hasSkill, setHasSkill] = useState(false);
        const [gainCount, setGainCount] = useState(0);
        const [lossCount, setLossCount] = useState(0);
        const [critRange, setCritRange] = useState(6);
        const [modifier, setModifier] = useState(0);
        const [history, setHistory] = useState([]);
        const [currentRoll, setCurrentRoll] = useState(null);
        const [isRolling, setIsRolling] = useState(false);

        const diceCount = useMemo(() => {
          let count = 1;
          if (hasSkill) count++;
          count += gainCount;
          count -= lossCount;
          return Math.max(1, Math.min(3, count));
        }, [hasSkill, gainCount, lossCount]);

        const roll = () => {
          if (isRolling) return;
          setIsRolling(true);
          setTimeout(() => {
            const results = Array.from({length: diceCount}, () => Math.floor(Math.random()*6)+1);
            const attrValue = attributes[selectedAttribute] || 0;
            const diceSum = results.reduce((a,b) => a+b, 0);
            const criticalHits = results.filter(r => r >= critRange).length;
            const criticalBonus = criticalHits * attrValue;
            const isCriticalFailure = results.every(r => r === 1);
            const total = diceSum + attrValue + criticalBonus + modifier;
            const newRoll = { id: Date.now(), attribute: selectedAttribute, diceCount, results, total, attrValue, criticalBonus, isCriticalFailure, criticalHits, modifier };
            setCurrentRoll(newRoll);
            setHistory(prev => [newRoll, ...prev].slice(0, 10));
            setIsRolling(false);
            if (onRollBroadcast) onRollBroadcast(newRoll);
          }, 600);
        };

        return (
          <div id="dice-modal" className="fixed inset-0 backdrop-blur-md z-50 flex items-center justify-center p-4" style={{background:"rgba(0,5,15,0.92)"}}>
            <div className="w-full max-w-lg rounded-lg overflow-hidden flex flex-col max-h-[90vh] cyber-corner" style={{background:"var(--cyber-panel)",border:"1px solid var(--cyber-border)",boxShadow:"0 0 40px var(--cyber-glow)"}}>
              <div className="p-4 flex justify-between items-center" style={{background:"rgba(0,0,0,0.8)",borderBottom:"1px solid rgba(0,229,255,0.3)"}}>
                <h2 className="text-lg font-bold flex items-center gap-2 text-white"><Dice className="w-6 h-6 text-indigo-400" /> Teste 3DeT</h2>
                <button onClick={onClose} className="p-1 hover:bg-slate-700 rounded text-slate-400 hover:text-white"><X className="w-6 h-6" /></button>
              </div>
              <div className="p-6 overflow-y-auto space-y-6 flex-1">
                <div>
                  <label className="block text-xs font-bold text-slate-500 uppercase mb-2">1. Escolha o Atributo</label>
                  <div className="grid grid-cols-3 gap-3">
                    <button onClick={() => setSelectedAttribute('poder')} className={`p-3 rounded-lg flex flex-col items-center gap-1 transition-all ${selectedAttribute==='poder'?'':' '}`} style={{background: selectedAttribute==='poder'?'rgba(255,23,68,0.2)':"rgba(0,0,0,0.5)", border: selectedAttribute==='poder'?'1px solid #ff1744':'1px solid rgba(0,229,255,0.2)', color: selectedAttribute==='poder'?'#ff1744':'rgba(0,229,255,0.6)'}}>
                      <Sword className="w-5 h-5" /><span className="text-xs font-bold uppercase">Poder ({attributes.poder})</span>
                    </button>
                    <button onClick={() => setSelectedAttribute('habilidade')} className={`p-3 rounded-lg flex flex-col items-center gap-1 transition-all`} style={{background: selectedAttribute==='habilidade'?'rgba(0,229,255,0.2)':"rgba(0,0,0,0.5)", border: selectedAttribute==='habilidade'?'1px solid #00e5ff':'1px solid rgba(0,229,255,0.2)', color: selectedAttribute==='habilidade'?'#00e5ff':'rgba(0,229,255,0.6)'}}>
                      <Zap className="w-5 h-5" /><span className="text-xs font-bold uppercase">Habilidade ({attributes.habilidade})</span>
                    </button>
                    <button onClick={() => setSelectedAttribute('resistencia')} className={`p-3 rounded-lg flex flex-col items-center gap-1 transition-all`} style={{background: selectedAttribute==='resistencia'?'rgba(0,230,118,0.2)':"rgba(0,0,0,0.5)", border: selectedAttribute==='resistencia'?'1px solid #00e676':'1px solid rgba(0,229,255,0.2)', color: selectedAttribute==='resistencia'?'#00e676':'rgba(0,229,255,0.6)'}}>
                      <Shield className="w-5 h-5" /><span className="text-xs font-bold uppercase">Resistência ({attributes.resistencia})</span>
                    </button>
                  </div>
                </div>
                <div>
                  <div className="flex justify-between items-end mb-2">
                    <label className="block text-xs font-bold text-slate-500 uppercase">2. Modificadores</label>
                    <span className="text-xs font-mono text-indigo-400 bg-indigo-500/10 px-2 py-0.5 rounded border border-indigo-500/30">Total: {diceCount}D</span>
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <button onClick={() => setHasSkill(!hasSkill)} className={`p-2 rounded-lg border text-xs font-bold transition-all flex flex-col items-center justify-center gap-1 ${hasSkill?'bg-indigo-600 border-indigo-500 text-white':'bg-slate-800 border-slate-700 text-slate-400'}`}>
                      {hasSkill ? 'Com Perícia' : 'Sem Perícia'}
                    </button>
                    <div className="p-2 rounded-lg flex flex-col items-center justify-between" style={{background: modifier!==0?'rgba(0,229,255,0.1)':"rgba(0,0,0,0.5)", border: modifier!==0?'1px solid rgba(0,229,255,0.5)':"1px solid rgba(0,229,255,0.2)"}}>
                      <span className={`text-[10px] font-bold uppercase mb-1 ${modifier!==0?'text-blue-400':'text-slate-500'}`}>Modificador</span>
                      <div className="flex items-center gap-2 w-full justify-center">
                        <button onClick={() => setModifier(modifier-1)} className="w-6 h-6 flex items-center justify-center rounded bg-slate-700 hover:bg-slate-600 text-slate-300 font-bold">-</button>
                        <span className={`font-mono font-bold text-lg w-6 text-center ${modifier!==0?'text-blue-400':'text-slate-500'}`}>{modifier>0?`+${modifier}`:modifier}</span>
                        <button onClick={() => setModifier(modifier+1)} className="w-6 h-6 flex items-center justify-center rounded bg-blue-600 hover:bg-blue-500 text-white font-bold">+</button>
                      </div>
                    </div>
                    <div className="p-2 rounded-lg flex flex-col items-center justify-between" style={{background: gainCount>0?'rgba(0,230,118,0.1)':"rgba(0,0,0,0.5)", border: gainCount>0?'1px solid rgba(0,230,118,0.5)':"1px solid rgba(0,229,255,0.2)"}}>
                      <span className={`text-[10px] font-bold uppercase mb-1 ${gainCount>0?'text-emerald-400':'text-slate-500'}`}>Ganhos (+1D)</span>
                      <div className="flex items-center gap-2 w-full justify-center">
                        <button onClick={() => setGainCount(Math.max(0,gainCount-1))} className="w-6 h-6 flex items-center justify-center rounded bg-slate-700 hover:bg-slate-600 text-slate-300 font-bold">-</button>
                        <span className={`font-mono font-bold text-lg w-4 text-center ${gainCount>0?'text-emerald-400':'text-slate-500'}`}>{gainCount}</span>
                        <button onClick={() => setGainCount(gainCount+1)} className="w-6 h-6 flex items-center justify-center rounded bg-emerald-600 hover:bg-emerald-500 text-white font-bold">+</button>
                      </div>
                    </div>
                    <div className="p-2 rounded-lg flex flex-col items-center justify-between" style={{background: lossCount>0?'rgba(255,23,68,0.1)':"rgba(0,0,0,0.5)", border: lossCount>0?'1px solid rgba(255,23,68,0.5)':"1px solid rgba(0,229,255,0.2)"}}>
                      <span className={`text-[10px] font-bold uppercase mb-1 ${lossCount>0?'text-rose-400':'text-slate-500'}`}>Perdas (-1D)</span>
                      <div className="flex items-center gap-2 w-full justify-center">
                        <button onClick={() => setLossCount(Math.max(0,lossCount-1))} className="w-6 h-6 flex items-center justify-center rounded bg-slate-700 hover:bg-slate-600 text-slate-300 font-bold">-</button>
                        <span className={`font-mono font-bold text-lg w-4 text-center ${lossCount>0?'text-rose-400':'text-slate-500'}`}>{lossCount}</span>
                        <button onClick={() => setLossCount(lossCount+1)} className="w-6 h-6 flex items-center justify-center rounded bg-rose-600 hover:bg-rose-500 text-white font-bold">+</button>
                      </div>
                    </div>
                  </div>
                  <div className="mt-3 flex items-center gap-2">
                    <input type="checkbox" id="crit5" checked={critRange===5} onChange={() => setCritRange(critRange===6?5:6)} className="w-4 h-4 rounded" />
                    <label htmlFor="crit5" className="text-xs text-slate-400 select-none cursor-pointer">Crítico também com 5 (Maestria/Vantagem)</label>
                  </div>
                </div>
                <button onClick={roll} disabled={isRolling} className="cyber-btn w-full py-4 rounded font-black text-lg active:scale-95 transition-all flex items-center justify-center gap-2 disabled:opacity-50" style={{fontFamily:"Orbitron,sans-serif",letterSpacing:"2px"}}>
                  {isRolling ? 'Rolando...' : `Rolar ${diceCount}D + ${attributes[selectedAttribute]}`}
                </button>
                <div className="min-h-[140px] rounded-lg p-4 flex flex-col items-center justify-center relative overflow-hidden" style={{background:"rgba(0,0,0,0.8)",border:"1px solid rgba(0,229,255,0.2)"}}>
                  {isRolling ? (
                    <Dice className="w-16 h-16 text-indigo-500 rolling opacity-50" />
                  ) : currentRoll ? (
                    <div className="w-full text-center">
                      {currentRoll.isCriticalFailure && <div className="absolute top-0 left-0 w-full bg-rose-600 text-white text-xs font-bold uppercase py-1">Falha Crítica!</div>}
                      <div className="flex flex-wrap justify-center gap-3 mb-4 mt-2">
                        {currentRoll.results.map((val,idx) => {
                          const isCrit = val >= critRange;
                          let style = "bg-slate-800 border-slate-600 text-slate-300";
                          if (isCrit) style = "bg-yellow-500 text-slate-900 border-yellow-400 scale-110";
                          if (currentRoll.isCriticalFailure) style = "bg-rose-900 text-rose-200 border-rose-700";
                          return <div key={idx} className={`w-14 h-14 flex items-center justify-center rounded-xl border-2 text-3xl font-black ${style}`}>{val}</div>;
                        })}
                      </div>
                      <div className="text-sm text-slate-400 font-mono mb-2">
                        {currentRoll.isCriticalFailure ? <span className="text-rose-400 font-bold">Erro Automático</span> : (
                          <>{currentRoll.results.reduce((a,b)=>a+b,0)} (Dados) + {currentRoll.attrValue} (Atributo)
                            {currentRoll.criticalBonus>0 && <span className="text-yellow-400"> + {currentRoll.criticalBonus} (Crítico)</span>}
                            {currentRoll.modifier!==0 && <span className={currentRoll.modifier>0?"text-blue-400":"text-rose-400"}>{currentRoll.modifier>0?` + ${currentRoll.modifier}`:` - ${Math.abs(currentRoll.modifier)}`} (Mod)</span>}
                          </>
                        )}
                      </div>
                      {!currentRoll.isCriticalFailure && (
                        <div className="inline-block bg-indigo-600 px-6 py-2 rounded-full shadow-lg">
                          <span className="text-indigo-200 text-xs font-bold uppercase mr-2">Resultado Final</span>
                          <span className="text-2xl font-black text-white">{currentRoll.total}</span>
                        </div>
                      )}
                    </div>
                  ) : (<p className="text-slate-600 italic text-sm">Configure e role os dados...</p>)}
                </div>
                {history.length > 0 && (
                  <div className="border-t border-slate-700 pt-4">
                    <h4 className="text-xs font-bold text-slate-500 uppercase mb-3">Últimas Rolagens</h4>
                    <div className="space-y-2 max-h-[100px] overflow-y-auto pr-1 custom-scrollbar">
                      {history.map(h => (
                        <div key={h.id} className="flex justify-between items-center text-xs p-2 rounded" style={{background:"rgba(0,0,0,0.5)",border:"1px solid rgba(0,229,255,0.15)"}}>
                          <span className="text-slate-400 uppercase font-bold">{h.attribute.substr(0,3)} ({h.diceCount}D)</span>
                          <div className="flex gap-2">
                            <span className="font-mono text-slate-500">[{h.results.join(', ')}]</span>
                            {h.isCriticalFailure ? <span className="font-bold text-rose-500">Falha</span> : <span className="font-bold text-indigo-400">= {h.total}</span>}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      };

      const App = () => {
        const fileInputRef = useRef(null);
        const importInputRef = useRef(null);
        const [showSidebar, setShowSidebar] = useState(false);
        const [showDiceModal, setShowDiceModal] = useState(false);
        const [showLobbySidebar, setShowLobbySidebar] = useState(false);
        const [savedSheets, setSavedSheets] = useState([]);
        const [kitInput, setKitInput] = useState('');
        const [character, setCharacter] = useState({ ...emptyCharacter, id: Date.now() });

        // Lobby state
        const [lobbyMode, setLobbyMode] = useState(null);
        const [lobbyId, setLobbyId] = useState('');
        const [joinInputId, setJoinInputId] = useState('');
        const [connectionStatus, setConnectionStatus] = useState('disconnected');
        const [sharedRolls, setSharedRolls] = useState([]);
        const [initiatives, setInitiatives] = useState([]);
        const peerRef = useRef(null);
        const connectionsRef = useRef([]);
        const clientConnectionRef = useRef(null);

        const addSharedRoll = (payload) => setSharedRolls(prev => [payload, ...prev].slice(0, 50));

        const broadcastInitiative = (newList) => {
          setInitiatives(newList);
          const msg = { type: 'SYNC_INITIATIVE', payload: newList };
          if (lobbyMode === 'host') connectionsRef.current.forEach(c => c.send(msg));
          else if (lobbyMode === 'client' && clientConnectionRef.current) clientConnectionRef.current.send(msg);
        };

        const startHosting = () => {
          setConnectionStatus('connecting');
          const peer = new Peer();
          peer.on('open', (id) => { setLobbyId(id); setLobbyMode('host'); setConnectionStatus('connected'); });
          peer.on('connection', (conn) => {
            connectionsRef.current.push(conn);
            conn.on('data', (data) => {
              if (data.type === 'ROLL') { addSharedRoll(data.payload); connectionsRef.current.forEach(c => { if (c.peer !== conn.peer) c.send(data); }); }
              if (data.type === 'SYNC_INITIATIVE') { setInitiatives(data.payload); connectionsRef.current.forEach(c => { if (c.peer !== conn.peer) c.send(data); }); }
            });
            conn.on('close', () => { connectionsRef.current = connectionsRef.current.filter(c => c.peer !== conn.peer); });
          });
          peer.on('error', (err) => { alert("Erro P2P: " + err.type); setConnectionStatus('disconnected'); });
          peerRef.current = peer;
        };

        const joinLobby = () => {
          if (!joinInputId.trim()) return;
          setConnectionStatus('connecting');
          const peer = new Peer();
          peer.on('open', () => {
            const conn = peer.connect(joinInputId.trim());
            conn.on('open', () => { setLobbyMode('client'); setLobbyId(joinInputId.trim()); setConnectionStatus('connected'); clientConnectionRef.current = conn; });
            conn.on('data', (data) => {
              if (data.type === 'ROLL') addSharedRoll(data.payload);
              if (data.type === 'SYNC_INITIATIVE') setInitiatives(data.payload);
            });
            conn.on('close', () => { alert("Conexão com o Host perdida."); leaveLobby(); });
          });
          peer.on('error', (err) => { alert("Erro ao conectar: " + err.type); setConnectionStatus('disconnected'); });
          peerRef.current = peer;
        };

        const leaveLobby = () => {
          if (peerRef.current) peerRef.current.destroy();
          peerRef.current = null; connectionsRef.current = []; clientConnectionRef.current = null;
          setLobbyMode(null); setLobbyId(''); setConnectionStatus('disconnected'); setSharedRolls([]);
        };

        const handleBroadcastRoll = (rollData) => {
          const payload = { id: Date.now()+Math.random(), playerName: character.nome||'Jogador', rollData, time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) };
          if (connectionStatus === 'connected') addSharedRoll(payload);
          const msg = { type: 'ROLL', payload };
          if (lobbyMode === 'host') connectionsRef.current.forEach(c => c.send(msg));
          else if (lobbyMode === 'client' && clientConnectionRef.current) clientConnectionRef.current.send(msg);
        };

        const copyLobbyId = () => { navigator.clipboard.writeText(lobbyId); alert("ID da Sala copiado!"); };

        const FIREBASE_URL = "https://ficha-editavel-3det-default-rtdb.firebaseio.com";
        const syncToCloud = async () => {
          try {
            let syncId = character.syncId;
            if (!syncId) { syncId = Math.random().toString(36).substring(2,7).toUpperCase(); setCharacter(prev => ({...prev, syncId})); }
            const dataToSave = { ...character, syncId };
            await fetch(`${FIREBASE_URL}/fichas/${syncId}.json`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(dataToSave) });
            navigator.clipboard.writeText(syncId);
            alert(`☁️ Ficha salva na nuvem!\n\nCódigo: ${syncId}\n\nJá copiado! Envie para o Mestre.`);
          } catch(e) { alert("❌ Erro ao salvar na nuvem."); }
        };

        const importFromCloud = async () => {
          const code = prompt("Digite o código de 5 letras da ficha (ex: 8F2A1):");
          if (!code) return;
          try {
            const res = await fetch(`${FIREBASE_URL}/fichas/${code.trim().toUpperCase()}.json`);
            const parsed = await res.json();
            if (parsed && parsed.id) {
              const safe = { ...emptyCharacter, ...parsed, pericias:parsed.pericias||[], vantagens:parsed.vantagens||[], desvantagens:parsed.desvantagens||[], kits:parsed.kits||[], tecnicas:parsed.tecnicas||[], atributos:{...emptyCharacter.atributos,...(parsed.atributos||{})}, recursos:{...emptyCharacter.recursos,...(parsed.recursos||{})}, inventario:{...emptyCharacter.inventario,...(parsed.inventario||{})}, trocas:{...emptyCharacter.trocas,...(parsed.trocas||{})} };
              setSavedSheets(prev => { const f = prev.filter(s=>s.id!==safe.id); return [...f, safe]; });
              alert(`☁️ Ficha de "${safe.nome||'Jogador'}" importada!\n\nJá está na sua Biblioteca.`);
            } else { alert("❌ Nenhuma ficha encontrada com esse código."); }
          } catch(e) { alert("❌ Erro ao buscar da nuvem."); }
        };

        useLayoutEffect(() => {
          const textareas = document.querySelectorAll('.auto-expand');
          textareas.forEach(t => { t.style.height='auto'; t.style.height=t.scrollHeight+'px'; });
        });

        useEffect(() => {
          const saved = localStorage.getItem('3det_sheets');
          if (saved) { try { setSavedSheets(JSON.parse(saved)); } catch(e) {} }
        }, []);

        const calculatedTotalPoints = useMemo(() => {
          const attrPoints = (character.atributos.poder||0)+(character.atributos.habilidade||0)+(character.atributos.resistencia||0);
          const advPoints = character.vantagens.reduce((acc,item) => acc+(parseInt(item.custo)||0),0);
          const disadvPoints = character.desvantagens.reduce((acc,item) => acc+(parseInt(item.custo)||0),0);
          const skillPoints = character.pericias.reduce((acc,item) => acc+(parseInt(item.custo)||0),0);
          const nKits = (character.kits||[]).length;
          const kitsPoints = (nKits*(nKits+1))/2;
          const archPoints = parseInt(character.arquetipoCusto)||0;
          return attrPoints+advPoints+disadvPoints+skillPoints+archPoints+kitsPoints;
        }, [character.atributos,character.vantagens,character.desvantagens,character.pericias,character.kits,character.arquetipoCusto]);

        const handleAddKit = () => {
          if (!kitInput.trim()) return;
          const kitName = kitInput.trim();
          const newKit = { id: Date.now(), nome: kitName };
          const newKits = [...(character.kits||[]), newKit];
          let newVantagens = [...character.vantagens];
          const kitData = DB_KITS[kitName];
          if (kitData && kitData.poderes) {
            kitData.poderes.forEach((p,idx) => {
              newVantagens.push({ id: Date.now()+idx+Math.random(), nome: p.nome, detalhe:`(Kit: ${kitName})`, descricao:"", custo:"0" });
            });
          }
          setCharacter({ ...character, kits: newKits, vantagens: newVantagens });
          setKitInput('');
        };

        const handleArquetipoChange = (e) => {
          const novoNome = e.target.value;
          const novoCusto = DB_ARQUETIPOS[novoNome] ? DB_ARQUETIPOS[novoNome].custo : character.arquetipoCusto;
          setCharacter({ ...character, arquetipo: novoNome, arquetipoCusto: novoCusto });
        };

        const updateAttr = (attr, val) => setCharacter(prev => ({ ...prev, atributos: { ...prev.atributos, [attr]: Math.max(0, parseInt(val)||0) } }));

        const addListItem = (list) => setCharacter(prev => ({
          ...prev, [list]: [...(prev[list]||[]), { id: Date.now(), nome:'', detalhe:'', descricao:'', custo: list==='pericias'?'1':'' }]
        }));

        const updateListItem = (list, id, field, value) => {
          setCharacter(prev => {
            const newList = prev[list].map(item => {
              if (item.id === id) {
                const updated = { ...item, [field]: value };

                if (field === 'nome') {
                  // Ao mudar o nome, busca descrição geral
                  const info = list==='vantagens' ? DB_VANTAGENS[value] : list==='desvantagens' ? DB_DESVANTAGENS[value] : null;
                  if (info) {
                    if (!updated.custo) { updated.custo = (info.custo.match(/-?\d+/)||[""])[0]; }
                    updated.descricao = info.desc;
                  }
                  if (list==='pericias' && DB_PERICIAS[value]) {
                    updated.descricao = DB_PERICIAS[value];

                  // Limpa o detalhe ao trocar de nome
                  updated.detalhe = '';
                }

                if (field === 'detalhe' && value) {
                  // Ao escolher uma opção/detalhe, busca a sub-descrição específica
                  const subDesc = DB_SUBOPCOES[item.nome]?.[value];
                  if (subDesc) {
                    updated.descricao = subDesc;
                  }
                }

                return updated;
              }
              return item;
            });
            return { ...prev, [list]: newList };
          });
        };

        const removeListItem = (list, id) => setCharacter(prev => ({ ...prev, [list]: prev[list].filter(item => item.id !== id) }));
        const addInventoryItem = (cat) => setCharacter(prev => ({ ...prev, inventario: { ...prev.inventario, [cat]: [...prev.inventario[cat], { id: Date.now(), nome:'', qtd:1, desc:'' }] } }));
        const updateInventoryItem = (cat, id, field, value) => setCharacter(prev => ({ ...prev, inventario: { ...prev.inventario, [cat]: prev.inventario[cat].map(item => item.id===id ? { ...item, [field]:value } : item) } }));
        const removeInventoryItem = (cat, id) => setCharacter(prev => ({ ...prev, inventario: { ...prev.inventario, [cat]: prev.inventario[cat].filter(item => item.id!==id) } }));

        const saveToLibrary = () => {
          const newSheet = { ...character, id: character.id||Date.now(), lastModified: new Date().toISOString() };
          try {
            const existingIndex = savedSheets.findIndex(s => s.id === newSheet.id);
            let newSaved = [...savedSheets];
            if (existingIndex >= 0) newSaved[existingIndex] = newSheet; else newSaved.push(newSheet);
            localStorage.setItem('3det_sheets', JSON.stringify(newSaved));
            setSavedSheets(newSaved);
            setCharacter(newSheet);
            alert('Ficha salva na biblioteca!');
          } catch(e) { alert('Erro ao salvar. Tente remover a foto.'); }
        };

        const loadFromLibrary = (sheet) => { setCharacter({ ...emptyCharacter, ...sheet, kits: sheet.kits||[], escala: sheet.escala||'Ningen', marco: sheet.marco||'Iniciante' }); setShowSidebar(false); };
        const deleteFromLibrary = (e, id) => { e.stopPropagation(); if(window.confirm('Remover ficha?')) { const n=savedSheets.filter(s=>s.id!==id); localStorage.setItem('3det_sheets',JSON.stringify(n)); setSavedSheets(n); } };
        const createNewSheet = () => { if(window.confirm('Criar nova ficha?')) { setCharacter({ ...emptyCharacter, id: Date.now() }); setShowSidebar(false); } };
        const exportFile = () => { const d="data:text/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(character)); const a=document.createElement('a'); a.setAttribute('href',d); a.setAttribute('download',`${character.nome||'personagem'}_3det.json`); document.body.appendChild(a); a.click(); a.remove(); };
        const importFile = (e) => {
          const file = e.target.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
              try {
                const loaded = JSON.parse(ev.target.result);
                if (!loaded.inventario) loaded.inventario = emptyCharacter.inventario;
                if (!loaded.kits) loaded.kits = [];
                if (!loaded.id) loaded.id = Date.now();
                setCharacter({ ...emptyCharacter, ...loaded });
                alert('Ficha carregada!');
              } catch(err) { alert('Erro ao ler arquivo.'); }
              e.target.value = null;
            };
            reader.readAsText(file);
          }
        };
        const handleImageUpload = (e) => { const file=e.target.files[0]; if(file) { const r=new FileReader(); r.onloadend=()=>setCharacter(p=>({...p,foto:r.result})); r.readAsDataURL(file); } };

        const hasPatrono = character.vantagens.some(v => v.nome.toLowerCase().includes('patrono'));
        const getInventoryLimits = (level, trades) => {
          let limits = { comuns:2, incomuns:0, raros:0, lendarios:0 };
          if (level>=1) { limits.comuns=3; limits.incomuns=1; }
          if (level>=2) { limits.comuns=5; limits.incomuns=2; }
          if (level>=3) { limits.incomuns=4; limits.raros=1; limits.lendarios=1; }
          if (hasPatrono) { if(limits.comuns>0)limits.comuns+=1; if(limits.incomuns>0)limits.incomuns+=1; if(limits.raros>0)limits.raros+=1; if(limits.lendarios>0)limits.lendarios+=1; }
          limits.comuns -= trades.comumParaIncomum*3; limits.incomuns += trades.comumParaIncomum;
          limits.incomuns -= trades.incomumParaRaro*3; limits.raros += trades.incomumParaRaro;
          limits.raros -= trades.raroParaLendario*3; limits.lendarios += trades.raroParaLendario;
          return limits;
        };
        const limits = getInventoryLimits(character.nivelInventario, character.trocas||{comumParaIncomum:0,incomumParaRaro:0,raroParaLendario:0});
        const performTrade = (type, dir) => setCharacter(prev => { const t=prev.trocas||{comumParaIncomum:0,incomumParaRaro:0,raroParaLendario:0}; const nv=t[type]+dir; if(nv<0)return prev; return {...prev,trocas:{...t,[type]:nv}}; });

        const maxPA = character.atributos.poder||1;
        const maxPM = character.atributos.habilidade === 0 ? 1 : character.atributos.habilidade * 5;
        const maxPV = character.atributos.resistencia === 0 ? 1 : character.atributos.resistencia * 5;

        return (
          <div className="min-h-screen w-full print:bg-white print:text-black" style={{background:"var(--cyber-bg)",color:"var(--cyber-text)",position:"relative",zIndex:1}}>
            {/* TOP BAR CYBERPUNK */}
            <div className="cyber-header sticky top-0 left-0 w-full p-3 flex justify-between items-center z-40 no-print" style={{position:'relative',zIndex:40}}>
              <div style={{position:'absolute',inset:0,background:'linear-gradient(90deg, transparent, rgba(0,229,255,0.03), transparent)',pointerEvents:'none'}}></div>
              <button onClick={() => setShowSidebar(true)} className="cyber-btn p-2 rounded flex items-center gap-2 text-xs">
                <Menu className="w-5 h-5" /><span className="hidden md:inline">FICHAS</span>
              </button>
              <div className="text-center">
                <div className="flicker" style={{fontFamily:"'Orbitron',sans-serif",fontSize:'clamp(12px,3vw,20px)',fontWeight:900,color:'#00e5ff',textShadow:'0 0 10px rgba(0,229,255,0.8), 0 0 20px rgba(0,229,255,0.4)',letterSpacing:'4px',textTransform:'uppercase'}}>
                  PLUS DISTOPHYA
                </div>
                <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:'9px',color:'rgba(0,229,255,0.5)',letterSpacing:'3px',textTransform:'uppercase'}}>
                  ◆ FICHA 3DeT VICTORY ◆
                </div>
              </div>
              <div className="flex gap-1 md:gap-2">
                <button onClick={syncToCloud} className="p-2 rounded flex items-center gap-1 text-xs font-bold no-print" style={{background:"rgba(168,85,247,0.15)",border:"1px solid rgba(168,85,247,0.4)",color:"#a855f7"}} title="Sincronizar na Nuvem">
                  <CloudUpload className="w-4 h-4" /><span className="hidden md:inline" style={{fontFamily:"Orbitron,sans-serif",fontSize:"10px"}}>SINCRONIZAR</span>
                </button>
                <button onClick={importFromCloud} className="p-2 rounded flex items-center gap-1 text-xs font-bold no-print" style={{background:"rgba(236,72,153,0.15)",border:"1px solid rgba(236,72,153,0.4)",color:"#ec4899"}} title="Baixar Ficha da Nuvem">
                  <CloudDownload className="w-4 h-4" /><span className="hidden md:inline" style={{fontFamily:"Orbitron,sans-serif",fontSize:"10px"}}>BAIXAR FICHA</span>
                </button>
                <button onClick={() => setShowLobbySidebar(!showLobbySidebar)} className="p-2 rounded flex items-center gap-1 text-xs font-bold no-print" style={{background: connectionStatus==='connected' ? "rgba(0,230,118,0.15)" : "rgba(245,158,11,0.15)", border: connectionStatus==='connected' ? "1px solid rgba(0,230,118,0.4)" : "1px solid rgba(245,158,11,0.4)", color: connectionStatus==='connected' ? "#00e676" : "#f59e0b"}} title="Ver Sala">
                  <Users className="w-4 h-4" /><span className="hidden md:inline" style={{fontFamily:"Orbitron,sans-serif",fontSize:"10px"}}>{connectionStatus==='connected'?'NA SALA':'VER SALA'}</span>
                </button>
                <button onClick={saveToLibrary} className="cyber-btn p-2 rounded flex items-center gap-1 text-xs">
                  <Save className="w-4 h-4" /><span className="hidden md:inline">SALVAR</span>
                </button>
              </div>
            </div>

            {/* DICE BUTTON */}
            <button onClick={() => setShowDiceModal(true)} className="cyber-dice fixed bottom-8 right-8 z-[100] p-4 rounded-full flex items-center justify-center cursor-pointer no-print" title="Rolar Dados" style={{color:'#00e5ff'}}>
              <Dice className="w-8 h-8" />
            </button>

            {showDiceModal && <DiceModal onClose={() => setShowDiceModal(false)} attributes={character.atributos} onRollBroadcast={handleBroadcastRoll} />}

            {/* SIDEBAR */}
            {showSidebar && (
              <>
                <div className="fixed inset-0 z-40 backdrop-blur-sm no-print" style={{background:"rgba(0,5,15,0.85)"}} onClick={() => setShowSidebar(false)}></div>
                <div className="fixed inset-y-0 left-0 w-80 shadow-2xl z-50 no-print flex flex-col" style={{background:"var(--cyber-panel)",borderRight:"1px solid var(--cyber-border)",boxShadow:"0 0 40px var(--cyber-glow)"}}>
                  <div className="p-4 flex justify-between items-center" style={{borderBottom:"1px solid rgba(0,229,255,0.3)",background:"rgba(0,0,0,0.8)"}}>
                    <h2 className="font-bold text-lg flex items-center gap-2" style={{color:"#00e5ff",fontFamily:"Orbitron,sans-serif"}}><BookOpen className="w-5 h-5 text-indigo-400" /> Biblioteca</h2>
                    <button onClick={() => setShowSidebar(false)} className="text-slate-400 hover:text-white"><X className="w-6 h-6" /></button>
