                    ))}
                    {KITS[kitIn].desv && (
                      <div style={{marginTop:6,padding:'4px 8px',background:'rgba(255,23,68,0.06)',border:'1px solid rgba(255,23,68,0.2)',borderRadius:4}}>
                        <span style={{fontSize:10,color:'#ff5252',fontWeight:700,fontFamily:'Orbitron'}}>{KITS[kitIn].desv.nome} ({KITS[kitIn].desv.custo}pt):</span>
                        <span style={{fontSize:10,color:'rgba(255,82,82,0.7)',marginLeft:4}}>{KITS[kitIn].desv.desc}</span>
                      </div>
                    )}
                    <button onClick={addKit} style={{marginTop:10,width:'100%',padding:'6px',
                      background: KITS[kitIn].homebrew ? 'rgba(255,214,0,0.12)' : 'rgba(0,229,255,0.12)',
                      border: '1px solid '+(KITS[kitIn].homebrew ? '#ffd600' : 'var(--ca)'),
                      color: KITS[kitIn].homebrew ? '#ffd600' : 'var(--ca)',
                      borderRadius:6,cursor:'pointer',fontFamily:'Orbitron',fontSize:10,textTransform:'uppercase',letterSpacing:1
                    }}>✓ Adicionar Kit</button>
                  </div>
                )}
                <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                  {(char.kits||[]).map(k=>{
                    const isHB = KITS[k.nome]?.homebrew;
                    return (
                      <span key={k.id} style={{
                        background: isHB ? 'rgba(255,214,0,0.08)' : 'rgba(0,229,255,0.08)',
                        border: '1px solid '+(isHB ? 'rgba(255,214,0,0.4)' : 'rgba(0,229,255,0.3)'),
                        borderRadius:4,padding:'3px 8px',fontSize:11,fontFamily:'Orbitron',
                        color: isHB ? '#ffd600' : '#00e5ff',
                        display:'flex',alignItems:'center',gap:4
                      }}>
                        {isHB && <span style={{fontSize:7,opacity:0.7}}>⚗</span>}
                        {k.nome}
                        <button className="no-print" onClick={()=>setChar(c=>({...c,kits:c.kits.filter(x=>x.id!==k.id)}))} style={{background:'none',border:'none',color:'#ff1744',cursor:'pointer',fontSize:12}}>×</button>
                      </span>
                    );
                  })}
                  {(char.kits||[]).length===0 && <span style={{fontSize:11,color:'rgba(0,229,255,0.25)',fontStyle:'italic'}}>Nenhum kit.</span>}
                </div>
              </div>

              {/* ── MUDANÇA: Pontos Totais com vermelho se exceder ── */}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <div style={{
                  background:'rgba(0,0,0,0.4)',
                  border:`1px solid ${pontosExcedido?'rgba(255,23,68,0.5)':'rgba(0,229,255,0.2)'}`,
                  borderRadius:6,padding:12,textAlign:'center',
                  boxShadow: pontosExcedido ? '0 0 15px rgba(255,23,68,0.2)' : 'none',
                  transition:'all 0.3s'
                }}>
                  <div style={{fontFamily:'Orbitron',fontSize:9,color:pontosExcedido?'#ff5252':'rgba(0,229,255,0.5)',marginBottom:4,textTransform:'uppercase',letterSpacing:1}}>
                    {pontosExcedido ? '⚠ PONTOS EXCEDIDOS' : 'Pontos Totais'}
                  </div>
                  <div style={{fontFamily:'Orbitron',fontSize:28,fontWeight:900,color:pontosExcedido?'#ff1744':'#00e5ff',textShadow:pontosExcedido?'0 0 15px rgba(255,23,68,0.6)':'0 0 15px var(--cg)',lineHeight:1}}>
                    {pts}
                  </div>
                  <div style={{fontSize:10,color:pontosExcedido?'rgba(255,82,82,0.6)':'rgba(0,229,255,0.3)',marginTop:3,fontFamily:'Share Tech Mono'}}>
                    / {pontosMax} máx
                  </div>
                </div>
                <div style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.2)',borderRadius:6,padding:12,textAlign:'center'}}>
                  <div style={{fontFamily:'Orbitron',fontSize:9,color:'rgba(0,229,255,0.5)',marginBottom:4,textTransform:'uppercase'}}>XP</div>
                  <input type="number" value={char.experiencia} onChange={e=>setChar(c=>({...c,experiencia:parseInt(e.target.value)||0}))} style={{width:'100%',textAlign:'center',fontSize:24,fontWeight:900,fontFamily:'Orbitron',color:'#00e5ff',background:'transparent',border:'none'}} />
                </div>
              </div>
            </div>
          </div>
        </div>

        {/* ATRIBUTOS + ESTADO */}
        <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'1fr 2fr',gap:isMobile?10:16,marginBottom:isMobile?12:20}}>
          <div className="panel" style={{padding:20}}>
            <div style={{fontFamily:'Orbitron',fontSize:12,color:'#00e5ff',borderBottom:'1px solid rgba(0,229,255,0.15)',paddingBottom:8,marginBottom:16,textTransform:'uppercase'}}>⭐ Atributos</div>
            {[['poder','#ff1744'],['habilidade','#00e5ff'],['resistencia','#00e676']].map(([a,c])=>(
              <div key={a} style={{background:'rgba(0,0,0,0.4)',borderLeft:'3px solid '+c,borderRadius:6,padding:'10px 12px',marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontFamily:'Orbitron',fontSize:11,color:c,textTransform:'uppercase'}}>{a.slice(0,1).toUpperCase()+a.slice(1)}</span>
                <Stepper value={char.atributos[a]} onChange={v=>setChar(c=>({...c,atributos:{...c.atributos,[a]:Math.max(0,v)}}))} />
              </div>
            ))}
          </div>
          <div className="panel" style={{padding:20}}>
            <div style={{fontFamily:'Orbitron',fontSize:12,color:'rgba(0,229,255,0.7)',borderBottom:'1px solid rgba(0,229,255,0.15)',paddingBottom:8,marginBottom:16,textTransform:'uppercase'}}>Estado Atual</div>
            <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'1fr 1fr',gap:isMobile?10:16,marginBottom:16}}>
              <Bar label="Vida (Rx5)" current={char.recursos.pv} max={maxPV} color="red" icon="heart" onChange={v=>setChar(c=>({...c,recursos:{...c.recursos,pv:v}}))} />
              <Bar label="Mana (Hx5)" current={char.recursos.pm} max={maxPM} color="blue" icon="zap" onChange={v=>setChar(c=>({...c,recursos:{...c.recursos,pm:v}}))} />
            </div>
            <div style={{background:'rgba(0,0,0,0.5)',border:'1px solid rgba(255,214,0,0.3)',borderRadius:6,padding:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontFamily:'Orbitron',fontSize:11,color:'#ffd600',textTransform:'uppercase'}}>⭐ Pontos de Ação</span>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <Btn onClick={()=>setChar(c=>({...c,recursos:{...c.recursos,pa:Math.max(0,(c.recursos.pa||0)-1)}}))} style={{padding:'2px 8px',fontSize:14,borderColor:'rgba(255,214,0,0.4)',color:'#ffd600'}}>−</Btn>
                <input type="number" value={char.recursos.pa||0} onChange={e=>setChar(c=>({...c,recursos:{...c.recursos,pa:parseInt(e.target.value)||0}}))} style={{width:52,textAlign:'center',fontSize:24,fontWeight:900,fontFamily:'Orbitron',color:'#ffd600',borderColor:'rgba(255,214,0,0.3)'}} />
                <span style={{color:'rgba(255,214,0,0.4)',fontSize:14}}>/ {maxPA}</span>
                <Btn onClick={()=>setChar(c=>({...c,recursos:{...c.recursos,pa:(c.recursos.pa||0)+1}}))} style={{padding:'2px 8px',fontSize:14,borderColor:'rgba(255,214,0,0.4)',color:'#ffd600'}}>+</Btn>
              </div>
            </div>
          </div>
        </div>

        {/* LISTAS — mobile: acordeão; desktop: 3 colunas */}
        {isMobile ? (
          <div style={{display:'flex',flexDirection:'column',gap:0,marginBottom:12}}>
            {[
              {id:'pericias', title:'Perícias', color:'blue', borderColor:'rgba(0,229,255,0.3)', titleColor:'#00e5ff', items:char.pericias, suggestions:PERICIAS},
              {id:'vantagens', title:'Vantagens', color:'green', borderColor:'rgba(0,230,118,0.3)', titleColor:'#00e676', items:char.vantagens, suggestions:LISTA_VANT},
              {id:'desvantagens', title:'Desvantagens', color:'red', borderColor:'rgba(255,23,68,0.3)', titleColor:'#ff5252', items:char.desvantagens, suggestions:LISTA_DESV},
            ].map(({id,title,color,borderColor,titleColor,items,suggestions})=>{
              const open = listTab===id;
              const total = items.reduce((a,i)=>a+(parseInt(i.custo)||0),0);
              return (
                <div key={id} style={{border:'1px solid '+borderColor,borderRadius:open?8:6,marginBottom:6,overflow:'hidden',background:'var(--cp)'}}>
                  {/* Cabeçalho clicável */}
                  <button onClick={()=>setListTab(open?'':id)} style={{
                    width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',
                    padding:'12px 14px',background:'transparent',border:'none',cursor:'pointer'
                  }}>
                    <span style={{fontFamily:'Orbitron',fontSize:11,color:titleColor,textTransform:'uppercase',letterSpacing:1,display:'flex',alignItems:'center',gap:8}}>
                      {title}
                      {items.length>0 && <span style={{fontSize:9,background:titleColor+'22',color:titleColor,borderRadius:10,padding:'1px 7px'}}>{items.length}</span>}
                      {total!==0 && <span style={{fontSize:9,color:'rgba(0,229,255,0.4)'}}>({total>0?'+':''}{total}pt)</span>}
                    </span>
                    <span style={{color:titleColor,fontSize:14,transition:'transform 0.2s',display:'inline-block',transform:open?'rotate(180deg)':'rotate(0deg)'}}>▼</span>
                  </button>
                  {/* Conteúdo expandido */}
                  {open && (
                    <div style={{borderTop:'1px solid '+borderColor,padding:'0 0 8px'}}>
                      <ListSection title={title} color={color} items={items} suggestions={suggestions}
                        onAdd={()=>addItem(id)}
                        onUpdate={(itemId,f,v)=>updItem(id,itemId,f,v)}
                        onRemove={itemId=>remItem(id,itemId)}
                      />
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        ) : (
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,marginBottom:20}}>
            <ListSection title="Perícias" color="blue" items={char.pericias} suggestions={PERICIAS} onAdd={()=>addItem('pericias')} onUpdate={(id,f,v)=>updItem('pericias',id,f,v)} onRemove={id=>remItem('pericias',id)} />
            <ListSection title="Vantagens" color="green" items={char.vantagens} suggestions={LISTA_VANT} onAdd={()=>addItem('vantagens')} onUpdate={(id,f,v)=>updItem('vantagens',id,f,v)} onRemove={id=>remItem('vantagens',id)} />
            <ListSection title="Desvantagens" color="red" items={char.desvantagens} suggestions={LISTA_DESV} onAdd={()=>addItem('desvantagens')} onUpdate={(id,f,v)=>updItem('desvantagens',id,f,v)} onRemove={id=>remItem('desvantagens',id)} />
          </div>
        )}

        {/* TÉCNICAS */}
        <div className="panel" style={{padding:20,marginBottom:20}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:'1px solid rgba(0,229,255,0.15)',paddingBottom:8,marginBottom:16}}>
            <span style={{fontFamily:'Orbitron',fontSize:12,color:'#00e5ff',textTransform:'uppercase'}}>✨ Técnicas & Truques</span>
            <Btn onClick={()=>addItem('tecnicas')} style={{fontSize:10,padding:'4px 10px'}}>+ ADD</Btn>
          </div>
          <datalist id="tec-list">{LISTA_TEC.map(t=><option key={t} value={t}/>)}</datalist>
          <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'repeat(2,1fr)',gap:12}}>
            {char.tecnicas.map(t=>{
              const tecInfo = TECNICAS_DATA[t.nome];
              const tipoCor = tecInfo?.tipo==='Truque' ? '#a855f7' : tecInfo?.tipo==='Técnica Comum' ? '#00e5ff' : '#ffd600';
              return (
                <div key={t.id} style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.15)',borderRadius:6,padding:10,position:'relative'}}>
                  <div style={{display:'flex',gap:6,marginBottom:4,alignItems:'center'}}>
                    <input list="tec-list" placeholder="Nome da Técnica" value={t.nome}
                      onChange={e=>updItem('tecnicas',t.id,'nome',e.target.value)}
                      style={{flex:1,fontSize:13,fontWeight:700,padding:'3px 6px',background:'transparent',border:'none',borderBottom:'1px solid rgba(0,229,255,0.15)',color:'var(--ct)',outline:'none'}} />
                    {tecInfo && (
                      <span style={{fontSize:8,fontFamily:'Orbitron',color:tipoCor,background:tipoCor+'18',border:'1px solid '+tipoCor+'44',borderRadius:3,padding:'1px 5px',flexShrink:0,textTransform:'uppercase',whiteSpace:'nowrap'}}>
                        {tecInfo.tipo}
                      </span>
                    )}
                    <button className="no-print" onClick={()=>remItem('tecnicas',t.id)} style={{background:'none',border:'none',color:'#ff1744',cursor:'pointer',fontSize:14,flexShrink:0}}>×</button>
                  </div>
                  <input placeholder="Custo | Alcance | Duração" value={t.custo}
                    onChange={e=>updItem('tecnicas',t.id,'custo',e.target.value)}
                    style={{width:'100%',fontSize:10,padding:'2px 6px',marginBottom:4}} />
                  <textarea placeholder="Descrição do efeito..." value={t.descricao||''}
                    onChange={e=>updItem('tecnicas',t.id,'descricao',e.target.value)}
                    rows={3} style={{width:'100%',fontSize:11,padding:'4px 6px',resize:'vertical',lineHeight:1.5}} />
                </div>
              );
            })}
            {char.tecnicas.length===0 && <p style={{color:'rgba(0,229,255,0.25)',fontSize:11,fontStyle:'italic'}}>Nenhuma técnica. Clique em + ADD e escolha da lista.</p>}
          </div>
        </div>

        {/* ── MUDANÇA: INVENTÁRIO SIMPLIFICADO ── */}
        <div className="panel" style={{padding:20,marginBottom:20}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:'1px solid rgba(0,229,255,0.15)',paddingBottom:8,marginBottom:16,flexWrap:'wrap',gap:8}}>
            <span style={{fontFamily:'Orbitron',fontSize:12,color:'#00e5ff',textTransform:'uppercase'}}>🎒 Inventário</span>
            {/* Campo de Dinheiro */}
            <div style={{display:'flex',alignItems:'center',gap:8,background:'rgba(255,214,0,0.06)',border:'1px solid rgba(255,214,0,0.25)',borderRadius:8,padding:'6px 12px'}}>
              <span style={{fontFamily:'Orbitron',fontSize:11,color:'#ffd600'}}>$</span>
              <input
                value={inv.dinheiro||''}
                onChange={e=>setDinheiro(e.target.value)}
                placeholder="0,00"
                style={{width:100,fontSize:14,fontWeight:700,fontFamily:'Share Tech Mono',color:'#ffd600',background:'transparent',border:'none',textAlign:'right',outline:'none'}}
              />
            </div>
            <Btn onClick={addInvItem} style={{fontSize:10,padding:'4px 12px'}}>+ Adicionar Item</Btn>
          </div>
          {inv.itens.length===0
            ? <div style={{textAlign:'center',padding:'24px 0',color:'rgba(0,229,255,0.2)',fontSize:12,fontStyle:'italic'}}>Inventário vazio. Adicione itens acima.</div>
            : <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:10}}>
                {inv.itens.map(item=>(
                  <div key={item.id} style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.12)',borderRadius:6,padding:'10px 12px',position:'relative',display:'flex',gap:8,alignItems:'flex-start'}}>
                    <div style={{flex:1,minWidth:0}}>
                      <input
                        placeholder="Nome do item"
                        value={item.nome}
                        onChange={e=>updInvItem(item.id,'nome',e.target.value)}
                        style={{width:'100%',fontSize:13,fontWeight:700,padding:'2px 4px',marginBottom:4,background:'transparent',border:'none',borderBottom:'1px solid rgba(0,229,255,0.15)',color:'var(--ct)',outline:'none'}}
                      />
                      <input
                        placeholder="Descrição / efeito..."
                        value={item.desc||''}
                        onChange={e=>updInvItem(item.id,'desc',e.target.value)}
                        style={{width:'100%',fontSize:11,padding:'2px 4px',color:'rgba(0,229,255,0.5)'}}
                      />
                    </div>
                    <button onClick={()=>remInvItem(item.id)} className="no-print"
                      style={{background:'none',border:'none',color:'#ff1744',cursor:'pointer',fontSize:14,flexShrink:0,paddingTop:2}}>×</button>
                  </div>
                ))}
              </div>
          }
        </div>

        {/* NOTAS */}
        <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'1fr 1fr',gap:isMobile?10:16,marginBottom:isMobile?12:20}}>
          <div className="panel" style={{padding:16}}>
            <div style={{fontFamily:'Orbitron',fontSize:11,color:'rgba(0,229,255,0.6)',marginBottom:8,textTransform:'uppercase'}}>📝 Anotações</div>
            <textarea value={char.anotacoes} onChange={e=>setChar(c=>({...c,anotacoes:e.target.value}))} placeholder="Notas rápidas..." rows={5} style={{width:'100%',resize:'vertical',fontSize:13,padding:8}} />
          </div>
          <div className="panel" style={{padding:16}}>
            <div style={{fontFamily:'Orbitron',fontSize:11,color:'rgba(0,229,255,0.6)',marginBottom:8,textTransform:'uppercase'}}>📖 História</div>
            <textarea value={char.historia} onChange={e=>setChar(c=>({...c,historia:e.target.value}))} placeholder="Biografia do personagem..." rows={5} style={{width:'100%',resize:'vertical',fontSize:13,padding:8}} />
          </div>
        </div>

        {/* FOOTER */}
        <div className="no-print" style={{display:'flex',justifyContent:'center',gap:12,paddingTop:16,borderTop:'1px solid rgba(0,229,255,0.15)',flexWrap:'wrap'}}>
          <Btn onClick={exportJ} style={{padding:'10px 20px'}}>📥 Baixar JSON</Btn>
          <Btn onClick={save} style={{padding:'10px 20px',background:'rgba(0,229,255,0.1)',boxShadow:'0 0 15px var(--cg)'}}>💾 Salvar na Biblioteca</Btn>
          <Btn onClick={()=>window.print()} style={{padding:'10px 20px'}}>🖨️ Imprimir</Btn>
        </div>
      </div>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
