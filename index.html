                                        &lt;p&gt;&lt;strong&gt;Regra &#34;Na Hora&#34;:&lt;/strong&gt; Slots vazios podem ser preenchidos durante a aventura. Use o painel de &lt;strong&gt;Troca de Itens&lt;/strong&gt; acima para converter slots menores em maiores.&lt;/p&gt;
                                    &lt;/div&gt;
                                &lt;/div&gt;

                                {/* NOTAS E HISTÓRIA */}
                                &lt;div className=&#34;grid grid-cols-1 gap-6 print:break-inside-avoid&#34;&gt;
                                    &lt;div className=&#34;bg-slate-800 p-6 rounded-2xl border border-slate-700 print:bg-transparent print:border-black print:p-4&#34;&gt;
                                        &lt;h3 className=&#34;flex items-center gap-2 text-lg font-bold border-b border-slate-700 pb-2 uppercase mb-4 text-slate-400 print:text-black print:border-black&#34;&gt;
                                            &lt;Info className=&#34;w-5 h-5&#34; /&gt; Anotações Rápidas
                                        &lt;/h3&gt;
                                        &lt;textarea className=&#34;w-full bg-slate-900 border-none rounded-xl p-4 min-h-[100px] focus:ring-2 focus:ring-indigo-500 outline-none resize-none print:bg-transparent print:border print:border-black print:text-black auto-expand text-white&#34; placeholder=&#34;Notas gerais, lembretes...&#34; value={character.anotacoes} onChange={(e) =&gt; setCharacter({ ...character, anotacoes: e.target.value })}&gt;&lt;/textarea&gt;
                                    &lt;/div&gt;
                                    &lt;div className=&#34;bg-slate-800 p-6 rounded-2xl border border-slate-700 print:bg-transparent print:border-black print:p-4&#34;&gt;
                                        &lt;h3 className=&#34;flex items-center gap-2 text-lg font-bold border-b border-slate-700 pb-2 uppercase mb-4 text-slate-400 print:text-black print:border-black&#34;&gt;
                                            &lt;BookOpen className=&#34;w-5 h-5&#34; /&gt; História do Personagem
                                        &lt;/h3&gt;
                                        &lt;textarea className=&#34;w-full bg-slate-900 border-none rounded-xl p-4 min-h-[200px] focus:ring-2 focus:ring-indigo-500 outline-none resize-y print:bg-transparent print:border print:border-black print:text-black auto-expand text-white&#34; placeholder=&#34;Escreva aqui a biografia, origens e objetivos do seu herói...&#34; value={character.historia} onChange={(e) =&gt; setCharacter({ ...character, historia: e.target.value })}&gt;&lt;/textarea&gt;
                                    &lt;/div&gt;
                                &lt;/div&gt;

                                {/* FOOTER */}
                                &lt;div className=&#34;flex flex-wrap justify-center gap-4 py-8 no-print border-t border-slate-800 mt-8&#34;&gt;
                                    &lt;button onClick={exportFile} className=&#34;flex items-center gap-2 bg-slate-700 hover:bg-slate-600 px-6 py-3 rounded-full font-bold transition-all&#34;&gt;
                                        &lt;FileJson className=&#34;w-5 h-5&#34; /&gt; Baixar Arquivo (.JSON)
                                    &lt;/button&gt;
                                    &lt;button onClick={saveToLibrary} className=&#34;flex items-center gap-2 bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-full font-bold transition-all shadow-lg hover:scale-105&#34;&gt;
                                        &lt;Save className=&#34;w-5 h-5&#34; /&gt; Salvar na Biblioteca
                                    &lt;/button&gt;
                                    &lt;button onClick={() =&gt; window.print()} className=&#34;flex items-center gap-2 bg-slate-700 hover:bg-slate-600 px-6 py-3 rounded-full font-bold transition-all&#34;&gt;
                                        &lt;Printer className=&#34;w-5 h-5&#34; /&gt; Imprimir / PDF
                                    &lt;/button&gt;
                                &lt;/div&gt;
                            &lt;/div&gt;
                        &lt;/div&gt;
                    &lt;/div&gt; {/* &lt;--- FECHA A DIV ROLÁVEL PRINCIPAL DA FICHA AQUI */}

                    {/* --- NOVA SIDEBAR DIREITA DO LOBBY --- */}
                    &lt;div className={`h-full bg-slate-900 border-slate-700 shadow-xl flex flex-col no-print transition-all duration-300 flex-shrink-0 overflow-hidden ${showLobbySidebar ? &#39;w-80 sm:w-96 border-l&#39; : &#39;w-0 border-none&#39;}`}&gt;
                        {/* Essa div interna mantém o layout sem quebrar o texto durante a animação */}
                        &lt;div className=&#34;min-w-[320px] h-full flex flex-col&#34;&gt;

                            &lt;div className=&#34;p-4 border-b border-slate-800 flex justify-between items-center bg-slate-950 flex-shrink-0&#34;&gt;
                                &lt;h2 className=&#34;font-bold text-lg text-white flex items-center gap-2&#34;&gt;
                                    &lt;Users className=&#34;w-5 h-5 text-amber-400&#34; /&gt; Sala de Rolagens
                                &lt;/h2&gt;
                                &lt;button onClick={() =&gt; setShowLobbySidebar(false)} className=&#34;text-slate-400 hover:text-white&#34;&gt;
                                    &lt;X className=&#34;w-6 h-6&#34; /&gt;
                                &lt;/button&gt;
                            &lt;/div&gt;

                            &lt;div className=&#34;p-4 flex flex-col flex-1 overflow-hidden&#34;&gt;
                                {connectionStatus === &#39;disconnected&#39; &amp;&amp; (
                                    &lt;div className=&#34;space-y-6&#34;&gt;
                                        &lt;p className=&#34;text-sm text-slate-400&#34;&gt;Conecte-se com seus amigos para ver as rolagens em tempo real.&lt;/p&gt;
                                        &lt;div className=&#34;bg-slate-800 p-4 rounded-xl border border-slate-700 space-y-3&#34;&gt;
                                            &lt;h3 className=&#34;font-bold text-sm uppercase text-slate-300&#34;&gt;Sou o Mestre / Criar Sala&lt;/h3&gt;
                                            &lt;button onClick={startHosting} className=&#34;w-full py-2 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-lg transition-colors flex items-center justify-center gap-2&#34;&gt;
                                                &lt;Crown className=&#34;w-4 h-4&#34; /&gt; Criar Nova Sala
                                            &lt;/button&gt;
                                        &lt;/div&gt;
                                        &lt;div className=&#34;flex items-center justify-center gap-4&#34;&gt;
                                            &lt;hr className=&#34;flex-1 border-slate-700&#34; /&gt;&lt;span className=&#34;text-xs text-slate-500 uppercase font-bold&#34;&gt;OU&lt;/span&gt;&lt;hr className=&#34;flex-1 border-slate-700&#34; /&gt;
                                        &lt;/div&gt;
                                        &lt;div className=&#34;bg-slate-800 p-4 rounded-xl border border-slate-700 space-y-3&#34;&gt;
                                            &lt;h3 className=&#34;font-bold text-sm uppercase text-slate-300&#34;&gt;Sou Jogador / Entrar&lt;/h3&gt;
                                            &lt;input type=&#34;text&#34; placeholder=&#34;Cole o ID da Sala aqui...&#34; className=&#34;w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-white outline-none focus:border-indigo-500&#34; value={joinInputId} onChange={e =&gt; setJoinInputId(e.target.value)} /&gt;
                                            &lt;button onClick={joinLobby} className=&#34;w-full py-2 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-lg transition-colors flex items-center justify-center gap-2&#34;&gt;
                                                &lt;Zap className=&#34;w-4 h-4&#34; /&gt; Conectar na Sala
                                            &lt;/button&gt;
                                        &lt;/div&gt;
                                    &lt;/div&gt;
                                )}

                                {connectionStatus === &#39;connecting&#39; &amp;&amp; (
                                    &lt;div className=&#34;flex-1 flex flex-col items-center justify-center text-slate-400 space-y-4&#34;&gt;
                                        &lt;div className=&#34;w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin&#34;&gt;&lt;/div&gt;
                                        &lt;p&gt;Estabelecendo conexão P2P...&lt;/p&gt;
                                    &lt;/div&gt;
                                )}

                                {connectionStatus === &#39;connected&#39; &amp;&amp; (
                                    &lt;div className=&#34;flex flex-col h-full&#34;&gt;
                                        &lt;div className=&#34;bg-slate-800 p-3 rounded-xl border border-emerald-500/30 mb-4 space-y-2 flex-shrink-0&#34;&gt;
                                            &lt;div className=&#34;flex justify-between items-center&#34;&gt;
                                                &lt;span className=&#34;text-xs font-bold text-emerald-400 uppercase flex items-center gap-1&#34;&gt;
                                                    &lt;span className=&#34;w-2 h-2 rounded-full bg-emerald-500 animate-pulse&#34;&gt;&lt;/span&gt;
                                                    {lobbyMode === &#39;host&#39; ? &#39;Host da Sala&#39; : &#39;Conectado&#39;}
                                                &lt;/span&gt;
                                                &lt;button onClick={leaveLobby} className=&#34;text-xs text-rose-400 hover:underline&#34;&gt;Sair&lt;/button&gt;
                                            &lt;/div&gt;
                                            &lt;div className=&#34;bg-slate-900 p-2 rounded border border-slate-700 flex justify-between items-center&#34;&gt;
                                                &lt;span className=&#34;font-mono text-xs text-slate-300 truncate mr-2&#34;&gt;{lobbyId}&lt;/span&gt;
                                                &lt;button onClick={copyLobbyId} className=&#34;p-1.5 bg-slate-700 hover:bg-slate-600 rounded text-white&#34; title=&#34;Copiar ID da Sala&#34;&gt;&lt;Copy className=&#34;w-3 h-3&#34; /&gt;&lt;/button&gt;
                                            &lt;/div&gt;
                                        &lt;/div&gt;

                                        &lt;InitiativeManager list={initiatives} onUpdate={broadcastInitiative} isHost={lobbyMode === &#39;host&#39;} characterName={character.nome} attributes={character.atributos} /&gt;

                                        &lt;h3 className=&#34;text-xs font-bold uppercase text-slate-500 mb-2 border-b border-slate-800 pb-1 flex-shrink-0&#34;&gt;Log de Rolagens&lt;/h3&gt;

                                        &lt;div className=&#34;flex-1 overflow-y-auto space-y-3 custom-scrollbar pr-2 pb-10&#34;&gt;
                                            {sharedRolls.length === 0 ? (
                                                &lt;p className=&#34;text-center text-slate-600 text-xs italic mt-10&#34;&gt;Faça uma rolagem para que apareça aqui.&lt;/p&gt;
                                            ) : (
                                                sharedRolls.map((rollItem) =&gt; (
                                                    &lt;div key={rollItem.id} className=&#34;bg-slate-800 p-3 rounded-lg border border-slate-700&#34;&gt;
                                                        &lt;div className=&#34;flex justify-between items-end mb-2&#34;&gt;
                                                            &lt;span className=&#34;text-sm font-bold text-indigo-300&#34;&gt;{rollItem.playerName}&lt;/span&gt;
                                                            &lt;div className=&#34;flex items-center gap-2&#34;&gt;
                                                                &lt;span className=&#34;text-[10px] text-slate-500&#34;&gt;{rollItem.time}&lt;/span&gt;
                                                                {lobbyMode === &#39;host&#39; &amp;&amp; (
                                                                    &lt;button onClick={() =&gt; handleDeleteRoll(rollItem.id)} className=&#34;text-rose-500 hover:text-rose-400 p-1 bg-rose-500/10 hover:bg-rose-500/20 rounded transition-colors&#34; title=&#34;Apagar rolagem&#34;&gt;
                                                                        &lt;Trash2 className=&#34;w-3 h-3&#34; /&gt;
                                                                    &lt;/button&gt;
                                                                )}
                                                            &lt;/div&gt;
                                                        &lt;/div&gt;
                                                        &lt;div className=&#34;flex items-center gap-3&#34;&gt;
                                                            &lt;div className={`text-2xl font-black ${rollItem.rollData.isCriticalFailure ? &#39;text-rose-500&#39; : &#39;text-white&#39;}`}&gt;
                                                                {rollItem.rollData.isCriticalFailure ? &#39;FALHA!&#39; : rollItem.rollData.total}
                                                            &lt;/div&gt;
                                                            &lt;div className=&#34;flex-1&#34;&gt;
                                                                &lt;div className=&#34;text-xs text-slate-400 uppercase mb-1&#34;&gt;{rollItem.rollData.attribute} ({rollItem.rollData.diceCount}D)&lt;/div&gt;
                                                                &lt;div className=&#34;flex gap-1 flex-wrap&#34;&gt;
                                                                    {rollItem.rollData.results.map((r, i) =&gt; (
                                                                        &lt;span key={i} className={`inline-block w-5 h-5 text-center text-[10px] leading-5 font-bold rounded ${r &gt;= rollItem.rollData.critRange ? &#39;bg-yellow-500 text-black&#39; : r === 1 &amp;&amp; rollItem.rollData.isCriticalFailure ? &#39;bg-rose-900 text-white&#39; : &#39;bg-slate-700 text-slate-300&#39;}`}&gt;{r}&lt;/span&gt;
                                                                    ))}
                                                                &lt;/div&gt;
                                                            &lt;/div&gt;
                                                        &lt;/div&gt;
                                                    &lt;/div&gt;
                                                ))
                                            )}
                                        &lt;/div&gt;
                                    &lt;/div&gt;
                                )}
                            &lt;/div&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;

                &lt;/div&gt;
            );
        };

        // Componentes Auxiliares
        const AttributeRow = ({ icon, label, value, onChange, color }) =&gt; {
            const borderColors = { red: &#39;border-red-500&#39;, blue: &#39;border-blue-500&#39;, green: &#39;border-green-500&#39; };
            return (
                &lt;div className={`flex items-center justify-between bg-slate-900 p-4 rounded-xl border-l-4 ${borderColors[color]} group print:bg-transparent print:border print:border-black print:py-2`}&gt;
                    &lt;div className=&#34;flex items-center gap-3&#34;&gt;
                        {icon}
                        &lt;span className=&#34;font-bold print:text-black&#34;&gt;{label}&lt;/span&gt;
                    &lt;/div&gt;
                    &lt;div className=&#34;flex items-center gap-2&#34;&gt;
                        &lt;button
                            onClick={() =&gt; onChange(parseInt(value || 0) - 1)}
                            className=&#34;w-8 h-8 flex items-center justify-center bg-slate-800 hover:bg-slate-700 rounded text-slate-400 hover:text-white transition-colors no-print&#34;
                        &gt;
                            &lt;Minus className=&#34;w-4 h-4&#34; /&gt;
                        &lt;/button&gt;
                        &lt;input
                            type=&#34;number&#34;
                            className=&#34;w-12 text-center bg-transparent text-2xl font-black outline-none print:text-black&#34;
                            value={value}
                            onChange={(e) =&gt; onChange(e.target.value)}
                        /&gt;
                        &lt;button
                            onClick={() =&gt; onChange(parseInt(value || 0) + 1)}
                            className=&#34;w-8 h-8 flex items-center justify-center bg-slate-800 hover:bg-slate-700 rounded text-slate-400 hover:text-white transition-colors no-print&#34;
                        &gt;
                            &lt;Plus className=&#34;w-4 h-4&#34; /&gt;
                        &lt;/button&gt;
                    &lt;/div&gt;
                &lt;/div&gt;
            );
        };

        const ResourceBar = ({ label, current, max, color, icon, onChange }) =&gt; {
            const gradientColors = { red: &#39;from-red-600 to-red-400&#39;, blue: &#39;from-blue-600 to-blue-400&#39; };
            const focusBorder = { red: &#39;focus:border-red-500&#39;, blue: &#39;focus:border-blue-500&#39; };
            return (
                &lt;div className=&#34;space-y-2&#34;&gt;
                    &lt;div className=&#34;flex justify-between items-end&#34;&gt;
                        &lt;span className={`flex items-center gap-2 font-bold text-${color}-400 print:text-black`}&gt;{icon} {label}&lt;/span&gt;
                        &lt;div className=&#34;flex items-center gap-2&#34;&gt;
                            &lt;input type=&#34;number&#34; className={`w-12 bg-slate-900 rounded text-center border border-slate-700 ${focusBorder[color]} outline-none font-bold print:bg-transparent print:text-black print:border-black`} value={current} onChange={(e) =&gt; onChange(parseInt(e.target.value) || 0)} /&gt;
                            &lt;span className=&#34;text-slate-500 print:text-black&#34;&gt;/ {max}&lt;/span&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;
                    &lt;div className=&#34;h-4 bg-slate-900 rounded-full overflow-hidden border border-slate-700 print:border-black print:h-2&#34;&gt;
                        &lt;div className={`h-full bg-gradient-to-r ${gradientColors[color]} transition-all duration-300 print:bg-black`} style={{ width: `${Math.min(100, (current / max) * 100)}%` }}&gt;&lt;/div&gt;
                    &lt;/div&gt;
                &lt;/div&gt;
            );
        };

        const Section = ({ title, icon, items, suggestionList, onAdd, onUpdate, onRemove, color }) =&gt; {
            const list = title.toLowerCase();
            const colorMap = { cyan: &#39;border-cyan-500/30&#39;, emerald: &#39;border-emerald-500/30&#39;, rose: &#39;border-rose-500/30&#39;, amber: &#39;border-amber-500/30&#39; };
            const listId = `list-${title.toLowerCase().replace(/\s/g, &#39;-&#39;)}`;

            const totalPoints = items.reduce((acc, item) =&gt; acc + (parseInt(item.custo) || 0), 0);
            const totalLabel = totalPoints &gt; 0 ? `+${totalPoints}` : totalPoints;

            return (
                &lt;div className={`bg-slate-800 p-4 rounded-2xl border ${colorMap[color]} space-y-4 print:bg-transparent print:border-black print:break-inside-avoid`}&gt;
                    &lt;div className=&#34;flex justify-between items-center border-b border-slate-700 pb-2 print:border-black&#34;&gt;
                        &lt;div className=&#34;flex items-baseline gap-2&#34;&gt;
                            &lt;h3 className=&#34;flex items-center gap-2 font-bold uppercase tracking-tighter text-sm print:text-black&#34;&gt;{icon} {title}&lt;/h3&gt;
                            &lt;span className=&#34;text-xs font-normal text-slate-400 print:text-black&#34;&gt;({totalLabel} pts)&lt;/span&gt;
                        &lt;/div&gt;
                        &lt;button onClick={onAdd} className=&#34;p-1 hover:bg-slate-700 rounded-lg transition-colors no-print&#34;&gt;&lt;Plus className=&#34;w-4 h-4&#34; /&gt;&lt;/button&gt;
                    &lt;/div&gt;

                    {suggestionList &amp;&amp; suggestionList.length &gt; 0 &amp;&amp; (
                        &lt;datalist id={listId}&gt;
                            {suggestionList.map((opt) =&gt; (
                                &lt;option key={opt} value={opt} /&gt;
                            ))}
                        &lt;/datalist&gt;
                    )}

                    &lt;div className=&#34;space-y-2 max-h-[350px] overflow-y-auto pr-1 custom-scrollbar&#34;&gt;
                        {items.map(item =&gt; {
                            const subOptions = OPCOES_POR_ITEM[item.nome];
                            const subListId = `sublist-${item.id}`;

                            return (
                                &lt;div key={item.id} className=&#34;group relative bg-slate-900/30 p-2 rounded-lg border border-slate-700/50 print:bg-transparent print:border-black&#34;&gt;
                                    &lt;div className=&#34;flex gap-1 items-center flex-wrap md:flex-nowrap mb-1&#34;&gt;
                                        &lt;input
                                            placeholder={suggestionList &amp;&amp; suggestionList.length &gt; 0 ? &#34;Selecione...&#34; : &#34;Nome&#34;}
                                            list={suggestionList &amp;&amp; suggestionList.length &gt; 0 ? listId : undefined}
                                            className=&#34;flex-1 min-w-[120px] bg-slate-900 border border-slate-700 rounded p-1 px-2 text-sm text-white outline-none focus:border-blue-500 print:bg-transparent print:border-none print:p-0 print:text-black print:border-b print:border-dotted print:border-slate-400 font-bold&#34;
                                            value={item.nome}
                                            onChange={(e) =&gt; onUpdate(item.id, &#39;nome&#39;, e.target.value)}
                                        /&gt;

                                        {subOptions &amp;&amp; &lt;datalist id={subListId}&gt;{subOptions.map(opt =&gt; &lt;option key={opt} value={opt} /&gt;)}&lt;/datalist&gt;}

                                        &lt;input
                                            placeholder=&#34;Detalhes / Opção&#34;
                                            list={subOptions ? subListId : undefined}
                                            className=&#34;flex-1 bg-slate-900/50 border border-slate-700/50 rounded p-1 px-2 text-xs text-slate-300 outline-none focus:border-blue-500 print:bg-transparent print:border-none print:p-0 print:text-black italic&#34;
                                            value={item.detalhe || &#39;&#39;}
                                            onChange={(e) =&gt; onUpdate(item.id, &#39;detalhe&#39;, e.target.value)}
                                        /&gt;

                                        &lt;input
                                            type=&#34;number&#34;
                                            placeholder=&#34;Pts&#34;
                                            className=&#34;w-10 bg-slate-900 border border-slate-700 rounded p-1 text-sm text-white text-center outline-none print:bg-transparent print:border-none print:p-0 print:text-black font-bold&#34;
                                            value={item.custo}
                                            onChange={(e) =&gt; onUpdate(item.id, &#39;custo&#39;, e.target.value)}
                                        /&gt;
                                        &lt;button onClick={() =&gt; onRemove(item.id)} className=&#34;p-1 text-rose-500 opacity-0 group-hover:opacity-100 transition-opacity no-print rounded hover:bg-rose-500/10&#34;&gt;&lt;Trash2 className=&#34;w-4 h-4&#34; /&gt;&lt;/button&gt;
                                    &lt;/div&gt;

                                    &lt;textarea
                                        placeholder=&#34;Descrição completa do efeito ou poder...&#34;
                                        className=&#34;w-full mt-1 bg-slate-950/80 border border-slate-700/50 rounded p-2 text-[11px] text-slate-300 outline-none resize-none min-h-[2.5rem] leading-relaxed auto-expand focus:ring-1 focus:ring-blue-500 print:text-black print:text-xs print:bg-transparent print:border-none print:p-0&#34;
                                        rows={2}
                                        onInput={(e) =&gt; { e.target.style.height = &#34;auto&#34;; e.target.style.height = e.target.scrollHeight + &#34;px&#34; }}
                                        value={item.descricao || (list === &#39;vantagens&#39; ? DB_VANTAGENS[item.nome]?.desc : list === &#39;desvantagens&#39; ? DB_DESVANTAGENS[item.nome]?.desc : &#39;&#39;) || &#39;&#39;}
                                        onChange={(e) =&gt; onUpdate(item.id, &#39;descricao&#39;, e.target.value)}
                                    /&gt;
                                &lt;/div&gt;
                            );
                        })}
                        {items.length === 0 &amp;&amp; &lt;p className=&#34;text-center text-slate-600 text-xs py-4 italic print:hidden&#34;&gt;Vazio&lt;/p&gt;}
                    &lt;/div&gt;
                &lt;/div&gt;
            );
        };

        const TradePanel = ({ from, to, type, limitFrom, limitTo, tradeCount, onTrade, fromColor, toColor }) =&gt; (
            &lt;div className=&#34;flex items-center justify-between bg-slate-800 p-2 rounded-lg border border-slate-700&#34;&gt;
                &lt;div className=&#34;text-xs text-slate-400 text-center flex-1&#34;&gt;
                    &lt;div className={`font-bold ${fromColor}`}&gt;{from}&lt;/div&gt;
                    &lt;div className=&#34;text-[10px] my-1&#34;&gt;para&lt;/div&gt;
                    &lt;div className={`font-bold ${toColor}`}&gt;{to}&lt;/div&gt;
                &lt;/div&gt;
                &lt;div className=&#34;flex flex-col gap-1&#34;&gt;
                    &lt;button onClick={() =&gt; onTrade(type, 1)} className=&#34;p-1 bg-slate-700 hover:bg-slate-600 rounded text-green-400 disabled:opacity-30 disabled:cursor-not-allowed&#34; disabled={limitFrom &lt; 3} title=&#34;Realizar troca&#34;&gt;
                        &lt;ArrowUp className=&#34;w-3 h-3&#34; /&gt;
                    &lt;/button&gt;
                    &lt;button onClick={() =&gt; onTrade(type, -1)} className=&#34;p-1 bg-slate-700 hover:bg-slate-600 rounded text-rose-400 disabled:opacity-30 disabled:cursor-not-allowed&#34; disabled={(tradeCount || 0) &lt;= 0} title=&#34;Reverter troca&#34;&gt;
                        &lt;ArrowDown className=&#34;w-3 h-3&#34; /&gt;
                    &lt;/button&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        );

        const InventoryColumn = ({ title, items, limit, onAdd, onUpdate, onRemove, color }) =&gt; {
            const isFull = items.length &gt;= limit &amp;&amp; limit &gt; 0;
            const colors = { slate: &#39;text-slate-300 border-slate-600&#39;, blue: &#39;text-blue-400 border-blue-500/50&#39;, yellow: &#39;text-yellow-400 border-yellow-500/50&#39;, purple: &#39;text-purple-400 border-purple-500/50&#39; };
            const barColors = { slate: &#39;bg-slate-500&#39;, blue: &#39;bg-blue-500&#39;, yellow: &#39;bg-yellow-500&#39;, purple: &#39;bg-purple-500&#39; };

            return (
                &lt;div className={`flex flex-col h-full bg-slate-950/30 rounded-xl p-3 border ${colors[color].split(&#39; &#39;)[1]} print:bg-transparent print:border-black print:border`}&gt;
                    &lt;div className=&#34;flex justify-between items-center mb-3&#34;&gt;
                        &lt;div&gt;
                            &lt;h4 className={`text-sm font-bold uppercase ${colors[color].split(&#39; &#39;)[0]} print:text-black`}&gt;{title}&lt;/h4&gt;
                            {limit &gt; 0 ? (
                                &lt;div className=&#34;flex items-center gap-2 mt-1&#34;&gt;
                                    &lt;div className=&#34;w-16 h-1.5 bg-slate-800 rounded-full overflow-hidden print:border print:border-black print:bg-transparent&#34;&gt;
                                        &lt;div className={`h-full ${barColors[color]} transition-all print:bg-black`} style={{ width: `${Math.min(100, (items.length / limit) * 100)}%` }}&gt;&lt;/div&gt;
                                    &lt;/div&gt;
                                    &lt;span className={`text-[10px] font-bold ${items.length &gt; limit ? &#39;text-rose-500&#39; : &#39;text-slate-500&#39;} print:text-black`}&gt;{items.length}/{limit}&lt;/span&gt;
                                &lt;/div&gt;
                            ) : (
                                &lt;span className=&#34;text-[10px] text-slate-600 uppercase font-bold mt-1 block print:hidden&#34;&gt;Indisponível&lt;/span&gt;
                            )}
                        &lt;/div&gt;
                        &lt;button onClick={onAdd} className={`p-1.5 rounded transition-colors no-print ${limit === 0 ? &#39;opacity-50 cursor-not-allowed bg-slate-800&#39; : &#39;bg-slate-700 hover:bg-slate-600&#39;}`} disabled={limit === 0}&gt;
                            &lt;Plus className=&#34;w-3 h-3&#34; /&gt;
                        &lt;/button&gt;
                    &lt;/div&gt;

                    &lt;div className=&#34;space-y-2 flex-1&#34;&gt;
                        {items.map(item =&gt; (
                            &lt;div key={item.id} className=&#34;group bg-slate-900 p-1.5 rounded border border-slate-700/50 flex flex-col gap-1 relative print:bg-transparent print:border-black&#34;&gt;
                                &lt;div className=&#34;flex justify-between gap-2&#34;&gt;
                                    &lt;input placeholder=&#34;Item&#34; className=&#34;w-full bg-transparent text-xs font-bold outline-none print:text-black text-white&#34; value={item.nome} onChange={(e) =&gt; onUpdate(item.id, &#39;nome&#39;, e.target.value)} /&gt;
                                    &lt;input placeholder=&#34;Qtd&#34; className=&#34;w-8 bg-slate-800 text-center text-[10px] rounded outline-none print:bg-transparent print:text-black text-white&#34; value={item.qtd} onChange={(e) =&gt; onUpdate(item.id, &#39;qtd&#39;, e.target.value)} /&gt;
                                &lt;/div&gt;
                                &lt;input placeholder=&#34;Efeito&#34; className=&#34;w-full bg-transparent text-[10px] text-slate-400 outline-none print:text-black&#34; value={item.desc} onChange={(e) =&gt; onUpdate(item.id, &#39;desc&#39;, e.target.value)} /&gt;
                                &lt;button onClick={() =&gt; onRemove(item.id)} className=&#34;absolute top-1 right-1 p-1 text-rose-500 opacity-0 group-hover:opacity-100 transition-opacity no-print&#34;&gt;
                                    &lt;Trash2 className=&#34;w-3 h-3&#34; /&gt;
                                &lt;/button&gt;
                            &lt;/div&gt;
                        ))}
                        {limit &gt; 0 &amp;&amp; Array.from({ length: Math.max(0, limit - items.length) }).map((_, i) =&gt; (
                            &lt;div key={`empty-${i}`} className=&#34;border-2 border-dashed border-slate-800 rounded p-1.5 text-center print:border-black&#34;&gt;
                                &lt;span className=&#34;text-[10px] text-slate-700 uppercase font-bold print:text-slate-400&#34;&gt;Vazio&lt;/span&gt;
                            &lt;/div&gt;
                        ))}
                    &lt;/div&gt;
                &lt;/div&gt;
            );
        };

        const root = ReactDOM.createRoot(document.getElementById(&#39;root&#39;));
        root.render(&lt;App /&gt;);
    </script>
  </body>
  </html>
