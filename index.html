window.KITS = {
"Abastado":{exig:"Influência ou Manha; Riqueza",desc:"Apesar dos temores e conflitos iniciais, a Era das Arcas trouxe prosperidade ao mundo. Empreendedores ousados tornaram-se mais poderosos que governos. O abastado usa sua riqueza para aventuras, causas justas ou sonhos que o dinheiro sozinho não alcança.",poderes:[{nome:"Meritocracia",desc:"Uma vez por cena, faça um teste de compra para usar uma vantagem que não possua, uma única vez. 1pt = meta 9; +3 por ponto extra. Você ainda paga outros custos (como PM)."},{nome:"Poder aquisitivo",desc:"Todos os seus testes de compra ganham +3 no resultado final (depois da rolagem)."},{nome:"Tempo é dinheiro!",desc:"Seu primeiro teste de compra em cada sessão recebe Ganho, e seu segundo teste não sofre Perda."}]},
"Agente Secreto":{exig:"Manha ou Percepção; Patrono",desc:"Com treinamento extremo, aparelhos incríveis e até superpoderes, agentes secretos são empregados em missões variadas: revelar segredos, desmascarar vilões, resgatar reféns. Preferem furtividade a confrontos diretos.",poderes:[{nome:"Identidade secreta",desc:"Ganho em testes para ocultar suas atividades (incluindo manter-se escondido). Testes feitos por outros para descobrir qualquer coisa sobre você têm Perda."},{nome:"Olho clínico",desc:"Gaste 1 ação e 1PM, teste de Percepção (9). Com sucesso, descobre algo sobre um personagem: atributo, perícia, vantagem ou desvantagem."},{nome:"Plano de ação",desc:"Gaste 1 movimento e 2PM para analisar a situação. Até o fim da cena você recebe H+2."}]},
"Alquimista":{exig:"Mística, Saber",desc:"Alquimistas transformam e destroem elementos através de diagramas complexos. Para conseguir algo, deve-se dar algo em troca. Estudioso disciplinado, não acredita em conquistas fáceis.",poderes:[{nome:"Diagrama",desc:"Gaste um movimento para traçar um diagrama alquímico em alguma superfície. Sua próxima vantagem ou técnica com PM tem custo reduzido em -1 (mínimo 1PM)."},{nome:"Diagrama pessoal",desc:"Escolha uma vantagem ou técnica que você tem. Você pode levar seu diagrama consigo (tatuado, bordado...) sem precisar gastar movimento para reduzir o custo."},{nome:"Troca equivalente",desc:"Na primeira rodada de cada cena, você pode mudar seus atributos e vantagens livremente (exceto perícias, desvantagens e técnicas). Ou transmutar um aliado voluntário Perto. Reverte no fim da cena."}]},
"Artista Marcial":{exig:"Luta",desc:"Artistas marciais dominam estilos milenares adaptados à Era das Arcas. Alguns buscam provar a força de seu estilo, outros buscam glória ou vingança. Para eles, o mundo inteiro é uma arena.",poderes:[{nome:"Kata",desc:"Quando seu ataque vence a defesa do alvo, use um movimento para aumentar o dano em 2 pontos. Cada movimento extra adiciona mais 2 pontos."},{nome:"Montagem de treino",desc:"Uma vez por sessão, antes de um combate importante, teste de Luta (9 ou mais). Com sucesso, você recebe Maestria (Luta) durante aquele combate."},{nome:"Lutarei para conseguir!",desc:"Uma vez por cena, você pode usar Luta para substituir qualquer outra perícia. Pode pagar 3PM para cada nova utilização na mesma cena."}]},
"Atirador de Elite":{exig:"Manha; Alcance 2",desc:"O atirador de elite faz um trabalho limpo e rápido. Furtividade é sua estratégia máxima — evita combate direto, usa cobertura e camuflagem, preferindo agir sozinho.",poderes:[{nome:"Mira perfeita",desc:"Em cada cena, seu primeiro ataque contra cada alvo Longe ou mais impõe Perda na defesa do alvo."},{nome:"Posição vantajosa",desc:"Gaste uma ação completa para se colocar em ponto protegido, recebendo Ganho em testes de defesa contra ataques de Longe ou mais."},{nome:"Um tiro, duas mortes",desc:"Quando reduz um oponente a 0PV com ataque à distância (Longe+), o mesmo projétil atinge outro alvo à sua escolha com a mesma rolagem, sem custo extra."}]},
"Bárbaro":{exig:"Sobrevivência; Vigoroso",desc:"O bárbaro é um guerreiro bravo, indomável e rústico. Conhecedor da terra e seus caminhos, não precisa de luxos urbanos. Pode invocar energias primevas que o tornam ainda mais forte e assustador.",poderes:[{nome:"Espírito livre",desc:"Se estiver consciente, você nunca é considerado indefeso."},{nome:"Frenesi de combate",desc:"Gaste 3PM para invocar frenesi: P+3 (sem afetar PA) até o fim da cena. Quando o combate termina, você fica esgotado e é considerado derrotado durante toda a cena seguinte."},{nome:"Resistência superior",desc:"Para você, a vantagem Vigoroso oferece R+3, em vez de +2."}]},
"Caça-Prêmios":{exig:"Percepção, Manha ou Sobrevivência",desc:"O caça-prêmios abraça a vida de aventureiro como profissão. Procura ativamente por contratos para rastrear e capturar criminosos procurados, ou aceita missões típicas: explorar Arcas, caçar monstros, resgatar tesouros.",poderes:[{nome:"Ataque subjugante",desc:"Gaste 2PM antes de atacar. Se causar dano, o alvo tem Perda em testes de ataque e defesa até seu próximo turno."},{nome:"Contrato",desc:"Quando aceita um contrato para caçar um alvo, você recebe a vantagem Inimigo temporariamente para esse alvo."},{nome:"Mural de recompensas",desc:"Sempre tem Ganho em testes para obter informações sobre procurados e suas recompensas, e em testes para rastrear o alvo de seu Contrato."}]},
"CARD Gamer":{exig:"Magia, Mística, Utensílio",desc:"CARD gamers usam Cartões de Ampliação da Realidade Dimensional como conjuradores místicos, manifestando o conteúdo dos CARDS no mundo real: magias, seres lendários, efeitos fantásticos.",poderes:[{nome:"Caiu na armadilha!",desc:"Uma vez por cena, após um oponente realizar qualquer ação, faça um teste de Mística (6 + H do oponente). Com sucesso, use Magia ou uma técnica mágica como reação."},{nome:"Carta na manga",desc:"Quando usa vantagem ou técnica com PM, se gastar +2PM, existe chance (resultado ímpar em 1D) de que o mesmo efeito aconteça outra vez no turno seguinte, sem custo adicional."},{nome:"Escolha uma carta",desc:"Gaste 1PM, teste de Mística (9): com sucesso, você escolhe o tipo de Ajudante; se falhar, o mestre escolhe. Dura até o fim da cena. Ainda paga PM por cada utilização do Ajudante."}]},
"Cavaleiro":{exig:"Resoluto ou Vigoroso; Código (qualquer)",desc:"O cavaleiro é guiado por ideais de honra. Seus códigos são sua certeza e força. Enquanto outros os veem como amarras, ele extrai deles seu ímpeto para seguir lutando.",poderes:[{nome:"Armadura completa",desc:"Ao sofrer um ataque, gaste 2PM para reduzir em -1 o resultado de cada dado do atacante (cancela críticos). Você ainda faz seu teste de defesa normalmente."},{nome:"Força da honra",desc:"Ganho em qualquer teste, uma vez por cena, para cada Código que você tem. Se violar qualquer Código, não pode usar este poder até se redimir."},{nome:"Inspirar aliado",desc:"Gaste 1PM e uma ação para inspirar um aliado que possa vê-lo. Ele recebe Ganho em um teste em seu próximo turno."}]},
"Celebridade":{exig:"Famoso, Torcida",desc:"Celebridades conquistam fama em quase qualquer área — artes, esportes, política, aventura. Muitas buscam ainda mais notoriedade participando de missões perigosas ou salvando o mundo.",poderes:[{nome:"Grande fama",desc:"Você gasta 2PM, em vez de 3, para usar a vantagem Famoso."},{nome:"Ovação",desc:"Quando está sob efeito de sua Torcida, você pode gastar um turno para recuperar 1D Pontos de Mana."},{nome:"Rugido das massas",desc:"Além do Ganho recebido por Torcida, seu teste causa um acerto crítico com 5 ou 6."}]},
"Cientista":{exig:"Saber",desc:"Cientistas estão entre os maiores desbravadores da Era das Arcas. Exploram ruínas, desvendam tecnologias alienígenas e avisam sobre ameaças. Em qualquer grupo de aventureiros, são ajuda valiosa.",poderes:[{nome:"Eureka!",desc:"Uma vez por sessão, com um movimento e 3PM, você adquire uma vantagem de custo 1pt à sua escolha, até o fim da cena."},{nome:"Método científico",desc:"Uma vez por cena, você pode usar Saber para substituir qualquer outra perícia. Pode pagar 3PM para cada nova utilização na mesma cena."},{nome:"Pesquisa",desc:"Gaste um movimento e 1PM, teste de Saber (9): descobre informações sobre um personagem na cena (atributos, perícias, vantagens, desvantagens, técnicas ou itens)."}]},
"Clérigo":{exig:"Devoto",desc:"Clérigos fazem pactos com entidades divinas de além-Convergência, servindo em troca de poder mágico. Recebem comandos em sonhos e visões. Seu patrono nem sempre é nobre.",poderes:[{nome:"Devoto fervoroso",desc:"Você pode usar a vantagem Devoto até três vezes por cena, em vez de duas."},{nome:"Dom divino",desc:"Uma vez por cena, com um movimento e 3PM, você adquire uma perícia ou vantagem de custo 1pt à sua escolha, até o fim da cena."},{nome:"Poder concedido",desc:"Escolha uma vantagem: Anulação, Cura, Defesa Especial (qualquer), Magia ou Paralisia. Pode usá-la sem gastar PM uma vez por cena."}]},
"Curandeiro":{exig:"Medicina; Cura",desc:"Curandeiros têm origens variadas: médicos de competência extrema, devotos de divindades benevolentes, mestres de técnicas dos Viajantes. São sempre os mais procurados em qualquer grupo Arcanauta.",poderes:[{nome:"Paramédico",desc:"Você pode curar 1D Pontos de Vida com uma ação e um teste de Medicina (9)."},{nome:"Cura crítica",desc:"Sempre que você rola 6 em um dado de Cura, pode rolar um dado extra. Isso também vale para os dados extras."},{nome:"Explosão de cura",desc:"Uma vez por cena, você pode usar sua Cura em capacidade máxima (1D para cada ponto de Habilidade) sem gastar PM."}]},
"Detetive":{exig:"Manha, Percepção",desc:"Detetives investigam e resolvem crimes, identificam suspeitos e coletam informações. Na Era das Arcas, podem pertencer a qualquer raça e recorrer a magia e poderes estranhos para resolver casos.",poderes:[{nome:"Elementar!",desc:"Uma vez por cena, você pode usar Percepção para substituir qualquer outra perícia. Pode pagar 3PM para cada nova utilização na mesma cena."},{nome:"Obter informação",desc:"Com crítico em teste de Manha ou Percepção, pegue uma Pista (máx 3). Gaste Pistas em outros testes para crítico automático. Pistas não usadas até o fim da cena são perdidas."},{nome:"Caso encerrado",desc:"Em sua presença, inimigos derrotados permanecem nessa condição até o fim da cena, mesmo se recuperam PV."}]},
"DPS":{exig:"P3, Ataque Especial (qualquer)",desc:"DPS (damage per second) são focados em causar dano. Podem ser melee ou ranged. Presença quase obrigatória em qualquer grupo Arcanauta, acompanhados por tanques e curandeiros.",poderes:[{nome:"Estilo de combate",desc:"Escolha melee ou ranged. Recebe Especialização (Luta) para atacar Perto (melee) ou Longe e além (ranged). Porém, é considerado Inapto para qualquer defesa e ataques no estilo não escolhido."},{nome:"Ataque gratuito",desc:"Uma vez por cena, você pode usar um Ataque Especial sem gastar PM."},{nome:"Último recurso",desc:"Quando você está perto da derrota, todos os seus ataques no estilo escolhido têm Ganho."}]},
"Druida":{exig:"Animais; Ajudante, Transformação; Código Dahllan",desc:"Defensores da Mãe Natureza, os druidas assumem a missão de proteger o equilíbrio ecológico. São inimigos de corporações inescrupulosas e invasores alienígenas.",poderes:[{nome:"Forma selvagem",desc:"Sua Transformação permite mudar para várias feras. Cada vez que muda de forma, escolha duas vantagens extras sem custo: Aceleração, Ágil, Alcance 1, Forte, Imune, Paralisia, Regeneração, Sentido, Vigoroso ou Voo."},{nome:"Irmãos selvagens",desc:"Animais e plantas surgem para ajudá-lo onde estiver. Você pode mudar seu Ajudante para um tipo diferente no início de cada cena."},{nome:"Dádiva da natureza",desc:"Uma vez por cena, você pode usar Animais para substituir qualquer outra perícia. Pode pagar 3PM para cada nova utilização na mesma cena."}],desv:{nome:"Código Dahllan",custo:"-1",desc:"Não consumir produtos de origem animal. Nunca atacar um animal, nem deixar de prestar ajuda a um animal em dificuldade."}},
"Elementalista":{exig:"Magia, Ambiente, Fraqueza",desc:"Magos especializados em um único elemento da natureza. Além dos quatro clássicos existem outros como gelo, eletricidade, metal, madeira, luz, trevas. O elemento oposto será sempre sua fraqueza.",poderes:[{nome:"Ambiente elemental",desc:"Seu elemento escolhido é seu Ambiente. Ao rolar 1 em 1D: Perda em todos os testes. Ao rolar 6: elemento em abundância, uma utilização de Magia sem gastar PM."},{nome:"Elemento primordial",desc:"Uma vez por sessão, com um movimento e 3PM, você adquire uma perícia ou vantagem de custo 1pt à sua escolha, até o fim da cena."},{nome:"Moldar essência",desc:"Na primeira rodada de cada cena, você pode mudar seus atributos e perícias livremente (não vantagens, desvantagens e técnicas). Reverte no fim da cena."}],desv:{nome:"Fraqueza Elemental",custo:"-1 ou -2",desc:"Escolha um elemento oposto como sua Fraqueza. Decida se é comum ou incomum. Perda em todos os testes se estiver Perto dessa fraqueza."}},
"Engenheiro Mecha":{exig:"Máquinas; Utensílio (ferramentas)",desc:"Inventor fabuloso e mestre da maquinaria pesada, capaz de controlar ou construir qualquer coisa: armas cibernéticas, veículos robóticos, golems e androides.",poderes:[{nome:"A ferramenta certa",desc:"Uma vez por cena, você pode usar Máquinas para substituir qualquer outra perícia. Pode pagar 3PM para cada nova utilização na mesma cena."},{nome:"Engenheiro de campo",desc:"Com teste de Máquinas (9), gaste 1PM para ter um Ajudante de tipo à sua escolha, até o fim da cena. Ainda paga PM por cada utilização."},{nome:"Martelinho de ouro",desc:"Gaste uma ação, teste de Máquinas (9). Com sucesso: cura 2D PV em um construto Perto, ou soma 1D ao seu próximo teste."}]},
"Estudante":{exig:"Qualquer perícia; Mentor",desc:"Na Era das Arcas, estudantes enfrentam aulas com realidade virtual, conjuração de criaturas e tarefas de construir robôs. A escola moderna é onde nascem as mais fortes amizades e as primeiras grandes aventuras.",poderes:[{nome:"Hora do intervalo",desc:"Após uma cena de conflito, você recebe uma refeição básica (Ganho em um único teste, à sua escolha, até o fim do dia). Não recebe nova refeição antes de consumir a anterior."},{nome:"Prova real",desc:"Gaste 2PM para rolar 1D extra em um teste de perícia que possua, descartando o resultado mais baixo."},{nome:"Quem não cola...",desc:"Você pode usar a vantagem Mentor uma segunda vez por cena."}]},
"Gatuno Galante":{exig:"Manha; Ágil, Carismático ou Gênio",desc:"Virtuoso na arte da infiltração, o gatuno galante combina astúcia, intelecto e refinamento. Desliza pelas sombras com graça, mas também se mistura em ambientes sociais com charme irresistível.",poderes:[{nome:"Ardiloso",desc:"Gaste 3PM para ter os benefícios de Confusão, Invisível, Inofensivo ou Telepata durante um turno. Você ainda paga outros custos em PM se houver."},{nome:"Reconhecimento de terreno",desc:"Uma vez por sessão, por ter investigado o lugar antes, você pode escolher o local de uma cena como Arena."},{nome:"Um passo à frente",desc:"Gaste 2PM para ter Ganho em um teste para evitar qualquer efeito negativo (exceto dano). Pode fazer isso um número de vezes por cena igual à sua Habilidade."}]},
"Guerreiro":{exig:"Luta; Ataque Especial ou Defesa Especial",desc:"O guerreiro supera obstáculos através de combate. Lutar não é apenas um meio — é o próprio objetivo.",poderes:[{nome:"Lutar é tudo!",desc:"Quando faz um teste de Luta, gaste 2PM para adicionar +3 ao resultado, após a rolagem (antes do oponente rolar a defesa)."},{nome:"Manobra especial",desc:"Uma vez por cena, você pode usar um Ataque ou Defesa Especial sem gastar PM."},{nome:"Sem parar",desc:"Quando reduz um oponente a 0PV de forma violenta, você pode imediatamente fazer um ataque contra outro oponente ao alcance."}]},
"Idol":{exig:"Arte; Carismático, Famoso",desc:"A idol encanta com voz graciosa, dança empolgante e trajes deslumbrantes. Quando se aventura, canaliza seu carisma para elevar o espírito dos aliados e libertar o poder da canção como arma.",poderes:[{nome:"Seu sorriso...",desc:"Para você, a vantagem Carismático oferece P+3, em vez de +2."},{nome:"...É tão resplandecente!",desc:"Uma vez por cena, você pode usar Arte para substituir qualquer outra perícia. Pode pagar 3PM para cada nova utilização na mesma cena."},{nome:"Me dê a mão!",desc:"Com sucesso em teste de Arte (9), gaste um movimento e 1PM para conceder Ganho a um aliado que consiga ver e ouvir você."}]},
"Ilusionista":{exig:"Arte, Mística ou Telepata; Ilusão",desc:"Ilusionistas usam mágica, truques de palco ou poderes mentais para controlar o que outros percebem. Criativos e astutos, raramente encontram situações que não possam contornar com imaginação.",poderes:[{nome:"Gambito ilusório",desc:"Uma vez por rodada, gaste 1PM para ter Ganho em um teste de defesa."},{nome:"Glamour",desc:"Gaste PM para mudar sua aparência ou a de aliados e objetos (dentro dos limites de Ilusão). Essas ilusões se movem com seus alvos e não gastam seus movimentos."},{nome:"Ilusão autônoma",desc:"Crie uma ilusão que age sozinha, sem gastar seus movimentos, pelo custo normal. Você pode manter apenas uma desse tipo, mas ainda pode criar outras ilusões."}]},
"Ladino":{exig:"Manha; Ágil ou Gênio",desc:"Muito mais que um criminoso, o ladino é um aventureiro ousado e inventivo. Seu método é não ter método. A surpresa é sua arma.",poderes:[{nome:"Ataque furtivo",desc:"Gaste 2PM ao atacar alvo desprevenido para reduzir em -1 sua Resistência para defesa. Gaste +1PM para ataque furtivo contra alvo envolvido em combate com um aliado."},{nome:"Malandragem",desc:"Uma vez por cena, você pode usar Manha para substituir qualquer outra perícia. Pode pagar 3PM para cada nova utilização na mesma cena."},{nome:"Trapaça",desc:"Ao usar um poder surpreendente, gaste 1 Ponto de Ação para ter qualquer vantagem (mesmo as que custam mais de 1pt)."}]},
"Mago":{exig:"Mística; Magia",desc:"O verdadeiro mago estuda fórmulas herméticas para conseguir efeitos mágicos acurados. Para ele, magia é uma ciência tão complexa quanto física quântica.",poderes:[{nome:"Aptidão mágica",desc:"Seu bônus máximo da vantagem Magia é H+2 (em vez de H)."},{nome:"Bateria de mana",desc:"Uma vez por cena, você pode usar uma ação completa para recuperar 1D+H PM."},{nome:"Preparar magias",desc:"Quando estiver com PM completos e fora de conflito, deixe magias preparadas. Gasta metade dos PM para preparar. Não pode mudar, e PM não podem ser recuperados até usá-las."}]},
"Menestreamer":{exig:"Arte, Influência ou Carismático; Famoso",desc:"Bardos modernos que transmitem aventuras para seguidores online. Mais que narradores, inspiram companheiros com descrições dramáticas, música climática e manobras estilosas.",poderes:[{nome:"Inspirar",desc:"Gaste um movimento e 3PM para conceder Ganho ao teste de perícia de um aliado Perto ou Longe. Deve ser realizado até o próximo turno do aliado. Se já tem este poder, o custo cai para 1PM."},{nome:"É meu amigo!",desc:"Gaste 1PM para conceder a um aliado os benefícios da vantagem Famoso durante uma cena."},{nome:"Audiência generosa",desc:"Com teste de Arte ou Influência (9), você pode arrecadar doações de seus seguidores para ter Ganho em um teste de compra."}]},
"Mercenário":{exig:"Devoto, Patrono, Código",desc:"O verdadeiro mercenário tem uma reputação a zelar. Uma vez que aceite um contrato, vai cumpri-lo a qualquer custo. Sua lealdade pode ser comprada — mas, uma vez adquirida, será absoluta.",poderes:[{nome:"Nem morto",desc:"Enquanto tiver um contrato, sempre que fizer um teste de morte, role +1D e descarte o menor resultado."},{nome:"Melhor no que faz",desc:"Você é devotado a cumprir seus contratos. Pode usar Devoto até três vezes por cena, em vez de duas."},{nome:"Trato feito",desc:"No início de cada sessão (sem violação do Código), você pode mudar de Patrono. Em testes de compra para o Patrono, some +3 ao resultado final."}],desv:{nome:"Código do Mercenário",custo:"-1",desc:"Jamais trair seu Patrono. Jamais falhar em cumprir uma missão para seu Patrono."}},
"Monge":{exig:"Ágil; Resoluto ou Vigoroso; 1ª Lei de Asimov",desc:"Monges buscam a paz, mas são combatentes excepcionais. Treinam corpo e mente à exaustão, adquirem agilidade incomparável. Lutam apenas para se defender ou proteger inocentes.",poderes:[{nome:"Agilidade superior",desc:"Para você, a vantagem Ágil oferece H+3, em vez de +2."},{nome:"Alma de aço",desc:"Sempre que faz um teste de R (incluindo defesas), gaste 1PM para aumentar em +1 o resultado de um dado. Não provoca críticos, mas anula falhas críticas."},{nome:"Controle dos chakras",desc:"Em situação de conflito, gaste um turno completo para recuperar 1D+H PV ou 1D+H PM. Só funciona se tiver pelo menos 1PV e 1PM."}],desv:{nome:"1ª Lei de Asimov",custo:"-1",desc:"Jamais causar mal a um ser humano ou, por omissão, permitir que um humano sofra qualquer mal."}},
"Necromante":{exig:"Mística; Magia",desc:"Mestres da energia negativa, necromantes são apreciados e prestigiados na Era das Arcas. São o melhor amigo dos aventureiros osteon e mortos-vivos. Dizem que o necromante é apenas um curandeiro meio atrasado!",poderes:[{nome:"Criar morto-vivo",desc:"Teste de Mística (9), gaste 1PM para receber um Ajudante de tipo à sua escolha, até o fim da cena. Ainda paga PM por cada utilização."},{nome:"Energia negativa",desc:"Suas vantagens de cura (incluindo Ajudante Curandeiro) funcionam em seres Sem Vida (mas não se aplica a descanso ou itens)."},{nome:"Fortificar morto-vivo",desc:"Você gasta -1PM (mínimo 1) para usar Magia em seres Sem Vida."}]},
"Negociador":{exig:"Influência, Carismático",desc:"O negociador acredita em superar desafios com diálogo. Com empatia e comunicação eficaz, cria ambiente de entendimento mútuo.",poderes:[{nome:"Argumentação",desc:"Uma vez por cena, você pode usar Influência para substituir qualquer outra perícia. Pode pagar 3PM para cada nova utilização na mesma cena."},{nome:"Empatia",desc:"Gaste 2PM para anular um Ganho em um teste de Poder (incluindo combate) realizado contra você."},{nome:"Palavras de conforto",desc:"Sempre que qualquer poder de cura é utilizado em sua presença, o teste tem Ganho ou recupera +2PV."}]},
"Ninja":{exig:"Manha; Mentor",desc:"Mestres da furtividade e eficiência. Alguns servem a antigos clãs, outros obedecem apenas aos ensinamentos de seus mestres.",poderes:[{nome:"Mestre ninja",desc:"Você tem Ganho em dois testes de perícia por cena pela vantagem Mentor, em vez de um."},{nome:"Ninpo de combate",desc:"Uma vez por rodada, gaste 1PM para trocar um teste de ataque ou defesa por um teste de Manha (Habilidade). Pode usar vantagens e técnicas normalmente."},{nome:"Ougi",desc:"Escolha uma vantagem ou técnica como seu ougi (técnica secreta). Custará -1PM (mínimo 1) e, no primeiro uso da sessão, o alvo tem Perda no teste resistido. Pode trocar seu ougi a cada evolução dramática."}]},
"Paladino":{exig:"Devoto; Código dos Heróis e Honestidade",desc:"Campeões de causas e ideais, paladinos podem ser cavaleiros clássicos ou usar armaduras robóticas. Heróis naturais, frequentemente assumem a liderança. Todos confiam em paladinos.",poderes:[{nome:"Bravura final",desc:"Você não faz testes de morte: qualquer dano nesse estado é descontado de seus PM. Sem PM, você cai automaticamente Quase Morto."},{nome:"Me dê sua força!",desc:"Quando usa Devoto para ter Ganho em um teste, some +1 ao resultado de cada dado. Não afeta críticos, mas cancela falhas críticas."},{nome:"Sétimo sentido",desc:"Quando está perto da derrota, gaste 2PM para fazer um ataque ou defesa uma escala acima."}]},
"Patrulheiro":{exig:"Sobrevivência",desc:"Exploradores rústicos com profunda ligação com a natureza. Sobreviventes extremos, podem encontrar abrigo e sustento nos ambientes mais rigorosos.",poderes:[{nome:"Natureza provedora",desc:"Uma vez por cena, você pode usar Sobrevivência para substituir qualquer outra perícia. Pode pagar 3PM para cada nova utilização na mesma cena."},{nome:"À prova de tudo",desc:"Automaticamente bem-sucedido em testes de Sobrevivência para achar lugar de descanso. Gaste 1PM para você ou aliado receber +3 em um teste contra privações."},{nome:"Rastreador perfeito",desc:"Gaste 2PM para adquirir um Sentido à sua escolha, para um único teste."}]},
"Servo da Centelha":{exig:"Luta; Devoto",desc:"Praticantes de artes marciais que experimentaram a Centelha — energia ardente que impulsiona lutar com intensidade implacável.",poderes:[{nome:"Bater onde dói",desc:"Quando faz um ataque, gaste 2PM para impor R-1 no teste de defesa do oponente."},{nome:"Combate violento",desc:"Para cada acerto crítico em um teste de ataque, além do efeito normal, você também soma +2 ao resultado final."},{nome:"Faísca da Centelha",desc:"Quando usa Devoto, em vez do benefício normal, você recebe P+2 e R+1 (não afeta recursos). O efeito dura rodadas igual ao seu Poder."}]},
"Shinigami":{exig:"Imortal, Inimigo (espíritos)",desc:"Guerreiros espirituais com a missão de proteger o equilíbrio entre o mundo dos vivos e o reino dos mortos. Caçam espíritos monstruosos e protegem os que vivem pacificamente em sociedade.",poderes:[{nome:"Eu voltarei!",desc:"Um shinigami morto retorna com recursos completos no início da cena seguinte. Só pode ser destruído permanentemente pelo ataque de outro shinigami."},{nome:"Guia dos mortos",desc:"Cabe ao shinigami adiar a passagem daqueles cuja hora final ainda não chegou. Você pode conceder um Ganho a qualquer teste de morte realizado em sua presença."},{nome:"Inimigo espiritual",desc:"Um espírito derrotado por um shinigami não recupera PV e permanece derrotado até o fim da cena, ou até ser destruído."}]},
"Super-Herói":{exig:"Ágil, Carismático, Forte, Gênio, Resoluto ou Vigoroso; Código dos Heróis",desc:"Aqueles que usam seus dons especiais para proteger o planeta. O típico super-herói tem um único superpoder de destaque, mas muitos têm conjuntos de poderes relacionados.",poderes:[{nome:"Sobrehumano",desc:"Escolha uma vantagem das exigências que você possua. Gaste 1PM para aumentar seu bônus de atributo em +4, em vez de +2."},{nome:"Façanha épica",desc:"Uma vez por sessão, em um teste envolvendo um atributo sobrehumano, você pode aumentar esse teste uma escala."},{nome:"Herói de ação",desc:"Você tem 2 Pontos de Ação extras (Poder+2)."}]},
"Superatleta":{exig:"Esporte",desc:"O superatleta personifica o espírito esportivo e a excelência física. Domina uma variedade de modalidades e busca a vitória em cada empreendimento.",poderes:[{nome:"Aquecimento",desc:"No início de uma nova cena, você sempre recupera um número de PM igual a seu maior atributo."},{nome:"Espírito olímpico",desc:"Suas vitórias inspiram seus companheiros. Sempre que você tem sucesso em um teste, todos os seus aliados recebem +1 em seu teste seguinte."},{nome:"Medalha de ouro",desc:"Uma vez por cena, você pode usar Esporte para substituir qualquer outra perícia. Pode pagar 3PM para cada nova utilização na mesma cena."}]},
"Tanque":{exig:"R3, Defesa Especial (Provocação)",desc:"Especializados em defesa, tanques atuam como escudos vivos para os companheiros, atraindo ataques inimigos sobre si. São chamativos, provocadores — não existe tanque tímido ou furtivo.",poderes:[{nome:"Hoje não!",desc:"Uma vez por cena, quando recebe dano que o levaria a 0PV, você pode ignorar completamente esse dano."},{nome:"Defesa gratuita",desc:"Uma vez por cena, você pode usar uma Defesa Especial sem gastar PM."},{nome:"Último bastião",desc:"Quando você está perto da derrota, todos os seus testes de defesa têm Ganho."}]},
"Treinador de Monstros":{exig:"Animais; Ajudante (qualquer)",desc:"Alguém com grande afinidade por mascotes fantásticas. Pode capturar e domar criaturas exóticas onde estiver. Para quase todos, não há objetivo maior que acumular monstros e torná-los mais fortes.",poderes:[{nome:"Amigo dos monstros",desc:"Para você, cada utilização de Ajudante custa -1PM (mínimo 1PM)."},{nome:"Eu escolho você!",desc:"Se tiver mais de um Ajudante, pode utilizar a vantagem duas vezes por rodada (máx duas). Não pode usar o mesmo Ajudante mais de uma vez por rodada. Ainda paga PM por cada utilização."},{nome:"Temos que pegar!",desc:"No início da cena, teste de Animais (9+). Com sucesso, um novo Ajudante (tipo escolhido pelo mestre) surge até o fim da cena. Funciona apenas uma vez por sessão."}]},
"Vigilante Sombrio":{exig:"Invisível, Sentido (Infravisão)",desc:"Sinistro campeão das trevas, especialista em explorar a escuridão e aterrorizar inimigos. Medo e intimidação são sua arma. Muitos buscam vingança por injustiças passadas; outros protegem o sono dos inocentes.",poderes:[{nome:"Forma sombria",desc:"Gaste um movimento para adquirir Incorpóreo a 1PM por turno (máx = 5 ou Habilidade, o menor). Se já tem Incorpóreo, pode interagir com o mundo físico (inclusive atacar) a 1PM por interação."},{nome:"Terror da noite",desc:"Sempre que causa dano, gaste 2PM para forçar o alvo a fazer um teste de R (6 + H do vigilante). Se falhar: Perda na defesa contra o próximo ataque. Falha crítica: fica indefeso."},{nome:"Sumir nas sombras",desc:"Você gasta 1PM (em vez de 3) para ficar Invisível."}]},
"Ás Advogado":{exig:"Influência, Defesa Especial (Reflexão)",desc:"Nem toda luta contra o mal acontece em batalhas violentas. A mais pura justiça está nos tribunais, onde o ás advogado é o campeão supremo. Armado apenas com a lei, é o verdadeiro defensor dos necessitados e terror dos criminosos. Sua convicção é mais dura que qualquer escudo, seu dedo acusador é pungente feito espada afiada.",poderes:[{nome:"Coleta de provas",desc:"Quando tem um crítico em um teste de Influência ou Saber, em vez de somar o atributo outra vez, você pode escolher pegar uma Prova (anote P na ficha). Pode fazer isso até três vezes por cena. Em outros testes de Influência ou Saber, você pode gastar Provas para críticos automáticos. Provas não usadas até o fim da cena são perdidas."},{nome:"Embargo",desc:"Você pode pagar 2PM para evitar todo o dano de um ataque, ou qualquer efeito negativo por falhar em um teste. Pode fazer isso um número de vezes por sessão igual a seu Poder ou 5, o que for menor."},{nome:"Objeção!",desc:"Sua Defesa Especial (Reflexão) adiciona +2 ao dano contra o adversário."}]},
"Cosmonauta da ORDEM":{exig:"Patrono, Inimigo (aliens)",desc:"A ORDEM — Organização de Resistência a Divergência Extraterrestre Maledicente — combate ameaças alienígenas em todo o universo. Seus membros são preparados para atuar em planetas estranhos e interagir com formas de vida desconhecidas. O cosmonauta é também um valente cientista e aventureiro, pronto para desafiar o desconhecido com armas futuristas, curiosidade e boa vontade.",poderes:[{nome:"Primeiro contato",desc:"Você é treinado para enfrentar o desconhecido. Pode gastar 2PM para receber +3 em qualquer teste de Saber ou Sobrevivência."},{nome:"Inimigo meu",desc:"Você pode usar a vantagem Inimigo para seres extraterrestres que nunca viu antes. Apesar do nome, também afeta testes para interações sociais amistosas e prestação de ajuda."},{nome:"Sensores avançados",desc:"Você pode pagar 2PM para adquirir um Sentido à sua escolha, para um único teste."}]},
"Entidade Exilada":{exig:"Nenhuma",desc:"Sejam trazidos pelas Convergências, invocados por rituais ou náufragos de outros planetas, muitos seres não chegaram a este mundo por livre vontade. Uma entidade exilada é qualquer ser estrangeiro impossibilitado de voltar a seu mundo nativo. Alguns se escondem, outros tentam se adaptar, adotando o modo de vida local, até encontrar um meio — e talvez um motivo — de voltar para casa.",poderes:[{nome:"Não conheci o outro mundo por querer!",desc:"Em testes de morte, você pode rolar 1D extra e descartar o dado mais baixo."},{nome:"Sorte extraplanar",desc:"Seus dons incomuns funcionam na hora certa. Uma vez por sessão, você pode usar uma vantagem, técnica ou Energia youkai sem gastar PM."},{nome:"Energia youkai",desc:"Você pode usar uma ação para gastar qualquer quantidade de PM e curar PV, em você mesmo ou alguém com quem tenha Elo Mental. Cada 2PM curam 1PV."}]},
"Exército da Luz":{exig:"Patrono",desc:"O Exército da Luz são os defensores finais do planeta contra extraterrestres, kaijus e outras ameaças. Treinados e equipados para combater o que existe de pior no universo, seus membros têm nacionalidades e origens variadas. Por suas façanhas, conquistam grande prestígio público, sendo reconhecidos como heróis e inspirando jovens a integrar suas fileiras.",poderes:[{nome:"Artilharia total",desc:"Uma vez por cena, você pode fazer um Ataque Especial de até 3pt à sua escolha. Você ainda deve pagar seu custo em PM."},{nome:"Armadura radiante",desc:"Por seu treino rigoroso e tecnologias de proteção, você adiciona 1D a qualquer teste para resistir a efeitos nocivos (incluindo testes de defesa), descartando o dado mais baixo."},{nome:"Ombro a ombro",desc:"Você pode gastar 2PM para conceder Ganho a um teste de um aliado Perto."}]},
"Experimento":{exig:"Imune; +Mana ou +Vida",desc:"A tecnologia e magia da Era das Arcas vem permitindo produzir novas formas de vida ou modificar profundamente as existentes. O fruto de um experimento pode ser glorioso ou algo monstruoso, marcado por dor e revolta. Em qualquer caso, terá que escolher entre usar seus poderes exóticos para o bem ou o mal.",poderes:[{nome:"Adaptação",desc:"Você tem duas formas de imunidade pela vantagem Imune, em vez de uma."},{nome:"Bioenergia",desc:"Em vez de +10, você recebe +15PM ou +15PV pela vantagem +Mana ou +Vida (escolha uma)."},{nome:"Mutação",desc:"Escolha um atributo. Sempre que faz um teste com o atributo escolhido, você pode pagar 2PM para rolar 1D extra e descartar o dado mais baixo."}]},
"Gigante da Luz":{exig:"Transformação; Código do Combate e Heróis",desc:"Gigantes da luz são guerreiros de estrelas distantes que protegem o universo contra kaiju e vilões. Em suas formas naturais, são humanoides gigantescos. Quando se estabelecem na Terra, tomam como hospedeiro o corpo de algum nativo digno, que pode então se transformar em gigante da luz por breves períodos em situações de perigo extremo.",poderes:[{nome:"Poder interior",desc:"Sua forma original é aprimorada. Escolha entre Forte, Ágil ou Vigoroso. Esta vantagem também se aplica à segunda forma."},{nome:"Transformação gigante",desc:"Você tem uma segunda forma que também eleva sua escala para Kiodai até o fim da cena, recebendo Alcance (raios e lâminas de energia), Golpe Final e Voo sem custo. Um sinal piscante avisa quando perto da derrota. Esta Transformação não pode ser executada sem oponente de escala Kiodai em cena, nem em caso de violação dos Códigos."},{nome:"Transformação menor",desc:"Você pode adotar sua segunda forma em tamanho normal, com as mesmas vantagens, poderes e limitações, mas sem mudar de escala."}]},
"Guerreira Mágica":{exig:"Mística; Magia",desc:"A guerreira mágica é um símbolo de pureza, coragem e esperança contra a escuridão. Uma heroína destinada a proteger a humanidade usando poderes mágicos e atitude positiva. Ela sabe que amizade, amor e compaixão são armas tão poderosas quanto qualquer magia.",poderes:[{nome:"Auxílio mágico",desc:"Quando usa Magia para emular efeitos de vantagens, você gasta PM igual ao custo da vantagem (em vez de ×3) para Ataque Especial (qualquer), Ajudante (qualquer), Alcance e Mentor."},{nome:"Punirei você!",desc:"Contra um alvo perto da derrota, seu custo em PM para Magia cai pela metade. Você também pode usar este poder para ajudar aliados em perigo."},{nome:"Transformação radiante",desc:"Você pode gastar um movimento para vestir seu traje mágico de combate. Nesta forma, pode gastar 2PM para ter Ganho em um teste de Mística, e testes para descobrir sua verdadeira identidade sofrem Perda. A transformação dura até o fim da cena."}]},
"Herói Sentai":{exig:"Elo Mental, Golpe Final, Patrono",desc:"Um herói sentai atua como membro de um superesquadrão em defesa do planeta. Sempre em equipe, é um exemplo de que a união faz a força. Formidável sozinho, mas invencível com seus aliados. Usa um uniforme colorido de altíssima tecnologia que amplifica suas capacidades.",poderes:[{nome:"Hora de sincronizar",desc:"Seu Elo Mental funciona com todos os seus aliados (no máximo 5). Eles não precisam ter também esta vantagem, mas recebem seus benefícios."},{nome:"Soltar faísca",desc:"Quando você sofre dano, pode escolher pagar 1PM para anular 3 pontos de dano."},{nome:"Finalização",desc:"Quando você executa um Golpe Final, cada aliado pode escolher pagar 3PM para somar seu próprio Poder a esse ataque."}]},
"Impostor":{exig:"Influência; Imitar",desc:"Mestre do disfarce, o impostor é especializado em personificar outras pessoas. Pode alcançar isso por meios mundanos ou fantásticos — magia ilusória, poder camaleônico, hologramas. O impostor realmente hábil não imita apenas aparência, mas adquire até mesmo talentos de seus alvos.",poderes:[{nome:"Disfarce perfeito",desc:"Com um movimento e 3PM, você pode assumir a aparência de qualquer pessoa ou criatura que conheça ou veja. É impossível enxergar através de seu disfarce, exceto com Telepatia ou Sentidos, e mesmo assim o teste de Percepção tem Perda."},{nome:"Engenheiro social",desc:"Uma vez por cena, você pode usar Influência para substituir qualquer outra perícia. Você pode pagar 3PM para cada nova utilização na mesma cena."},{nome:"Jogo da imitação",desc:"Você pode copiar e manter duas vantagens por vez com Imitar, em vez de uma."}]},
"Intendente":{exig:"Arte ou Sobrevivência; Improviso",desc:"Intendentes, mordomos, butlers, maids. Podem ser vistos apenas como servos, mas nada poderia estar mais distante da verdade. Formados exclusivamente no Instituto Maior de Intendência em Akibara, passam por treinamentos que fariam um ninja chorar. São os membros mais perigosos de qualquer equipe.",poderes:[{nome:"Excelência",desc:"Quando consegue um crítico em um teste de perícia que possua (incluindo perícias aprendidas com Improviso), você pode gastar 3PM para somar o atributo no teste mais uma vez."},{nome:"Housekeeping",desc:"Por 3PM, escolha um número de aliados voluntários (incluindo você) igual à sua Habilidade. Eles somam seus PM atuais. Esse total é compartilhado por todos até o fim da cena ou você ser derrotado. Se o efeito acaba, os PM restantes são divididos igualmente."},{nome:"Sempre a postos",desc:"Você gasta 2PM (em vez de 3) para aprender perícias com Improviso. Além disso, pode manter até duas perícias ao mesmo tempo."}]},
"Maginauta":{exig:"Magia, Mística",desc:"Quando uma barreira mágica bloqueia uma passagem importante ou um feiticeiro maligno conjura encantamentos imbatíveis, há ainda esperança: o maginauta. Ele é o hacker do mundo mágico, surfista das ondas místicas, cowboy das fronteiras da realidade — aquele que domina o magiespaço, dimensão cósmica onde a magia é criada e manipulada.",poderes:[{nome:"Imersão",desc:"Você usa uma ação completa e 2PM para imergir no magiespaço. Enquanto ali seu corpo físico fica imóvel e indefeso, mas você tem Ganho em testes de Mística, a vantagem Magia gasta metade dos PM, e pode afetar alvos até Muito Longe sem penalidade. Manter a imersão custa 1PM por rodada; você pode encerrá-la com um movimento."},{nome:"Interferência",desc:"Você pode usar uma ação e 2PM para conceder Ganho ou causar Perda em um teste de Mística de outro personagem, que seja feito até seu próximo turno. No magiespaço, este poder gasta apenas um movimento."},{nome:"Sobrecarga",desc:"Ao usar Magia, faça um teste de Mística (9). Com sucesso, recebe +2 no teste afetado; cada crítico aumenta em +1. Em caso de falha a magia não tem efeito mas ainda gasta PM (falha crítica gasta o dobro)."}]},
"Mestre-Cuca":{exig:"Arte ou Sobrevivência",desc:"Nem todas as batalhas são vencidas com aço e magia. Às vezes, o caminho para a vitória passa pelo estômago. O mestre-cuca é um profissional culinário altamente treinado, especializado em alta gastronomia. Alguns escolhem participar de aventuras: para descobrir receitas miraculosas em pergaminhos antigos, preparar pratos fabulosos com ingredientes das Arcas, ou usar seu talento para fazer um amanhã melhor.",poderes:[{nome:"Talento culinário",desc:"Você recebe +3 em todos os testes de Arte e Sobrevivência para preparar refeições."},{nome:"Prato milagroso",desc:"Uma vez por sessão, quando prepara uma refeição, você pode gastar Pontos de Ação para conceder uma vantagem (veja em +Ação) como poder surpreendente a você mesmo ou um aliado, pela duração do efeito do prato."},{nome:"Despensa cheia",desc:"Você começa cada sessão com um número de refeições básicas igual à sua Habilidade. Você pode trocar três refeições básicas por uma refeição gourmet, ou cinco básicas por uma refeição do chef que já conheça."}]},
"Motoqueiro Mascarado":{exig:"Luta; Ajudante (Montaria)",desc:"Existem poderes malignos capazes de transformar pessoas em monstros. Alguns recusam seu papel, enfrentando seus criadores e buscando seus próprios destinos. Tornam-se combatentes da justiça, correndo o mundo em suas motocicletas para ajudar os necessitados. Usam máscaras que conferem seus poderes ou que ocultam sua verdadeira face.",poderes:[{nome:"Henshin",desc:"Você pode gastar um movimento para invocar sua máscara e traje de combate, ou revelar sua forma verdadeira. Nesta forma, pode gastar 2PM para ter Ganho em um teste de Luta, e testes para descobrir sua identidade sofrem Perda. A transformação dura até o fim da cena."},{nome:"Moto de batalha",desc:"Você pode pagar 2PM para que seu ajudante atue como Lutador, em vez de Montaria."},{nome:"Até o fim",desc:"Você não sofre Perda e pode seguir lutando normalmente quando está derrotado. Você ainda pode morrer se receber dano nesse estado."}]},
"Operativo":{exig:"Luta, Sobrevivência; Patrono",desc:"Operativos são os melhores agentes de forças armadas privadas e organizações secretas. Estes supersoldados são altamente treinados e aprimorados, muitas vezes através de procedimentos experimentais. Agem em pequenas forças-tarefa, compensando com extrema perícia e equipamentos de altíssima tecnologia.",poderes:[{nome:"Combate tático",desc:"Sempre que executa uma manobra de combate (agarrão, ataque concentrado, ataque direcionado, ataque total, contra-ataque, defesa total, fuga), você pode pagar 1PM para ter +3 em seu teste de ataque ou defesa."},{nome:"Armas secretas",desc:"Tentativas de revelar ou anular suas vantagens e técnicas (como Anulação ou Telepatia) sempre sofrem Perda, ou gastam PM dobrado."},{nome:"Equipamento de espião",desc:"Uma vez por sessão, seu Patrono fornece um aparelho com efeito igual a uma vantagem de 1pt (escolhida no início da sessão), que funciona uma única vez. Para vantagens que gastam PM, o aparelho tem carga equivalente a 3PM."}]},
"Pescador Parrudo":{exig:"Poder 3; Sobrevivência; Vigoroso",desc:"Esse curioso aventureiro se destaca por sua força impressionante, constituição robusta, personalidade cativante e incapacidade de abotoar a camisa. Combinando grande força e carisma, pode igualmente esmagar inimigos com braços poderosos ou com um sorriso contagiante. É um verdadeiro gigante gentil, sempre otimista.",poderes:[{nome:"Quem sou? Onde estou?",desc:"Uma vez por cena, você pode usar os benefícios da vantagem Vigoroso em testes de Poder."},{nome:"Parrudez",desc:"Você pode gastar 1PM para fazer um teste de defesa usando a perícia Sobrevivência. Quando o faz, some +1 ao resultado de cada dado (não afeta críticos, mas cancela falhas críticas). Qualquer defesa bem-sucedida é considerada perfeita."},{nome:"Pescado do dia",desc:"No início da cena, faça um teste de Sobrevivência (meta 6 +1 para cada aliado). Se tiver sucesso, todos ganham +1 em testes de Resistência, incluindo defesa, até o fim da cena. Funciona apenas próximo a lugares com possibilidade de pesca."}]},
"Piloto Mecha":{exig:"Máquinas; Ajudante",desc:"Com a obtenção de corpos robóticos traktorianos na Guerra da Galáxia, a ciência cibernética avançou muito na Era das Arcas. Pilotos mecha são formados na Alta Academia Gattai da UniPotência e estão entre os poucos capazes de controlar mechas de combate para confrontar os maiores inimigos da humanidade.",poderes:[{nome:"Ajudante robô",desc:"Seu Ajudante robótico funciona como arma, armadura e veículo, sendo considerado Lutador e Montaria. Você ainda deve pagar PM para cada utilização."},{nome:"Ás indomável",desc:"Você é um mestre das manobras impossíveis. Uma vez por sessão, quando usar 1 Ponto de Ação para qualquer teste, você também pode aumentar esse teste uma escala."},{nome:"Kiodai mecha",desc:"Uma vez por sessão, ou a critério do mestre, você pode invocar um veículo de 10 pontos em escala Kiodai (cruzador espacial, robô gigante, dinossauro mecânico...). O veículo surge apenas se houver um oponente de escala Kiodai em cena."}]},
"Policial do Espaço":{exig:"Luta; Ajudante, Patrono; Código dos Heróis",desc:"O universo é hostil, mas tem guardiões. Policiais do espaço são agentes designados para proteger mundos contra a destruição perpetrada por monstros e vilões. Pertencentes a raças variadas, recebem treinamento de combate rigoroso e equipamentos avançados, desde armaduras tecnológicas até cruzadores estelares.",poderes:[{nome:"Jouchaku!",desc:"Você pode gastar um movimento para invocar um traje de combate tecnológico, ou revelar sua forma verdadeira. Nesta forma, pode gastar 2PM para um único uso da vantagem Alcance 1 (pistola de raios) ou Golpe Final. A transformação dura até o fim da cena."},{nome:"Assistente",desc:"Seu Ajudante custa -1PM (mínimo 1PM) para ser utilizado."},{nome:"Kiodai mecha",desc:"Uma vez por sessão, ou a critério do mestre, seu Patrono disponibiliza um veículo de 10 pontos em escala Kiodai. O veículo surge apenas se houver um oponente de escala Kiodai em cena."}]},
"Psiônico":{exig:"Obstinado, Sentido (Intuição), Telepata",desc:"Poderes psíquicos podem se manifestar por muitos motivos: experimentos genéticos, origens alienígenas, mutações, magia. Psiônicos podem ser seres muito poderosos, mas também perigosos para si mesmos. Seus poderes, quando excedem limites, consomem corpo e mente — podendo causar sangramentos, dores de cabeça, até combustão espontânea!",poderes:[{nome:"Dom telepático",desc:"Você não precisa gastar um movimento (mas ainda gasta PM) para usar Telepata."},{nome:"Intuição psíquica",desc:"Você pode pagar 1PM para ter Ganho em um teste de Percepção usando Sentido (Intuição)."},{nome:"Sobrecarga psíquica",desc:"Quando utiliza Obstinado, você pode escolher gastar 1 ponto de atributo como se fossem 2 Pontos de Ação, em vez de 1. Sempre que fizer isso, role um dado. Com resultado 1, seus PV caem para zero e você deve fazer um teste de morte."}]},
"Repórter Extremo":{exig:"Percepção; Sentido (Intuição)",desc:"Armado com curiosidade insaciável, o repórter extremo busca tudo que é desconhecido — para tornar conhecido. Onde houver uma história intrigante, ameaça oculta ou herói anônimo, ele lutará para entregar a verdade ao público. Nenhum segredo é sagrado para ele; o público sempre tem o direito de saber.",poderes:[{nome:"Faro para notícia",desc:"Você fuça até achar. Pode pagar 1PM para trocar sua Intuição por outro Sentido, para um único teste."},{nome:"Fontes confiáveis",desc:"Uma vez por sessão, você pode contactar suas fontes para revelar uma informação crucial. Durante uma cena, escolha uma vantagem entre Ajudante, Arena, Base, Inimigo ou Telepata. Você ainda paga custos em PM da vantagem escolhida, se houver."},{nome:"Furo de reportagem",desc:"Uma vez por cena, você pode usar Percepção para substituir qualquer outra perícia. Você pode pagar 3PM para cada nova utilização na mesma cena."}]},
"Samurai":{exig:"Patrono ou Código",desc:"Samurais do além-Convergência chegaram a este mundo como Viajantes, trazendo sua habilidade com a katana e devoção à honra. Servir é sua natureza — é o próprio significado da palavra samurai. Quando não tem um patrono, o samurai serve a seus próprios códigos de honra. Samurais sem mestre ou honra são chamados ronin, sem acesso total a seus poderes.",poderes:[{nome:"Guerreiro poeta",desc:"Samurais são treinados em arte e etiqueta. Você pode gastar 2PM para receber +3 em qualquer teste de Arte ou Influência."},{nome:"Artefato ancestral",desc:"No início de seu turno, você pode gastar PM para imbuir sua arma ou armadura com uma qualidade de artefato durante um turno. O custo é igual a um décimo do custo em XP. Por exemplo, pode tornar sua arma Encantada +1 por 1PM, ou sua armadura Fortificada por 2PM. Você pode aplicar apenas uma qualidade por vez."},{nome:"Guerreiro honrado",desc:"Você tem 1 Ponto de Ação extra para cada Patrono e Código que possua. Se desobedecer a seu Patrono ou violar qualquer Código, perde esses pontos extras até se redimir."}]},
"Hacker":{exig:"Máquinas; Telepata",homebrew:true,autor:"Dan C. | Hao",desc:"Muito se engana aquele que olha para um hacker e vê apenas um especialista em informática. Se trata de alguém que se aprofundou tanto em entender a maneira que a informação trafega pela internet e os códigos de funcionamento dos mais diversos sistemas, ao ponto de conseguir facilmente interceptar dados ou explorar as vulnerabilidades de redes e dispositivos.",poderes:[{nome:"Encontrar rastros",desc:"Todo mundo deixa informações online, e você sabe exatamente onde estão. Gastando 3PM por uso (ao invés de apenas 1), você não é restrito a personagens presentes na cena para aplicar efeitos de Telepata; quaisquer Ganhos obtidos dessa forma deverão ser usados até o final da sessão, ou serão perdidos."},{nome:"Explorar brechas",desc:"Você vai longe com acesso à internet e algumas linhas de código. Uma vez por cena, você pode usar Máquinas para substituir qualquer outra perícia. Você pode pagar 3PM para cada nova utilização na mesma cena."},{nome:"Pane no sistema",desc:"Você desconfigurou um aparato tecnológico (ou mesmo alguém!). Quando lida com um adversário envolvendo tecnologia ou do tipo Construto, você pode atacar usando Máquinas e obtém acesso a Paralisia (caso adquira essa Vantagem, poderá usá-la por apenas 1PM)."}]},
"Mago Sombrio":{exig:"Mística; Magia",homebrew:true,autor:"Dan C. | Hao",desc:"O mago sombrio é o mestre dos elementos e das magias ofensivas e explosivas, temido por adversários e admirado na mesma medida pelos aliados.",poderes:[{nome:"Magia ofensiva",desc:"Quando usa a vantagem Magia para atacar diretamente um alvo, o seu limite de gasto em PM é de H+2 (em vez de H)."},{nome:"Mestre dos elementos",desc:"Sempre que usa Magia para atacar um alvo, você pode dar a ela um tipo de dano entre choque, fogo ou frio. Isso não causa Perda e, se vencer a defesa adversária, você causa +2 pontos de dano sem custo extra em PM."},{nome:"Sifão de mana",desc:"Quando ataca um inimigo com Magia e tem um acerto crítico, você recupera 1D PM. Cada crítico adicional aumenta a recuperação em +2PM."}]}
};
window.LISTA_KITS = Object.keys(window.KITS).sort();
window.VANTAGENS = {
"+Ação":{c:"1",d:"Você tem mais Pontos de Ação além dos oferecidos por seu Poder. Cada compra = +2PA. Pode comprar várias vezes."},
"+Membros":{c:"2",d:"Você tem um ou mais membros extras (segundo par de braços, cauda preênsil, tentáculos...). Gaste 3PM para fazer uma segunda ação em seu turno. Essa ação pode ser de combate ou não, e pode conceder Ganho à sua outra ação como se estivesse prestando auxílio a si mesmo. Você não pode fazer mais de uma ação extra por rodada."},
"+Mana":{c:"1",d:"Você tem mais Pontos de Mana além dos oferecidos por sua Habilidade. Cada compra = +10PM. Pode comprar várias vezes."},
"+Vida":{c:"1",d:"Você tem mais Pontos de Vida além dos oferecidos por sua Resistência. Cada compra = +10PV. Pode comprar várias vezes."},
"Aceleração":{c:"1",d:"Você se move muito rápido. Gaste 1PM para realizar um movimento extra em seu turno. Também pode gastar 1PM antes de rolar os dados para receber Ganho na iniciativa, ou em testes de Habilidade para correr, fugir ou perseguir um oponente."},
"Acumulador":{c:"1",d:"Sempre que acerta um ataque (causa dano), pode gastar 2PM para ganhar P+1 no ataque seguinte. Se acertar de novo, gasta 2PM para P+2, e assim por diante, até P+5. Se errar um ataque ou deixar de atacar, os bônus acabam."},
"Ágil":{c:"1",d:"Você tem grande agilidade e coordenação motora. Recebe H+2 em testes envolvendo agilidade, coordenação ou equilíbrio, incluindo iniciativa. Bônus incluído em críticos. Também pode gastar 2PM antes de fazer um desses testes para crítico com 5 ou 6. Incompatível com Atrapalhado."},
"Ajudante":{c:"1",d:"Uma vez por rodada, gaste PM para invocar seu ajudante: Curandeiro (2PM — cura 2D PV ou repete teste de R contra efeito negativo), Especialista (2PM — Ganho em teste de uma perícia, exceto atacar/defender), Familiar (1PM — reduz à metade o custo de outra vantagem na rodada), Lutador (2PM — Ganho em ataque ou em defesas por uma rodada), Montaria (1PM — movimento extra ou Ganho em iniciativa/perseguição). Pode comprar várias vezes para ajudantes diferentes."},
"Alcance":{c:"1-2",d:"1pt: atinge Longe sem penalidade, Muito Longe com Perda. 2pt: atinge Muito Longe sem penalidade. Também afeta outras vantagens (Cura, Magia, etc.)."},
"Anulação":{c:"2",d:"Após o uso de uma vantagem em sua presença (Longe ou menos), gaste uma ação e 3PM para tentar anulá-la. O alvo faz teste de R (9 + seu Poder) para evitar. Se falhar, não pode mais usar essa vantagem até o fim da cena. A cada turno o alvo pode fazer novo teste para cancelar. Apenas uma vantagem anulada por vez."},
"Arena":{c:"1",d:"Você se dá melhor em certo tipo de terreno. Quando está nesse lugar, gaste 2PM para Ganho em um teste. Exemplos: Água, Céu, Cidades, Ermos, Subterrâneo, ou lugar específico."},
"Artefato":{c:"1+",d:"Você possui um item especial e único que só você pode utilizar. Cada ponto de Artefato vale 10XP para adquirir uma arma, armadura ou acessório (não veículo) como descrito em Recompensas."},
"Ataque Especial":{c:"1",d:"Ao atacar, gaste PM para efeitos: Área(3PM — todos Perto do alvo), Choque(1PM — ataca com R), Distante(1PM — alcança um passo além), Espiritual(1PM — alvo perde PM em vez de PV), Investida(1PM — move até o alvo), Múltiplo(1PM/alvo), Penetrante(2PM — Perda na defesa), Perigoso(1PM — crítico com 5/6), Poderoso(2PM — soma P extra no crítico), Potente(1PM/P+2), Preciso(1PM — ataca com H), Titânico(3PM — crítico automático)."},
"Base":{c:"1",d:"Você tem uma base de operações, esconderijo ou porto seguro. Através de teleporte ou outro meio, pode alcançar sua base em qualquer situação fora de combate (leva até P+H aliados). Viagem de mão única. Sua base é ideal para descanso e todos os testes realizados ali têm Ganho."},
"Brutal":{c:"1",d:"Ao atacar inimigos, além de causar dano, você recupera suas próprias energias. Vida: recupera 1PV para cada 3 pontos de dano. Mana: recupera 1PM para cada 3 pontos de dano. Derrota: ao derrotar um oponente, recupera 3PV e 1PM. Pode comprar cada versão por 1pt, com efeitos acumuláveis."},
"Carismático":{c:"1",d:"Você tem facilidade para fazer com que gostem de você. Recebe P+2 em testes sociais. Bônus incluído em críticos. Também pode gastar 2PM para crítico com 5 ou 6 nesses testes. Incompatível com Antipático."},
"Clone":{c:"1",d:"Gaste 2PM por clone e um movimento para criar cópias exatas de si mesmo. Cada vez que sofre um ataque bem-sucedido, não sofre dano mas uma cópia desaparece. Clones duram até o fim da cena. Um atacante com Sentido adequado pode fazer teste de Percepção (9 + seu Poder) para ignorar os clones."},
"Confusão":{c:"1",d:"Faça um ataque e gaste 2PM. Se vencer a defesa, o alvo fica confuso: não consegue escolher alvos de suas perícias ou vantagens (o mestre escolhe ao acaso). Dura até o fim da cena ou o alvo sofrer dano. A cada turno o alvo pode fazer teste de R (9 + seu Poder) para cancelar."},
"Cura":{c:"1",d:"Gaste 2PM para curar 1D PV em você ou alguém que possa tocar (limite de dados = Habilidade). Também pode gastar 2PM para que um personagem repita teste de R contra efeito negativo duradouro após ter falhado."},
"Defesa Especial":{c:"1",d:"Ao receber ataque, gaste PM para efeitos: Blindada(1PM — crítico com 5/6), Bloqueio(1PM — defende com P), Esquiva(1PM — defende com H), Proteção(1PM — usa sua defesa por aliado Perto), Provocação(1PM — recebe ataque destinado a aliado), Reflexão(1PM — devolve dano se defesa > ataque), Robusta(2PM — soma R extra no crítico), Tenaz(1PM/+2R), Titânica(3PM — crítico automático e defesa perfeita)."},
"Desgaste":{c:"1",d:"Faça um ataque e gaste 2PM. Se vencer a defesa e causar dano, o alvo sofre o mesmo dano outra vez na próxima rodada. O dano extra pode ser evitado se o alvo gasta sua próxima ação para isso (apagando chamas, tomando antídoto, etc.)."},
"Devoto":{c:"1",d:"Ao fazer teste seguindo ou defendendo sua devoção, gaste 2PM para Ganho. Pode recorrer à devoção até duas vezes por cena."},
"Elo Mental":{c:"1",d:"Ligação especial com outro personagem (que também deve ter esta vantagem). Vocês compartilham pensamentos quando se veem, podem usar PM um do outro em perigos, e podem passar Ganho entre si. Quando separados, sentem emoções gerais e sabem direção/distância do outro."},
"Estender":{c:"1",d:"Ao usar uma vantagem pessoal (que afeta apenas você), pode gastar 1PM por turno para que ela também funcione com um aliado Perto. Vantagens que atacam ou prejudicam outros não podem ser afetadas."},
"Famoso":{c:"1",d:"Você é conhecido ao redor do mundo. Quando faz testes sociais com NPCs que o reconhecem (1-4 em 1D), pode gastar 3PM para Ganho. Incompatível com Infame."},
"Foco":{c:"1",d:"Gaste 2PM e um turno inteiro se concentrando (Perda na defesa durante esse tempo; se sofrer dano, perde a concentração). No turno seguinte, seu próximo teste recebe crítico automático (atributo somado outra vez)."},
"Forte":{c:"1",d:"Você é muito forte. Recebe P+2 em testes de esforço físico (levantar peso, derrubar porta, socar vilão). Bônus incluído em críticos. Também pode gastar 2PM para crítico com 5 ou 6 nesses testes. Incompatível com Fracote."},
"Gênio":{c:"1",d:"Você tem um cérebro notável. Recebe H+2 em testes envolvendo conhecimento, inteligência e raciocínio. Bônus incluído em críticos. Também pode gastar 2PM para crítico com 5 ou 6 nesses testes. Incompatível com Tapado."},
"Golpe Final":{c:"1",d:"Gaste 3PM e faça um ataque contra um alvo perto da derrota. Esse ataque é elevado uma escala acima."},
"Grimório":{c:"1+",d:"Você tem uma fonte de conhecimentos (grimório, pergaminho, manual, aplicativo...) com técnicas especiais. Cada ponto de Grimório vale 10XP para adquirir truques ou técnicas comuns (não lendárias). As técnicas precisam de aprovação do mestre."},
"Ilusão":{c:"2",d:"Você cria ilusões tridimensionais sem massa ou substância. Custo por tamanho: 1PM (livro ou menor), 3PM (pessoa ou menor), 5PM (caminhão), 8PM (prédio). Ilusões ficam imóveis após criadas; mover uma usa um movimento por rodada. PM gastos na ilusão não podem ser recuperados até dissipá-la."},
"Imitar":{c:"1",d:"Quando alguém usa uma vantagem em sua presença (Longe ou menos), faça teste de Percepção (9): com sucesso, gaste 3PM para adquirir a mesma vantagem até o fim da cena. Apenas uma vantagem imitada por vez."},
"Imortal":{c:"1",d:"Em testes de morte, você nunca tem resultado pior que inconsciente."},
"Improviso":{c:"2",d:"Gaste 3PM para aprender temporariamente uma perícia que não possua, até o fim da cena. Você pode manter apenas uma perícia improvisada por vez."},
"Imune":{c:"1",d:"Você é imune a algo que normalmente afeta outras criaturas. Opções: Abiótico (sem necessidades biológicas básicas), Anfíbio (respira/move normalmente embaixo d'água), Doenças (imune a doenças naturais ou mágicas), Resiliente (não se cansa por esforço intenso; qualquer lugar de descanso é ideal), Sem Mente (imune a magias e efeitos que afetam a mente)."},
"Incorpóreo":{c:"2",d:"Ao gastar uma ação e 5PM, você se torna intangível como um fantasma até o fim da cena. Pode atravessar barreiras físicas e é imune a dano por combate violento — exceto Magia ou ataques de outros Incorpóreos. Da mesma forma, não pode interagir fisicamente com objetos materiais nem causar dano, exceto com Magia. Pode encerrar o efeito quando quiser."},
"Inimigo":{c:"1-2",d:"Você é treinado em enfrentar certo tipo de criatura. Em todos os testes contra criaturas do tipo escolhido, você consegue crítico com 5 ou 6. Opções (1pt cada): Humanoides, Construtos, Espíritos, Monstros. Humanos custa 2pt. Pode também escolher um único arquétipo ou personagem (com Ganho adicional)."},
"Inofensivo":{c:"1",d:"Você não parece perigoso. Em combate, por surpreender o oponente, você ganha uma ação extra antes do primeiro turno (não funciona com quem já viu você lutar; não funciona duas vezes com a mesma pessoa). Mesmo contra esses, tem Ganho em iniciativa. Também pode gastar 3PM para Ganho em testes para enganar alguém ou passar despercebido. Incompatível com Monstruoso."},
"Instrutor":{c:"1",d:"Usando uma ação e 2PM, você permite a um aliado fazer um teste como se tivesse uma perícia que você tem. Se o aliado já tem a perícia, pode usar uma vantagem sua que a afete (como Maestria ou Mentor). Outros custos de PM são pagos pelo aliado. O teste deve ser feito até o próximo turno do aliado."},
"Inventário":{c:"1-3",d:"Você carrega itens consumíveis. 1pt (Pequeno): 3 comuns e 1 incomum. 2pt (Grande): 5 comuns e 2 incomuns. 3pt (Supremo): 5 comuns, 4 incomuns e 1 raro. Pode trocar 3 itens de nível inferior por 1 superior. Recarregado no início de cada aventura."},
"Invisível":{c:"1-2",d:"Gaste uma ação e 3PM para ficar invisível. Invisível: Ganho para se esconder; ataques contra você têm Perda. 1pt: invisibilidade interrompida quando você ataca ou sofre dano. 2pt: interrompida apenas ao sofrer dano."},
"Irresistível":{c:"1",d:"Quando um alvo faz teste para evitar ser afetado por uma de suas vantagens (Anulação, Confusão, Ilusão, Paralisia, Punição, etc.), você pode gastar 2PM ou mais. Para cada 2PM gastos, a meta do teste para resistir aumenta +3. Deve anunciar antes do teste."},
"Maestria":{c:"1",d:"Escolha uma perícia que você tem. Em testes dessa perícia, gaste 1PM para crítico com 5 ou 6. Pode comprar várias vezes para outras perícias."},
"Magia":{c:"2",d:"Você faz mágica. Gastando 1PM, some +1 em qualquer teste (máximo = Habilidade). Pode usar Mística em vez de Luta ao atacar ou defender. Pode gastar PM e uma ação para conceder bônus a um aliado ao alcance. Efeitos mágicos menores (iluminar sala, limpar mesa, aquecer comida) não custam PM."},
"Mentor":{c:"1",d:"Escolha uma perícia que você tem. Uma vez por cena, lembre de um ensinamento e tenha Ganho em um teste dessa perícia. Além disso, técnicas com essa perícia como pré-requisito gastam -1PM (mínimo 1PM). Pode comprar várias vezes para outras perícias."},
"Obstinado":{c:"1",d:"Você pode gastar 1 ponto de P, H ou R (à sua escolha) como se fosse 1 Ponto de Ação. Quando um atributo é reduzido, o limite máximo do recurso correspondente também diminui. Pontos de atributo se recuperam apenas com descanso (8h = +1 em cada atributo)."},
"Paralisia":{c:"1",d:"Faça um ataque e gaste 2PM. Se vencer a defesa, o alvo fica imobilizado (indefeso) em vez de sofrer dano. Dura até o fim da cena ou o alvo sofrer dano. A cada turno o alvo pode fazer teste de R (6 + seu Poder) para cancelar."},
"Patrono":{c:"1",d:"Você serve a uma pessoa, organização ou instituição com mais recursos que você. Quando faz teste de compra para algo que ajude na missão para o Patrono, gaste 1PM para Ganho. Também recebe um item consumível extra de cada raridade já disponível em seu Inventário."},
"Punição":{c:"1-2",d:"Ao comprar, escolha uma desvantagem de mesmo valor. Faça um ataque e gaste 2PM. Se vencer a defesa, o alvo sofre os efeitos da desvantagem escolhida em vez de dano. Dura até o fim da cena ou o alvo sofrer dano. A cada turno o alvo pode fazer teste de R (6 + seu Poder) para cancelar. Pode comprar várias vezes para outras desvantagens."},
"Regeneração":{c:"1-2",d:"1pt: recupera 1PV no início do seu turno. 2pt: recupera 3PV no início do seu turno. Em testes de morte, nunca tem resultado pior que inconsciente."},
"Resoluto":{c:"1",d:"Você tem determinação inabalável. Recebe R+2 em testes de força de vontade (perceber fraudes, resistir a encantos, testes de morte). Bônus incluído em críticos. Também pode gastar 2PM para crítico com 5 ou 6 nesses testes. Incompatível com Indeciso."},
"Riqueza":{c:"2+",d:"Você tem recursos financeiros de escala superior. Ao fazer testes de compra: 2pt (2PM): sobe uma escala. 4pt (4PM): sobe até duas escalas. 6pt (6PM): sobe até três escalas. PM gastos nesta vantagem não podem ser recuperados até o fim da cena. Incompatível com Pobreza."},
"Sentido":{c:"1",d:"Você tem um sentido melhor ou diferente. Opções: Aguçado (escolha um sentido — Ganho em Percepção com ele), Infravisão (percebe seres de sangue quente e enxerga no escuro), Intuição (percebe intenções ocultas, mentiras, segredos, intenção de ataque), Radar (percebe tudo em volta mesmo de costas ou no escuro; também capta rádio/tv/wi-fi), Raio X (vê através de portas e paredes, exceto metal ou mágico). Cada compra pode escolher algo diferente."},
"Telepata":{c:"1",d:"Gaste um movimento e 1PM para: ter Ganho em teste de perícia social com personagem na cena, ou fazer teste de H(9) para descobrir atributo/vantagem/desvantagem de personagem na cena, ou prever movimentos de adversário (Ganho em defesa contra ele até próxima rodada). Só funciona em criaturas vivas que possa ver."},
"Teleporte":{c:"1",d:"Gaste movimentos como PM (1PM por movimento) para se deslocar a qualquer lugar visível, ignorando terreno difícil. Também pode gastar 3PM para Ganho de defesa contra um ataque."},
"Torcida":{c:"1",d:"Quando uma torcida está presente, você tem um Ganho por rodada em qualquer teste. Role 1D no início da cena: com resultado 1, existe alguma torcida favorável a você. Um aliado pode substituir a torcida usando uma ação para motivá-lo."},
"Transformação":{c:"1-2",d:"Você pode mudar de forma e poderes. Faça outro personagem com o mesmo número de pontos. 1pt: todas as formas sofrem os efeitos de todas as desvantagens combinadas. 2pt: cada forma sofre apenas suas próprias desvantagens. Mudar de forma exige uma ação e restaura PM/PV ajustados à nova forma. Pode se transformar uma vez por sessão; +1PA por transformação extra."},
"Vigoroso":{c:"1",d:"Você é robusto como um cavalo. Recebe R+2 em testes de saúde física (resistir a fadiga, doenças, venenos, testes de morte). Bônus incluído em críticos. Também pode gastar 2PM para crítico com 5 ou 6 nesses testes. Incompatível com Frágil."},
"Voo":{c:"1",d:"Você pode voar. Em combate, levantar voo do chão usa um movimento e 2PM. Voando, você ignora terrenos difíceis e apenas personagens que também voem podem usar movimentos para alcançá-lo. Não precisa gastar mais PM para se manter no ar."}
};

window.DESVANTAGENS = {
"Ambiente":{c:"-1",d:"Você é mais acostumado a certo ambiente (água, clima muito quente, shopping, fliperama, etc.) que não existe em abundância no local da campanha. No início de cada cena, role 1D. Com resultado 1, nada relacionado ao seu ambiente existe ali e você tem Perda em todos os testes. O mestre pode dispensar a rolagem em situações especiais."},
"Amnésia":{c:"-2",d:"Você não sabe quem é. O mestre faz sua ficha em segredo. Você pode tentar fazer coisas, e o mestre diz se conseguiu ou não — sem jamais revelar se você tem a perícia ou vantagem. O mestre pode rolar seus testes secretamente, apenas anunciando os resultados. Suas vantagens só funcionam em situações de risco real, e as desvantagens aparecem no pior momento possível."},
"Antipático":{c:"-1",d:"Você não consegue (ou não quer) se expressar bem. Timidez, deselegância, orgulho, rabugice, aura sinistra — ou você é apenas um baita chato! Quando faz um teste de Poder envolvendo interação social, você tem Perda e nunca tem acertos críticos. Incompatível com Carismático."},
"Assombrado":{c:"-1 ou -2",d:"Você é assombrado por um espírito, sentimento ruim ou lembrança amarga. Escolha a intensidade: (-1pt) Ao entrar em situação de risco, role 1D — com resultado 1, todos os testes têm Perda até o fim da cena. (-2pt) A assombração aparece com qualquer resultado ímpar."},
"Atrapalhado":{c:"-1",d:"Você se atrapalha com facilidade. Quando faz um teste de Habilidade envolvendo coordenação e agilidade, você tem Perda e nunca tem acertos críticos. Incompatível com Ágil."},
"Aura":{c:"-1 ou -2",d:"Você emana uma aura de energia negativa, estática, karma ruim ou pura uruca. Qualquer um pode senti-la. (-1pt) Qualquer teste de outras pessoas realizado Perto de você tem Perda. (-2pt) Qualquer teste Longe de você ou menos tem Perda."},
"Bateria":{c:"-1",d:"Você tem uma reserva de energia para permanecer ativo. Sempre que ficar com 0PM, você 'desliga' — fica inconsciente e indefeso. Além disso, quando está com PM abaixo de sua Habilidade, sua bateria está fraca e todos os seus testes têm Perda."},
"Código":{c:"-1",d:"Você segue um código de conduta que o impede de fazer (ou deixar de fazer) alguma coisa. Sempre que violar seu código, a culpa o deixará com Perda em todos os testes até que consiga se redimir. Você pode ter mais de um Código."},
"Dependência":{c:"-2",d:"O personagem depende de algo raro, proibido ou desumano para viver (sangue, cérebros, substância ilícita...). A Dependência deve ser satisfeita todos os dias. Se não o fizer, o personagem tem Perda em todos os testes até satisfazê-la."},
"Diferente":{c:"-1",d:"Seu corpo é muito diferente de um humanoide comum. Você tem Perda ao usar itens feitos para outros. O inverso também é válido. O mestre pode conceder Ganho em situações onde sua diferença é vantajosa (ex: goblin pequeno em furtividade)."},
"Elo Vital":{c:"-1",d:"Escolha um aliado, que também deve ter esta desvantagem. Sempre que um de vocês sofre dano, o outro também perde PV na mesma quantidade. Se os personagens pertencem a escalas diferentes, o dano é ajustado proporcionalmente. Curar um não cura o outro."},
"Fracote":{c:"-1",d:"Você é fraco — falta ódio... e força. Ao fazer um teste de Poder envolvendo esforço físico (mover pedra, derrubar porta), você tem Perda e nunca tem acertos críticos. Incompatível com Forte."},
"Frágil":{c:"-1",d:"Você tem pouco vigor físico. Ao fazer um teste de Resistência envolvendo saúde física (resistir doenças, venenos, testes de morte), você tem Perda e nunca tem acertos críticos. Incompatível com Vigoroso."},
"Fraqueza":{c:"-1 ou -2",d:"Existe um objeto, elemento ou condição à qual você é especialmente vulnerável. Enquanto Perto dessa coisa, todos os seus testes têm Perda. (-1pt) Incomum: aparece raramente (1 em 1D). (-2pt) Comum: aparece com frequência (1-3 em 1D)."},
"Fúria":{c:"-2",d:"Sempre que você sofre dano ou fica irritado, deve fazer um teste de Resistência (9 ou igual ao dano, o maior). Se falhar, entra em frenesi e ataca o alvo mais próximo. Durante a Fúria: Perda em testes que não sejam de ataque (inclusive defesa), e vantagens gastam o dobro de PM. Termina quando alguém é derrotado ou foge; você fica esgotado (PM=0, Perda até descansar)."},
"Inapto":{c:"-1",d:"Escolha uma perícia que não possua. Você é um completo incompetente quando se trata dela. Sempre que o mestre pede um teste com essa perícia, você está em Perda. Além disso, qualquer falha é considerada falha crítica."},
"Inculto":{c:"-1",d:"Você não tem familiaridade com a cultura local. Não sabe ler a língua local (ou acha muito difícil). Tem dificuldade para se comunicar, exceto com seus aliados. Testes sociais com personagens que não o entendem têm Perda."},
"Indeciso":{c:"-1",d:"Você tem pouca convicção e muita dificuldade para tomar decisões importantes. Em testes de Resistência envolvendo força de vontade, você tem Perda e nunca tem acertos críticos. Incompatível com Resoluto."},
"Infame":{c:"-1",d:"Você é muito conhecido, mas não por uma boa razão. Quando faz testes sociais com um NPC que o reconhece (normalmente 1-4 em 1D), você está sempre em Perda. Incompatível com Famoso."},
"Lento":{c:"-1",d:"Você se move devagar. Em testes de iniciativa, está sempre em Perda. Também gasta um movimento a mais para cruzar cada distância. Incompatível com Aceleração."},
"Maldição":{c:"-1 ou -2",d:"Você é vítima de uma maldição que o perturba quase o tempo inteiro. (-1pt) Suave/constrangedora: pode causar Perda em situações específicas. (-2pt) Grave: efeito mecânico severo e constante (ex: receber o mesmo dano que causa, falhas críticas em um atributo, nunca curar PV exceto com descanso)."},
"Monstruoso":{c:"-1",d:"Você tem uma aparência grotesca que causa repulsa. Exceto quando pega alguém de surpresa, você sempre tem Perda em testes de iniciativa. Você também tem Perda em testes sociais que envolvem aparência. Incompatível com Inofensivo."},
"Munição":{c:"-1",d:"Sua arma ou técnica exige recarga após cada uso. Sempre que você usa uma ação para atacar, precisa usar um movimento para recarregar. Se atacar sem recarregar, não soma Poder ao teste de ataque nem em críticos."},
"Pacifista":{c:"-1 ou -2",d:"Você rejeita conflito e violência. (-1pt) Pode se defender quando atacado, mas não faz testes de ataque. (-2pt) Não faz absolutamente nada que cause dano — até ferir com palavras é violento demais! Se violar, tem Perda até se redimir."},
"Pobreza":{c:"-1",d:"Você não tem recursos financeiros e não consegue acumulá-los de nenhuma maneira. Todos os seus testes de compra são feitos em Perda. Incompatível com Riqueza."},
"Ponto Fraco":{c:"-1",d:"Você tem uma característica que seu adversário pode explorar (desequilíbrio na postura, tique nervoso, falha de raciocínio...). Pode ser descoberto por quem já viu você em ação, por Telepatia, ou por teste resistido de Percepção. Qualquer adversário que conhece seu Ponto Fraco pode gastar 1PM para ter Ganho contra você em um teste que explora esse problema."},
"Protegido":{c:"-1",d:"Existe alguém que você precisa proteger com a própria vida. Sempre que o Protegido está desaparecido, indefeso ou ferido (qualquer PV abaixo do total), todos os seus testes têm Perda. Vilões podem e vão usá-lo como chantagem. Se o Protegido morre para sempre, você adquire Assombrado -2pt."},
"Restrição":{c:"-1 ou -2",d:"Certa condição torna mais difícil usar seus poderes. Quando ela acontece, você sempre gasta o dobro de PM para usar suas vantagens. (-1pt) Incomum: acontece raramente. (-2pt) Comum: acontece com muita frequência. Só pode ter esta desvantagem se tiver vantagens que gastam PM."},
"Sem Vida":{c:"-2",d:"Você não é um ser vivo (construto, morto-vivo, brinquedo animado...). Em testes de morte, nunca tem resultado pior que inconsciente. Porém, não recupera PV de formas normais (descanso, itens, Cura, Regeneração). Pode ser consertado/restaurado com Máquinas ou Mística (1h de trabalho, teste 9). Ainda precisa descansar para recuperar PA e PM."},
"Tapado":{c:"-1",d:"Você não é uma pessoa muito brilhante. Quando faz testes de Habilidade relacionados a inteligência e raciocínio, você tem Perda e nunca tem acertos críticos. Incompatível com Gênio."},
"Transtorno":{c:"-1",d:"Você lida com um transtorno mental. Escolha um entre: Cleptomania, Compulsão, Distração, Fantasia, Fobia, Megalomania, Mitomania ou Paranoia. Superação de transtornos exige teste de Resistência (9)."},
"Utensílio":{c:"-1 ou -2",d:"Você precisa de um item específico para usar adequadamente uma perícia ou vantagens. (-1pt) Sem o Utensílio, não consegue acertos críticos na perícia escolhida. (-2pt) Sem o Utensílio, não pode usar vantagens/técnicas com PM nem PA (exceto para recuperar o item). Se rolar falha crítica usando o Utensílio, o deixa cair e precisa de um movimento para recuperá-lo."}
};
