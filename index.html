const Icon = ({n,s='16'}) => {
  const ref = useRef(null);
  useLayoutEffect(() => {
    if(ref.current && window.lucide) {
      ref.current.innerHTML = `<i data-lucide="${n}" style="width:${s}px;height:${s}px"></i>`;
      window.lucide.createIcons({root:ref.current});
    }
  });
  return <span ref={ref} style={{display:'inline-flex',alignItems:'center',justifyContent:'center'}} />;
};

const Btn = ({onClick,children,style={},className=''}) => (
  <button onClick={onClick} className={'cbtn '+className} style={style}>{children}</button>
);

const Stepper = ({value,onChange,min=0}) => (
  <div style={{display:'flex',alignItems:'center',gap:4}}>
    <Btn onClick={()=>onChange(Math.max(min,value-1))} style={{padding:'2px 8px',fontSize:14}}>−</Btn>
    <input type="number" value={value} onChange={e=>onChange(Math.max(min,parseInt(e.target.value)||0))}
      style={{width:50,textAlign:'center',fontSize:20,fontWeight:900}} />
    <Btn onClick={()=>onChange(value+1)} style={{padding:'2px 8px',fontSize:14}}>+</Btn>
  </div>
);

const Bar = ({label,current,max,color,icon,onChange}) => {
  const pct = max > 0 ? Math.min(100,(current/max)*100) : 0;
  const bg = color==='red' ? 'linear-gradient(90deg,#ff1744,#ff5252)' : 'linear-gradient(90deg,#00b8d4,#00e5ff)';

  const c = color==='red' ? '#ff5252' : '#00e5ff';
  return (
    <div style={{marginBottom:8}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
        <span style={{color:c,fontFamily:'Orbitron',fontSize:11,display:'flex',alignItems:'center',gap:4}}>

  return (
    <div className="panel" style={{padding:16,borderColor}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,borderBottom:'1px solid rgba(0,229,255,0.15)',paddingBottom:8}}>

            </div>
          ) : <span style={{fontSize:10,color:'rgba(0,229,255,0.25)'}}>Indisponível</span>}

          <div key={item.id} style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.1)',borderRadius:4,padding:6,position:'relative'}}>

// ── MODAL DE DADOS ────────────────────────────────────────────────
const DiceModal = ({onClose,attrs,onRollBroadcast}) => {
  const [attr,setAttr] = useState('poder');
  const [skill,setSkill] = useState(false);
  const [gain,setGain] = useState(0);
  const [loss,setLoss] = useState(0);
  const [crit,setCrit] = useState(6);
  const [mod,setMod] = useState(0);
  const [roll,setRoll] = useState(null);
  const [rolling,setRolling] = useState(false);
  const [hist,setHist] = useState([]);
  const dice = Math.max(1,Math.min(3,1+(skill?1:0)+gain-loss));
  const doRoll = () => {
    if(rolling) return;
    setRolling(true);
    setTimeout(()=>{
      const res = Array.from({length:dice},()=>Math.floor(Math.random()*6)+1);
      const av = attrs[attr]||0;
      const crits = res.filter(r=>r>=crit).length;
      const fail = res.every(r=>r===1);
      const total = res.reduce((a,b)=>a+b,0)+av+(crits*av)+mod;
      const nr = {id:Date.now(),attr,dice,res,total,av,crits,fail,mod,crit};
      setRoll(nr); setHist(p=>[nr,...p].slice(0,8)); setRolling(false);
      if(onRollBroadcast) onRollBroadcast(nr);
    },500);
  };
  const colors = {poder:'#ff1744',habilidade:'#00e5ff',resistencia:'#00e676'};
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,5,15,0.92)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
      <div className="panel" style={{width:'100%',maxWidth:480,maxHeight:'90vh',overflowY:'auto',padding:20}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <span style={{fontFamily:'Orbitron',color:'#00e5ff',fontSize:14}}>TESTE 3DeT</span>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#ff1744',fontSize:20,cursor:'pointer'}}>×</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:16}}>
          {['poder','habilidade','resistencia'].map(a=>(
            <button key={a} onClick={()=>setAttr(a)} style={{
              background:attr===a?`${colors[a]}22`:'rgba(0,0,0,0.4)',
              border:`1px solid ${attr===a?colors[a]:'rgba(0,229,255,0.2)'}`,
              color:attr===a?colors[a]:'rgba(0,229,255,0.5)',
              borderRadius:6,padding:'10px 4px',cursor:'pointer',
              fontFamily:'Orbitron',fontSize:9,textTransform:'uppercase',letterSpacing:0.5
            }}>
              <div style={{fontSize:11,marginBottom:2}}>{a.slice(0,3).toUpperCase()}</div>
              <div style={{fontSize:16,fontWeight:900}}>{attrs[a]}</div>
            </button>
          ))}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
          <button onClick={()=>setSkill(!skill)} style={{
            background:skill?'rgba(0,229,255,0.12)':'rgba(0,0,0,0.4)',
            border:`1px solid ${skill?'#00e5ff':'rgba(0,229,255,0.2)'}`,
            color:skill?'#00e5ff':'rgba(0,229,255,0.4)',
            borderRadius:6,padding:8,cursor:'pointer',fontFamily:'Orbitron',fontSize:9
          }}>{skill?'COM PERÍCIA':'SEM PERÍCIA'}</button>
          <div style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.2)',borderRadius:6,padding:8,textAlign:'center'}}>
            <div style={{fontFamily:'Orbitron',fontSize:9,color:'rgba(0,229,255,0.4)',marginBottom:4}}>DADOS</div>
            <span style={{fontFamily:'Orbitron',fontSize:18,color:'#00e5ff',fontWeight:900}}>{dice}D</span>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:12}}>
          {[['Ganhos',gain,setGain,'#00e676'],['Perdas',loss,setLoss,'#ff1744'],['Mod',mod,setMod,'#00e5ff']].map(([label,val,setter,c])=>(
            <div key={label} style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.15)',borderRadius:6,padding:8,textAlign:'center'}}>
              <div style={{fontSize:9,color:'rgba(0,229,255,0.4)',marginBottom:4,fontFamily:'Orbitron'}}>{label.toUpperCase()}</div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                <button onClick={()=>setter(label==='Mod'?val-1:Math.max(0,val-1))} style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.2)',color:'#fff',borderRadius:3,width:20,height:20,cursor:'pointer',fontSize:12}}>−</button>
                <span style={{fontFamily:'Orbitron',color:c,fontWeight:900,minWidth:20,textAlign:'center'}}>{val>0?'+'+val:val}</span>
                <button onClick={()=>setter(val+1)} style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.2)',color:'#fff',borderRadius:3,width:20,height:20,cursor:'pointer',fontSize:12}}>+</button>
              </div>
            </div>
          ))}
        </div>
        <label style={{display:'flex',alignItems:'center',gap:6,marginBottom:12,fontSize:11,color:'rgba(0,229,255,0.5)'}}>
          <input type="checkbox" checked={crit===5} onChange={()=>setCrit(crit===6?5:6)} />
          Crítico também com 5 (Maestria)
        </label>
        <button onClick={doRoll} disabled={rolling} style={{
          width:'100%',padding:14,background:'rgba(0,229,255,0.1)',border:'1px solid #00e5ff',
          color:'#00e5ff',fontFamily:'Orbitron',fontSize:12,letterSpacing:2,cursor:'pointer',
          borderRadius:6,marginBottom:12,textTransform:'uppercase'
        }}>{rolling?'ROLANDO...':(`ROLAR ${dice}D + ${attrs[attr]||0}`)}</button>
        <div style={{background:'rgba(0,0,0,0.6)',border:'1px solid rgba(0,229,255,0.15)',borderRadius:6,minHeight:100,padding:12,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
          {rolling && <div style={{width:32,height:32,border:'3px solid rgba(0,229,255,0.2)',borderTop:'3px solid #00e5ff',borderRadius:'50%',animation:'spin 0.6s linear infinite'}} />}
          {!rolling && roll && (
            <div style={{textAlign:'center',width:'100%'}}>
              {roll.fail && <div style={{background:'#ff1744',color:'#fff',fontSize:10,fontFamily:'Orbitron',padding:'2px 8px',borderRadius:3,marginBottom:8}}>FALHA CRÍTICA!</div>}
              <div style={{display:'flex',justifyContent:'center',gap:8,marginBottom:8}}>
                {roll.res.map((v,i)=>{
                  const isCrit=v>=roll.crit;
                  return <div key={i} style={{
                    width:44,height:44,display:'flex',alignItems:'center',justifyContent:'center',
                    borderRadius:8,border:'2px solid',fontSize:22,fontWeight:900,
                    background:isCrit?'rgba(255,214,0,0.2)':roll.fail?'rgba(255,23,68,0.2)':'rgba(0,229,255,0.08)',
                    borderColor:isCrit?'#ffd600':roll.fail?'#ff1744':'rgba(0,229,255,0.3)',
                    color:isCrit?'#ffd600':roll.fail?'#ff5252':'#00e5ff'
                  }}>{v}</div>;
                })}
              </div>
              {!roll.fail && <div style={{background:'rgba(0,229,255,0.1)',border:'1px solid rgba(0,229,255,0.3)',borderRadius:20,padding:'6px 20px',display:'inline-flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:10,color:'rgba(0,229,255,0.5)',fontFamily:'Orbitron'}}>RESULTADO</span>
                <span style={{fontSize:26,fontWeight:900,color:'#00e5ff',fontFamily:'Orbitron'}}>{roll.total}</span>
              </div>}
            </div>
          )}
          {!rolling && !roll && <p style={{color:'rgba(0,229,255,0.25)',fontSize:11}}>Configure e role os dados...</p>}
        </div>
        {hist.length>0 && (
          <div style={{marginTop:12}}>
            <div style={{fontFamily:'Orbitron',fontSize:9,color:'rgba(0,229,255,0.4)',marginBottom:6,textTransform:'uppercase'}}>Histórico</div>
            <div style={{display:'flex',flexDirection:'column',gap:4,maxHeight:100,overflowY:'auto'}}>
              {hist.map(h=>(
                <div key={h.id} style={{display:'flex',justifyContent:'space-between',fontSize:10,padding:'3px 6px',background:'rgba(0,0,0,0.3)',borderRadius:4}}>
                  <span style={{color:'rgba(0,229,255,0.5)',fontFamily:'Orbitron'}}>{h.attr.slice(0,3).toUpperCase()} ({h.dice}D)</span>
                  <span style={{color:'rgba(0,229,255,0.4)'}}>[{h.res.join(',')}]</span>
                  <span style={{color:h.fail?'#ff1744':'#00e5ff',fontWeight:700}}>{h.fail?'FALHA':'= '+h.total}</span>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

// ── MODAL DA SALA DE ROLAGENS ──────────────────────────────────────
const LobbyModal = ({onClose,char,onRollReceived}) => {
  const [mode,setMode] = useState(null); // null | 'host' | 'client'
  const [status,setStatus] = useState('idle'); // idle | connecting | connected
  const [lobbyId,setLobbyId] = useState('');
  const [joinId,setJoinId] = useState('');
  const [rolls,setRolls] = useState([]);
  const peerRef = useRef(null);
  const connsRef = useRef([]);
  const clientConnRef = useRef(null);

  const addRoll = (r) => setRolls(p=>[r,...p].slice(0,30));

  const startHost = () => {
    setStatus('connecting');
    const peer = new Peer();
    peer.on('open', id => { setLobbyId(id); setMode('host'); setStatus('connected'); });
    peer.on('connection', conn => {
      connsRef.current.push(conn);
      conn.on('data', data => {
        if(data.type==='ROLL') {
          addRoll(data.payload);
          connsRef.current.forEach(c=>{ if(c.peer!==conn.peer) c.send(data); });
        }
      });
      conn.on('close', ()=>{ connsRef.current = connsRef.current.filter(c=>c.peer!==conn.peer); });
    });
    peer.on('error', err=>{ alert('Erro P2P: '+err.type); setStatus('idle'); });
    peerRef.current = peer;
  };

  const joinLobby = () => {
    if(!joinId.trim()) return;
    setStatus('connecting');
    const peer = new Peer();
    peer.on('open', () => {
      const conn = peer.connect(joinId.trim());
      conn.on('open', ()=>{ setMode('client'); setLobbyId(joinId.trim()); setStatus('connected'); clientConnRef.current = conn; });
      conn.on('data', data=>{ if(data.type==='ROLL') addRoll(data.payload); });
      conn.on('close', ()=>{ alert('Conexão perdida.'); leaveLobby(); });
    });
    peer.on('error', err=>{ alert('Erro ao conectar: '+err.type); setStatus('idle'); });
    peerRef.current = peer;
  };

  const leaveLobby = () => {
    if(peerRef.current) peerRef.current.destroy();
    peerRef.current = null; connsRef.current = []; clientConnRef.current = null;
    setMode(null); setLobbyId(''); setStatus('idle'); setRolls([]);
  };

  // Expõe função para enviar rolagem para fora
  useEffect(() => {
    if(onRollReceived) onRollReceived({ send: broadcastRoll });
  }, [status, mode]);

  const broadcastRoll = (rollData) => {
    const payload = {
      id: Date.now()+Math.random(),
      playerName: char.nome || 'Jogador Anônimo',
      rollData,
      time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})
    };
    addRoll(payload);
    const msg = {type:'ROLL',payload};
    if(mode==='host') connsRef.current.forEach(c=>c.send(msg));
    else if(mode==='client' && clientConnRef.current) clientConnRef.current.send(msg);
  };

  const copyId = () => { navigator.clipboard.writeText(lobbyId); alert('ID copiado!'); };

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,5,15,0.92)',zIndex:200,display:'flex',alignItems:'flex-end',justifyContent:'flex-end',padding:16}} onClick={onClose}>
      <div className="panel" onClick={e=>e.stopPropagation()} style={{width:340,maxHeight:'85vh',display:'flex',flexDirection:'column',borderColor:'rgba(0,229,255,0.4)'}}>
        {/* Header */}
        <div style={{padding:'12px 16px',borderBottom:'1px solid rgba(0,229,255,0.2)',display:'flex',justifyContent:'space-between',alignItems:'center',background:'rgba(0,229,255,0.04)'}}>
          <span style={{fontFamily:'Orbitron',color:'#00e5ff',fontSize:13,display:'flex',alignItems:'center',gap:8}}>
            <Icon n="users" s="16"/> SALA DE ROLAGENS
          </span>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#ff1744',fontSize:18,cursor:'pointer'}}>×</button>
        </div>

        <div style={{flex:1,overflowY:'auto',padding:16}}>
          {/* IDLE */}
          {status==='idle' && (
            <div style={{display:'flex',flexDirection:'column',gap:16}}>
              <p style={{fontSize:12,color:'rgba(0,229,255,0.5)',lineHeight:1.5}}>Conecte-se com seus amigos para ver as rolagens em tempo real.</p>
              {/* Host */}
              <div style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.2)',borderRadius:8,padding:14}}>
                <div style={{fontFamily:'Orbitron',fontSize:11,color:'#ffd600',marginBottom:10,textTransform:'uppercase'}}>Sou o Mestre / Criar Sala</div>
                <button onClick={startHost} style={{width:'100%',padding:'10px',background:'rgba(99,102,241,0.15)',border:'1px solid #6366f1',color:'#a5b4fc',borderRadius:6,cursor:'pointer',fontFamily:'Orbitron',fontSize:10,letterSpacing:1,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                  <Icon n="crown" s="14"/> CRIAR NOVA SALA
                </button>
              </div>
              {/* Divider */}
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div style={{flex:1,height:1,background:'rgba(0,229,255,0.15)'}}/>
                <span style={{fontSize:10,color:'rgba(0,229,255,0.3)',fontFamily:'Orbitron'}}>OU</span>
                <div style={{flex:1,height:1,background:'rgba(0,229,255,0.15)'}}/>
              </div>
              {/* Client */}
              <div style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.2)',borderRadius:8,padding:14}}>
                <div style={{fontFamily:'Orbitron',fontSize:11,color:'#00e676',marginBottom:10,textTransform:'uppercase'}}>Sou Jogador / Entrar</div>
                <input placeholder="Cole o ID da Sala aqui..." value={joinId} onChange={e=>setJoinId(e.target.value)}
                  style={{width:'100%',padding:'8px 10px',fontSize:12,marginBottom:8}} />
                <button onClick={joinLobby} style={{width:'100%',padding:'10px',background:'rgba(0,230,118,0.1)',border:'1px solid #00e676',color:'#00e676',borderRadius:6,cursor:'pointer',fontFamily:'Orbitron',fontSize:10,letterSpacing:1,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                  <Icon n="zap" s="14"/> CONECTAR NA SALA
                </button>
              </div>
            </div>
          )}

          {/* CONNECTING */}
          {status==='connecting' && (
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12,padding:40}}>
              <div style={{width:36,height:36,border:'3px solid rgba(0,229,255,0.2)',borderTop:'3px solid #00e5ff',borderRadius:'50%',animation:'spin 1s linear infinite'}}/>
              <span style={{fontFamily:'Orbitron',fontSize:11,color:'rgba(0,229,255,0.5)'}}>CONECTANDO...</span>
            </div>
          )}

          {/* CONNECTED */}
          {status==='connected' && (
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              {/* Status bar */}
              <div style={{background:'rgba(0,230,118,0.08)',border:'1px solid rgba(0,230,118,0.3)',borderRadius:8,padding:10}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                  <span style={{fontFamily:'Orbitron',fontSize:10,color:'#00e676',display:'flex',alignItems:'center',gap:6}}>
                    <span style={{width:7,height:7,borderRadius:'50%',background:'#00e676',display:'inline-block',animation:'pulse 1.5s infinite'}}/>
                    {mode==='host'?'HOST DA SALA':'CONECTADO'}
                  </span>
                  <button onClick={leaveLobby} style={{background:'none',border:'none',color:'#ff5252',fontSize:11,cursor:'pointer',fontFamily:'Orbitron'}}>SAIR</button>
                </div>
                <div style={{background:'rgba(0,0,0,0.5)',border:'1px solid rgba(0,229,255,0.15)',borderRadius:4,padding:'6px 10px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontFamily:'Share Tech Mono',fontSize:11,color:'rgba(0,229,255,0.8)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:200}}>{lobbyId}</span>
                  <button onClick={copyId} style={{background:'rgba(0,229,255,0.1)',border:'1px solid rgba(0,229,255,0.2)',color:'#00e5ff',borderRadius:4,padding:'3px 6px',cursor:'pointer',fontSize:10,display:'flex',alignItems:'center',gap:4}}>
                    <Icon n="copy" s="12"/>
                  </button>
                </div>
                {mode==='host' && <p style={{fontSize:10,color:'rgba(0,229,255,0.35)',marginTop:6,fontFamily:'Share Tech Mono'}}>Envie o ID para seus jogadores</p>}
              </div>

              {/* Log de rolagens */}
              <div style={{fontFamily:'Orbitron',fontSize:9,color:'rgba(0,229,255,0.4)',textTransform:'uppercase',letterSpacing:1}}>Log de Rolagens</div>
              <div style={{display:'flex',flexDirection:'column',gap:8,maxHeight:300,overflowY:'auto'}}>
                {rolls.length===0 && <p style={{fontSize:11,color:'rgba(0,229,255,0.2)',textAlign:'center',padding:16,fontStyle:'italic'}}>Faça uma rolagem para que apareça aqui.</p>}
                {rolls.map(r=>(
                  <div key={r.id} style={{background:'rgba(0,0,0,0.5)',border:'1px solid rgba(0,229,255,0.15)',borderRadius:6,padding:'8px 10px'}}>

                      <span style={{fontFamily:'Orbitron',fontSize:10,color:'#a5b4fc'}}>{r.playerName}</span>
                      <span style={{fontSize:9,color:'rgba(0,229,255,0.3)',fontFamily:'Share Tech Mono'}}>{r.time}</span>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      <span style={{fontFamily:'Orbitron',fontSize:22,fontWeight:900,color:r.rollData.fail?'#ff1744':'#00e5ff'}}>
                        {r.rollData.fail?'FALHA':r.rollData.total}
                      </span>
                      <div>
                        <div style={{fontSize:9,color:'rgba(0,229,255,0.4)',textTransform:'uppercase',marginBottom:3}}>{r.rollData.attr} ({r.rollData.dice}D)</div>
                        <div style={{display:'flex',gap:3}}>
                          {r.rollData.res.map((v,i)=>(
                            <span key={i} style={{width:18,height:18,display:'flex',alignItems:'center',justifyContent:'center',borderRadius:3,border:'1px solid',fontSize:9,fontWeight:700,
                              background:v>=r.rollData.crit?'rgba(255,214,0,0.2)':'rgba(0,229,255,0.08)',
                              borderColor:v>=r.rollData.crit?'#ffd600':'rgba(0,229,255,0.2)',
                              color:v>=r.rollData.crit?'#ffd600':'#00e5ff'
                            }}>{v}</span>
                          ))}
                        </div>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

  const [kitIn,setKitIn] = useState('');
  const [syncing,setSyncing] = useState(false);
  const [importing,setImporting] = useState(false);

  useEffect(()=>{
    const s = localStorage.getItem('3det_v2');
    if(s) try{setSheets(JSON.parse(s))}catch(e){}
  },[]);

  // ── FIREBASE: Sincronizar (Jogador → Nuvem) ──────────────────────
  const syncToCloud = async () => {
    setSyncing(true);
    try {
      let syncId = char.syncId;
      if(!syncId) {
        syncId = Math.random().toString(36).substring(2,7).toUpperCase();
      }
      const data = {...char, syncId};
      await fetch(`${FIREBASE_URL}/fichas/${syncId}.json`, {
        method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)
      });
      setChar(data);
      navigator.clipboard.writeText(syncId).catch(()=>{});
      alert(`☁️ Ficha salva na nuvem!\n\nSeu código de sincronização é: ${syncId}\n\nO código já foi copiado. Envie para o Mestre!`);
    } catch(e) {
      alert('❌ Erro ao salvar na nuvem. Verifique sua conexão.');
    }
    setSyncing(false);
  };

  // ── FIREBASE: Baixar Ficha (Mestre ← Nuvem) ─────────────────────
  const importFromCloud = async () => {
    const code = prompt('Mestre, digite o código de 5 letras da ficha (ex: 8F2A1):');
    if(!code) return;
    setImporting(true);
    try {
      const res = await fetch(`${FIREBASE_URL}/fichas/${code.trim().toUpperCase()}.json`);
      const parsed = await res.json();
      if(parsed && parsed.id) {
        const safe = {
          ...EMPTY, ...parsed,
          pericias:parsed.pericias||[],
          vantagens:parsed.vantagens||[],
          desvantagens:parsed.desvantagens||[],
          kits:parsed.kits||[],
          tecnicas:parsed.tecnicas||[],
          atributos:{...EMPTY.atributos,...(parsed.atributos||{})},
          recursos:{...EMPTY.recursos,...(parsed.recursos||{})},
          inventario:{...EMPTY.inventario,...(parsed.inventario||{})},
          trocas:{...EMPTY.trocas,...(parsed.trocas||{})}
        };
        setSavedSheets(safe);
        alert(`☁️ Ficha de "${safe.nome||'Jogador'}" importada da nuvem!\n\nEla já está na sua Biblioteca.`);
      } else {
        alert('❌ Nenhuma ficha encontrada com esse código.');
      }
    } catch(e) {
      alert('❌ Erro ao buscar da nuvem.');
    }
    setImporting(false);
  };

  const setSavedSheets = (newChar) => {
    setSavedSheets2(prev=>{
      const filtered = prev.filter(s=>s.id!==newChar.id);
      const arr = [...filtered, newChar];
      localStorage.setItem('3det_v2', JSON.stringify(arr));
      return arr;
    });
  };
  // evita nome duplicado com o state setter
  const [_sheets, _setSheets] = useState([]);
  const setSavedSheets2 = (fn) => {
    setSheets(fn);
  };

  const pts = useMemo(()=>{
    const a = (char.atributos.poder||0)+(char.atributos.habilidade||0)+(char.atributos.resistencia||0);
    const v = char.vantagens.reduce((x,i)=>x+(parseInt(i.custo)||0),0);
    const d = char.desvantagens.reduce((x,i)=>x+(parseInt(i.custo)||0),0);
    const p = char.pericias.reduce((x,i)=>x+(parseInt(i.custo)||0),0);
    const n = (char.kits||[]).length; const k = n*(n+1)/2;
    return a+v+d+p+k+(parseInt(char.arquetipoCusto)||0);
  },[char.atributos,char.vantagens,char.desvantagens,char.pericias,char.kits,char.arquetipoCusto]);

  const save = () => {
    const ns = {...char,id:char.id||Date.now(),saved:new Date().toISOString()};
    try {
      const arr = [...sheets];
      const idx = arr.findIndex(s=>s.id===ns.id);
      if(idx>=0) arr[idx]=ns; else arr.push(ns);
      localStorage.setItem('3det_v2',JSON.stringify(arr));
      setSheets(arr); setChar(ns); alert('Ficha salva!');
    } catch(e){alert('Erro ao salvar. Tente remover a foto.');}
  };

  const addKit = () => {
    if(!kitIn.trim()) return;
    const name = kitIn.trim();
    const poderes = KITS[name]||[];
    const newV = [...char.vantagens,...poderes.map((p,i)=>({id:Date.now()+i+Math.random(),nome:p,detalhe:'(Kit: '+name+')',descricao:'',custo:'0'}))];
    setChar(c=>({...c,kits:[...(c.kits||[]),{id:Date.now(),nome:name}],vantagens:newV}));
    setKitIn('');
  };

  const addItem = list => setChar(c=>({...c,[list]:[...(c[list]||[]),{id:Date.now(),nome:'',detalhe:'',descricao:'',custo:list==='pericias'?'1':''}]}));
  const updItem = (list,id,f,v) => setChar(c=>{
    const nl = c[list].map(item=>{
      if(item.id!==id) return item;
      const u = {...item,[f]:v};
      if(f==='nome'){
        const info = list==='vantagens'?VANTAGENS[v]:list==='desvantagens'?DESVANTAGENS[v]:null;
        if(info){if(!u.custo||u.custo==='')u.custo=(info.c.match(/-?\d+/)||[''])[0]; u.descricao=info.d;}
        u.detalhe='';
      }
      return u;
    });
    return {...c,[list]:nl};
  });
  const remItem = (list,id) => setChar(c=>({...c,[list]:c[list].filter(i=>i.id!==id)}));
  const addInv = cat => setChar(c=>({...c,inventario:{...c.inventario,[cat]:[...c.inventario[cat],{id:Date.now(),nome:'',qtd:1,desc:''}]}}));
  const updInv = (cat,id,f,v) => setChar(c=>({...c,inventario:{...c.inventario,[cat]:c.inventario[cat].map(i=>i.id===id?{...i,[f]:v}:i)}}));
  const remInv = (cat,id) => setChar(c=>({...c,inventario:{...c.inventario,[cat]:c.inventario[cat].filter(i=>i.id!==id)}}));

  const maxPA = char.atributos.poder||1;
  const maxPM = char.atributos.habilidade===0?1:char.atributos.habilidade*5;
  const maxPV = char.atributos.resistencia===0?1:char.atributos.resistencia*5;

  const hasPatr = char.vantagens.some(v=>v.nome.toLowerCase().includes('patrono'));
  const getLimits = (lvl,tr) => {
    let l={comuns:2,incomuns:0,raros:0,lendarios:0};
    if(lvl>=1){l.comuns=3;l.incomuns=1;}
    if(lvl>=2){l.comuns=5;l.incomuns=2;}
    if(lvl>=3){l.incomuns=4;l.raros=1;l.lendarios=1;}
    if(hasPatr){if(l.comuns>0)l.comuns++;if(l.incomuns>0)l.incomuns++;if(l.raros>0)l.raros++;if(l.lendarios>0)l.lendarios++;}
    l.comuns-=tr.ci*3;l.incomuns+=tr.ci;l.incomuns-=tr.ir*3;l.raros+=tr.ir;l.raros-=tr.rl*3;l.lendarios+=tr.rl;
    return l;
  };
  const tr = char.trocas||{ci:0,ir:0,rl:0};
  const lim = getLimits(char.nivelInv||0,tr);
  const exportJ = () => {const d="data:text/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(char));const a=document.createElement('a');a.href=d;a.download=(char.nome||'personagem')+'_3det.json';document.body.appendChild(a);a.click();a.remove();};
  const importJ = e => {const f=e.target.files[0];if(f){const r=new FileReader();r.onload=ev=>{try{const l=JSON.parse(ev.target.result);if(!l.inventario)l.inventario=EMPTY.inventario;if(!l.kits)l.kits=[];if(!l.id)l.id=Date.now();setChar({...EMPTY,...l});alert('Ficha carregada!');}catch(err){alert('Erro ao ler arquivo.');}e.target.value=null;};r.readAsText(f);}};

  const handleRollBroadcast = (rollData) => {
    if(broadcastFnRef.current) broadcastFnRef.current(rollData);
  };

  return (
    <div style={{position:'relative',zIndex:1,minHeight:'100vh',background:'var(--cb)',color:'var(--ct)'}}>

      {/* ── TOP BAR ─────────────────────────────────────────── */}
      <div className="no-print" style={{
        position:'sticky',top:0,zIndex:100,
        background:'linear-gradient(90deg,var(--cb),var(--cp),var(--cb))',
        borderBottom:'1px solid var(--ca)',
        boxShadow:'0 0 20px var(--cg2)',
        padding:'8px 14px',
        display:'flex',alignItems:'center',justifyContent:'space-between',gap:8
      }}>
        {/* Esquerda */}
        <button onClick={()=>setSidebar(true)} style={{
          background:'transparent',border:'1px solid rgba(0,229,255,0.3)',color:'#00e5ff',
          borderRadius:6,padding:'6px 10px',cursor:'pointer',display:'flex',alignItems:'center',gap:6,
          fontFamily:'Orbitron',fontSize:9,textTransform:'uppercase',letterSpacing:1,flexShrink:0
        }}>☰ FICHAS</button>

        {/* Centro */}
        <div style={{textAlign:'center',flex:1}}>
          <div className="flicker orb" style={{color:'#00e5ff',textShadow:'0 0 10px var(--cg)',fontSize:'clamp(10px,3vw,18px)',fontWeight:900,letterSpacing:4,textTransform:'uppercase'}}>PLUS DISTOPHYA</div>
          <div className="mono" style={{color:'rgba(0,229,255,0.4)',fontSize:8,letterSpacing:3}}>◆ FICHA 3DeT VICTORY ◆</div>
        </div>

        {/* Direita — os 3 botões do site de referência */}
        <div style={{display:'flex',gap:6,alignItems:'center',flexShrink:0}}>
          {/* SINCRONIZAR */}
          <button onClick={syncToCloud} disabled={syncing} title="Salvar na Nuvem e Gerar Código" style={{
            background:'rgba(168,85,247,0.15)',border:'1px solid #a855f7',color:'#d8b4fe',
            borderRadius:6,padding:'6px 10px',cursor:'pointer',display:'flex',alignItems:'center',gap:5,
            fontFamily:'Orbitron',fontSize:9,textTransform:'uppercase',letterSpacing:0.8,opacity:syncing?0.6:1
          }}>
            {syncing
              ? <span style={{width:12,height:12,border:'2px solid rgba(168,85,247,0.3)',borderTop:'2px solid #a855f7',borderRadius:'50%',display:'inline-block',animation:'spin 0.8s linear infinite'}}/>
              : <Icon n="cloud-upload" s="13"/>}
            <span style={{display:'none'}} className="md-show">Sincronizar</span>
            <span style={{display:'inline'}}>Sync</span>
          </button>

          {/* BAIXAR FICHA */}
          <button onClick={importFromCloud} disabled={importing} title="Puxar ficha da Nuvem pelo código" style={{
            background:'rgba(236,72,153,0.15)',border:'1px solid #ec4899',color:'#f9a8d4',
            borderRadius:6,padding:'6px 10px',cursor:'pointer',display:'flex',alignItems:'center',gap:5,
            fontFamily:'Orbitron',fontSize:9,textTransform:'uppercase',letterSpacing:0.8,opacity:importing?0.6:1
          }}>
            {importing
              ? <span style={{width:12,height:12,border:'2px solid rgba(236,72,153,0.3)',borderTop:'2px solid #ec4899',borderRadius:'50%',display:'inline-block',animation:'spin 0.8s linear infinite'}}/>
              : <Icon n="cloud-download" s="13"/>}
            <span>Baixar</span>
          </button>

          {/* VER SALA */}
          <button onClick={()=>setLobby(true)} title="Sala de Rolagens Multijogador" style={{
            background:'rgba(245,158,11,0.15)',border:'1px solid #f59e0b',color:'#fcd34d',
            borderRadius:6,padding:'6px 10px',cursor:'pointer',display:'flex',alignItems:'center',gap:5,
            fontFamily:'Orbitron',fontSize:9,textTransform:'uppercase',letterSpacing:0.8
          }}>
            <Icon n="users" s="13"/>
            <span>Ver Sala</span>
          </button>

          {/* SALVAR */}
          <button onClick={save} style={{
            background:'rgba(0,229,255,0.08)',border:'1px solid var(--ca)',color:'var(--ca)',
            borderRadius:6,padding:'6px 10px',cursor:'pointer',display:'flex',alignItems:'center',gap:5,
            fontFamily:'Orbitron',fontSize:9,textTransform:'uppercase',letterSpacing:0.8
          }}>
            <Icon n="save" s="13"/>
            <span>Salvar</span>
          </button>
        </div>
      </div>

      {/* DICE FAB */}
      <button className="no-print pulse" onClick={()=>setDice(true)} style={{
        position:'fixed',bottom:24,right:24,zIndex:150,width:56,height:56,
        borderRadius:'50%',background:'var(--cp)',border:'2px solid var(--ca)',
        color:'var(--ca)',fontSize:22,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'
      }} title="Rolar Dados">🎲</button>

      {/* MODALS */}
      {dice && <DiceModal onClose={()=>setDice(false)} attrs={char.atributos} onRollBroadcast={handleRollBroadcast}/>}
      {lobby && <LobbyModal onClose={()=>setLobby(false)} char={char} onRollReceived={obj=>{ broadcastFnRef.current = obj.send; }}/>}

      {/* SIDEBAR */}
      {sidebar && <>
        <div onClick={()=>setSidebar(false)} style={{position:'fixed',inset:0,background:'rgba(0,5,15,0.85)',zIndex:200}} />
        <div style={{position:'fixed',top:0,left:0,bottom:0,width:300,background:'var(--cp)',borderRight:'1px solid var(--ca)',boxShadow:'0 0 30px var(--cg)',zIndex:201,display:'flex',flexDirection:'column'}}>
          <div style={{padding:16,borderBottom:'1px solid rgba(0,229,255,0.2)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontFamily:'Orbitron',color:'#00e5ff',fontSize:13}}>BIBLIOTECA</span>
            <button onClick={()=>setSidebar(false)} style={{background:'none',border:'none',color:'#ff1744',fontSize:20,cursor:'pointer'}}>×</button>
          </div>
          <div style={{padding:12,borderBottom:'1px solid rgba(0,229,255,0.1)',display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            <button className="cbtn" onClick={()=>{if(window.confirm('Nova ficha?')){setChar({...EMPTY,id:Date.now()});setSidebar(false);}}} style={{fontSize:10,padding:'6px 8px'}}>+ Nova</button>
            <button className="cbtn" onClick={()=>impRef.current.click()} style={{fontSize:10,padding:'6px 8px'}}>📂 Importar</button>
            <input ref={impRef} type="file" accept=".json" style={{display:'none'}} onChange={importJ} />
          </div>
          <div style={{flex:1,overflowY:'auto',padding:12,display:'flex',flexDirection:'column',gap:8}}>
            {sheets.length===0 ? <p style={{color:'rgba(0,229,255,0.3)',textAlign:'center',fontSize:12,marginTop:20}}>Nenhuma ficha salva.</p>
            : sheets.map(sh=>(
              <div key={sh.id} onClick={()=>{setChar({...EMPTY,...sh,kits:sh.kits||[]});setSidebar(false);}}
                style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.2)',borderRadius:6,padding:10,cursor:'pointer',display:'flex',alignItems:'center',gap:10,position:'relative'}}>
                {sh.foto && <img src={sh.foto} style={{width:36,height:36,borderRadius:4,objectFit:'cover'}} />}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:13,color:'#e8f4f8',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{sh.nome||'Sem Nome'}</div>
                  <div style={{fontSize:10,color:'rgba(0,229,255,0.4)'}}>{sh.arquetipo||'—'}</div>
                </div>
                <button onClick={e=>{e.stopPropagation();if(window.confirm('Remover?')){const n=sheets.filter(s=>s.id!==sh.id);localStorage.setItem('3det_v2',JSON.stringify(n));setSheets(n);}}}
                  style={{background:'none',border:'none',color:'#ff1744',cursor:'pointer',fontSize:14}}>×</button>
              </div>
            ))}
          </div>
          <div style={{padding:8,textAlign:'center',fontSize:9,color:'rgba(0,229,255,0.2)',fontFamily:'Share Tech Mono'}}>Armazenado no navegador</div>
        </div>
      </>}

      {/* MAIN CONTENT */}
      <div style={{maxWidth:1100,margin:'0 auto',padding:'24px 16px',position:'relative',zIndex:1}}>

        {/* HEADER CARD */}
        <div className="panel" style={{padding:20,marginBottom:20}}>
          <div style={{display:'flex',gap:20,flexWrap:'wrap'}}>
            <div onClick={()=>fileRef.current.click()} style={{width:140,height:140,borderRadius:8,background:'rgba(0,0,0,0.6)',border:'2px dashed rgba(0,229,255,0.25)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0,overflow:'hidden'}}>
              {char.foto ? <img src={char.foto} style={{width:'100%',height:'100%',objectFit:'cover'}} /> :
                <div style={{textAlign:'center',color:'rgba(0,229,255,0.3)'}}>
                  <div style={{fontSize:28,marginBottom:4}}>📷</div>
                  <div style={{fontFamily:'Orbitron',fontSize:9,textTransform:'uppercase'}}>Foto</div>
                </div>}
            </div>
            <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onloadend=()=>setChar(c=>({...c,foto:r.result}));r.readAsDataURL(f);}}} />

            <div style={{flex:1,minWidth:260,display:'flex',flexDirection:'column',gap:12}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <div>
                  <label style={{fontFamily:'Orbitron',fontSize:9,color:'rgba(0,229,255,0.6)',display:'block',marginBottom:4,textTransform:'uppercase',letterSpacing:1}}>Nome</label>
                  <input value={char.nome} onChange={e=>setChar(c=>({...c,nome:e.target.value}))} placeholder="Nome do Personagem" style={{width:'100%',fontSize:18,fontWeight:700,padding:'6px 10px',fontFamily:'Orbitron'}} />
                </div>
                <div>
                  <label style={{fontFamily:'Orbitron',fontSize:9,color:'rgba(0,229,255,0.6)',display:'block',marginBottom:4,textTransform:'uppercase',letterSpacing:1}}>Arquétipo</label>
                  <div style={{display:'flex',gap:6}}>
                    <input list="arq-list" value={char.arquetipo} onChange={e=>{const v=e.target.value;setChar(c=>({...c,arquetipo:v,arquetipoCusto:ARQUETIPOS[v]!==undefined?ARQUETIPOS[v]:c.arquetipoCusto}));}} placeholder="Arquétipo..." style={{flex:1,fontSize:14,fontWeight:700,padding:'6px 8px'}} />
                    <datalist id="arq-list">{LISTA_ARQ.map(a=><option key={a} value={a}>{a} ({ARQUETIPOS[a]}pt)</option>)}</datalist>
                    <input type="number" value={char.arquetipoCusto} onChange={e=>setChar(c=>({...c,arquetipoCusto:parseInt(e.target.value)||0}))} style={{width:44,textAlign:'center',fontSize:14,fontWeight:700,padding:'6px 4px'}} />
                  </div>
                </div>
                <div>
                  <label style={{fontFamily:'Orbitron',fontSize:9,color:'rgba(0,229,255,0.6)',display:'block',marginBottom:4,textTransform:'uppercase',letterSpacing:1}}>Marco</label>
                  <select value={char.marco} onChange={e=>setChar(c=>({...c,marco:e.target.value}))} style={{width:'100%',fontSize:14,fontWeight:700,padding:'6px 8px',appearance:'none'}}>
                    {['Iniciante','Herói','Veterano','Lenda'].map(m=><option key={m} value={m}>{m}</option>)}
                  </select>
                </div>
                <div>
                  <label style={{fontFamily:'Orbitron',fontSize:9,color:'rgba(0,229,255,0.6)',display:'block',marginBottom:4,textTransform:'uppercase',letterSpacing:1}}>Escala</label>
                  <select value={char.escala} onChange={e=>setChar(c=>({...c,escala:e.target.value}))} style={{width:'100%',fontSize:14,fontWeight:700,padding:'6px 8px',appearance:'none'}}>
                    {['Ningen','Sugoi','Kiodai','Kami'].map(m=><option key={m} value={m}>{m}</option>)}
                  </select>
                </div>
              </div>

              {/* KITS */}
              <div style={{background:'rgba(0,0,0,0.3)',border:'1px solid rgba(0,229,255,0.15)',borderRadius:6,padding:12}}>
                <div style={{fontFamily:'Orbitron',fontSize:10,color:'#00e5ff',marginBottom:8,textTransform:'uppercase'}}>👑 Kits ({(char.kits||[]).length})</div>
                <div className="no-print" style={{display:'flex',gap:8,marginBottom:8}}>
                  <input list="kit-list" value={kitIn} onChange={e=>setKitIn(e.target.value)} placeholder="Selecione um Kit..." style={{flex:1,fontSize:13,padding:'5px 8px'}} />
                  <datalist id="kit-list">{LISTA_KITS.map(k=><option key={k} value={k}/>)}</datalist>
                  <button className="cbtn" onClick={addKit} style={{padding:'5px 12px',fontSize:11}}>+ ADD</button>
                </div>
                <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                  {(char.kits||[]).map(k=>(
                    <span key={k.id} style={{background:'rgba(0,229,255,0.08)',border:'1px solid rgba(0,229,255,0.3)',borderRadius:4,padding:'3px 8px',fontSize:11,fontFamily:'Orbitron',color:'#00e5ff',display:'flex',alignItems:'center',gap:4}}>
                      {k.nome}
                      <button className="no-print" onClick={()=>setChar(c=>({...c,kits:c.kits.filter(x=>x.id!==k.id)}))} style={{background:'none',border:'none',color:'#ff1744',cursor:'pointer',fontSize:12}}>×</button>
                    </span>
                  ))}
                  {(char.kits||[]).length===0 && <span style={{fontSize:11,color:'rgba(0,229,255,0.25)',fontStyle:'italic'}}>Nenhum kit.</span>}
                </div>
              </div>

              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <div style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.2)',borderRadius:6,padding:12,textAlign:'center'}}>
                  <div style={{fontFamily:'Orbitron',fontSize:9,color:'rgba(0,229,255,0.5)',marginBottom:4,textTransform:'uppercase'}}>Pontos Totais</div>
                  <div style={{fontFamily:'Orbitron',fontSize:28,fontWeight:900,color:'#00e5ff',textShadow:'0 0 15px var(--cg)'}}>{pts}</div>
                </div>
                <div style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.2)',borderRadius:6,padding:12,textAlign:'center'}}>
                  <div style={{fontFamily:'Orbitron',fontSize:9,color:'rgba(0,229,255,0.5)',marginBottom:4,textTransform:'uppercase'}}>XP</div>
                  <input type="number" value={char.experiencia} onChange={e=>setChar(c=>({...c,experiencia:parseInt(e.target.value)||0}))} style={{width:'100%',textAlign:'center',fontSize:24,fontWeight:900,fontFamily:'Orbitron',color:'#00e5ff',background:'transparent !important',border:'none !important'}} />
                </div>
              </div>
            </div>
          </div>
        </div>

        {/* ATRIBUTOS + ESTADO */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 2fr',gap:16,marginBottom:20}}>
          <div className="panel" style={{padding:20}}>
            <div style={{fontFamily:'Orbitron',fontSize:12,color:'#00e5ff',borderBottom:'1px solid rgba(0,229,255,0.15)',paddingBottom:8,marginBottom:16,textTransform:'uppercase'}}>⭐ Atributos</div>
            {[['poder','#ff1744'],['habilidade','#00e5ff'],['resistencia','#00e676']].map(([a,c])=>(
              <div key={a} style={{background:'rgba(0,0,0,0.4)',border:`2px solid ${c}22`,borderLeft:`3px solid ${c}`,borderRadius:6,padding:'10px 12px',marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontFamily:'Orbitron',fontSize:11,color:c,textTransform:'uppercase'}}>{a.slice(0,1).toUpperCase()+a.slice(1)}</span>
                <Stepper value={char.atributos[a]} onChange={v=>setChar(c=>({...c,atributos:{...c.atributos,[a]:Math.max(0,v)}}))} />
              </div>
            ))}
          </div>
          <div className="panel" style={{padding:20}}>
            <div style={{fontFamily:'Orbitron',fontSize:12,color:'rgba(0,229,255,0.7)',borderBottom:'1px solid rgba(0,229,255,0.15)',paddingBottom:8,marginBottom:16,textTransform:'uppercase'}}>Estado Atual</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
              <Bar label="Vida (Rx5)" current={char.recursos.pv} max={maxPV} color="red" icon="heart" onChange={v=>setChar(c=>({...c,recursos:{...c.recursos,pv:v}}))} />
              <Bar label="Mana (Hx5)" current={char.recursos.pm} max={maxPM} color="blue" icon="zap" onChange={v=>setChar(c=>({...c,recursos:{...c.recursos,pm:v}}))} />
            </div>
            <div style={{background:'rgba(0,0,0,0.5)',border:'1px solid rgba(255,214,0,0.3)',borderRadius:6,padding:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontFamily:'Orbitron',fontSize:11,color:'#ffd600',textTransform:'uppercase'}}>⭐ Pontos de Ação</span>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <button className="cbtn" onClick={()=>setChar(c=>({...c,recursos:{...c.recursos,pa:Math.max(0,(c.recursos.pa||0)-1)}}))} style={{padding:'2px 8px',fontSize:14,borderColor:'rgba(255,214,0,0.4)',color:'#ffd600'}}>−</button>
                <input type="number" value={char.recursos.pa||0} onChange={e=>setChar(c=>({...c,recursos:{...c.recursos,pa:parseInt(e.target.value)||0}}))} style={{width:52,textAlign:'center',fontSize:24,fontWeight:900,fontFamily:'Orbitron',color:'#ffd600',borderColor:'rgba(255,214,0,0.3)'}} />
                <span style={{color:'rgba(255,214,0,0.4)',fontSize:14}}>/ {maxPA}</span>
                <button className="cbtn" onClick={()=>setChar(c=>({...c,recursos:{...c.recursos,pa:(c.recursos.pa||0)+1}}))} style={{padding:'2px 8px',fontSize:14,borderColor:'rgba(255,214,0,0.4)',color:'#ffd600'}}>+</button>
              </div>
            </div>
          </div>
        </div>

        {/* PERÍCIAS / VANTAGENS / DESVANTAGENS */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,marginBottom:20}}>
          <ListSection title="Perícias" color="blue" items={char.pericias} suggestions={PERICIAS} onAdd={()=>addItem('pericias')} onUpdate={(id,f,v)=>updItem('pericias',id,f,v)} onRemove={id=>remItem('pericias',id)} />
          <ListSection title="Vantagens" color="green" items={char.vantagens} suggestions={LISTA_VANT} onAdd={()=>addItem('vantagens')} onUpdate={(id,f,v)=>updItem('vantagens',id,f,v)} onRemove={id=>remItem('vantagens',id)} />
          <ListSection title="Desvantagens" color="red" items={char.desvantagens} suggestions={LISTA_DESV} onAdd={()=>addItem('desvantagens')} onUpdate={(id,f,v)=>updItem('desvantagens',id,f,v)} onRemove={id=>remItem('desvantagens',id)} />
        </div>

        {/* TÉCNICAS */}
        <div className="panel" style={{padding:20,marginBottom:20}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:'1px solid rgba(0,229,255,0.15)',paddingBottom:8,marginBottom:16}}>
            <span style={{fontFamily:'Orbitron',fontSize:12,color:'#00e5ff',textTransform:'uppercase'}}>✨ Técnicas</span>
            <button className="cbtn" onClick={()=>addItem('tecnicas')} style={{fontSize:10,padding:'4px 10px'}}>+ ADD</button>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:12}}>
            {char.tecnicas.map(t=>(
              <div key={t.id} style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.15)',borderRadius:6,padding:10,position:'relative'}}>
                <input placeholder="Nome da Técnica" value={t.nome} onChange={e=>updItem('tecnicas',t.id,'nome',e.target.value)} style={{width:'100%',fontSize:13,fontWeight:700,padding:'3px 6px',marginBottom:6}} />
                <input placeholder="Custo / Alcance / Duração" value={t.custo} onChange={e=>updItem('tecnicas',t.id,'custo',e.target.value)} style={{width:'100%',fontSize:10,padding:'2px 6px',marginBottom:4}} />
                <textarea placeholder="Descrição do efeito..." value={t.descricao||''} onChange={e=>updItem('tecnicas',t.id,'descricao',e.target.value)} rows={2} style={{width:'100%',fontSize:11,padding:'4px 6px',resize:'none'}} />
                <button className="no-print" onClick={()=>remItem('tecnicas',t.id)} style={{position:'absolute',top:6,right:6,background:'none',border:'none',color:'#ff1744',cursor:'pointer',fontSize:14}}>×</button>
              </div>
            ))}
            {char.tecnicas.length===0 && <p style={{color:'rgba(0,229,255,0.25)',fontSize:11,fontStyle:'italic'}}>Nenhuma técnica.</p>}
          </div>
        </div>

        {/* INVENTÁRIO */}
        <div className="panel" style={{padding:20,marginBottom:20}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:'1px solid rgba(0,229,255,0.15)',paddingBottom:8,marginBottom:16,flexWrap:'wrap',gap:8}}>
            <span style={{fontFamily:'Orbitron',fontSize:12,color:'#00e5ff',textTransform:'uppercase'}}>🎒 Inventário</span>
            <select value={char.nivelInv||0} onChange={e=>setChar(c=>({...c,nivelInv:parseInt(e.target.value)}))} style={{fontSize:12,padding:'4px 8px',fontFamily:'Orbitron'}}>
              <option value={0}>0pt (Padrão)</option><option value={1}>1pt (Pequeno)</option>
              <option value={2}>2pt (Grande)</option><option value={3}>3pt (Supremo)</option>
            </select>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
            <InvCol title="Comuns" color="slate" items={char.inventario.comuns} limit={lim.comuns} onAdd={()=>addInv('comuns')} onUpdate={(id,f,v)=>updInv('comuns',id,f,v)} onRemove={id=>remInv('comuns',id)} />
            <InvCol title="Incomuns" color="blue" items={char.inventario.incomuns} limit={lim.incomuns} onAdd={()=>addInv('incomuns')} onUpdate={(id,f,v)=>updInv('incomuns',id,f,v)} onRemove={id=>remInv('incomuns',id)} />
            <InvCol title="Raros" color="yellow" items={char.inventario.raros} limit={lim.raros} onAdd={()=>addInv('raros')} onUpdate={(id,f,v)=>updInv('raros',id,f,v)} onRemove={id=>remInv('raros',id)} />
            <InvCol title="Lendários" color="purple" items={char.inventario.lendarios} limit={lim.lendarios} onAdd={()=>addInv('lendarios')} onUpdate={(id,f,v)=>updInv('lendarios',id,f,v)} onRemove={id=>remInv('lendarios',id)} />
          </div>
        </div>

        {/* NOTAS */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
          <div className="panel" style={{padding:16}}>
            <div style={{fontFamily:'Orbitron',fontSize:11,color:'rgba(0,229,255,0.6)',marginBottom:8,textTransform:'uppercase'}}>📝 Anotações</div>
            <textarea value={char.anotacoes} onChange={e=>setChar(c=>({...c,anotacoes:e.target.value}))} placeholder="Notas rápidas..." rows={5} style={{width:'100%',resize:'vertical',fontSize:13,padding:8}} />
          </div>
          <div className="panel" style={{padding:16}}>
            <div style={{fontFamily:'Orbitron',fontSize:11,color:'rgba(0,229,255,0.6)',marginBottom:8,textTransform:'uppercase'}}>📖 História</div>
            <textarea value={char.historia} onChange={e=>setChar(c=>({...c,historia:e.target.value}))} placeholder="Biografia do personagem..." rows={5} style={{width:'100%',resize:'vertical',fontSize:13,padding:8}} />
          </div>
        </div>

        {/* FOOTER */}
        <div className="no-print" style={{display:'flex',justifyContent:'center',gap:12,paddingTop:16,borderTop:'1px solid rgba(0,229,255,0.15)',flexWrap:'wrap'}}>
          <button className="cbtn" onClick={exportJ} style={{padding:'10px 20px'}}>📥 Baixar JSON</button>
          <button className="cbtn" onClick={save} style={{padding:'10px 20px',background:'rgba(0,229,255,0.1)',boxShadow:'0 0 15px var(--cg)'}}>💾 Salvar na Biblioteca</button>
          <button className="cbtn" onClick={()=>window.print()} style={{padding:'10px 20px'}}>🖨️ Imprimir</button>
        </div>
      </div>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
