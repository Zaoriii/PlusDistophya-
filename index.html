    <style>
      body { color-scheme: dark; }
      @media print {
        .no-print { display: none !important; }
        body { background: white !important; color: black !important; -webkit-print-color-adjust: exact; color-scheme: light; }
        .bg-slate-900, .bg-slate-800, .bg-slate-950 { background: white !important; color: black !important; }
        input, textarea, select { border: none !important; resize: none; overflow: hidden; appearance: none; }
        .max-w-6xl { max-width: 100% !important; margin: 0 !important; padding: 0 !important; }
        .min-h-screen { min-height: auto; }
        #sidebar { display: none; }
        #dice-modal { display: none !important; }
        textarea { height: auto !important; }
        .custom-scrollbar { max-height: none !important; overflow: visible !important; }
      }
      input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #475569; }
      @keyframes roll {
        0% { transform: rotate(0deg); } 25% { transform: rotate(90deg); }
        50% { transform: rotate(180deg); } 75% { transform: rotate(270deg); } 100% { transform: rotate(360deg); }
      }
      .rolling { animation: roll 0.5s linear infinite; }
    </style>

        "Super-Herói":{desc:"",poderes:[{nome:"Sobrehumano",desc:"",custo:"1"},{nome:"Façanha épica",desc:"",custo:"1"},{nome:"Herói de ação",desc:"",custo:"1"}]}

      const DB_VANTAGENS = {
        "Aceleração":{custo:"1",desc:"Você se move muito rápido. Pode gastar 1PM para realizar um movimento extra em seu turno. Você também pode gastar 1PM antes de rolar os dados para receber um Ganho na iniciativa, ou em testes de Habilidade para correr, fugir ou perseguir um oponente."},
        "+Ação":{custo:"1",desc:"Você tem mais Pontos de Ação, além daqueles oferecidos por seu Poder. Cada vez que compra esta vantagem você recebe +2PA. Você pode comprar esta vantagem várias vezes, para novos aumentos de +2PA."},
        "Acumulador":{custo:"1",desc:"Sempre que você acerta um ataque (causando dano), pode gastar 2PM para ganhar Poder +1 no ataque seguinte. Pode acumular até P+5 (sempre 2PM por ataque). Se você erra um ataque ou deixa de atacar, os bônus acabam."},
        "Ágil":{custo:"1",desc:"Você tem grande agilidade e coordenação motora. Recebe H+2 em testes envolvendo agilidade, coordenação ou equilíbrio, incluindo testes de iniciativa. Este bônus é incluído em acertos críticos. Você também pode gastar 2PM antes de fazer um desses testes para conseguir acerto crítico com 5 ou 6."},
        "Ajudante":{custo:"1",desc:"Você tem algo ou alguém com quem pode contar. Uma vez por rodada, você pode gastar 2PM para invocar o ajudante. Tipos: Curandeiro (cura 2D PV ou repete teste de R contra efeito), Especialista (Ganho em uma perícia, exceto atacar/defender), Familiar (custa 1PM e reduz à metade o custo de outra vantagem na rodada), Lutador (Ganho em ataque ou defesa por uma rodada), Montaria (movimento extra ou Ganho em iniciativa/perseguição, custa 1PM). Você pode ter apenas uma ajuda por rodada."},
        "Alcance":{custo:"1-2",desc:"Seus ataques acertam mais longe. 1pt: pode atingir inimigos Longe sem penalidades, e Muito Longe com Perda. 2pt: também pode atingir Muito Longe sem penalidades. O Alcance também afeta suas outras vantagens (Cura, Magia, etc.)."},
        "Anulação":{custo:"2",desc:"Após o uso de uma vantagem em sua presença (Longe ou menos), você pode gastar uma ação e 3PM para anulá-la. O alvo faz um teste de R (9 + seu Poder) para evitar. Se falhar, não pode usar essa vantagem até o fim da cena. Apenas uma vantagem pode ser anulada por vez."},
        "Arena":{custo:"1",desc:"Você se dá melhor em um certo tipo de terreno. Quando está nesse lugar, pode gastar 2PM para ter Ganho em um teste. Sugestões: Água, Céu, Cidades, Ermos (desertos, florestas, montanhas), Subterrâneo, uma categoria específica de lugar, ou um único lugar no mundo."},
        "Artefato":{custo:"1+",desc:"Você possui um item especial e único que apenas você pode utilizar. Pode ser uma espada mágica, arma experimental ou armadura robótica. Cada ponto ao comprar esta vantagem vale 10XP para adquirir uma arma, armadura ou acessório como descrito em Recompensas."},
        "Ataque Especial":{custo:"1",desc:"Ao atacar, você pode gastar PM para ativar efeitos especiais. Exemplos: Área (todos Perto do alvo, 3PM), Choque (ataca com R em vez de P, 1PM), Distante (alcance extra, 1PM), Espiritual (alvo perde PM em vez de PV, 1PM), Múltiplo (mais alvos, 1PM por extra), Penetrante (alvo tem Perda de defesa, 2PM), Perigoso (crítico com 5 ou 6, 1PM), Potente (P+2, 1PM), Preciso (ataca com H em vez de P, 1PM), Titânico (crítico automático, 3PM)."},
        "Base":{custo:"1",desc:"Você tem uma base de operações onde pode descansar e se recuperar. Pode alcançá-la em qualquer situação fora de combate, levando aliados (máximo Poder + Habilidade). É viagem de mão única. Todos os seus testes realizados na base têm Ganho."},
        "Brutal":{custo:"1",desc:"Ao atacar inimigos, você recupera suas próprias energias. Versões (1pt cada): Vida (recupera 1PV para cada 3 pontos de dano causados), Mana (recupera 1PM para cada 3 pontos de dano), Derrota (recupera 3PV e 1PM ao derrotar um oponente). Funciona apenas em combates reais."},
        "Carismático":{custo:"1",desc:"Você tem facilidade para fazer com que gostem de você. Recebe P+2 em testes sociais ou que envolvam interações com outras pessoas. Este bônus é incluído em acertos críticos. Você também pode gastar 2PM antes de fazer um desses testes para conseguir acerto crítico com 5 ou 6."},
        "Clone":{custo:"1",desc:"Você pode criar cópias exatas de si mesmo gastando 2PM por clone e um movimento. Quando recebe um ataque bem-sucedido, não sofre dano, mas uma cópia desaparece. Clones fazem o que você quiser, mas não realizam ações próprias. Um atacante com Sentido adequado pode ignorar clones com um teste de Percepção (9 + seu Poder)."},
        "Companheiro":{custo:"1",desc:"Você tem um companheiro que luta ao seu lado, com atributos e habilidades definidos pelo Mestre."},
        "Confusão":{custo:"1",desc:"Faça um ataque e gaste 2PM. Se vencer a defesa do alvo, além de sofrer dano, ele fica confuso e não consegue escolher os alvos de suas perícias ou vantagens (escolhidos ao acaso pelo mestre). Dura até o fim da cena ou até o alvo sofrer dano. A cada turno, o alvo pode fazer um teste de R (9 + seu Poder) para cancelar."},
        "Cura":{custo:"1",desc:"Você pode curar a si mesmo ou a alguém que possa tocar. Gaste 2PM para curar 1D PV, até um limite de dados igual à Habilidade. Você também pode gastar 2PM para que um personagem repita um teste de Resistência contra algum efeito negativo duradouro após ter falhado."},
        "Defesa Especial":{custo:"1",desc:"Ao receber um ataque, você pode gastar PM para ativar técnicas de defesa. Exemplos: Blindada (crítico com 5 ou 6, 1PM), Bloqueio (defende com P em vez de R, 1PM), Esquiva (defende com H em vez de R, 1PM), Proteção (usa sua defesa por um aliado, 1PM), Provocação (recebe ataque destinado a aliado, 1PM), Reflexão (se defesa > ataque, oponente sofre a diferença, 1PM), Tenaz (R+2, 1PM por +2), Titânica (crítico automático na defesa, 3PM)."},
        "Desgaste":{custo:"1",desc:"Faça um ataque e gaste 2PM. Se vencer a defesa do alvo e causar dano, ele vai sofrer o mesmo dano outra vez na próxima rodada. O dano extra pode ser evitado se o alvo gastar sua próxima ação para isso."},
        "Devoto":{custo:"1",desc:"Você serve a uma causa ou crença. Ao fazer um teste quando está seguindo ou defendendo sua devoção, você pode gastar 2PM para ter Ganho. Você pode recorrer à devoção até duas vezes por cena."},
        "Elo Mental":{custo:"1",desc:"Você tem uma ligação especial com outro personagem (que também deve ter esta vantagem). Vocês se comunicam sem sinais quando se veem, podem compartilhar PM em situações de perigo, e podem passar Ganho um ao outro antes de rolar. Quando separados, sentem emoções gerais mas sempre sabem a direção e distância do outro."},
        "Estender":{custo:"1",desc:"Ao usar uma vantagem pessoal (que afeta apenas você), pode gastar 1PM por turno para que ela também funcione com um aliado Perto. Por exemplo, Teleporte pode levar consigo outros personagens gastando mais 1PM por cada um."},
        "Famoso":{custo:"1",desc:"Você é conhecido ao redor do mundo. Quando faz um teste em situações sociais envolvendo NPCs que o reconhecem (normalmente 1-4 em 1D), pode gastar 3PM para receber Ganho."},
        "Foco":{custo:"1",desc:"Gaste 2PM e use um turno inteiro se concentrando (Perda na defesa durante esse tempo; se sofrer dano, perde a concentração). No turno seguinte, seu próximo teste recebe um crítico automático (atributo somado outra vez). Você ainda pode rolar mais críticos normalmente."},
        "Forte":{custo:"1",desc:"Você é muito forte. Recebe P+2 em testes para empreender esforço físico, como levantar peso, derrubar porta ou socar vilão. Este bônus é incluído em acertos críticos. Você também pode gastar 2PM antes de fazer um desses testes para conseguir acerto crítico com 5 ou 6."},
        "Gênio":{custo:"1",desc:"Você tem um cérebro notável. Recebe H+2 em testes para resolver problemas que envolvem conhecimento, inteligência e capacidade de raciocínio. Este bônus é incluído em acertos críticos. Você também pode gastar 2PM antes de fazer um desses testes para conseguir acerto crítico com 5 ou 6."},
        "Golpe Final":{custo:"1",desc:"Você tem um golpe poderoso que pode finalizar um alvo já enfraquecido. Gaste 3PM e faça um ataque contra um alvo que esteja perto da derrota. Esse ataque é elevado uma escala acima."},
        "Grimório":{custo:"1+",desc:"Você tem um grimório de magias ou fonte de conhecimentos contendo segredos únicos. Esta vantagem permite já começar com uma ou mais técnicas. Cada ponto de Grimório vale 10XP para adquirir truques ou técnicas comuns (mas não lendárias), com autorização do mestre."},
        "Ilusão":{custo:"2",desc:"Você consegue criar ilusões tridimensionais sem massa ou substância. Custo por tamanho: 1PM (livro ou menor), 3PM (pessoa ou menor), 5PM (caminhão), 8PM (prédio). Criar gasta uma ação; mover gasta um movimento por rodada. Você não pode recuperar PM gastos até dissipá-la."},
        "Imitar":{custo:"1",desc:"Quando alguém usa uma vantagem em sua presença (Longe ou menos), você pode fazer um teste de Percepção (9): se tiver sucesso, pode gastar 3PM para adquirir a mesma vantagem até o fim da cena. Apenas uma vantagem pode ser imitada por vez."},
        "Imortal":{custo:"1",desc:"Você pode ser derrotado, e até tirado de cena, mas não morto. Em testes de morte, você nunca tem um resultado pior que inconsciente."},
        "Improviso":{custo:"2",desc:"Você pode gastar 3PM para aprender, na hora, uma perícia que não tenha e usá-la até o fim da cena. Você pode improvisar apenas uma perícia por vez. Se improvisar uma nova, vai esquecer a anterior."},
        "Imune":{custo:"1",desc:"Você é imune a algo que normalmente afeta outras criaturas. Opções: Abiótico (sem necessidades biológicas básicas), Anfíbio (respira e move normalmente embaixo d'água), Doenças (imune a doenças naturais ou mágicas), Resiliente (não se cansa; qualquer lugar de descanso é ideal), Sem Mente (imune a magias e efeitos mentais)."},
        "Incorpóreo":{custo:"2",desc:"Ao gastar uma ação e 5PM, você pode atravessar barreiras físicas e será imune a qualquer dano por combate violento — exceto Magia ou ataques de outros seres Incorpóreos. Da mesma forma, você também não pode interagir fisicamente com objetos materiais nem causar dano, exceto com Magia. Dura até o fim da cena ou até você decidir encerrar. Mesmo intangível, você pode sofrer dano mental/emocional."},
        "Inimigo":{custo:"1-2",desc:"Você é treinado em enfrentar certo tipo de criatura. Em todos os testes contra criaturas do tipo escolhido, você consegue acerto crítico com 5 ou 6. Grupos: Humanos, Humanoides, Construtos, Espíritos, Monstros. 1pt por grupo; 2pt se o grupo existe em grande abundância na campanha. Você também pode escolher um único arquétipo ou personagem: contra ele, todos os testes recebem Ganho."},
        "Inofensivo":{custo:"1",desc:"Você não parece perigoso. Em combate, por surpreender seu oponente, você ganha uma ação extra antes do primeiro turno (não funciona com quem já viu você lutar). Mesmo contra estes, tem Ganho ao rolar iniciativa. Você também pode gastar 3PM para Ganho em testes para enganar ou passar despercebido."},
        "Instrutor":{custo:"1",desc:"Usando uma ação e gastando 2PM, você permite a um aliado fazer um teste como se ele tivesse uma perícia que você tem. Se o aliado já tem a perícia, pode usar uma vantagem que você possua e a afete. O teste deve ser feito até o próximo turno do aliado."},
        "Inventário":{custo:"1-3",desc:"Você carrega itens consumíveis. Capacidade: 0pt = sem inventário (apenas 2 itens comuns), 1pt = 3 comuns + 1 incomum, 2pt = 5 comuns + 2 incomuns, 3pt = 5 comuns + 4 incomuns + 1 raro. Você pode trocar 3 itens de nível inferior por 1 superior. O Inventário é recarregado no início de cada aventura."},
        "Invisível":{custo:"1-2",desc:"Use uma ação e gaste 3PM para ficar invisível. Quando invisível: Ganho em testes para se esconder e todos os ataques contra você têm Perda. 1pt: invisibilidade interrompida ao atacar ou sofrer dano. 2pt: interrompida apenas ao sofrer dano. Você pode desfazê-la sempre que quiser."},
        "Irresistível":{custo:"1",desc:"Quando um alvo faz um teste para evitar ser afetado por uma de suas vantagens, você pode gastar 2PM ou mais. Para cada 2PM gastos, a meta do teste para resistir aumenta um passo (+3). Deve anunciar o uso antes que o alvo faça seu teste."},
        "Maestria":{custo:"1",desc:"Escolha uma perícia que você tem. Em testes dessa perícia, você pode gastar 1PM para ter um acerto crítico com 5 ou 6. Você pode comprar esta vantagem mais vezes para outras perícias."},
        "Magia":{custo:"2",desc:"Você faz mágica. Gastando 1PM, você soma +1 em qualquer teste. O bônus máximo é igual à sua Habilidade. Quando ataca ou defende com Magia, pode usar a perícia Mística em vez de Luta. Você pode fazer testes de Mística sem gastar PM para efeitos mágicos menores (iluminar sala, limpar mesa, aquecer comida)."},
        "+Mana":{custo:"1",desc:"Você tem mais Pontos de Mana, além daqueles oferecidos por sua Habilidade. Cada vez que compra esta vantagem você recebe +10PM. Você pode comprar esta vantagem várias vezes, para novos aumentos de +10PM."},
        "+Membros":{custo:"2",desc:"Você tem um ou mais membros extras (braços, tentáculos, cauda, etc.). Pode gastar 3PM para fazer uma segunda ação em seu turno (de combate ou não). Em alguns casos, a ação extra pode conceder Ganho à sua outra ação. Você não pode fazer mais de uma ação extra por rodada."},
        "Mentor":{custo:"1",desc:"Escolha uma perícia que você tem. Uma vez por cena, você pode lembrar de um ensinamento e ter Ganho em um teste da perícia escolhida. Além disso, técnicas que tenham a perícia do Mentor como pré-requisito gastam -1PM (mínimo 1PM). Você pode comprar esta vantagem mais vezes para outras perícias."},
        "Obstinado":{custo:"1",desc:"Você pode gastar 1 ponto de P, H ou R (à sua escolha) como se fosse 1 Ponto de Ação. Quando um atributo é reduzido, o limite máximo do recurso correspondente também diminui. Pontos de atributo podem ser recuperados apenas com descanso (8 horas restauram 1 ponto em cada atributo)."},
        "Paralisia":{custo:"1",desc:"Faça um ataque e gaste 2PM. Se vencer a defesa do alvo, em vez de sofrer dano, ele fica imobilizado e indefeso. Dura até o fim da cena ou até o alvo sofrer dano. A cada turno, o alvo pode fazer um teste de R (6 + seu Poder) para cancelar."},
        "Patrono":{custo:"1",desc:"Você serve a uma pessoa, organização ou instituição com mais recursos. Quando faz um teste de compra para algo que ajude na missão para o Patrono, pode gastar 1PM para receber Ganho. Você também recebe um item consumível extra de cada raridade já disponível em seu Inventário."},
        "Punição":{custo:"1-2",desc:"Ao comprar esta vantagem, escolha também uma desvantagem de mesmo valor. Faça um ataque e gaste 2PM. Se vencer a defesa do alvo, em vez de sofrer dano, ele sofre os efeitos da desvantagem escolhida. Dura até o fim da cena ou até o alvo sofrer dano. A cada turno, o alvo pode fazer um teste de R (6 + seu Poder) para cancelar."},
        "Regeneração":{custo:"1-2",desc:"1pt: No início do seu turno, você recupera 1PV. 2pt: No início do seu turno, você recupera 3PV. Além disso, em testes de morte, você nunca tem um resultado pior que Inconsciente; neste caso, desperta no final da cena e volta a regenerar."},
        "Resoluto":{custo:"1",desc:"Sua determinação é inabalável. Você recebe R+2 em testes envolvendo força de vontade, como perceber fraudes, resistir a encantos e ilusões (isso inclui testes de morte). Este bônus é incluído em acertos críticos. Você também pode gastar 2PM antes de fazer um desses testes para conseguir acerto crítico com 5 ou 6."},
        "Riqueza":{custo:"2+",desc:"Você tem recursos financeiros de escala superior. Quando faz testes de compra, pode gastar PM para subir sua escala: 2pt/Sugoi (Ganho + crítico adicional, 2PM), 4pt/Kiodai (dois Ganhos + dois críticos, 4PM), 6pt/Kami (três Ganhos + três críticos, 6PM). PM gastos nesta vantagem não podem ser recuperados até o fim da cena."},
        "Sentido":{custo:"1",desc:"Você tem um sentido melhor ou diferente. Opções: Aguçado (escolha um sentido; Ganho em Percepção com ele), Infravisão (percebe seres de sangue quente e enxerga no escuro), Intuição (percebe intenções ocultas, mentiras, segredos), Radar (percebe tudo em volta mesmo de costas; 'ouve' rádio, TV, celular, wi-fi), Raio X (vê através de portas e paredes, exceto metal ou materiais mágicos). Você pode inventar um sentido especial único."},
        "Telepata":{custo:"1",desc:"Você pode ler ou sentir os pensamentos de outras pessoas. Use um movimento e gaste 1PM para: ter Ganho em teste de perícia social, descobrir algo sobre um personagem com teste de H (9), ou prever movimentos de um adversário em combate (Ganho em defesa contra ele até a próxima rodada). Funciona apenas em criaturas vivas que você consiga ver."},
        "Teleporte":{custo:"1",desc:"Use um movimento e gaste PM para se deslocar até qualquer lugar que possa ver. Cada movimento substituído por Teleporte custa 1PM (ex: Perto para Muito Longe = 2PM). Não é afetado por terreno difícil. Você também pode gastar 3PM para ter Ganho de defesa contra um ataque."},
        "Torcida":{custo:"1",desc:"Quando uma torcida está presente, você tem um Ganho por rodada em qualquer teste. No início de cada cena, role 1D: com resultado 1, existe algum tipo de torcida favorável a você. Na falta de torcida, um aliado pode substituí-la usando uma ação para motivá-lo."},
        "Transformação":{custo:"1-2",desc:"Faça outro personagem com o mesmo número de pontos (pode ser diferente em tudo, exceto que também deve ter esta vantagem). 1pt: todas as formas sofrem os efeitos de todas as desvantagens combinadas. 2pt: cada forma sofre apenas os efeitos de suas próprias desvantagens. Mudar de forma exige uma ação e restaura PM e PV. Pode se transformar uma vez por sessão, ou pagar 1PA por cada transformação extra."},
        "+Vida":{custo:"1",desc:"Você tem mais Pontos de Vida, além daqueles oferecidos por sua Resistência. Cada vez que compra esta vantagem você recebe +10PV. Você pode comprar esta vantagem várias vezes, para novos aumentos de +10PV."},
        "Vigoroso":{custo:"1",desc:"Você é robusto como um cavalo. Recebe R+2 em testes envolvendo saúde física, como resistir a fadiga, doenças e venenos (isso inclui testes de morte). Este bônus é incluído em acertos críticos. Você também pode gastar 2PM antes de fazer um desses testes para conseguir acerto crítico com 5 ou 6."},
        "Voo":{custo:"1",desc:"Você pode voar! Ao usar um movimento para ficar Longe ou mais distante pelo ar, apenas personagens que também possam voar poderão alcançá-lo com movimentos. Você ignora terrenos difíceis. Em combate, levantar voo do chão usa um movimento e gasta 2PM. Voar por muito tempo está sujeito a cansaço."}

        "Ambiente":{custo:"-1",desc:"Você é mais acostumado a certo ambiente. No início de cada cena, role 1D. Com resultado 1, nada relacionado a seu ambiente existe ali e você tem Perda em todos os testes. O mestre pode dispensar a rolagem em situações especiais."},
        "Amnésia":{custo:"-2",desc:"Você não sabe quem é. O mestre faz sua ficha em segredo. Você pode tentar fazer coisas e o mestre diz se conseguiu ou não — sem jamais dizer se você tem mesmo a perícia ou vantagem. Suas capacidades e limitações devem permanecer um mistério."},
        "Antipático":{custo:"-1",desc:"Você não consegue (ou não quer) se expressar bem. Quando faz um teste de Poder envolvendo interação social, você tem Perda e nunca tem acertos críticos. Você não pode ser Antipático e também Carismático."},
        "Assombrado":{custo:"-1 ou -2",desc:"-1pt: Ao entrar em uma situação em que a assombração poderia afetá-lo, role 1D. Com resultado 1, todos os seus testes têm Perda até o fim da cena. -2pt: A assombração aparece com qualquer resultado ímpar."},
        "Atrapalhado":{custo:"-1",desc:"Você se atrapalha com facilidade. Quando faz um teste de Habilidade envolvendo coordenação e agilidade, você tem Perda e nunca tem acertos críticos. Você não pode ser Atrapalhado e também Ágil."},

        "Bateria":{custo:"-1",desc:"Sempre que ficar com 0PM você 'desliga', ficando inconsciente e indefeso. Além disso, quando está com pouco PM (abaixo de sua H), sua bateria está fraca e todos os seus testes têm Perda."},
        "Código":{custo:"-1",desc:"Você segue um código de conduta que o impede de fazer (ou deixar de fazer) alguma coisa. Sempre que violar seu código, a culpa o deixará com Perda em todos os testes, até que consiga se redimir. Exemplos: 1ª e 2ª Lei de Asimov, Código do Caçador, do Combate, da Derrota, da Gratidão, dos Heróis, da Honestidade, da Redenção."},
        "Dependência":{custo:"-2",desc:"O personagem depende de algo raro, proibido ou desumano para viver. A Dependência deve ser satisfeita todos os dias. Se não o fizer, o personagem tem Perda em todos os testes."},
        "Diferente":{custo:"-1",desc:"Seu corpo é muito diferente de um corpo humanoide comum. Você tem problemas para usar armas, roupas, equipamentos, máquinas e veículos disponíveis — pode usar apenas aqueles feitos especialmente para você. Você tem Perda ao usar itens feitos para outros."},
        "Elo Vital":{custo:"-1",desc:"Escolha um aliado (que também deve ter esta desvantagem). Sempre que um de vocês sofre dano, o outro também perde PV na mesma quantidade. O contrário não é verdadeiro: curar um não cura o outro."},
        "Fracote":{custo:"-1",desc:"Você é fraco. Ao fazer um teste de Poder envolvendo esforço físico, como para mover uma pedra ou derrubar uma porta, você tem Perda e nunca tem acertos críticos. Você não pode ser Fracote e também Forte."},
        "Frágil":{custo:"-1",desc:"Você tem pouco vigor físico. Ao fazer um teste de Resistência envolvendo saúde física, como para resistir doenças, venenos e testes de morte, você tem Perda e nunca tem acertos críticos. Você não pode ser Frágil e também Vigoroso."},
        "Fraqueza":{custo:"-1 ou -2",desc:"Existe um objeto, elemento ou condição à qual você é especialmente vulnerável. Enquanto estiver Perto dessa coisa, todos os seus testes têm Perda. -1pt: Incomum (aparece raramente, 1 em 1D). -2pt: Comum (aparece mais frequentemente, 1-3 em 1D)."},
        "Fúria":{custo:"-2",desc:"Sempre que você sofre dano ou fica irritado (a critério do mestre), deve fazer um teste de R (9 ou igual ao dano, o que for maior). Se falhar, entra em frenesi e ataca imediatamente. Durante a Fúria todos os testes que não sejam de ataque têm Perda e todas as vantagens gastam o dobro de PM."},
        "Inapto":{custo:"-1",desc:"Escolha uma perícia que não possua. Você é um completo incompetente nela. Sempre que o mestre pede um teste com essa perícia, você está em Perda e qualquer falha é considerada falha crítica."},
        "Inculto":{custo:"-1",desc:"Você não tem familiaridade com a cultura local. Você não sabe ler a língua local, ou acha muito difícil. Testes sociais com personagens que não o entendem têm Perda."},
        "Indeciso":{custo:"-1",desc:"Você tem pouca convicção. Em testes de Resistência envolvendo força de vontade, você tem Perda e nunca tem acertos críticos. Você não pode ser Indeciso e também Resoluto."},
        "Infame":{custo:"-1",desc:"Você é muito conhecido, mas não por uma boa razão. Quando faz testes sociais relacionados a um NPC que o reconhece (normalmente 1-4 em 1D), você está sempre em Perda. Você não pode ser Infame e também Famoso."},
        "Lento":{custo:"-1",desc:"Você se move devagar. Em testes de iniciativa, está sempre em Perda, e também gasta um movimento a mais para cruzar cada distância. Você não pode ser Lento e também ter Aceleração."},
        "Maldição":{custo:"-1 ou -2",desc:"-1pt: A Maldição é suave, mais irritante ou constrangedora. Normalmente não tem efeito em regras, mas em alguns casos pode causar Perda. -2pt: A Maldição é muito grave e desafiadora, com efeito mecânico severo definido pelo mestre."},
        "Monstruoso":{custo:"-1",desc:"Você tem uma aparência grotesca. Outros personagens estão sempre de prontidão contra você: exceto quando os pega de surpresa, você sempre tem Perda em testes de iniciativa. Você também tem Perda em testes sociais que envolvem aparência. Você não pode ser Monstruoso e também Inofensivo."},
        "Munição":{custo:"-1",desc:"Sua arma ou técnica exige recarga cada vez que é utilizada. Sempre que você usa uma ação para atacar, precisa usar um movimento para recarregar. Se fizer um ataque sem recarregar, você não soma seu Poder ao teste de ataque."},

        "Pobreza":{custo:"-1",desc:"Você não tem recursos financeiros e tende a não consegui-los. Todos os seus testes de compra são feitos em Perda. Você não pode ter Pobreza e também Riqueza."},
        "Ponto Fraco":{custo:"-1",desc:"Você tem uma característica que seu adversário pode explorar. Pode ser descoberto por quem já viu você em ação, Telepatia, ou se você é Famoso/Infame. Qualquer adversário que conhece seu Ponto Fraco pode gastar 1PM para ter Ganho contra você em um teste que explora esse problema."},
        "Protegido":{custo:"-1",desc:"Existe alguém que você precisa proteger de qualquer maneira. Sempre que o Protegido está desaparecido, indefeso ou ferido, todos os seus testes têm Perda. Vilões podem usá-lo como chantagem contra você."},
        "Restrição":{custo:"-1 ou -2",desc:"Certa condição torna mais difícil usar seus poderes. Quando ela acontece, você sempre gasta o dobro de PM para usar suas vantagens. -1pt: Incomum (acontece raramente). -2pt: Comum (acontece muito frequentemente)."},
        "Sem Vida":{custo:"-2",desc:"Você não é um ser vivo. A boa notícia: em testes de morte, você nunca tem resultado pior que inconsciente. A má notícia: você não recupera PV de formas normais (nem descanso, nem itens, nem Cura/Regeneração). Pode ser consertado por outro personagem com a perícia adequada (Máquinas ou Mística) em 1 hora de trabalho com teste (9)."},
        "Tapado":{custo:"-1",desc:"Você não é muito brilhante. Quando faz testes de Habilidade relacionado a inteligência e raciocínio, você tem Perda e nunca tem acertos críticos. Você não pode ser Tapado e também Gênio."},

                        value={item.nome} onChange={(e) => onUpdate(item.id,'nome',e.target.value)} />

                      <input placeholder="Detalhes / Opção" list={subOptions ? subListId : undefined}

                        value={item.detalhe||''} onChange={(e) => onUpdate(item.id,'detalhe',e.target.value)} />

                      rows={2} onInput={(e) => { e.target.style.height="auto"; e.target.style.height=e.target.scrollHeight+"px" }}

      const TradePanel = ({ from, to, type, limitFrom, limitTo, tradeCount, onTrade, fromColor, toColor }) => (
        <div className="flex items-center justify-between bg-slate-800 p-2 rounded-lg border border-slate-700">

      const InventoryColumn = ({ title, items, limit, onAdd, onUpdate, onRemove, color }) => {

        const barColors = { slate:'bg-slate-500', blue:'bg-blue-500', yellow:'bg-yellow-500', purple:'bg-purple-500' };

          <div className={`flex flex-col h-full bg-slate-950/30 rounded-xl p-3 border ${colors[color].split(' ')[1]} print:bg-transparent print:border-black print:border`}>

      const DiceModal = ({ onClose, attributes, onRollBroadcast }) => {
        const [selectedAttribute, setSelectedAttribute] = useState('poder');
        const [hasSkill, setHasSkill] = useState(false);
        const [gainCount, setGainCount] = useState(0);
        const [lossCount, setLossCount] = useState(0);
        const [critRange, setCritRange] = useState(6);
        const [modifier, setModifier] = useState(0);
        const [history, setHistory] = useState([]);
        const [currentRoll, setCurrentRoll] = useState(null);
        const [isRolling, setIsRolling] = useState(false);

        const diceCount = useMemo(() => {
          let count = 1;
          if (hasSkill) count++;
          count += gainCount;
          count -= lossCount;
          return Math.max(1, Math.min(3, count));
        }, [hasSkill, gainCount, lossCount]);

        const roll = () => {
          if (isRolling) return;
          setIsRolling(true);
          setTimeout(() => {
            const results = Array.from({length: diceCount}, () => Math.floor(Math.random()*6)+1);
            const attrValue = attributes[selectedAttribute] || 0;
            const diceSum = results.reduce((a,b) => a+b, 0);
            const criticalHits = results.filter(r => r >= critRange).length;
            const criticalBonus = criticalHits * attrValue;
            const isCriticalFailure = results.every(r => r === 1);
            const total = diceSum + attrValue + criticalBonus + modifier;
            const newRoll = { id: Date.now(), attribute: selectedAttribute, diceCount, results, total, attrValue, criticalBonus, isCriticalFailure, criticalHits, modifier };
            setCurrentRoll(newRoll);
            setHistory(prev => [newRoll, ...prev].slice(0, 10));
            setIsRolling(false);
            if (onRollBroadcast) onRollBroadcast(newRoll);
          }, 600);
        };

        return (
          <div id="dice-modal" className="fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center p-4">
            <div className="bg-slate-900 w-full max-w-lg rounded-2xl border border-slate-700 shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
              <div className="bg-slate-800 p-4 border-b border-slate-700 flex justify-between items-center">
