<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plus Distophya - Ficha 3DeT Victory</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --cb: #030810; --cp: #060d1a; --ca: #00e5ff;
      --cg: rgba(0,229,255,0.4); --cg2: rgba(0,229,255,0.15);
      --ct: #cde8f0; --cr: #ff1744; --cgreen: #00e676; --cy: #ffd600;
    }
    * { box-sizing: border-box; }
    body { background: var(--cb); color: var(--ct); font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,229,255,0.012) 2px, rgba(0,229,255,0.012) 4px);
    }
    body::after {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    h1,h2,h3,h4,.orb { font-family: 'Orbitron', sans-serif !important; }
    .mono { font-family: 'Share Tech Mono', monospace; }
    .panel { background: var(--cp); border: 1px solid rgba(0,229,255,0.25); border-radius: 8px; }
    .panel:hover { border-color: rgba(0,229,255,0.5); }
    .neon { color: var(--ca); text-shadow: 0 0 10px var(--cg); }
    .cbtn {
      background: transparent; border: 1px solid var(--ca); color: var(--ca);
      font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 1px;
      cursor: pointer; transition: all 0.2s; border-radius: 6px; padding: 6px 12px;
    }
    .cbtn:hover { background: rgba(0,229,255,0.1); box-shadow: 0 0 15px var(--cg); }
    input, textarea, select {
      background: rgba(0,0,0,0.6) !important; color: var(--ct) !important;
      border: 1px solid rgba(0,229,255,0.2) !important; font-family: 'Rajdhani', sans-serif !important;
      border-radius: 6px; outline: none;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--ca) !important; box-shadow: 0 0 8px var(--cg2) !important; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--ca); }
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
    @keyframes flicker { 0%,100%{opacity:1} 93%{opacity:0.8} 96%{opacity:0.9} }
    @keyframes pulse { 0%,100%{box-shadow:0 0 8px var(--cg)} 50%{box-shadow:0 0 25px var(--cg),0 0 50px var(--cg2)} }
    @keyframes roll { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
    .flicker { animation: flicker 4s infinite; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .rolling { animation: roll 0.5s linear infinite; }
    @media print {
      .no-print { display: none !important; }
      body::before, body::after { display: none !important; }
      body, * { background: white !important; color: black !important; border-color: #ccc !important; box-shadow: none !important; text-shadow: none !important; }
    }
  </style>
</head>

<script>
window.PERICIAS = ["Animais","Arte","Esporte","Influência","Luta","Manha","Máquinas","Medicina","Mística","Percepção","Saber","Sobrevivência"];
window.ARQUETIPOS_DATA = {
"Humano":{custo:0,desc:"Mesmo com as Convergências trazendo incontáveis criaturas fantásticas, a população humana ainda supera todas as outras juntas. Humanos têm mais iniciativa, energia e são mais adaptáveis. Os maiores heróis e vilões desta época são humanos.",poderes:[{nome:"Mais Além",desc:"Humanos se superam e não aceitam limites. Uma vez por cena, gaste 2PM para ter Ganho em um teste."}],desv:[]},
"Aberrante":{custo:1,desc:"Seres que não fazem parte deste universo, nem pertencem ao mundo natural. Surgem de experimentos insanos, mutações tóxicas, doenças mágicas ou corrupção cósmica. A Era das Arcas não é gentil com aberrantes — mas alguns lutam por um mundo que os teme e odeia.",poderes:[{nome:"Deformidade",desc:"Escolha uma perícia. Quando testá-la (mesmo sem a perícia), o atributo correspondente tem +1."},{nome:"Teratismo",desc:"Você recebe uma Técnica Comum à sua escolha. Você ainda precisa cumprir os requisitos da técnica."}],desv:[{nome:"Monstruoso",custo:"-1",desc:"Pode confiar, ninguém merece esta desvantagem mais do que você."}]},
"Abissal":{custo:1,desc:"Nativos de planos de natureza maligna como o Abismo, Infernos ou Hades. Visitam a Terra para coleta de almas, caça a tesouros, torneios de artes marciais ou até turismo. Muitos são aventureiros e Arcanautas — e alguns nem são malignos de verdade.",poderes:[{nome:"Ágil",desc:"Demônios são esquivos como gatos. Que também são demônios. Você recebe a vantagem Ágil."},{nome:"Desfavor",desc:"Gaste 1 ação e 3PM para forçar uma criatura Perto a fazer teste de Resistência oposto a seu Poder. Se falhar, o alvo sofre Perda em todos os testes até o próximo turno."}],desv:[{nome:"Infame",custo:"-1",desc:"Você é um demônio, esperava o quê?"}]},
"Alien":{custo:1,desc:"Estrangeiro de outro planeta, época ou dimensão. Muitos têm aparência quase humana, salvo algum detalhe difícil de disfarçar. Mesmo assim, têm dificuldade em passar despercebidos — cometem enganos culturais e atraem atenção.",poderes:[{nome:"Talento",desc:"Aliens têm aptidões superiores. Escolha uma vantagem: Ágil, Carismático, Forte, Gênio, Resoluto ou Vigoroso."},{nome:"Xenobiologia",desc:"Escolha uma vantagem que possua. Você pode usá-la por metade do custo em PM."}],desv:[{nome:"Inculto",custo:"-1",desc:"Aliens têm inaptidão à nossa cultura."}]},
"Anfíbio":{custo:1,desc:"Seres aquáticos de povos diversos: tritões, sereias, elfos-do-mar, homens-sapo. Podem viver fora d'água normalmente. Alguns temem o mundo seco, outros o enxergam como cheio de oportunidades e aventuras.",poderes:[{nome:"Imune (Anfíbio)",desc:"Embaixo d'água você pode se mover e respirar normalmente. Também pode se orientar no escuro, percebendo formas (mas não cores)."},{nome:"Vigoroso",desc:"Por sua tolerância a mudanças de pressão, anfíbios são mais resistentes. Você recebe a vantagem Vigoroso."}],desv:[{nome:"Ambiente",custo:"-1",desc:"Esta desvantagem foi praticamente inventada para você."}]},
"Anão":{custo:1,desc:"Não ultrapassam 1,30m de altura, mas são mais robustos que os humanos. Adoram trabalho duro, são grandes engenheiros e joalheiros. Cultivam barbas longas, adoram cerveja e têm paixão especial pelo motociclismo desde a chegada à Terra.",poderes:[{nome:"Abascanto",desc:"Anões são teimosamente resistentes a efeitos maléficos. Você tem Ganho em testes de Resistência para evitar ou cancelar efeitos ruins (exceto dano), como Anulação, Desgaste, Paralisia e outros."},{nome:"A Ferro e Fogo",desc:"Sempre que testar Máquinas (mesmo sem a perícia), o atributo correspondente tem +1. Além disso, você recebe Sentido (Infravisão)."}],desv:[{nome:"Lento",custo:"-1",desc:"Você tem perninhas curtas."}]},
"Celestial":{custo:1,desc:"Nativos de planos superiores benignos. Muitos têm aparência humana, muito belos e imponentes, emanando aura luminosa. Outros têm aparência de animais fantásticos. Muitos são nobres e bondosos, mas nem todos.",poderes:[{nome:"Carismático",desc:"Celestiais têm facilidade para influenciar pessoas. Você recebe a vantagem Carismático."},{nome:"Arrebatar",desc:"Gaste um movimento e 3PM para conceder Ganho ao teste de perícia de um aliado Perto ou Longe. Deve ser realizado até o próximo turno do aliado."}],desv:[{nome:"Código",custo:"-1",desc:"Todo celestial é guiado por pelo menos um código de conduta."}]},
"Centauro":{custo:2,desc:"Criatura taurica com torso humano ligado a um corpo com quatro ou mais patas. O típico é metade humano, metade cavalo. Alguns são amigos e companheiros, outros são territoriais e perigosos, e muitos abraçam a vida nas cidades.",poderes:[{nome:"Corpo Táurico",desc:"Gaste 1PM para crítico com 5 ou 6 em testes de Poder para esforço físico (não ataque), testes de iniciativa, e testes de Habilidade para correr ou perseguir."},{nome:"Vigoroso",desc:"Centauros são robustos e resistentes. Você recebe a vantagem Vigoroso."}],desv:[{nome:"Diferente",custo:"-1",desc:"Centauros não podem usar roupas, veículos ou equipamentos feitos para humanos."}]},
"Ciborgue":{custo:2,desc:"Parte máquina, parte ser vivo. Um ciborgue pode ter apenas alguns membros robóticos ou quase o corpo inteiro. Também representa meios-golens com partes artificiais mágicas. Embora orientados para combate, podem ter sucesso em áreas inesperadas.",poderes:[{nome:"Construto Vivo",desc:"Você pode recuperar PV normalmente (como um ser vivo) e também pode ser consertado por outro personagem. Ambos os métodos funcionam."},{nome:"Imune",desc:"Você é Imune a Abiótico, Doenças e Resiliente."}],desv:[{nome:"Diretriz",custo:"-1",desc:"Sua mente tem traves de programação. Escolha um Código ou Transtorno."}]},
"Construto":{custo:1,desc:"Você não nasceu; foi construído. Androides produzidos em massa que adquiriram mente e vontade própria ao ser alimentados com cristais das Arcas, ou golems mágicos feitos de materiais exóticos. Representa construtos de forma e tamanho humanos.",poderes:[{nome:"Imune (Abiótico, Doenças, Resiliente, Sem Mente)",desc:"Construtos não têm funções biológicas, nem estão sujeitos a certas limitações dos seres vivos."}],desv:[{nome:"Bateria",custo:"-1",desc:"Construtos precisam recarregar energia (bateria, gasolina, cristal mágico, etc)."},{nome:"Sem Vida",custo:"-2",desc:"Construtos não podem ser curados, apenas consertados."}]},
"Dahllan":{custo:1,desc:"Parte humanas, parte fadas e parte plantas. Têm seiva de árvores nas veias. Cabelos podem ser verdes, vermelhos ou dourados — ou mudar conforme as estações. Não é raro ver flores brotando em seu cabelo. Quase todas são mulheres.",poderes:[{nome:"Benção da Natureza",desc:"Gaste um movimento e 2PM para transformar sua pele em casca de árvore, recebendo Ganho em todas as jogadas de Defesa até seu próximo turno."},{nome:"Empatia Selvagem",desc:"Em todos os testes de Animais (mesmo sem a perícia), o atributo correspondente tem +1."}],desv:[{nome:"Código Dahllan",custo:"-1",desc:"Dahllan são veganas. Além disso, nunca atacam um animal, nem deixam de prestar ajuda a um animal em dificuldade."}]},
"Elfo":{custo:1,desc:"Belos e esguios, com orelhas pontiagudas, olhos amendoados, traços delicados e vidas muito longas. Alguns vivem isolados na natureza, outros integrados às cidades. Quase todo grupo menestreamer conta com pelo menos um elfo.",poderes:[{nome:"Impecável",desc:"Elfos são elegantes. Escolha uma vantagem: Ágil, Carismático ou Gênio."},{nome:"Natureza Mística",desc:"Em todos os testes de Mística (mesmo sem a perícia), o atributo correspondente tem +1."}],desv:[{nome:"Frágil",custo:"-1",desc:"Elfos têm compleição física delicada, sendo vulneráveis a efeitos nocivos."}]},
"Fada":{custo:1,desc:"Nome genérico para vários seres mágicos ligados à natureza: dríades, sílfides, duendes, sátiros, ninfas... Quase todas têm aparência feminina, infantil ou andrógina. De natureza curiosa e brincalhona, podem esconder grande sabedoria.",poderes:[{nome:"Magia das Fadas",desc:"Escolha entre Magia ou Ilusão. Além de ganhar a vantagem, você sempre gasta -1PM (mínimo 1PM) para usá-la. Pode comprar a outra separadamente, sem desconto."}],desv:[{nome:"Infame",custo:"-1",desc:"Fadas não são levadas muito a sério."},{nome:"Delicada",custo:"-1",desc:"Escolha: Diferente (fada pequenina) ou Frágil (tamanho normal)."}]},
"Fantasma":{custo:2,desc:"Mortos-vivos imateriais, espíritos descarnados. Surgem quando algum evento poderoso impede uma alma de encontrar o descanso eterno. Podem se passar por pessoas vivas — exceto ao toque, ou quando usam poderes (ficam translúcidos).",poderes:[{nome:"Espírito",desc:"Sempre em estado imaterial (incapazes de causar ou receber dano físico), mas podem gastar PM para se tornar sólidos durante uma cena. Você é Imune (Abiótico, Doenças) e Sem Vida (só recupera PV com descanso ou vantagens)."},{nome:"Paralisia",desc:"Você pode paralisar vítimas com sua aura de pânico. Você recebe a vantagem Paralisia."},{nome:"Devoto",desc:"Um fantasma está preso a este mundo por amor, raiva, vingança ou promessa. Você recebe a vantagem Devoto."}],desv:[]},
"Goblin":{custo:1,desc:"Humanoides pequenos (~1m) de pele cinzenta, orelhas longas e olhos que brilham no escuro. São os mais numerosos entre os povos viajantes. Curiosos, hiperativos e sempre acham solução para qualquer problema — mesmo que o resultado não fique nenhuma beleza. E aceitam explosões como resultados satisfatórios.",poderes:[{nome:"Espertalhão",desc:"Goblins sabem se virar. Sempre que testar Manha (mesmo sem a perícia), o atributo correspondente tem +1."},{nome:"Subterrâneo",desc:"Você recebe Sentido (Infravisão). Além disso, Ganho em testes de R para evitar ou cancelar doenças e venenos."}],desv:[{nome:"Diferente",custo:"-1",desc:"Goblins são pequenos e não fazem muita questão de se vestir bem."}]},
"Hynne":{custo:1,desc:"Também conhecidos como halflings ou 'pequeninos', não ultrapassam 90cm de altura. Muitos têm pés peludos. Hospitaleiros e apreciadores de boa comida, alguns buscam grandes aventuras usando mãos ligeiras e aparência inofensiva para ajudar seus colegas.",poderes:[{nome:"Atirador",desc:"Hynne têm aptidão natural para arremessar coisas. Gaste 2PM para ter Ganho em um teste para atacar Longe, em combate violento."},{nome:"Encantador",desc:"O sorriso inocente do hynne consegue o que quer. Sempre que testar Influência (mesmo sem a perícia), o atributo correspondente tem +1."}],desv:[{nome:"Diferente",custo:"-1",desc:"Quando um hynne pernoitar na sua casa, ele pode dormir em uma gaveta aberta."}]},
"Kallyanach":{custo:2,desc:"Meios-dragões que resultam de romance, maldições, experimentos ou nascimentos misteriosos. O típico tem garras, presas, cauda e/ou escamas. Alguns têm asas coriáceas. Por serem raros, não formam sociedades — buscam objetivos para suas vidas ou pistas sobre sua origem.",poderes:[{nome:"Baforada",desc:"Você recebe um Ataque Especial (escolha: Área, Distante ou Potente). Pode ser combinado com outros, e sempre gasta -1PM (mínimo 1PM)."},{nome:"Poder Dracônico",desc:"Dragões são poderosos em força física e personalidade. Escolha um entre Forte e Carismático."}],desv:[{nome:"Código dos Dragões",custo:"-1",desc:"Seja por honra, gratidão, vingança ou orgulho, um meio-dragão nunca esquece e sempre cumpre uma promessa feita."}]},
"Kemono":{custo:1,desc:"Animais antropomórficos com características humanas: bichos que andam, falam e agem como humanos, ou humanoides com traços ferais. O kemono típico é absolutamente humano em comportamento. Os mais conhecidos são chamados moreau.",poderes:[{nome:"Percepção Apurada",desc:"Kemono têm sentidos aguçados. Sempre que testar Percepção (mesmo sem a perícia ou Sentido), o atributo correspondente tem +1."},{nome:"Talento",desc:"Kemono têm aptidões físicas ou mentais dependendo de sua herança animal. Escolha: Ágil, Carismático, Forte, Gênio, Resoluto ou Vigoroso."}],desv:[{nome:"Cacoete",custo:"-1",desc:"Kemono demonstram algum traço negativo ligado a seu lado animal. Escolha: Antipático, Atrapalhado, Fracote, Frágil, Indeciso ou Tapado."}]},
"Medusa":{custo:1,desc:"Corpo humanoide com cabelo feito de serpentes. Algumas têm olhos de cores exóticas e pele escamada. São civilizadas, sociáveis e vaidosas — amam as redes sociais. Muitas acabam como Arcanautas e menestreamers, transmitindo aventuras online.",poderes:[{nome:"Carismático",desc:"Medusas têm facilidade para influenciar pessoas. Você recebe a vantagem Carismático."},{nome:"Olhar Atordoante",desc:"Gaste um movimento e 3PM para forçar uma criatura Perto a fazer teste de Resistência oposto a seu Poder. Se falhar, durante uma rodada o alvo não pode fazer ações e tem Perda em testes de defesa."}],desv:[{nome:"Fracote",custo:"-1",desc:"As medusas deviam sair da hypernet e se exercitar mais."}]},
"Minotauro":{custo:1,desc:"Humanoides robustos com cabeças bovinas. Orgulhosos, sisudos e determinados. Muito competitivos, resolvem desavenças com disputas físicas. Os mais bem-sucedidos são astros dos esportes, seguranças, soldados ou aventureiros.",poderes:[{nome:"Atlético",desc:"Minotauros são adeptos de atividades físicas. Sempre que testar Esporte (mesmo sem a perícia), o atributo correspondente tem +1."},{nome:"Sentido Labiríntico",desc:"Você sempre sabe o caminho de qualquer lugar em que tenha estado. Além disso, sempre tem Ganho em testes de Percepção para farejar."}],desv:[{nome:"Transtorno (Fobia)",custo:"-1",desc:"Minotauros têm medo de altura. Estar perto de uma queda de 3m ou mais ativa esta desvantagem."}]},
"Ogro":{custo:1,desc:"Humanoides imensos e brutais. Os mais selvagens habitam as Arcas, mas outros vivem em cidades ou se tornam Arcanautas. 'Ogro' virou sinônimo para qualquer não-humano imenso. São procurados como seguranças, soldados e mercenários.",poderes:[{nome:"Destruidor",desc:"Em combate violento, quando consegue um acerto crítico ao atacar alvo Perto, gaste 2PM para somar seu Poder mais uma vez. Apenas uma vez por ataque."},{nome:"Intimidador",desc:"Você sempre tem Ganho em testes de Influência para assustar, intimidar ou amedrontar alguém."}],desv:[{nome:"Diferente",custo:"-1",desc:"Quase nada é tão grande quanto um ogro."}]},
"Osteon":{custo:2,desc:"Esqueletos com inteligência e vontade própria, diferentes daqueles que rastejam em hordas nas Arcas. Buscam seu lugar no mundo como operários incansáveis, soldados em forças especiais, pesquisadores obsessivos ou Arcanautas.",poderes:[{nome:"Imune (Abiótico, Doenças, Resiliente)",desc:"Então, você é um morto-vivo."},{nome:"Memória Póstuma",desc:"Escolha uma perícia qualquer. Sempre que testá-la (mesmo sem a perícia), o atributo correspondente tem +1."}],desv:[{nome:"Sem Vida",custo:"-2",desc:"Pois é, você ainda é um morto-vivo."}]},
"Qareen":{custo:2,desc:"Seres mágicos descendentes de mortais e criaturas arcanas como gênios e ninfas. Também conhecidos como meios-gênios. Nascem com tatuagens que brilham ao usar poderes. Generosos e prestativos, sua magia é mais forte quando usada para realizar desejos de outros.",poderes:[{nome:"Desejos",desc:"Você recebe a vantagem Magia. Quando lança uma magia que outra pessoa pediu desde seu último turno, o custo diminui em -2PM (mínimo 1PM)."},{nome:"Carismático",desc:"Qareen têm facilidade para influenciar pessoas. Você recebe a vantagem Carismático."}],desv:[{nome:"Código da Gratidão",custo:"-1",desc:"Todo qareen será grato a alguém que lhe prestou um grande favor, adotando essa pessoa como seu 'amo' até igualar a dívida. Um qareen pode ter mais de um amo por vez."}]},
"Sauroide":{custo:2,desc:"Toda uma variedade de seres-répteis com traços humanos combinados com lagartos, crocodilos, serpentes ou dinossauros. Mais robustos e rústicos que os kemono, mas totalmente capazes de adotar qualquer carreira moderna.",poderes:[{nome:"Cascudo",desc:"Você recebe Resoluto e Vigoroso."},{nome:"Camuflagem",desc:"Sauroides têm movimentos cuidadosos, coloração igual ao ambiente e muita paciência. Você sempre tem Ganho em testes para se esconder."}],desv:[{nome:"Fraqueza (Frio)",custo:"-1",desc:"Você fica lerdo no frio. Leva um casaquinho."}]},
"Vampiro":{custo:1,desc:"Galantes e sedutores, vampiros estão entre os seres mais poderosos da Era das Arcas. Podem surgir de maldição, ritual, doença rara ou criação por outro vampiro. Alguns são publicamente conhecidos; outros buscam cura para sua condição.",poderes:[{nome:"Talento",desc:"Vampiros têm aptidões superiores. Escolha uma vantagem: Ágil, Carismático, Forte, Gênio, Resoluto ou Vigoroso."},{nome:"Imortal",desc:"Você é vampiro raiz. Mesmo depois de virar cinzas, você volta. Você recebe a vantagem Imortal."}],desv:[{nome:"Fraqueza (luz do dia)",custo:"-1",desc:"Você meio que não gosta do sol."}]}
};

    {nome:"Identidade secreta",desc:"Ganho em testes para ocultar suas atividades (incluindo manter-se escondido). Testes feitos por outros para descobrir qualquer coisa sobre você têm Perda."},
    {nome:"Olho clínico",desc:"Gaste 1 ação e 1PM, teste de Percepção (9). Com sucesso, descobre algo sobre um personagem: atributo, perícia, vantagem ou desvantagem."},
    {nome:"Plano de ação",desc:"Gaste 1 movimento e 2PM para analisar a situação. Até o fim da cena você recebe H+2."}
  ]
},
"Alquimista":{
  exig:"Mística, Saber",
  desc:"Alquimistas transformam e destroem elementos através de diagramas complexos. Para conseguir algo, deve-se dar algo em troca. Estudioso disciplinado, não acredita em conquistas fáceis.",
  poderes:[
    {nome:"Diagrama",desc:"Gaste um movimento para traçar um diagrama alquímico em alguma superfície. Sua próxima vantagem ou técnica com PM tem custo reduzido em -1 (mínimo 1PM)."},
    {nome:"Diagrama pessoal",desc:"Escolha uma vantagem ou técnica que você tem. Você pode levar seu diagrama consigo (tatuado, bordado...) sem precisar gastar movimento para reduzir o custo."},
    {nome:"Troca equivalente",desc:"Na primeira rodada de cada cena, você pode mudar seus atributos e vantagens livremente (exceto perícias, desvantagens e técnicas). Ou transmutar um aliado voluntário Perto. Reverte no fim da cena."}
  ]
},
"Artista Marcial":{
  exig:"Luta",
  desc:"Artistas marciais dominam estilos milenares adaptados à Era das Arcas. Alguns buscam provar a força de seu estilo, outros buscam glória ou vingança. Para eles, o mundo inteiro é uma arena.",
  poderes:[
    {nome:"Kata",desc:"Quando seu ataque vence a defesa do alvo, use um movimento para aumentar o dano em 2 pontos. Cada movimento extra adiciona mais 2 pontos."},
    {nome:"Montagem de treino",desc:"Uma vez por sessão, antes de um combate importante, teste de Luta (9 ou mais). Com sucesso, você recebe Maestria (Luta) durante aquele combate. Se já tem, pode pagar 2PM para crítico com 4, 5 e 6."},
    {nome:"Lutarei para conseguir!",desc:"Uma vez por cena, você pode usar Luta para substituir qualquer outra perícia. Pode pagar 3PM para cada nova utilização na mesma cena."}
  ]
},
"Ás Advogado":{
  exig:"Influência, Defesa Especial (Reflexão)",
  desc:"O ás advogado vence no tribunal com convicção mais dura que qualquer escudo. Luta pela justiça coletando provas, apontando suspeitos e confrontando infratores.",
  poderes:[
    {nome:"Coleta de provas",desc:"Com crítico em teste de Influência ou Saber, em vez de somar o atributo, pegue uma Prova (máx 3 por cena). Gaste Provas em outros testes para crítico automático. Provas não usadas até o fim da cena são perdidas."},
    {nome:"Embarco",desc:"Gaste 2PM para evitar todo o dano de um ataque ou qualquer efeito negativo por falha. Pode fazer isso um número de vezes por sessão igual a seu Poder ou 5, o menor."},
    {nome:"Objeção!",desc:"Sua Defesa Especial (Reflexão) adiciona +2 ao dano contra o adversário."}
  ]
},
"Atirador de Elite":{
  exig:"Manha; Alcance 2",
  desc:"O atirador de elite faz um trabalho limpo e rápido. Toca ia é sua estratégia máxima — evita combate direto, usa cobertura e camuflagem, preferindo agir sozinho.",
  poderes:[
    {nome:"Mira perfeita",desc:"Em cada cena, seu primeiro ataque contra cada alvo Longe ou mais impõe Perda na defesa do alvo."},
    {nome:"Posição vantajosa",desc:"Gaste uma ação completa para se colocar em ponto protegido, recebendo Ganho em testes de defesa contra ataques de Longe ou mais."},
    {nome:"Um tiro, duas mortes",desc:"Quando reduz um oponente a 0PV com ataque à distância (Longe+), o mesmo projétil atinge outro alvo à sua escolha com a mesma rolagem, sem custo extra."}
  ]
},
"Bárbaro":{
  exig:"Sobrevivência; Vigoroso",
  desc:"O bárbaro é um guerreiro bravo, indomável e rústico — mas não um ignorante. Conhecedor da terra e seus caminhos, não precisa de luxos urbanos. Pode invocar energias primevas que o tornam ainda mais forte e assustador.",
  poderes:[
    {nome:"Espírito livre",desc:"Se estiver consciente, você nunca é considerado indefeso."},
    {nome:"Frenesi de combate",desc:"Gaste 3PM para invocar frenesi: P+3 (sem afetar PA) até o fim da cena. Quando o combate termina, você fica esgotado e é considerado derrotado durante toda a cena seguinte."},
    {nome:"Resistência superior",desc:"Para você, a vantagem Vigoroso oferece R+3, em vez de +2."}
  ]
},
"Caça-Prêmios":{
  exig:"Percepção, Manha ou Sobrevivência",
  desc:"O caça-prêmios abraça a vida de aventureiro como profissão. Procura ativamente por contratos para rastrear e capturar criminosos procurados, ou aceita missões típicas: explorar Arcas, caçar monstros, resgatar tesouros.",
  poderes:[
    {nome:"Ataque subjugante",desc:"Gaste 2PM antes de atacar. Se causar dano, o alvo tem Perda em testes de ataque e defesa até seu próximo turno."},
    {nome:"Contrato",desc:"Quando aceita um contrato para caçar um alvo, você recebe a vantagem Inimigo temporariamente para esse alvo."},
    {nome:"Mural de recompensas",desc:"Sempre tem Ganho em testes para obter informações sobre procurados e suas recompensas, e em testes para rastrear o alvo de seu Contrato."}
  ]
},
"CARD Gamer":{
  exig:"Magia, Mística, Utensílio",
  desc:"CARD gamers usam Cartões de Ampliação da Realidade Dimensional como conjuradores místicos, manifestando o conteúdo dos CARDS no mundo real: magias, seres lendários, efeitos fantásticos.",
  poderes:[
    {nome:"Caiu na armadilha!",desc:"Uma vez por cena, após um oponente realizar qualquer ação, faça um teste de Mística (6 + H do oponente). Com sucesso, use Magia ou uma técnica mágica como reação."},
    {nome:"Carta na manga",desc:"Quando usa vantagem ou técnica com PM, se gastar +2PM, existe chance (resultado ímpar em 1D) de que o mesmo efeito aconteça outra vez no turno seguinte, sem custo adicional."},
    {nome:"Escolha uma carta",desc:"Gaste 1PM, teste de Mística (9): com sucesso, você escolhe o tipo de Ajudante; se falhar, o mestre escolhe. Dura até o fim da cena. Ainda paga PM por cada utilização do Ajudante."}
  ]
},
"Cavaleiro":{
  exig:"Resoluto ou Vigoroso; Código (qualquer)",
  desc:"O cavaleiro é guiado por ideais de honra — verdade, lealdade, bravura, combate justo. Seus códigos são sua certeza e força. Enquanto outros os veem como amarras, ele extrai deles seu ímpeto para seguir lutando.",
  poderes:[
    {nome:"Armadura completa",desc:"Ao sofrer um ataque, gaste 2PM para reduzir em -1 o resultado de cada dado do atacante (cancela críticos). Você ainda faz seu teste de defesa normalmente."},
    {nome:"Força da honra",desc:"Ganho em qualquer teste, uma vez por cena, para cada Código que você tem. Se violar qualquer Código, não pode usar este poder até se redimir."},
    {nome:"Inspirar aliado",desc:"Gaste 1PM e uma ação para inspirar um aliado que possa vê-lo. Ele recebe Ganho em um teste em seu próximo turno."}
  ]
},
"Celebridade":{
  exig:"Famoso, Torcida",
  desc:"Celebridades conquistam fama em quase qualquer área — artes, esportes, política, aventura. Muitas buscam ainda mais notoriedade participando de missões perigosas ou salvando o mundo.",
  poderes:[
    {nome:"Grande fama",desc:"Você gasta 2PM, em vez de 3, para usar a vantagem Famoso."},
    {nome:"Ovação",desc:"Quando está sob efeito de sua Torcida, você pode gastar um turno para recuperar 1D Pontos de Mana."},
    {nome:"Rugido das massas",desc:"Além do Ganho recebido por Torcida, seu teste causa um acerto crítico com 5 ou 6."}
  ]
},
"Cientista":{
  exig:"Saber",
  desc:"Cientistas estão entre os maiores desbravadores da Era das Arcas. Exploram ruínas, desvendam tecnologias alienígenas e avisam sobre ameaças. Em qualquer grupo de aventureiros, são ajuda valiosa.",
  poderes:[
    {nome:"Eureka!",desc:"Uma vez por sessão, com um movimento e 3PM, você adquire uma vantagem de custo 1pt à sua escolha, até o fim da cena. Você ainda paga outros custos da vantagem escolhida."},
    {nome:"Método científico",desc:"Uma vez por cena, você pode usar Saber para substituir qualquer outra perícia. Pode pagar 3PM para cada nova utilização na mesma cena."},
    {nome:"Pesquisa",desc:"Gaste um movimento e 1PM, teste de Saber (9): descobre informações sobre um personagem na cena (atributos, perícias, vantagens, desvantagens, técnicas ou itens)."}
  ]
},
"Clérigo":{
  exig:"Devoto",
  desc:"Clérigos fazem pactos com entidades divinas de além-Convergência, servindo em troca de poder mágico. Recebem comandos em sonhos e visões. Seu patrono nem sempre é nobre — existem deuses malignos que escolhem servos de igual afinidade.",
  poderes:[
    {nome:"Devoto fervoroso",desc:"Você pode usar a vantagem Devoto até três vezes por cena, em vez de duas."},
    {nome:"Dom divino",desc:"Uma vez por cena, com um movimento e 3PM, você adquire uma perícia ou vantagem de custo 1pt à sua escolha, até o fim da cena. Você ainda paga outros custos da vantagem escolhida."},
    {nome:"Poder concedido",desc:"Escolha uma vantagem: Anulação, Confusão, Cura, Defesa Especial (qualquer), Magia ou Paralisia. Se tiver essa vantagem (ou a escolheu como Dom Divino), pode usá-la sem gastar PM uma vez por cena."}
  ]
},
"Cosmonauta da ORDEM":{
  exig:"Patrono, Inimigo (aliens)",
  desc:"A ORDEM — Organização de Resistência a Divergência Extraterrestre Maledicente — combate ameaças alienígenas pelo universo. Seus cosmonautas são também cientistas e exploradores, preparados para interagir com formas de vida desconhecidas.",
  poderes:[
    {nome:"Primeiro contato",desc:"Gaste 2PM para receber +3 em qualquer teste de Saber ou Sobrevivência."},
    {nome:"Inimigo meu",desc:"Você pode usar a vantagem Inimigo para seres extraterrestres que nunca viu antes. Também afeta testes para interações sociais amistosas."},
    {nome:"Sensores avançados",desc:"Gaste 2PM para adquirir um Sentido à sua escolha, para um único teste."}
  ]
},
"Curandeiro":{
  exig:"Medicina; Cura",
  desc:"Curandeiros têm origens variadas: médicos de competência extrema, devotos de divindades benevolentes, mestres de técnicas dos Viajantes, ou simplesmente nascidos com essa capacidade. São sempre os mais procurados em qualquer grupo Arcanauta.",
  poderes:[
    {nome:"Paramédico",desc:"Você pode curar 1D Pontos de Vida com uma ação e um teste de Medicina (9)."},
    {nome:"Cura crítica",desc:"Sempre que você rola 6 em um dado de Cura, pode rolar um dado extra. Isso também vale para os dados extras."},
    {nome:"Explosão de cura",desc:"Uma vez por cena, você pode usar sua Cura em capacidade máxima (1D para cada ponto de Habilidade) sem gastar PM."}
  ]
},
"Detetive":{
  exig:"Manha, Percepção",
  desc:"Detetives investigam e resolvem crimes, identificam suspeitos e coletam informações. Na Era das Arcas, podem pertencer a qualquer raça e recorrer a magia e poderes estranhos para resolver casos.",
  poderes:[
    {nome:"Elementar!",desc:"Uma vez por cena, você pode usar Percepção para substituir qualquer outra perícia. Pode pagar 3PM para cada nova utilização na mesma cena."},
    {nome:"Obter informação",desc:"Com crítico em teste de Manha ou Percepção, em vez de somar o atributo, pegue uma Pista (máx 3). Gaste Pistas em outros testes para crítico automático. Pistas não usadas até o fim da cena são perdidas."},
    {nome:"Caso encerrado",desc:"Em sua presença, inimigos derrotados permanecem nessa condição até o fim da cena, mesmo se recuperam PV."}
  ]
},
"DPS":{
  exig:"P3, Ataque Especial (qualquer)",
  desc:"DPS (damage per second) são focados em causar dano. Podem ser melee ou ranged. Presença quase obrigatória em qualquer grupo Arcanauta, acompanhados por tanques e curandeiros.",
  poderes:[
    {nome:"Estilo de combate",desc:"Escolha melee ou ranged. Recebe Especialização (Luta) para atacar Perto (melee) ou Longe e além (ranged). Porém, é considerado Inapto para qualquer defesa e ataques no estilo não escolhido."},
    {nome:"Ataque gratuito",desc:"Uma vez por cena, você pode usar um Ataque Especial sem gastar PM."},
    {nome:"Último recurso",desc:"Quando você está perto da derrota, todos os seus ataques no estilo escolhido têm Ganho."}
  ]
},
"Druida":{
  exig:"Animais; Ajudante, Transformação; Código Dahllan",
  desc:"Defensores da Mãe Natureza, os druidas assumem a missão de proteger o equilíbrio ecológico. São inimigos de corporações inescrupulosas, invasores alienígenas e monstros que ameacem a vida natural.",
  poderes:[
    {nome:"Forma selvagem",desc:"Sua Transformação permite mudar para várias feras. Cada vez que muda de forma, escolha duas vantagens extras sem custo: Aceleração, Ágil, Alcance 1, Forte, Imune (Anfíbio/Doenças/Resiliente), +Membros, Paralisia, Regeneração, Sentido, Vigoroso ou Voo."},
    {nome:"Irmãos selvagens",desc:"Animais e plantas surgem para ajudá-lo onde estiver. Você pode mudar seu Ajudante para um tipo diferente no início de cada cena."},
    {nome:"Dádiva da natureza",desc:"Uma vez por cena, você pode usar Animais para substituir qualquer outra perícia. Pode pagar 3PM para cada nova utilização na mesma cena."}
  ],
  desv:{nome:"Código Dahllan",custo:"-1",desc:"Não consumir produtos de origem animal. Nunca atacar um animal, nem deixar de prestar ajuda a um animal em dificuldade."}
},
"Elementalista":{
  exig:"Magia, Ambiente, Fraqueza",
  desc:"Magos especializados em um único elemento da natureza. Além dos quatro clássicos (água, vento, fogo, terra) existem outros como gelo, eletricidade, metal, madeira, luz, trevas. O elemento oposto será sempre sua fraqueza.",
  poderes:[
    {nome:"Ambiente elemental",desc:"Seu elemento escolhido é seu Ambiente. Ao rolar 1 em 1D: Perda em todos os testes. Ao rolar 6: elemento em abundância, uma utilização de Magia sem gastar PM."},
    {nome:"Elemento primordial",desc:"Uma vez por sessão, com um movimento e 3PM, você adquire uma perícia ou vantagem de custo 1pt à sua escolha, até o fim da cena."},
    {nome:"Moldar essência",desc:"Na primeira rodada de cada cena, você pode mudar seus atributos e perícias livremente (não vantagens, desvantagens e técnicas). Reverte no fim da cena."}
  ],
  desv:{nome:"Fraqueza Elemental",custo:"-1 ou -2",desc:"Escolha um elemento oposto como sua Fraqueza. Decida se é comum ou incomum. Perda em todos os testes se estiver Perto dessa fraqueza."}
},
"Engenheiro Mecha":{
  exig:"Máquinas; Utensílio (ferramentas)",
  desc:"Inventor fabuloso e mestre da maquinaria pesada, capaz de controlar ou construir qualquer coisa: armas cibernéticas, veículos robóticos, golems e androides. Acredita na tecnologia para forjar um futuro melhor.",
  poderes:[
    {nome:"A ferramenta certa",desc:"Uma vez por cena, você pode usar Máquinas para substituir qualquer outra perícia. Pode pagar 3PM para cada nova utilização na mesma cena."},
    {nome:"Engenheiro de campo",desc:"Com teste de Máquinas (9), gaste 1PM para ter um Ajudante de tipo à sua escolha, até o fim da cena. Ainda paga PM por cada utilização."},
    {nome:"Martelinho de ouro",desc:"Gaste uma ação, teste de Máquinas (9). Com sucesso: cura 2D PV em um construto Perto, ou soma 1D ao seu próximo teste. (Você mesmo se for construto.)"}
  ]
},
"Entidade Exilada":{
  exig:"Nenhuma",
  desc:"Alien, abissal, celestial, fantasma ou Viajante impossibilitado de voltar a seu mundo nativo. Alguns se adaptam à cultura local, outros procuram um meio de voltar para casa — talvez tendo se apegado a novos amigos.",
  poderes:[
    {nome:"Não conheci o outro mundo por querer!",desc:"Em testes de morte, você pode rolar 1D extra e descartar o dado mais baixo."},
    {nome:"Sorte extraplanar",desc:"Uma vez por sessão, você pode usar uma vantagem, técnica ou Energia youkai sem gastar PM."},
    {nome:"Energia youkai",desc:"Gaste qualquer quantidade de PM: cada 2PM curam 1PV, em você mesmo ou em alguém com quem tenha Elo Mental."}
  ]
},
"Estudante":{
  exig:"Qualquer perícia; Mentor",
  desc:"Na Era das Arcas, estudantes enfrentam aulas com realidade virtual, conjuração de criaturas e tarefas de construir robôs. A escola moderna é onde nascem as mais fortes amizades e as primeiras grandes aventuras.",
  poderes:[
    {nome:"Hora do intervalo",desc:"Após uma cena de conflito, você recebe uma refeição básica (Ganho em um único teste, à sua escolha, até o fim do dia). Não recebe nova refeição antes de consumir a anterior."},
    {nome:"Prova real",desc:"Gaste 2PM para rolar 1D extra em um teste de perícia que possua, descartando o resultado mais baixo."},
    {nome:"Quem não cola...",desc:"Você pode usar a vantagem Mentor uma segunda vez por cena."}
  ]
},
"Exército da Luz":{
  exig:"Patrono",
  desc:"Os defensores finais do planeta contra extraterrestres, kaijus e outras ameaças. Treinados e equipados com tecnologia alienígena, são reconhecidos e admirados como heróis. Suas fileiras incluem membros de origens e raças variadas.",
  poderes:[
    {nome:"Artilharia total",desc:"Uma vez por cena, você pode fazer um Ataque Especial de até 3pt à sua escolha. Você ainda deve pagar seu custo em PM."},
    {nome:"Armadura radiante",desc:"Por treino rigoroso e tecnologias de proteção, você adiciona 1D a qualquer teste para resistir a efeitos nocivos (incluindo defesas), descartando o dado mais baixo."},
    {nome:"Ombro a ombro",desc:"Gaste 2PM para conceder Ganho a um teste de um aliado Perto."}
  ]
},
"Experimento":{
  exig:"Imune; +Mana ou +Vida",
  desc:"Criado em laboratório por experimentos fantásticos ou mágicos. Pode ser glorioso e amado por seus criadores, ou algo monstruoso e ressentido. Talvez nem conheça a verdade sobre seu passado, obcecado por desvendar esse mistério.",
  poderes:[
    {nome:"Adaptação",desc:"Você tem duas formas de imunidade pela vantagem Imune, em vez de uma."},
    {nome:"Bioenergia",desc:"Em vez de +10, você recebe +15PM ou +15PV pela vantagem +Mana ou +Vida (escolha uma)."},
    {nome:"Mutação",desc:"Escolha um atributo. Sempre que faz um teste com o atributo escolhido, gaste 2PM para rolar 1D extra e descartar o dado mais baixo."}
  ]
},
"Gatuno Galante":{
  exig:"Manha; Ágil, Carismático ou Gênio",
  desc:"Virtuoso na arte da infiltração, o gatuno galante combina astúcia, intelecto e refinamento. Desliza pelas sombras com graça, mas também se mistura em ambientes sociais com charme irresistível.",
  poderes:[
    {nome:"Ardiloso",desc:"Gaste 3PM para ter os benefícios de Confusão, Invisível, Inofensivo ou Telepata durante um turno. Você ainda paga outros custos em PM se houver."},
    {nome:"Reconhecimento de terreno",desc:"Uma vez por sessão, por ter investigado o lugar antes, você pode escolher o local de uma cena como Arena."},
    {nome:"Um passo à frente",desc:"Gaste 2PM para ter Ganho em um teste para evitar qualquer efeito negativo (exceto dano). Pode fazer isso um número de vezes por cena igual à sua Habilidade."}
  ]
},
"Gigante da Luz":{
  exig:"Transformação; Código do Combate e Heróis",
  desc:"Guerreiros de estrelas distantes que protegem o universo contra kaiju. Em sua forma natural são humanoides gigantescos. Na Terra, tomam como hospedeiro o corpo de algum nativo digno, que pode se transformar em gigante da luz por breves períodos.",
  poderes:[
    {nome:"Poder interior",desc:"Sua forma original é aprimorada. Escolha entre Forte, Ágil ou Vigoroso. Esta vantagem também se aplica à segunda forma."},
    {nome:"Transformação gigante",desc:"Segunda forma que eleva sua escala para Kiodai até o fim da cena. Recebe Alcance, Golpe Final e Voo sem custo. Sinal piscante avisa quando perto da derrota. Reverte se derrotado ou sem oponente Kiodai em cena."},
    {nome:"Transformação menor",desc:"Você pode adotar sua segunda forma em tamanho normal, com as mesmas vantagens e poderes, mas sem mudar de escala."}
  ]
},
"Guerreira Mágica":{
  exig:"Mística; Magia",
  desc:"Heroína destinada a proteger a humanidade com poderes mágicos e atitude positiva. Sabe que amizade, amor e compaixão são armas tão poderosas quanto qualquer magia. Deixa suas fraquezas de lado quando existe mal a ser punido.",
  poderes:[
    {nome:"Auxílio mágico",desc:"Quando usa Magia para emular vantagens, você gasta PM igual ao custo da vantagem (em vez de x3) para: Ataque Especial, Ajudante, Alcance e Mentor."},
    {nome:"Punirei você!",desc:"Contra um alvo perto da derrota, seu custo em PM para Magia cai pela metade. Também pode usar para ajudar aliados em perigo."},
    {nome:"Transformação radiante",desc:"Gaste um movimento para vestir seu traje mágico (com musiquinha e coreografia). Nesta forma: gaste 2PM para Ganho em Mística; testes para descobrir sua identidade têm Perda. Dura até o fim da cena."}
  ]
},
"Guerreiro":{
  exig:"Luta; Ataque Especial ou Defesa Especial",
  desc:"O guerreiro supera obstáculos através de combate. Lutar não é apenas um meio — é o próprio objetivo. Alguns sonham ser o lutador mais forte do mundo; outros lutam para que outros não precisem.",
  poderes:[
    {nome:"Lutar é tudo!",desc:"Quando faz um teste de Luta, gaste 2PM para adicionar +3 ao resultado, após a rolagem (antes do oponente rolar a defesa)."},
    {nome:"Manobra especial",desc:"Uma vez por cena, você pode usar um Ataque ou Defesa Especial sem gastar PM."},
    {nome:"Sem parar",desc:"Quando reduz um oponente a 0PV de forma violenta, você pode imediatamente fazer um ataque contra outro oponente ao alcance."}
  ]
},
"Herói Sentai":{
  exig:"Elo Mental, Golpe Final, Patrono",
  desc:"Membro de um superesquadrão em defesa do planeta. Formidável sozinho, mas invencível com seus aliados. Usa uniforme colorido de altíssima tecnologia. Responde à organização Defensores da Terra.",
  poderes:[
    {nome:"Hora de sincronizar",desc:"Seu Elo Mental funciona com todos os seus aliados (máximo 5). Eles não precisam ter a vantagem, mas recebem seus benefícios."},
    {nome:"Soltar faísca",desc:"Quando você sofre dano, pode escolher pagar 1PM para anular 3 pontos de dano."},
    {nome:"Finalização",desc:"Quando você executa um Golpe Final, cada aliado pode escolher pagar 3PM para somar seu próprio Poder a esse ataque."}
  ]
},
"Idol":{
  exig:"Arte; Carismático, Famoso",
  desc:"A idol encanta com voz graciosa, dança empolgante e trajes deslumbrantes. Quando se aventura, canaliza seu carisma para elevar o espírito dos aliados, inspirar bravura e libertar o poder da canção como arma.",
  poderes:[
    {nome:"Seu sorriso...",desc:"Para você, a vantagem Carismático oferece P+3, em vez de +2."},
    {nome:"...É tão resplandecente!",desc:"Uma vez por cena, você pode usar Arte para substituir qualquer outra perícia. Pode pagar 3PM para cada nova utilização na mesma cena."},
    {nome:"Me dê a mão!",desc:"Com sucesso em teste de Arte (9), gaste um movimento e 1PM para conceder Ganho a um aliado que consiga ver e ouvir você."}
  ]
},
"Ilusionista":{
  exig:"Arte, Mística ou Telepata; Ilusão",
  desc:"Ilusionistas usam mágica, truques de palco ou poderes mentais para controlar o que outros percebem. Criativos e astutos, raramente encontram situações que não possam contornar com imaginação.",
  poderes:[
    {nome:"Gambito ilusório",desc:"Uma vez por rodada, gaste 1PM para ter Ganho em um teste de defesa."},
    {nome:"Glamour",desc:"Gaste PM para mudar sua aparência ou a de aliados e objetos (dentro dos limites de Ilusão). Essas ilusões se movem com seus alvos e não gastam seus movimentos."},
    {nome:"Ilusão autônoma",desc:"Crie uma ilusão que age sozinha, sem gastar seus movimentos (você ainda precisa vê-la), pelo custo normal. Você pode manter apenas uma desse tipo, mas ainda pode criar outras ilusões."}
  ]
},
"Impostor":{
  exig:"Influência; Imitar",
  desc:"Mestre do disfarce por meios mundanos ou fantásticos — magia, poder camaleônico, hologramas. O impostor habilidoso não apenas imita aparência, mas adquire talentos de seus alvos.",
  poderes:[
    {nome:"Disfarce perfeito",desc:"Com um movimento e 3PM, assuma a aparência de qualquer pessoa ou criatura que conheça ou veja. Impossível enxergar através do disfarce, exceto com Telepatia ou Sentidos (com Perda no teste)."},
    {nome:"Engenheiro social",desc:"Uma vez por cena, você pode usar Influência para substituir qualquer outra perícia. Pode pagar 3PM para cada nova utilização na mesma cena."},
    {nome:"Jogo da imitação",desc:"Você pode copiar e manter duas vantagens por vez com Imitar, em vez de uma."}
  ]
},
"Intendente":{
  exig:"Arte ou Sobrevivência; Improviso",
  desc:"Formados no Instituto Maior de Intendência, os intendentes passam por treinamentos que fariam um ninja chorar. Enquanto heróis exploram Arcas, intendentes fazem tudo isso em seus momentos de folga. São o membro mais perigoso de qualquer grupo!",
  poderes:[
    {nome:"Excelência",desc:"Quando consegue um crítico em um teste de perícia que possua (incluindo perícias aprendidas com Improviso), gaste 3PM para somar o atributo no teste mais uma vez."},
    {nome:"Housekeeping",desc:"Por 3PM, escolha aliados voluntários (incluindo você, máx = Habilidade). Eles somam seus PM atuais, compartilhados por todos até o fim da cena ou até você ser derrotado. PM restantes são divididos igualmente ao fim."},
    {nome:"Sempre a postos",desc:"Você gasta 2PM (em vez de 3) para aprender perícias com Improviso. Pode manter até duas perícias ao mesmo tempo."}
  ]
},
"Ladino":{
  exig:"Manha; Ágil ou Gênio",
  desc:"Muito mais que um criminoso, o ladino é um aventureiro ousado e inventivo. Seu método é não ter método. A surpresa é sua arma. Alguns, contrariando o esperado, usam suas habilidades para fazer justiça.",
  poderes:[
    {nome:"Ataque furtivo",desc:"Gaste 2PM ao atacar alvo desprevenido para reduzir em -1 sua Resistência para defesa. Gaste +1PM para ataque furtivo contra alvo envolvido em combate com um aliado."},
    {nome:"Malandragem",desc:"Uma vez por cena, você pode usar Manha para substituir qualquer outra perícia. Pode pagar 3PM para cada nova utilização na mesma cena."},
    {nome:"Trapaça",desc:"Ao usar um poder surpreendente (veja em +Ação!!!), gaste 1 Ponto de Ação para ter qualquer vantagem (mesmo as que custam mais de 1pt)."}
  ]
},
"Maginauta":{
  exig:"Magia, Mística",
  desc:"O hacker do mundo mágico, surfista das ondas místicas. Maginautas dominam o magiespaço, dimensão cósmica onde a magia é criada e manipulada. Absortos em suas viagens, podem passar dias sem comer ou dormir.",
  poderes:[
    {nome:"Imersão",desc:"Gaste 1 ação completa e 2PM para imergir no magiespaço: corpo físico imóvel e indefeso, mas Ganho em Mística, Magia gasta metade dos PM, alcance até Muito Longe. Custa 1PM por rodada. Encerre com um movimento."},
    {nome:"Interferência",desc:"Gaste 1 ação e 2PM para conceder Ganho ou causar Perda em um teste de Mística de outro personagem (até seu próximo turno). No magiespaço, custa apenas um movimento."},
    {nome:"Sobrecarga",desc:"Ao usar Magia, teste de Mística (9). Sucesso: +2 no teste afetado (+1 por crítico). Falha: magia sem efeito mas ainda gasta PM (falha crítica: dobro de PM)."}
  ]
},
"Mago":{
  exig:"Mística; Magia",
  desc:"O verdadeiro mago estuda fórmulas herméticas para conseguir efeitos mágicos acurados. Para ele, magia é uma ciência tão complexa quanto física quântica. Em combate, são temidos a ponto de sempre serem atacados primeiro.",
  poderes:[
    {nome:"Aptidão mágica",desc:"Seu bônus máximo da vantagem Magia é H+2 (em vez de H)."},
    {nome:"Bateria de mana",desc:"Uma vez por cena, você pode usar uma ação completa para recuperar 1D+H PM."},
    {nome:"Preparar magias",desc:"Quando estiver com PM completos e fora de conflito, deixe magias preparadas (lista de efeitos de Magia). Gasta metade dos PM para preparar. Não pode mudar, e PM não podem ser recuperados até usá-las."}
  ]
},
"Menestreamer":{
  exig:"Arte, Influência ou Carismático; Famoso",
  desc:"Bardos modernos que transmitem aventuras para seguidores online. Mais que narradores, inspiram companheiros com descrições dramáticas, música climática e manobras frulentas. Transformam cada ação dos companheiros em um momento épico.",
  poderes:[
    {nome:"Inspirar",desc:"Gaste um movimento e 3PM para conceder Ganho ao teste de perícia de um aliado Perto ou Longe. Deve ser realizado até o próximo turno do aliado. Se já tem este poder, o custo cai para 1PM."},
    {nome:"É meu amigo!",desc:"Gaste 1PM para conceder a um aliado os benefícios da vantagem Famoso durante uma cena."},
    {nome:"Audiência generosa",desc:"Com teste de Arte ou Influência (9), você pode arrecadar doações de seus seguidores para ter Ganho em um teste de compra."}
  ]
},
"Mercenário":{
  exig:"Devoto, Patrono, Código",
  desc:"O verdadeiro mercenário tem uma reputação a zelar. Uma vez que aceite um contrato, vai cumpri-lo a qualquer custo. Sua lealdade pode ser comprada — mas, uma vez adquirida, será absoluta.",
  poderes:[
    {nome:"Nem morto",desc:"Enquanto tiver um contrato, sempre que fizer um teste de morte, role +1D e descarte o menor resultado."},
    {nome:"Melhor no que faz",desc:"Você é devotado a cumprir seus contratos. Pode usar Devoto até três vezes por cena, em vez de duas."},
    {nome:"Trato feito",desc:"No início de cada sessão (sem violação do Código), você pode mudar de Patrono. Em testes de compra para o Patrono, some +3 ao resultado final."}
  ],
  desv:{nome:"Código do Mercenário",custo:"-1",desc:"Jamais trair seu Patrono. Jamais falhar em cumprir uma missão para seu Patrono."}
},
"Mestre-Cuca":{
  exig:"Arte ou Sobrevivência",
  desc:"O mestre-cuca domina a arte de preparar pratos e harmonizar sabores para criar experiências gastronômicas memoráveis. Alguns buscam receitas miraculosas em Arcas, outros simplesmente usam seu talento para fazer um amanhã melhor.",
  poderes:[
    {nome:"Talento culinário",desc:"Você recebe +3 em todos os testes de Arte e Sobrevivência para preparar refeições."},
    {nome:"Prato milagroso",desc:"Uma vez por sessão, quando prepara uma refeição, gaste Pontos de Ação para conceder uma vantagem (veja em +Ação!!!) como poder surpreendente a você ou aliado."},
    {nome:"Despensa cheia",desc:"Você começa cada sessão com um número de refeições básicas igual à sua Habilidade. Troque 3 básicas por 1 gourmet, ou 5 básicas por 1 do chef que conheça."}
  ]
},
"Monge":{
  exig:"Ágil; Resoluto ou Vigoroso; 1ª Lei de Asimov",
  desc:"Monges buscam a paz, mas são combatentes excepcionais. Treinam corpo e mente à exaustão, adquirem agilidade incomparável. Lutam apenas para se defender ou proteger inocentes.",
  poderes:[
    {nome:"Agilidade superior",desc:"Para você, a vantagem Ágil oferece H+3, em vez de +2."},
    {nome:"Alma de aço",desc:"Sempre que faz um teste de R (incluindo defesas), gaste 1PM para aumentar em +1 o resultado de um dado. Não provoca críticos, mas anula falhas críticas."},
    {nome:"Controle dos chakras",desc:"Em situação de conflito, gaste um turno completo para recuperar 1D+H PV ou 1D+H PM. Só funciona se tiver pelo menos 1PV e 1PM."}
  ],
  desv:{nome:"1ª Lei de Asimov",custo:"-1",desc:"Jamais causar mal a um ser humano ou, por omissão, permitir que um humano sofra qualquer mal."}
},
"Motoqueiro Mascado":{
  exig:"Luta; Ajudante (Montaria)",
  desc:"Criados por experimentos ou transformações, motoqueiros mascarados rejeitam seus criadores e tornam-se combatentes da justiça. Cavalgam veículos especiais e seguem o próprio coração, desafiando autoridades se necessário.",
  poderes:[
    {nome:"Henshin",desc:"Gaste um movimento para invocar sua máscara e traje de combate. Nesta forma: gaste 2PM para Ganho em Luta; testes para descobrir sua identidade têm Perda. Dura até o fim da cena."},
    {nome:"Moto de batalha",desc:"Gaste 2PM para que seu Ajudante atue como Lutador, em vez de Montaria."},
    {nome:"Até o fim",desc:"Você não sofre Perda e pode seguir lutando normalmente quando está derrotado. Você ainda pode morrer se receber dano nesse estado."}
  ]
},
"Necromante":{
  exig:"Mística; Magia",
  desc:"Mestres da energia negativa, necromantes são apreciados e prestigiados na Era das Arcas. São o melhor amigo dos aventureiros osteon e mortos-vivos. Dizem que o necromante é apenas um curandeiro meio atrasado!",
  poderes:[
    {nome:"Criar morto-vivo",desc:"Teste de Mística (9), gaste 1PM para receber um Ajudante de tipo à sua escolha, até o fim da cena. Ainda paga PM por cada utilização."},
    {nome:"Energia negativa",desc:"Suas vantagens de cura (incluindo Ajudante Curandeiro) funcionam em seres Sem Vida (mas não se aplica a descanso ou itens)."},
    {nome:"Fortificar morto-vivo",desc:"Você gasta -1PM (mínimo 1) para usar Magia em seres Sem Vida."}
  ]
},
"Negociador":{
  exig:"Influência, Carismático",
  desc:"O negociador acredita em superar desafios com diálogo. Com empatia e comunicação eficaz, cria ambiente de entendimento mútuo. Um negociador empenhado pode confundir capangas, acalmar monstros furiosos e abalar a convicção de vilões.",
  poderes:[
    {nome:"Argumentação",desc:"Uma vez por cena, você pode usar Influência para substituir qualquer outra perícia. Pode pagar 3PM para cada nova utilização na mesma cena."},
    {nome:"Empatia",desc:"Gaste 2PM para anular um Ganho em um teste de Poder (incluindo combate) realizado contra você."},
    {nome:"Palavras de conforto",desc:"Sempre que qualquer poder de cura é utilizado em sua presença, o teste tem Ganho ou recupera +2PV."}
  ]
},
"Ninja":{
  exig:"Manha; Mentor",
  desc:"Mestres da furtividade e eficiência. Alguns servem a antigos clãs, outros obedecem apenas aos ensinamentos de seus mestres. Mantêm valores tradicionais de disciplina e respeito pelas artes ancestrais.",
  poderes:[
    {nome:"Mestre ninja",desc:"Você tem Ganho em dois testes de perícia por cena pela vantagem Mentor, em vez de um."},
    {nome:"Ninpo de combate",desc:"Uma vez por rodada, gaste 1PM para trocar um teste de ataque ou defesa por um teste de Manha (Habilidade). Pode usar vantagens e técnicas normalmente."},
    {nome:"Ougi",desc:"Escolha uma vantagem ou técnica como seu ougi (técnica secreta). Custará -1PM (mínimo 1) e, no primeiro uso da sessão, o alvo tem Perda no teste resistido. Pode trocar seu ougi a cada evolução dramática."}
  ]
},
"Operativo":{
  exig:"Luta, Sobrevivência; Patrono",
  desc:"Supersoldados de organizações secretas, altamente treinados e aprimorados por procedimentos experimentais ou magia. Atuam em pequenas forças-tarefa com extrema perícia e equipamentos de altíssima tecnologia.",
  poderes:[
    {nome:"Combate táctico",desc:"Sempre que executa uma manobra de combate (agarrão, ataque concentrado, etc.), gaste 1PM para ter +3 em seu teste de ataque ou defesa."},
    {nome:"Armas secretas",desc:"Tentativas de revelar ou anular suas vantagens e técnicas (como Anulação ou Telepatia) sempre sofrem Perda, ou gastam PM dobrado."},
    {nome:"Equipamento de espião",desc:"Uma vez por sessão, seu Patrono fornece um aparelho com efeito igual a uma vantagem de 1pt (escolhida no início da sessão), que funciona uma única vez. Para vantagens com PM, o aparelho tem carga de 3PM."}
  ]
},
"Paladino":{
  exig:"Devoto; Código dos Heróis e Honestidade",
  desc:"Campeões de causas e ideais, paladinos podem ser cavaleiros clássicos ou usar armaduras robóticas. Heróis naturais, frequentemente assumem a liderança. Todos confiam em paladinos.",
  poderes:[
    {nome:"Bravura final",desc:"Você não faz testes de morte: qualquer dano nesse estado é descontado de seus PM. Sem PM, você cai automaticamente Quase Morto. PM perdidos assim só podem ser recuperados com descanso."},
    {nome:"Me dê sua força!",desc:"Quando usa Devoto para ter Ganho em um teste, some +1 ao resultado de cada dado. Não afeta críticos, mas cancela falhas críticas."},
    {nome:"Sétimo sentido",desc:"Quando está perto da derrota, gaste 2PM para fazer um ataque ou defesa uma escala acima."}
  ]
},
"Patrulheiro":{
  exig:"Sobrevivência",
  desc:"Exploradores rústicos com profunda ligação com a natureza. Sobreviventes extremos, podem encontrar abrigo e sustento nos ambientes mais rigorosos. Muitos atuam como guardiões da vida selvagem.",
  poderes:[
    {nome:"Natureza provedora",desc:"Uma vez por cena, você pode usar Sobrevivência para substituir qualquer outra perícia. Pode pagar 3PM para cada nova utilização na mesma cena."},
    {nome:"À prova de tudo",desc:"Automaticamente bem-sucedido em testes de Sobrevivência para achar lugar de descanso. Gaste 1PM para você ou aliado receber +3 em um teste contra privações (cansaço, fome, sono)."},
    {nome:"Rastreador perfeito",desc:"Gaste 2PM para adquirir um Sentido à sua escolha, para um único teste."}
  ]
},
"Pescador Parrudo":{
  exig:"Poder 3; Sobrevivência; Vigoroso",
  desc:"Combina força impressionante e carisma irresistível. Pode igualmente esmagar inimigos com braços poderosos ou com um sorriso contagiante. Um verdadeiro gigante gentil, sempre otimista. E às vezes, ele pesca.",
  poderes:[
    {nome:"Quem sou? Onde estou?",desc:"Uma vez por cena, você pode usar os benefícios da vantagem Vigoroso em testes de Poder."},
    {nome:"Parrudez",desc:"Gaste 1PM para fazer um teste de defesa usando Sobrevivência. Some +1 ao resultado de cada dado (não afeta críticos, mas cancela falhas críticas). Qualquer defesa bem-sucedida é considerada perfeita."},
    {nome:"Pescado do dia",desc:"No início da cena, teste de Sobrevivência (meta 6 +1 por aliado). Com sucesso, todos ganham +1 em testes de Resistência (incluindo defesa) até o fim da cena. Funciona apenas perto de lugares com pesca."}
  ]
},
"Piloto Mecha":{
  exig:"Máquinas; Ajudante",
  desc:"Um dos poucos operadores capacitados a controlar mechas de combate. Selecionados por habilidade extrema ou compatibilidade misteriosa, enfrentam os maiores inimigos da humanidade. Além de suas máquinas, contam com treino em combate e outros poderes.",
  poderes:[
    {nome:"Ajudante robô",desc:"Seu Ajudante robótico funciona como arma, armadura e veículo, sendo considerado Lutador e Montaria. Você ainda paga PM para cada utilização."},
    {nome:"Ás indomável",desc:"Uma vez por sessão, quando usar 1 Ponto de Ação para qualquer teste, você também pode aumentar esse teste uma escala."},
    {nome:"Kiodai mecha",desc:"Uma vez por sessão, ou a critério do mestre, você pode invocar um veículo de 10 pontos em escala Kiodai. Só surge se houver oponente de escala Kiodai na cena."}
  ]
},
"Policial do Espaço":{
  exig:"Luta; Ajudante, Patrono; Código dos Heróis",
  desc:"Agentes designados para proteger mundos contra monstros e vilões. Recebem treinamento rigoroso e equipamentos avançados. Atuam sozinhos ou em pequenas equipes. Muitos são alienígenas socialmente desastrados na Terra.",
  poderes:[
    {nome:"Jouchaku!",desc:"Gaste um movimento para invocar traje tecnológico ou revelar sua forma verdadeira. Nesta forma: gaste 2PM para uso único de Alcance 1 (pistola de raios) ou Golpe Final. Dura até o fim da cena."},
    {nome:"Assistente",desc:"Seu Ajudante custa -1PM (mínimo 1PM) para ser utilizado."},
    {nome:"Kiodai mecha",desc:"Uma vez por sessão, ou a critério do mestre, seu Patrono disponibiliza um veículo de 10 pontos em escala Kiodai. Só surge se houver oponente de escala Kiodai na cena."}
  ]
},
"Psiônico":{
  exig:"Obstinado, Sentido (Intuição), Telepata",
  desc:"Poderes psíquicos originados de experimentos, mutações, origens alienígenas ou magia. Incluem intuição, telepatia, e podem evoluir para poderes mais dramáticos. Quando excedem limites, consomem corpo e mente.",
  poderes:[
    {nome:"Dom telepático",desc:"Você não precisa gastar um movimento (mas ainda gasta PM) para usar Telepata."},
    {nome:"Intuição psíquica",desc:"Gaste 1PM para ter Ganho em um teste de Percepção usando Sentido (Intuição)."},
    {nome:"Sobrecarga psíquica",desc:"Quando utiliza Obstinado, gaste 1 ponto de atributo como se fossem 2 Pontos de Ação, em vez de 1. Ao fazer isso, role 1D: com resultado 1, seus PV caem para zero (faça teste de morte)."}
  ]
},
"Repórter Extremo":{
  exig:"Percepção; Sentido (Intuição)",
  desc:"Armado com curiosidade insaciável, o repórter extremo busca tudo que é desconhecido para tornar conhecido. Nenhum segredo é sagrado. O público sempre tem o direito de saber.",
  poderes:[
    {nome:"Faro para notícia",desc:"Gaste 1PM para trocar sua Intuição por outro Sentido, para um único teste."},
    {nome:"Fontes confiáveis",desc:"Uma vez por sessão, contacte suas fontes para revelar uma informação crucial. Escolha uma vantagem: Ajudante, Arena, Base, Inimigo ou Telepata. Você ainda paga custos em PM, se houver."},
    {nome:"Furo de reportagem",desc:"Uma vez por cena, você pode usar Percepção para substituir qualquer outra perícia. Pode pagar 3PM para cada nova utilização na mesma cena."}
  ]
},
"Samurai":{
  exig:"Patrono ou Código",
  desc:"Guerreiros de elite que chegaram do além-Convergência ou descendem de antigos clãs. Servir é sua natureza — quando não têm patrono, servem a seus próprios códigos. Samurais sem mestre ou honra são chamados ronin.",
  poderes:[
    {nome:"Guerreiro poeta",desc:"Gaste 2PM para receber +3 em qualquer teste de Arte ou Influência."},
    {nome:"Artefato ancestral",desc:"No início do seu turno, gaste PM para imbuir sua arma ou armadura com uma qualidade de artefato durante um turno. Custo = 1/10 do XP da qualidade. Pode aplicar apenas uma qualidade por vez."},
    {nome:"Guerreiro honrado",desc:"Você tem 1 Ponto de Ação extra para cada Patrono e Código que possua. Se desobedecer ou violar Códigos, perde esses pontos até se redimir."}
  ]
},
"Servo da Centelha":{
  exig:"Luta; Devoto",
  desc:"Praticantes de artes marciais que experimentaram a Centelha — energia ardente que impulsiona lutar com intensidade implacável. Comprometidos com a melhoria constante, buscam desafios cada vez mais difíceis.",
  poderes:[
    {nome:"Bater onde dói",desc:"Quando faz um ataque, gaste 2PM para impor R-1 no teste de defesa do oponente."},
    {nome:"Combate violento",desc:"Para cada acerto crítico em um teste de ataque, além do efeito normal, você também soma +2 ao resultado final."},
    {nome:"Faísca da Centelha",desc:"Quando usa Devoto, em vez do benefício normal, você recebe P+2 e R+1 (não afeta recursos). O efeito dura rodadas igual ao seu Poder (após ajuste)."}
  ]
},
"Shinigami":{
  exig:"Imortal, Inimigo (espíritos)",
  desc:"Guerreiros espirituais com a missão de proteger o equilíbrio entre o mundo dos vivos e o reino dos mortos. Caçam espíritos monstruosos e protegem os que vivem pacificamente em sociedade.",
  poderes:[
    {nome:"Eu voltarei!",desc:"Um shinigami morto retorna com recursos completos no início da cena seguinte. Só pode ser destruído permanentemente pelo ataque de outro shinigami."},
    {nome:"Guia dos mortos",desc:"Cabe ao shinigami adiar a passagem daqueles cuja hora final ainda não chegou. Você pode conceder um Ganho a qualquer teste de morte realizado em sua presença."},
    {nome:"Inimigo espiritual",desc:"Um espírito derrotado por um shinigami não recupera PV e permanece derrotado até o fim da cena, ou até ser destruído."}
  ]
},
"Superatleta":{
  exig:"Esporte",
  desc:"O superatleta personifica o espírito esportivo e a excelência física. Domina uma variedade de modalidades e busca a vitória em cada empreendimento. Herói inspirador dedicado a superar obstáculos.",
  poderes:[
    {nome:"Aquecimento",desc:"No início de uma nova cena, você sempre recupera um número de PM igual a seu maior atributo."},
    {nome:"Espírito olímpico",desc:"Suas vitórias inspiram seus companheiros. Sempre que você tem sucesso em um teste, todos os seus aliados recebem +1 em seu teste seguinte."},
    {nome:"Medalha de ouro",desc:"Uma vez por cena, você pode usar Esporte para substituir qualquer outra perícia. Pode pagar 3PM para cada nova utilização na mesma cena."}
  ]
},
"Super-Herói":{
  exig:"Ágil, Carismático, Forte, Gênio, Resoluto ou Vigoroso; Código dos Heróis",
  desc:"Aqueles que usam seus dons especiais para proteger o planeta. O típico super-herói tem um único superpoder de destaque, mas muitos têm conjuntos de poderes relacionados. Formados na UniPotência.",
  poderes:[
    {nome:"Sobrehumano",desc:"Escolha uma vantagem das exigências que você possua. Gaste 1PM para aumentar seu bônus de atributo em +4, em vez de +2."},

"Mitomania":"Nunca diz a verdade. Precisa de um teste para dizer algo verdadeiro.","Paranoia":"Não confia em ninguém. Descanso recupera metade dos recursos."},"Inapto":{"Animais":"Perda e falhas críticas em testes de Animais.","Arte":"Perda e falhas críticas em testes de Arte.","Esporte":"Perda e falhas críticas em testes de Esporte.","Influência":"Perda e falhas críticas em testes de Influência.","Luta":"Perda e falhas críticas em testes de Luta.","Manha":"Perda e falhas críticas em testes de Manha.","Máquinas":"Perda e falhas críticas em testes de Máquinas.","Medicina":"Perda e falhas críticas em testes de Medicina.","Mística":"Perda e falhas críticas em testes de Mística.","Percepção":"Perda e falhas críticas em testes de Percepção.","Saber":"Perda e falhas críticas em testes de Saber.","Sobrevivência":"Perda e falhas críticas em testes de Sobrevivência."}};
