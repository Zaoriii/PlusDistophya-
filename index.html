// ── Dice Modal ───────────────────────────────────────────────────────────────
const DiceModal = ({onClose,attrs,pericias,onRoll}) => {
  const [attr,setAttr] = useState('habilidade');
  // perícia selecionada — detecta Luta automaticamente
  const [periciaSel,setPericiaSel] = useState('');
  const [gain,setGain] = useState(0);
  const [loss,setLoss] = useState(0);
  const [crit,setCrit] = useState(6);
  const [mod,setMod] = useState(0);
  const [roll,setRoll] = useState(null);
  const [rolling,setRolling] = useState(false);
  const [hist,setHist] = useState([]);

  // tem a perícia Luta? → 2D; senão → 1D; ganhos/perdas ajustam
  const temLuta = pericias && pericias.some(p=>p.nome==='Luta');
  const baseSkill = periciaSel ? 1 : 0; // qualquer perícia selecionada dá +1D
  const dice = Math.max(1, Math.min(3, 1 + baseSkill + gain - loss));

  const doRoll = () => {
    if(rolling) return;
    setRolling(true);
    setTimeout(()=>{
      const res = Array.from({length:dice},()=>Math.floor(Math.random()*6)+1);
      const av = attrs[attr]||0;
      const crits = res.filter(r=>r>=crit).length;
      const fail = res.every(r=>r===1);
      const total = res.reduce((a,b)=>a+b,0)+av+(crits*av)+mod;
      const nr = {id:Date.now(),attr,dice,pericia:periciaSel,res,total,av,crits,fail,mod,crit};
      setRoll(nr); setHist(p=>[nr,...p].slice(0,8)); setRolling(false);
      if(onRoll) onRoll(nr);
    },500);
  };
  const colors = {poder:'#ff1744',habilidade:'#00e5ff',resistencia:'#00e676'};
  // perícias disponíveis do personagem
  const listaPericias = pericias ? pericias.map(p=>p.nome) : [];

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,5,15,0.92)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
      <div className="panel" style={{width:'100%',maxWidth:480,maxHeight:'90vh',overflowY:'auto',padding:20}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <span style={{fontFamily:'Orbitron',color:'#00e5ff',fontSize:14}}>🎲 TESTE 3DeT</span>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#ff1744',fontSize:20,cursor:'pointer'}}>×</button>
        </div>

        {/* Atributos */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:12}}>
          {['poder','habilidade','resistencia'].map(a=>(
            <button key={a} onClick={()=>setAttr(a)} style={{
              background:attr===a?colors[a]+'22':'rgba(0,0,0,0.4)',
              border:`1px solid ${attr===a?colors[a]:'rgba(0,229,255,0.2)'}`,
              color:attr===a?colors[a]:'rgba(0,229,255,0.5)',
              borderRadius:6,padding:'10px 4px',cursor:'pointer',
              fontFamily:'Orbitron',fontSize:9,textTransform:'uppercase',letterSpacing:0.5
            }}>
              <div style={{fontSize:11,marginBottom:2}}>{a.slice(0,3).toUpperCase()}</div>
              <div style={{fontSize:16,fontWeight:900}}>{attrs[a]||0}</div>
            </button>
          ))}
        </div>

        {/* Perícia — seletor ou toggle Luta */}
        <div style={{marginBottom:12}}>
          <div style={{fontFamily:'Orbitron',fontSize:9,color:'rgba(0,229,255,0.4)',marginBottom:6,textTransform:'uppercase',letterSpacing:1}}>
            Perícia <span style={{color:'rgba(0,229,255,0.25)',fontSize:8,fontFamily:'Share Tech Mono'}}>(+1D se tiver)</span>
          </div>
          {listaPericias.length > 0 ? (
            <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
              {/* Botão "Nenhuma" */}
              <button onClick={()=>setPericiaSel('')} style={{
                padding:'4px 10px',borderRadius:5,cursor:'pointer',fontFamily:'Orbitron',fontSize:8,
                border:'1px solid rgba(0,229,255,0.2)',
                background:periciaSel===''?'rgba(0,229,255,0.15)':'rgba(0,0,0,0.4)',
                color:periciaSel===''?'#00e5ff':'rgba(0,229,255,0.35)',
                textTransform:'uppercase'
              }}>Nenhuma</button>
              {listaPericias.map(p=>(
                <button key={p} onClick={()=>setPericiaSel(periciaSel===p?'':p)} style={{
                  padding:'4px 10px',borderRadius:5,cursor:'pointer',fontFamily:'Orbitron',fontSize:8,
                  border:'1px solid '+(periciaSel===p?'#00e5ff':'rgba(0,229,255,0.2)'),
                  background:periciaSel===p?'rgba(0,229,255,0.15)':'rgba(0,0,0,0.4)',
                  color:periciaSel===p?'#00e5ff':'rgba(0,229,255,0.4)',
                  textTransform:'uppercase'
                }}>{p}</button>
              ))}
            </div>
          ) : (
            /* Sem ficha carregada: toggle manual */
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>setPericiaSel(periciaSel?'':'Luta')} style={{
                flex:1,padding:8,borderRadius:6,cursor:'pointer',fontFamily:'Orbitron',fontSize:9,
                border:'1px solid '+(periciaSel?'#00e5ff':'rgba(0,229,255,0.2)'),
                background:periciaSel?'rgba(0,229,255,0.12)':'rgba(0,0,0,0.4)',
                color:periciaSel?'#00e5ff':'rgba(0,229,255,0.4)',
                textTransform:'uppercase'
              }}>{periciaSel ? '✓ COM PERÍCIA' : 'SEM PERÍCIA'}</button>
            </div>
          )}
        </div>

        {/* Dados + info */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
          <div style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.2)',borderRadius:6,padding:'8px 12px',textAlign:'center'}}>
            <div style={{fontFamily:'Orbitron',fontSize:9,color:'rgba(0,229,255,0.4)',marginBottom:4}}>DADOS</div>
            <span style={{fontFamily:'Orbitron',fontSize:24,color:'#00e5ff',fontWeight:900}}>{dice}D6</span>
            <div style={{fontSize:8,color:'rgba(0,229,255,0.3)',fontFamily:'Share Tech Mono',marginTop:2}}>
              {periciaSel ? `+1D (${periciaSel})` : '1D base'}
            </div>
          </div>
          <div style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.2)',borderRadius:6,padding:'8px 12px',textAlign:'center'}}>
            <div style={{fontFamily:'Orbitron',fontSize:9,color:'rgba(0,229,255,0.4)',marginBottom:4}}>FÓRMULA</div>
            <span style={{fontFamily:'Orbitron',fontSize:14,color:'#00e5ff',fontWeight:900}}>
              {dice}D6 + {attrs[attr]||0}
            </span>
            <div style={{fontSize:8,color:'rgba(0,229,255,0.3)',fontFamily:'Share Tech Mono',marginTop:2}}>
              {attr.slice(0,3).toUpperCase()} = {attrs[attr]||0}
            </div>
          </div>
        </div>

        {/* Ganhos / Perdas / Mod */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:12}}>
          {[['Ganhos',gain,setGain,'#00e676'],['Perdas',loss,setLoss,'#ff1744'],['Mod',mod,setMod,'#00e5ff']].map(([label,val,setter,c])=>(
            <div key={label} style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.15)',borderRadius:6,padding:8,textAlign:'center'}}>
              <div style={{fontSize:9,color:'rgba(0,229,255,0.4)',marginBottom:4,fontFamily:'Orbitron'}}>{label.toUpperCase()}</div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                <button onClick={()=>setter(label==='Mod'?val-1:Math.max(0,val-1))} style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.2)',color:'#fff',borderRadius:3,width:20,height:20,cursor:'pointer',fontSize:12}}>−</button>
                <span style={{fontFamily:'Orbitron',color:c,fontWeight:900,minWidth:20,textAlign:'center'}}>{val>0?'+'+val:val}</span>
                <button onClick={()=>setter(val+1)} style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.2)',color:'#fff',borderRadius:3,width:20,height:20,cursor:'pointer',fontSize:12}}>+</button>
              </div>
            </div>
          ))}
        </div>

        <label style={{display:'flex',alignItems:'center',gap:6,marginBottom:12,fontSize:11,color:'rgba(0,229,255,0.5)'}}>
          <input type="checkbox" checked={crit===5} onChange={()=>setCrit(crit===6?5:6)} />
          Crítico também com 5 (Maestria)
        </label>

        <button onClick={doRoll} disabled={rolling} style={{
          width:'100%',padding:14,background:'rgba(0,229,255,0.1)',border:'1px solid #00e5ff',
          color:'#00e5ff',fontFamily:'Orbitron',fontSize:12,letterSpacing:2,cursor:'pointer',
          borderRadius:6,marginBottom:12,textTransform:'uppercase'
        }}>{rolling?'ROLANDO...':`ROLAR ${dice}D6 + ${attrs[attr]||0}`}</button>

        <div style={{background:'rgba(0,0,0,0.6)',border:'1px solid rgba(0,229,255,0.15)',borderRadius:6,minHeight:100,padding:12,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
          {rolling && <div style={{width:32,height:32,border:'3px solid rgba(0,229,255,0.2)',borderTop:'3px solid #00e5ff',borderRadius:'50%',animation:'roll 0.6s linear infinite'}} />}
          {!rolling && roll && (
            <div style={{textAlign:'center',width:'100%'}}>
              {roll.fail && <div style={{background:'#ff1744',color:'#fff',fontSize:10,fontFamily:'Orbitron',padding:'2px 8px',borderRadius:3,marginBottom:8}}>FALHA CRÍTICA!</div>}
              <div style={{display:'flex',justifyContent:'center',gap:8,marginBottom:8}}>
                {roll.res.map((v,i)=>{
                  const isCrit=v>=roll.crit;
                  return <div key={i} style={{
                    width:44,height:44,display:'flex',alignItems:'center',justifyContent:'center',
                    borderRadius:8,border:'2px solid',fontSize:22,fontWeight:900,
                    background:isCrit?'rgba(255,214,0,0.2)':roll.fail?'rgba(255,23,68,0.2)':'rgba(0,229,255,0.08)',
                    borderColor:isCrit?'#ffd600':roll.fail?'#ff1744':'rgba(0,229,255,0.3)',
                    color:isCrit?'#ffd600':roll.fail?'#ff5252':'#00e5ff'
                  }}>{v}</div>;
                })}
              </div>
              {!roll.fail && (
                <div>
                  <div style={{background:'rgba(0,229,255,0.1)',border:'1px solid rgba(0,229,255,0.3)',borderRadius:20,padding:'6px 20px',display:'inline-flex',alignItems:'center',gap:8,marginBottom:4}}>
                    <span style={{fontSize:10,color:'rgba(0,229,255,0.5)',fontFamily:'Orbitron'}}>RESULTADO</span>
                    <span style={{fontSize:26,fontWeight:900,color:'#00e5ff',fontFamily:'Orbitron'}}>{roll.total}</span>
                  </div>
                  <div style={{fontSize:9,color:'rgba(0,229,255,0.35)',fontFamily:'Share Tech Mono'}}>
                    [{roll.res.join('+')}] + {roll.av}{roll.pericia?' ('+roll.pericia+')':''}
                    {roll.crits>0&&<span style={{color:'#ffd600'}}> +{roll.crits}×{roll.av} crítico</span>}
                    {roll.mod!==0&&<span> {roll.mod>0?'+':''}{roll.mod} mod</span>}
                  </div>
                </div>
              )}
            </div>
          )}
          {!rolling && !roll && <p style={{color:'rgba(0,229,255,0.25)',fontSize:11}}>Configure e role os dados...</p>}
        </div>

        {hist.length>0 && (
          <div style={{marginTop:12}}>
            <div style={{fontFamily:'Orbitron',fontSize:9,color:'rgba(0,229,255,0.4)',marginBottom:6,textTransform:'uppercase'}}>Histórico</div>
            <div style={{display:'flex',flexDirection:'column',gap:4,maxHeight:100,overflowY:'auto'}}>
              {hist.map(h=>(
                <div key={h.id} style={{display:'flex',justifyContent:'space-between',fontSize:10,padding:'3px 6px',background:'rgba(0,0,0,0.3)',borderRadius:4}}>
                  <span style={{color:'rgba(0,229,255,0.5)',fontFamily:'Orbitron'}}>{h.dice}D {h.attr.slice(0,3).toUpperCase()}{h.pericia?' +'+h.pericia.slice(0,3):''}</span>
                  <span style={{color:'rgba(0,229,255,0.4)'}}>[{h.res.join(',')}]</span>
                  <span style={{color:h.fail?'#ff1744':'#00e5ff',fontWeight:700}}>{h.fail?'FALHA':'= '+h.total}</span>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

// ── Campaign Panel ──────────────────────────────────────────────────────────
const CampaignPanel = ({char, sheets, onClose}) => {
  const [mode, setMode] = useState('menu');
  const [campNome, setCampNome] = useState('');
  const [campCode, setCampCode] = useState('');
  const [joinCode, setJoinCode] = useState('');
  const [loading, setLoading] = useState(false);
  const [erro, setErro] = useState('');
  const [campData, setCampData] = useState(null);
  const [fichas, setFichas] = useState({});
  const [rolls, setRolls] = useState([]);
  const [iniciativas, setIniciativas] = useState([]);
  const [fichaAberta, setFichaAberta] = useState(null);
  const [npcNome, setNpcNome] = useState('');
  const [npcHabil, setNpcHabil] = useState(0);
  const [npcTemLuta, setNpcTemLuta] = useState(false);
  const [diceOpen, setDiceOpen] = useState(false);
  const [tab, setTab] = useState('fichas');
  const pollingRef = useRef(null);
  // myPlayerId persiste no localStorage para ser sempre o mesmo entre sessões
  const myPlayerId = useRef((() => {
    const stored = localStorage.getItem('3det_pid');
    if (stored) return stored;
    const newId = char.id ? 'j-'+char.id : 'j-'+uid();
    localStorage.setItem('3det_pid', newId);
    return newId;
  })());
  const [fbErro, setFbErro] = useState(false);
  const [showSheetSelector, setShowSheetSelector] = useState(false);

  // estado local dos recursos para feedback imediato antes de salvar no Firebase
  const [recursosLocal, setRecursosLocal] = useState({}); // { [fichaId]: { pv, pm, pa } }

  // ── Ficha ativa: Firebase tem prioridade, char local como fallback ──
  const fichaAtiva = useMemo(() => {
    const pid = myPlayerId.current;
    const remotaPorId = fichas[pid];
    
    // 1. Ficha registrada com meu ID no Firebase → fonte mais confiável
    if (remotaPorId && remotaPorId.nome) {
      // Se char local também tem dados, mescla (char local pode ter edições não enviadas)
      if (char.nome && char.nome.trim()) {
        return char; // char local tem prioridade se estiver preenchido
      }
      return { ...EMPTY, ...remotaPorId };
    }
    
    // 2. Busca por nome no Firebase (caso o ID mudou entre sessões)
    if (char.nome && char.nome.trim()) {
      const remotaPorNome = Object.values(fichas).find(f => f.nome === char.nome);
      if (remotaPorNome) return char;
    }
    
    // 3. Se não tem char local, pega qualquer ficha registrada com meu nome
    const nomeSalvo = localStorage.getItem('3det_meu_nome');
    if (nomeSalvo) {
      const remotaPorNome = Object.values(fichas).find(f => f.nome === nomeSalvo);
      if (remotaPorNome) return { ...EMPTY, ...remotaPorNome };
    }
    
    return char;
  }, [fichas, char]);

  useEffect(() => {
    try {
      const s = localStorage.getItem('3det_camp');
      if(s) {
        const d = JSON.parse(s);
        setCampData(d); setCampCode(d.code); setMode('sala');
        iniciarPolling(d.code);
      }
    } catch(e) {}
    return () => pararPolling();
  }, []);

  const pararPolling = () => { if(pollingRef.current) clearInterval(pollingRef.current); };
  const iniciarPolling = (code) => {
    pararPolling(); buscarTudo(code);
    pollingRef.current = setInterval(() => buscarTudo(code), 4000);
  };
  const buscarTudo = async (code) => {
    try {
      const [fichasData, rollsData, initData] = await Promise.all([
        fbGet(`campanhas/${code}/fichas`).catch(e=>{if(e.message==='REGRAS_FIREBASE')setFbErro(true);return null;}),
        fbGet(`campanhas/${code}/rolls`).catch(()=>null),
        fbGet(`campanhas/${code}/iniciativas`).catch(()=>null),
      ]);
      setFbErro(false);
      if(fichasData) setFichas(fichasData);
      if(rollsData) {
        const arr = Object.entries(rollsData).map(([k,v])=>({...v,_fbKey:k})).sort((a,b)=>b.ts-a.ts).slice(0,30);
        setRolls(arr);
      } else setRolls([]);
      if(initData) {
        const arr = Object.entries(initData).map(([k,v])=>({...v,_fbKey:k})).sort((a,b)=>b.total-a.total);
        setIniciativas(arr);
      } else setIniciativas([]);
    } catch(e) {}
  };

  const criarCampanha = async () => {
    if(!campNome.trim()){setErro('Digite o nome da campanha.');return;}
    setLoading(true); setErro('');
    try {
      const code = gerarCodCamp();
      const data = {code,nome:campNome.trim(),mestre:char.nome||'Mestre',criadoEm:Date.now()};
      await fbSet(`campanhas/${code}/info`, data);
      localStorage.setItem('3det_camp', JSON.stringify(data));
      setCampData(data); setCampCode(code); setMode('sala');
      iniciarPolling(code);
      navigator.clipboard.writeText(code).catch(()=>{});
      alert('✅ Campanha criada!\nCódigo: '+code+'\n(Já copiado para a área de transferência)');
    } catch(e){
      if(e.message==='REGRAS_FIREBASE'){alert(MSG_REGRAS);setErro('🔒 Banco bloqueado.');}
      else setErro('Erro ao criar: '+e.message);
    }
    setLoading(false);
  };

  const entrarCampanha = async () => {
    const code = joinCode.trim().toUpperCase();
    if(!code){setErro('Digite o código.');return;}
    setLoading(true); setErro('');
    try {
      const data = await fbGet(`campanhas/${code}/info`);
      if(!data||!data.code){setErro('❌ Campanha não encontrada.');setLoading(false);return;}
      localStorage.setItem('3det_camp', JSON.stringify(data));
      setCampData(data); setCampCode(code); setMode('sala');
      iniciarPolling(code);
    } catch(e){
      if(e.message==='REGRAS_FIREBASE'){alert(MSG_REGRAS);setErro('🔒 Banco bloqueado.');}
      else setErro('❌ Erro ao buscar campanha.');
    }
    setLoading(false);
  };

  // ── MUDANÇA: Registrar ficha usa char.nome sempre (não "Jogador") ──
  const buildPayload = (sheet, playerId) => ({
    id: playerId,
    nome: sheet.nome || 'Sem nome',
    arquetipo: sheet.arquetipo,
    foto: sheet.foto || null,
    atributos: sheet.atributos,
    recursos: sheet.recursos,
    bonusPA: sheet.bonusPA||0,
    bonusPM: sheet.bonusPM||0,
    bonusPV: sheet.bonusPV||0,
    kits: (sheet.kits||[]).map(k=>k.nome),
    pericias: (sheet.pericias||[]).slice(0,30),
    vantagens: (sheet.vantagens||[]).slice(0,30),
    desvantagens: (sheet.desvantagens||[]).slice(0,30),
    tecnicas: (sheet.tecnicas||[]).slice(0,20),
    inventario: sheet.inventario,
    anotacoes: sheet.anotacoes,
    historia: sheet.historia,
    atualizadoEm: Date.now()
  });

  const registrarFicha = async () => {
    if(!char.nome){alert('Sua ficha precisa ter um nome primeiro.');return;}
    setLoading(true);
    try {
      const payload = buildPayload(char, myPlayerId.current);
      await fbSet(`campanhas/${campCode}/fichas/${myPlayerId.current}`, payload);
      localStorage.setItem('3det_meu_nome', char.nome);
      await buscarTudo(campCode);
      alert('✅ Ficha de "'+char.nome+'" registrada!');
    } catch(e){
      if(e.message==='REGRAS_FIREBASE') alert(MSG_REGRAS);
      else alert('Erro ao registrar: '+e.message);
    }
    setLoading(false);
  };

  const registrarFichaFromSheet = async (sheet) => {
    if(!sheet.nome){alert('A ficha selecionada não tem nome.');return;}
    setLoading(true);
    try {
      // Sempre usa myPlayerId para garantir que fichaAtiva encontra a ficha
      const payload = buildPayload(sheet, myPlayerId.current);
      await fbSet(`campanhas/${campCode}/fichas/${myPlayerId.current}`, payload);
      localStorage.setItem('3det_meu_nome', sheet.nome);
      await buscarTudo(campCode);
      alert('✅ Ficha de "'+sheet.nome+'" registrada!');
    } catch(e){
      if(e.message==='REGRAS_FIREBASE') alert(MSG_REGRAS);
      else alert('Erro: '+e.message);
    }
    setLoading(false);
    setShowSheetSelector(false);
  };

  // ── publicarRolagem com info completa e foto ──
  const publicarRolagem = async (rollObj, nomeJogador) => {
    if(!campCode) return;
    const nomeReal = fichaAtiva.nome || nomeJogador || char.nome || 'Desconhecido';
    const foto = fichaAtiva.foto || char.foto || null;
    // Monta string explícita: "2D6+3 (Habilidade) [4,2]+3 = 9"
    const dados = rollObj.dice + 'D6';
    const attrNome = rollObj.attr ? rollObj.attr.charAt(0).toUpperCase()+rollObj.attr.slice(1) : '';
    const perNome = rollObj.pericia ? ' + '+rollObj.pericia : '';
    const formula = dados + '+' + rollObj.av + (rollObj.mod && rollObj.mod!==0 ? (rollObj.mod>0?'+':'')+rollObj.mod : '');
    const diceStr = '['+rollObj.res.join(',')+']';
    const criStr = rollObj.crits > 0 ? ' +'+rollObj.crits+'×'+rollObj.av+'(crít)' : '';
    const modStr = rollObj.mod && rollObj.mod!==0 ? (rollObj.mod>0?' +':' ')+rollObj.mod+'(mod)' : '';
    const explicit = formula+' ('+attrNome+perNome+') '+diceStr+'+'+rollObj.av+criStr+modStr+' = '+(rollObj.fail?'FALHA CRÍTICA':rollObj.total);
    try {
      await fbPush(`campanhas/${campCode}/rolls`, {
        player: nomeReal,
        foto,
        roll: rollObj,
        explicit,
        ts: Date.now(),
        time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})
      });
      buscarTudo(campCode);
    } catch(e){}
  };

  const rolarIniciativa = async () => {
    const h = fichaAtiva.atributos?.habilidade||0;
    const temLuta = (fichaAtiva.pericias||[]).some(p=>p.nome==='Luta');
    const dados = Math.max(1, Math.min(3, 1 + (temLuta?1:0)));
    const res = Array.from({length:dados},()=>Math.floor(Math.random()*6)+1);
    const total = res.reduce((a,b)=>a+b,0)+h;
    const nomeJogador = fichaAtiva.nome || char.nome || 'Jogador';
    const foto = fichaAtiva.foto || char.foto || null;
    try {
      await fbSet(`campanhas/${campCode}/iniciativas/${myPlayerId.current}`, {
        id:myPlayerId.current, nome:nomeJogador, foto, total, res, habil:h, temLuta, ts:Date.now(), isNpc:false
      });
      buscarTudo(campCode);
    } catch(e){}
  };

  // ── MUDANÇA: NPC — qualquer pessoa pode adicionar se ehMestre (conforme decisão) ──
  const rolarIniciativaNpc = async () => {
    if(!npcNome.trim()) return;
    const h = parseInt(npcHabil)||0;
    const dados = Math.max(1, Math.min(3, 1 + (npcTemLuta?1:0)));
    const res = Array.from({length:dados},()=>Math.floor(Math.random()*6)+1);
    const total = res.reduce((a,b)=>a+b,0)+h;
    const npcId = 'npc-'+uid();
    try {
      await fbSet(`campanhas/${campCode}/iniciativas/${npcId}`, {
        id:npcId, nome:'[NPC] '+npcNome.trim(), total, res, habil:h, temLuta:npcTemLuta, ts:Date.now(), isNpc:true
      });
      setNpcNome(''); buscarTudo(campCode);
    } catch(e){}
  };

  const removerIniciativa = async (id) => {
    try { await fbDelete(`campanhas/${campCode}/iniciativas/${id}`); buscarTudo(campCode); } catch(e){}
  };
  const limparIniciativas = async () => {
    try { await fbDelete(`campanhas/${campCode}/iniciativas`); setIniciativas([]); } catch(e){}
  };
  const removerFicha = async (fichaId) => {
    if(!window.confirm('Remover esta ficha da campanha?')) return;
    try { await fbDelete(`campanhas/${campCode}/fichas/${fichaId}`); buscarTudo(campCode); } catch(e){}
  };

  // ── Ajustar recurso com +1 / -1, com feedback local imediato ──
  const ajustarRecurso = async (fichaId, campo, delta) => {
    const fichaAtual = fichas[fichaId];
    if(!fichaAtual) return;
    const base = recursosLocal[fichaId]?.[campo] ?? fichaAtual.recursos?.[campo] ?? 0;
    const novoVal = Math.max(0, base + delta);
    // atualiza local imediatamente
    setRecursosLocal(prev => ({
      ...prev,
      [fichaId]: { ...(prev[fichaId] || fichaAtual.recursos || {}), [campo]: novoVal }
    }));
    try {
      const novosRecursos = {...(fichaAtual.recursos||{}), ...(recursosLocal[fichaId]||{}), [campo]: novoVal};
      await fbSet(`campanhas/${campCode}/fichas/${fichaId}/recursos`, novosRecursos);
    } catch(e){}
  };

  const setRecursoExato = async (fichaId, campo, valor) => {
    const fichaAtual = fichas[fichaId];
    if(!fichaAtual) return;
    const novoVal = Math.max(0, parseInt(valor)||0);
    setRecursosLocal(prev => ({
      ...prev,
      [fichaId]: { ...(prev[fichaId] || fichaAtual.recursos || {}), [campo]: novoVal }
    }));
    try {
      const novosRecursos = {...(fichaAtual.recursos||{}), ...(recursosLocal[fichaId]||{}), [campo]: novoVal};
      await fbSet(`campanhas/${campCode}/fichas/${fichaId}/recursos`, novosRecursos);
    } catch(e){}
  };

  const sairCampanha = () => {
    pararPolling();
    localStorage.removeItem('3det_camp');
    setCampData(null); setCampCode(''); setFichas({}); setRolls([]);
    setIniciativas([]); setMode('menu'); setFichaAberta(null);
  };

  if(mode==='menu') return (
    <div style={{display:'flex',flexDirection:'column',gap:12,padding:16}}>
      <p style={{color:'rgba(0,229,255,0.5)',fontSize:12,lineHeight:1.6,margin:0}}>
        Crie ou entre em uma campanha para compartilhar fichas, rolagens e iniciativa em tempo real.
      </p>
      <button onClick={()=>setMode('criar')} style={{padding:'12px 16px',background:'rgba(255,214,0,0.08)',border:'1px solid rgba(255,214,0,0.35)',color:'#ffd600',borderRadius:8,cursor:'pointer',fontFamily:'Orbitron',fontSize:11,textTransform:'uppercase',letterSpacing:1}}>
        👑 Criar Nova Campanha (Mestre)
      </button>
      <button onClick={()=>setMode('entrar')} style={{padding:'12px 16px',background:'rgba(0,229,255,0.06)',border:'1px solid rgba(0,229,255,0.25)',color:'#00e5ff',borderRadius:8,cursor:'pointer',fontFamily:'Orbitron',fontSize:11,textTransform:'uppercase',letterSpacing:1}}>
        ⚡ Entrar em Campanha (Jogador)
      </button>
    </div>
  );

  if(mode==='criar') return (
    <div style={{display:'flex',flexDirection:'column',gap:10,padding:16}}>
      <button onClick={()=>{setMode('menu');setErro('');}} style={{background:'none',border:'none',color:'rgba(0,229,255,0.5)',cursor:'pointer',fontSize:11,fontFamily:'Orbitron',textAlign:'left',padding:0,marginBottom:4}}>← Voltar</button>
      <div style={{fontFamily:'Orbitron',fontSize:12,color:'#ffd600',marginBottom:4}}>👑 CRIAR CAMPANHA</div>
      <input value={campNome} onChange={e=>setCampNome(e.target.value)} placeholder="Nome da campanha..."
        style={{fontSize:14,padding:'8px 10px'}} onKeyDown={e=>e.key==='Enter'&&criarCampanha()} />
      {erro && <div style={{color:'#ff5252',fontSize:11}}>{erro}</div>}
      <button onClick={criarCampanha} disabled={loading} style={{padding:'10px',background:'rgba(255,214,0,0.12)',border:'1px solid #ffd600',color:'#ffd600',borderRadius:6,cursor:'pointer',fontFamily:'Orbitron',fontSize:11,textTransform:'uppercase',opacity:loading?0.6:1}}>
        {loading?'Criando...':'✦ Criar'}
      </button>
    </div>
  );

  if(mode==='entrar') return (
    <div style={{display:'flex',flexDirection:'column',gap:10,padding:16}}>
      <button onClick={()=>{setMode('menu');setErro('');}} style={{background:'none',border:'none',color:'rgba(0,229,255,0.5)',cursor:'pointer',fontSize:11,fontFamily:'Orbitron',textAlign:'left',padding:0,marginBottom:4}}>← Voltar</button>
      <div style={{fontFamily:'Orbitron',fontSize:12,color:'#00e5ff',marginBottom:4}}>⚡ ENTRAR NA CAMPANHA</div>
      <input value={joinCode} onChange={e=>setJoinCode(e.target.value.toUpperCase())} placeholder="Código: CAMP-XXXX"
        style={{fontSize:14,padding:'8px 10px',fontFamily:'Share Tech Mono'}} onKeyDown={e=>e.key==='Enter'&&entrarCampanha()} />
      {erro && <div style={{color:'#ff5252',fontSize:11,padding:'4px 0'}}>{erro}</div>}
      <button onClick={entrarCampanha} disabled={loading} style={{padding:'10px',background:'rgba(0,229,255,0.1)',border:'1px solid #00e5ff',color:'#00e5ff',borderRadius:6,cursor:'pointer',fontFamily:'Orbitron',fontSize:11,textTransform:'uppercase',opacity:loading?0.6:1}}>
        {loading?'Buscando...':'⚡ Entrar'}
      </button>
    </div>
  );

  // ── Sala ──
  const fichasArr = Object.values(fichas);
  const ehMestre = campData && (campData.mestre === char.nome);

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      {fbErro && (
        <div style={{background:'rgba(255,23,68,0.12)',border:'1px solid rgba(255,23,68,0.4)',margin:'8px 12px',borderRadius:8,padding:'10px 12px',flexShrink:0}}>
          <div style={{fontFamily:'Orbitron',fontSize:10,color:'#ff5252',marginBottom:4}}>🔒 BANCO BLOQUEADO (401)</div>
          <ol style={{fontSize:10,color:'rgba(255,82,82,0.7)',lineHeight:1.7,paddingLeft:16,margin:0}}>
            <li>Abra <strong style={{color:'#ff5252'}}>console.firebase.google.com</strong></li>
            <li>Projeto <strong style={{color:'#ff5252'}}>plusdistophya</strong> → Realtime Database → Regras</li>
            <li>Cole: <code style={{background:'rgba(0,0,0,0.4)',padding:'1px 5px',borderRadius:3,color:'#ffd600',fontSize:9}}>{"{ \"rules\": { \".read\": true, \".write\": true } }"}</code></li>
            <li>Clique em <strong style={{color:'#ff5252'}}>Publicar</strong></li>
          </ol>
          <button onClick={()=>buscarTudo(campCode)} style={{marginTop:8,padding:'4px 10px',background:'rgba(255,23,68,0.1)',border:'1px solid rgba(255,23,68,0.4)',color:'#ff5252',borderRadius:4,cursor:'pointer',fontFamily:'Orbitron',fontSize:8,textTransform:'uppercase'}}>🔄 Tentar novamente</button>
        </div>
      )}

      {/* Cabeçalho campanha */}
      <div style={{padding:'10px 14px',background:'rgba(0,0,0,0.5)',borderBottom:'1px solid rgba(0,229,255,0.15)',flexShrink:0}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
          <div>
            <div style={{fontFamily:'Orbitron',fontSize:13,color:'#ffd600',fontWeight:700}}>{campData?.nome}</div>
            <div style={{fontSize:9,color:'rgba(0,229,255,0.4)',fontFamily:'Share Tech Mono',marginTop:1}}>Mestre: {campData?.mestre}</div>
          </div>
          <button onClick={()=>{navigator.clipboard.writeText(campCode).catch(()=>{});alert('Código copiado: '+campCode);}}
            style={{background:'rgba(255,214,0,0.08)',border:'1px solid rgba(255,214,0,0.3)',color:'#ffd600',borderRadius:4,padding:'3px 8px',cursor:'pointer',fontSize:9,fontFamily:'Orbitron',flexShrink:0}}>
            📋 {campCode}
          </button>
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          <button onClick={registrarFicha} disabled={loading} style={{flex:1,padding:'5px 6px',background:'rgba(0,229,255,0.06)',border:'1px solid rgba(0,229,255,0.25)',color:'#00e5ff',borderRadius:5,cursor:'pointer',fontFamily:'Orbitron',fontSize:8,textTransform:'uppercase',opacity:loading?0.6:1}}>
            {loading?'..':'📤 Registrar Minha Ficha'}
          </button>
          <button onClick={()=>setShowSheetSelector(true)} style={{flex:1,padding:'5px 6px',background:'rgba(168,85,247,0.06)',border:'1px solid rgba(168,85,247,0.25)',color:'#a855f7',borderRadius:5,cursor:'pointer',fontFamily:'Orbitron',fontSize:8,textTransform:'uppercase'}}>
            📚 Registrar da Biblioteca
          </button>
          <button onClick={()=>buscarTudo(campCode)} style={{padding:'5px 8px',background:'rgba(0,229,255,0.04)',border:'1px solid rgba(0,229,255,0.15)',color:'rgba(0,229,255,0.5)',borderRadius:5,cursor:'pointer',fontSize:10}}>🔄</button>
          <button onClick={sairCampanha} style={{padding:'5px 6px',background:'rgba(255,23,68,0.06)',border:'1px solid rgba(255,23,68,0.2)',color:'#ff5252',borderRadius:5,cursor:'pointer',fontFamily:'Orbitron',fontSize:8,textTransform:'uppercase'}}>Sair</button>
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:'flex',borderBottom:'1px solid rgba(0,229,255,0.15)',flexShrink:0}}>
        {[{id:'fichas',label:'👥 Fichas',count:fichasArr.length},{id:'rolagens',label:'🎲 Rolagens',count:rolls.length},{id:'iniciativa',label:'⚔ Turno',count:iniciativas.length}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            flex:1,padding:'8px 4px',background:tab===t.id?'rgba(0,229,255,0.08)':'transparent',
            border:'none',borderBottom:tab===t.id?'2px solid #00e5ff':'2px solid transparent',
            color:tab===t.id?'#00e5ff':'rgba(0,229,255,0.4)',
            cursor:'pointer',fontFamily:'Orbitron',fontSize:8,textTransform:'uppercase',transition:'all 0.2s'
          }}>
            {t.label}{t.count>0?` (${t.count})`:''}
          </button>
        ))}
      </div>

      {/* Conteúdo */}
      <div style={{flex:1,overflowY:'auto',padding:12}}>

        {/* ── TAB FICHAS ── */}
        {tab==='fichas' && (
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {fichasArr.length===0
              ? <p style={{color:'rgba(0,229,255,0.25)',fontSize:11,textAlign:'center',fontStyle:'italic',padding:16}}>Nenhuma ficha registrada ainda.</p>
              : fichasArr.map(f=>{
                // ── Bug fix: calcular base corretamente com bônus ──
                // ── Base: usa recursos registrados como fonte de verdade ──
                // R=0 com +Vida: Math.max(1, 0*5) + bonusPV = 1 + 10 = 11
                const basePV = Math.max(1, (f.atributos?.resistencia||0)*5) + (f.bonusPV||0);
                const basePM = Math.max(1, (f.atributos?.habilidade||0)*5) + (f.bonusPM||0);
                const basePA = Math.max(1, (f.atributos?.poder||0)) + (f.bonusPA||0);

                return (
                <div key={f.id} style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.18)',borderRadius:8,overflow:'hidden'}}>
                  {/* ── Header do card ── */}
                  <div style={{padding:'8px 10px',display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}
                    onClick={()=>setFichaAberta(fichaAberta===f.id?null:f.id)}>
                    {/* Foto */}
                    {f.foto
                      ? <img src={f.foto} style={{width:42,height:42,borderRadius:6,objectFit:'cover',border:'1px solid rgba(0,229,255,0.25)',flexShrink:0}} alt="" />
                      : <div style={{width:42,height:42,borderRadius:6,background:'rgba(0,229,255,0.06)',border:'1px dashed rgba(0,229,255,0.2)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:18}}>👤</div>
                    }
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontFamily:'Orbitron',fontSize:11,color:'#e8f4f8',fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.nome||'Sem nome'}</div>
                      <div style={{fontSize:9,color:'rgba(0,229,255,0.4)',marginTop:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.arquetipo||'—'}{f.kits&&f.kits.length>0?' · '+f.kits.join(', '):''}</div>
                    </div>
                    <span style={{color:'rgba(0,229,255,0.3)',fontSize:10,flexShrink:0}}>{fichaAberta===f.id?'▲':'▼'}</span>
                  </div>

                  {/* ── Recursos ── */}
                  <div style={{padding:'0 10px 8px',display:'flex',flexDirection:'row',gap:4}} onClick={e=>e.stopPropagation()}>
                    {[
                      {campo:'pv', label:'PV', icon:'♥', color:'#ff5252', border:'rgba(255,23,68,0.5)', bg:'rgba(255,23,68,0.1)', base:basePV},
                      {campo:'pm', label:'PM', icon:'⚡', color:'#00e5ff', border:'rgba(0,229,255,0.5)', bg:'rgba(0,229,255,0.08)', base:basePM},
                      {campo:'pa', label:'PA', icon:'★',  color:'#ffd600', border:'rgba(255,214,0,0.5)', bg:'rgba(255,214,0,0.08)', base:basePA},
                    ].map(({campo,label,icon,color,border,bg,base})=>{
                      const val = recursosLocal[f.id]?.[campo] ?? f.recursos?.[campo] ?? 0;
                      const pct = base > 0 ? Math.min(100,(val/base)*100) : 0;
                      return (
                        <div key={campo} style={{background:bg,border:'1px solid '+border,borderRadius:8,overflow:'hidden',boxShadow:'0 0 8px '+border,flex:1}}>
                          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:4,padding:'6px 4px 2px'}}>
                            <span style={{fontSize:12,color:color,textShadow:'0 0 8px '+color}}>{icon}</span>
                            <span style={{fontFamily:'Orbitron',fontSize:9,fontWeight:700,color:color,letterSpacing:1,textShadow:'0 0 6px '+color}}>{label}</span>
                          </div>
                          <div style={{textAlign:'center',padding:'0 4px 2px'}}>
                            <input type="number" value={val} onChange={e=>setRecursoExato(f.id,campo,e.target.value)}
                              style={{width:'100%',textAlign:'center',fontSize:20,fontWeight:900,fontFamily:'Orbitron',color:color,background:'transparent',border:'none',outline:'none',padding:0,textShadow:'0 0 10px '+color}}/>
                            <div style={{fontSize:9,color:'rgba(255,255,255,0.3)',fontFamily:'Share Tech Mono',marginTop:-2}}>/{base}</div>
                          </div>
                          <div style={{display:'flex'}}>
                            <button onClick={()=>ajustarRecurso(f.id,campo,-1)} style={{flex:1,height:24,background:'rgba(0,0,0,0.4)',border:'none',borderTop:'1px solid '+border,borderRight:'1px solid '+border,color:color,cursor:'pointer',fontSize:16,fontWeight:900,display:'flex',alignItems:'center',justifyContent:'center'}}
                              onMouseEnter={e=>e.currentTarget.style.background='rgba(0,0,0,0.7)'}
                              onMouseLeave={e=>e.currentTarget.style.background='rgba(0,0,0,0.4)'}>−</button>
                            <button onClick={()=>ajustarRecurso(f.id,campo,+1)} style={{flex:1,height:24,background:'rgba(0,0,0,0.4)',border:'none',borderTop:'1px solid '+border,color:color,cursor:'pointer',fontSize:16,fontWeight:900,display:'flex',alignItems:'center',justifyContent:'center'}}
                              onMouseEnter={e=>e.currentTarget.style.background='rgba(0,0,0,0.7)'}
                              onMouseLeave={e=>e.currentTarget.style.background='rgba(0,0,0,0.4)'}>+</button>
                          </div>
                          <div style={{height:4,background:'rgba(0,0,0,0.6)'}}>
                            <div style={{height:'100%',width:pct+'%',background:color,boxShadow:'0 0 6px '+color,transition:'width 0.25s ease'}}/>
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  {/* ── Detalhes expandidos ── */}
                  {fichaAberta===f.id && (
                    <div style={{borderTop:'1px solid rgba(0,229,255,0.1)',padding:'10px 12px',display:'flex',flexDirection:'column',gap:8}}>
                      {/* Atributos */}
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:5}}>
                        {[['POD',f.atributos?.poder,'#ff5252'],['HAB',f.atributos?.habilidade,'#00e5ff'],['RES',f.atributos?.resistencia,'#00e676']].map(([n,v,c])=>(
                          <div key={n} style={{background:'rgba(0,0,0,0.4)',border:'1px solid '+c+'33',borderRadius:5,padding:'4px 6px',textAlign:'center'}}>
                            <div style={{fontFamily:'Orbitron',fontSize:7,color:c,marginBottom:1}}>{n}</div>
                            <div style={{fontFamily:'Orbitron',fontSize:16,fontWeight:900,color:c}}>{v??0}</div>
                          </div>
                        ))}
                      </div>
                      {/* Perícias */}
                      {f.pericias?.length>0 && (
                        <div>
                          <div style={{fontFamily:'Orbitron',fontSize:8,color:'rgba(0,229,255,0.4)',marginBottom:3,textTransform:'uppercase'}}>Perícias</div>
                          <div style={{display:'flex',flexWrap:'wrap',gap:3}}>
                            {f.pericias.map((p,i)=><span key={i} style={{fontSize:9,background:'rgba(0,229,255,0.06)',border:'1px solid rgba(0,229,255,0.15)',borderRadius:3,padding:'1px 5px',color:'rgba(0,229,255,0.6)'}}>{p.nome}</span>)}
                          </div>
                        </div>
                      )}
                      {/* Vantagens */}
                      {f.vantagens?.length>0 && (
                        <div>
                          <div style={{fontFamily:'Orbitron',fontSize:8,color:'#00e676',marginBottom:3,textTransform:'uppercase'}}>Vantagens</div>
                          <div style={{display:'flex',flexWrap:'wrap',gap:3}}>
                            {f.vantagens.map((v,i)=>(
                              <span key={i} style={{fontSize:9,background:'rgba(0,230,118,0.06)',border:'1px solid rgba(0,230,118,0.15)',borderRadius:3,padding:'1px 5px',color:'#00e676'}}>
                                {v.nome}{v.detalhe?` (${v.detalhe})`:''}
                              </span>
                            ))}
                          </div>
                        </div>
                      )}
                      {/* Desvantagens */}
                      {f.desvantagens?.length>0 && (
                        <div>
                          <div style={{fontFamily:'Orbitron',fontSize:8,color:'#ff5252',marginBottom:3,textTransform:'uppercase'}}>Desvantagens</div>
                          <div style={{display:'flex',flexWrap:'wrap',gap:3}}>
                            {f.desvantagens.map((d,i)=>(
                              <span key={i} style={{fontSize:9,background:'rgba(255,23,68,0.06)',border:'1px solid rgba(255,23,68,0.15)',borderRadius:3,padding:'1px 5px',color:'#ff5252'}}>
                                {d.nome}{d.detalhe?` (${d.detalhe})`:''}
                              </span>
                            ))}
                          </div>
                        </div>
                      )}
                      {/* Kits */}
                      {f.kits?.length>0 && (
                        <div>
                          <div style={{fontFamily:'Orbitron',fontSize:8,color:'#ffd600',marginBottom:3,textTransform:'uppercase'}}>Kits</div>
                          <div style={{display:'flex',flexWrap:'wrap',gap:3}}>
                            {f.kits.map((k,i)=><span key={i} style={{fontSize:9,background:'rgba(255,214,0,0.06)',border:'1px solid rgba(255,214,0,0.2)',borderRadius:3,padding:'1px 5px',color:'#ffd600'}}>{k}</span>)}
                          </div>
                        </div>
                      )}
                      {/* Técnicas */}
                      {f.tecnicas?.length>0 && (
                        <div>
                          <div style={{fontFamily:'Orbitron',fontSize:8,color:'#a855f7',marginBottom:3,textTransform:'uppercase'}}>Técnicas</div>
                          <div style={{display:'flex',flexWrap:'wrap',gap:3}}>
                            {f.tecnicas.map((t,i)=><span key={i} style={{fontSize:9,background:'rgba(168,85,247,0.06)',border:'1px solid rgba(168,85,247,0.15)',borderRadius:3,padding:'1px 5px',color:'#a855f7'}}>{t.nome}</span>)}
                          </div>
                        </div>
                      )}
                      {/* Anotações */}
                      {f.anotacoes && (
                        <div>
                          <div style={{fontFamily:'Orbitron',fontSize:8,color:'rgba(0,229,255,0.4)',marginBottom:3,textTransform:'uppercase'}}>Anotações</div>
                          <div style={{fontSize:9,color:'rgba(0,229,255,0.5)',background:'rgba(0,0,0,0.3)',borderRadius:4,padding:'5px 7px',lineHeight:1.5}}>{f.anotacoes}</div>
                        </div>
                      )}
                      {/* Botões mestre */}
                      <div style={{display:'flex',gap:6,marginTop:4,flexWrap:'wrap'}}>
                        {/* Todos podem baixar qualquer ficha */}
                        <button onClick={()=>{
                          const blob = new Blob([JSON.stringify(f,null,2)],{type:'application/json'});
                          const a = document.createElement('a');
                          a.href = URL.createObjectURL(blob);
                          a.download = (f.nome||'ficha')+'_3det.json';
                          a.click();
                        }} style={{flex:1,padding:'6px 0',background:'rgba(255,214,0,0.08)',border:'1px solid rgba(255,214,0,0.3)',color:'#ffd600',borderRadius:4,cursor:'pointer',fontFamily:'Orbitron',fontSize:8,textTransform:'uppercase'}}>
                          💾 Baixar JSON
                        </button>
                        {/* Jogador: remover a própria ficha */}
                        {f.id===myPlayerId.current && (
                          <button onClick={()=>{if(window.confirm('Remover sua ficha da campanha?'))removerFicha(f.id);}}
                            style={{flex:1,padding:'6px 0',background:'rgba(255,23,68,0.05)',border:'1px solid rgba(255,23,68,0.18)',color:'#ff5252',borderRadius:4,cursor:'pointer',fontFamily:'Orbitron',fontSize:8,textTransform:'uppercase'}}>
                            × Sair da Mesa
                          </button>
                        )}
                        {/* Mestre: remover ficha de outro jogador */}
                        {ehMestre && f.id!==myPlayerId.current && (
                          <button onClick={()=>removerFicha(f.id)} style={{flex:1,padding:'6px 0',background:'rgba(255,23,68,0.05)',border:'1px solid rgba(255,23,68,0.18)',color:'#ff5252',borderRadius:4,cursor:'pointer',fontFamily:'Orbitron',fontSize:8,textTransform:'uppercase'}}>
                            × Remover
                          </button>
                        )}
                      </div>
                    </div>
                  )}
                </div>
              );})}
          </div>
        )}

        {/* ── TAB ROLAGENS ── */}
        {tab==='rolagens' && (
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            <div style={{display:'flex',gap:6}}>
              <button onClick={()=>setDiceOpen(true)} style={{
                flex:1,padding:'10px',background:'rgba(0,229,255,0.08)',border:'1px solid rgba(0,229,255,0.35)',
                color:'#00e5ff',borderRadius:8,cursor:'pointer',fontFamily:'Orbitron',fontSize:10,
                textTransform:'uppercase',letterSpacing:1
              }}>🎲 Abrir Dados</button>
              {rolls.length>0 && (
                <button onClick={async()=>{
                  try{await fbDelete(`campanhas/${campCode}/rolls`);setRolls([]);}catch(e){}
                }} style={{
                  padding:'10px 12px',background:'rgba(255,23,68,0.06)',border:'1px solid rgba(255,23,68,0.3)',
                  color:'#ff5252',borderRadius:8,cursor:'pointer',fontFamily:'Orbitron',fontSize:9,
                  textTransform:'uppercase'
                }}>✕ Limpar</button>
              )}
            </div>
            {diceOpen && (
              <DiceModal
                onClose={()=>setDiceOpen(false)}
                attrs={fichaAtiva.atributos}
                pericias={fichaAtiva.pericias}
                onRoll={(r)=>{publicarRolagem(r, fichaAtiva.nome);setDiceOpen(false);}}
              />
            )}
            {rolls.length===0
              ? <p style={{color:'rgba(0,229,255,0.2)',fontSize:11,textAlign:'center',fontStyle:'italic',padding:12}}>Nenhuma rolagem ainda.</p>
              : rolls.map((r,idx)=>(
                <div key={r._fbKey||idx} className="fadeIn" style={{background:'rgba(0,0,0,0.45)',border:'1px solid rgba(0,229,255,0.15)',borderRadius:8,padding:'8px 10px'}}>
                  {/* Header: foto + nome + hora */}
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                    {r.foto
                      ? <img src={r.foto} style={{width:28,height:28,borderRadius:4,objectFit:'cover',border:'1px solid rgba(0,229,255,0.2)',flexShrink:0}} alt="" />
                      : <div style={{width:28,height:28,borderRadius:4,background:'rgba(0,229,255,0.06)',border:'1px solid rgba(0,229,255,0.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,flexShrink:0}}>👤</div>
                    }
                    <span style={{fontFamily:'Orbitron',fontSize:10,color:'#00e5ff',fontWeight:700,flex:1}}>{r.player}</span>
                    <span style={{fontSize:8,color:'rgba(0,229,255,0.3)',fontFamily:'Share Tech Mono'}}>{r.time}</span>
                  </div>
                  {/* Resultado */}
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <div style={{fontFamily:'Orbitron',fontSize:26,fontWeight:900,color:r.roll?.fail?'#ff1744':'#00e5ff',textShadow:'0 0 12px '+(r.roll?.fail?'rgba(255,23,68,0.5)':'rgba(0,229,255,0.4)'),minWidth:40,textAlign:'center'}}>
                      {r.roll?.fail?'💥':r.roll?.total}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      {/* String explícita */}
                      <div style={{fontSize:10,color:'rgba(0,229,255,0.8)',fontFamily:'Share Tech Mono',lineHeight:1.5,wordBreak:'break-all'}}>
                        {r.explicit || (r.roll?.dice+'D6+'+r.roll?.av+' ['+r.roll?.res?.join(',')+'] = '+(r.roll?.fail?'FALHA':r.roll?.total))}
                      </div>
                      {/* Dados individuais */}
                      <div style={{display:'flex',gap:3,marginTop:4,flexWrap:'wrap'}}>
                        {r.roll?.res?.map((v,i)=>{
                          const isCrit = v>=(r.roll?.crit||6);
                          return (
                            <span key={i} style={{
                              width:20,height:20,display:'inline-flex',alignItems:'center',justifyContent:'center',
                              fontSize:10,fontWeight:900,borderRadius:3,
                              background:isCrit?'rgba(255,214,0,0.2)':r.roll?.fail?'rgba(255,23,68,0.15)':'rgba(0,229,255,0.08)',
                              color:isCrit?'#ffd600':r.roll?.fail?'#ff5252':'#00e5ff',
                              border:'1px solid '+(isCrit?'rgba(255,214,0,0.4)':r.roll?.fail?'rgba(255,23,68,0.3)':'rgba(0,229,255,0.2)')
                            }}>{v}</span>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                </div>
              ))
            }
          </div>
        )}

        {/* ── TAB INICIATIVA ── */}
        {tab==='iniciativa' && (
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            <button onClick={rolarIniciativa} style={{
              width:'100%',padding:'10px',background:'rgba(255,214,0,0.08)',border:'1px solid rgba(255,214,0,0.35)',
              color:'#ffd600',borderRadius:8,cursor:'pointer',fontFamily:'Orbitron',fontSize:10,
              textTransform:'uppercase',letterSpacing:1
            }}>🎲 Rolar Minha Iniciativa ({fichaAtiva.nome||char.nome||'Meu Personagem'})</button>

            {/* NPC — todos podem adicionar ── */}
            <div style={{background:'rgba(168,85,247,0.06)',border:'1px solid rgba(168,85,247,0.2)',borderRadius:6,padding:8}}>
                <div style={{fontFamily:'Orbitron',fontSize:8,color:'#a855f7',marginBottom:5,textTransform:'uppercase'}}>👾 Adicionar NPC</div>
                <div style={{display:'flex',gap:5,marginBottom:5}}>
                  <input value={npcNome} onChange={e=>setNpcNome(e.target.value)} placeholder="Nome do NPC..."
                    style={{flex:1,fontSize:11,padding:'4px 7px'}} onKeyDown={e=>e.key==='Enter'&&rolarIniciativaNpc()} />
                  <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:1}}>
                    <label style={{fontSize:7,color:'rgba(168,85,247,0.6)',fontFamily:'Orbitron',textTransform:'uppercase'}}>HAB</label>
                    <input type="number" value={npcHabil} onChange={e=>setNpcHabil(e.target.value)} min={0} max={5}
                      style={{width:36,textAlign:'center',fontSize:14,fontWeight:700,padding:'4px'}} />
                  </div>
                </div>
                {/* Toggle Luta */}
                <button onClick={()=>setNpcTemLuta(!npcTemLuta)} style={{
                  width:'100%',marginBottom:5,padding:'4px 0',
                  background:npcTemLuta?'rgba(255,23,68,0.15)':'rgba(0,0,0,0.3)',
                  border:'1px solid '+(npcTemLuta?'rgba(255,23,68,0.5)':'rgba(168,85,247,0.2)'),
                  color:npcTemLuta?'#ff5252':'rgba(168,85,247,0.5)',
                  borderRadius:4,cursor:'pointer',fontFamily:'Orbitron',fontSize:8,textTransform:'uppercase'
                }}>
                  {npcTemLuta ? '⚔ TEM LUTA (+1D)' : '⚔ Sem Luta (1D)'}
                </button>
                <div style={{display:'flex',gap:5}}>
                  <button onClick={rolarIniciativaNpc} style={{flex:1,background:'rgba(168,85,247,0.1)',border:'1px solid rgba(168,85,247,0.3)',color:'#a855f7',borderRadius:4,padding:'5px 0',cursor:'pointer',fontSize:9,fontFamily:'Orbitron',textTransform:'uppercase'}}>
                    🎲 Rolar NPC
                  </button>
                  <button onClick={limparIniciativas} style={{flex:1,background:'rgba(255,23,68,0.06)',border:'1px solid rgba(255,23,68,0.2)',color:'#ff5252',borderRadius:4,padding:'5px 0',cursor:'pointer',fontSize:9,fontFamily:'Orbitron',textTransform:'uppercase'}}>
                    ✕ Limpar Tudo
                  </button>
                </div>
            </div>

            {iniciativas.length===0
              ? <p style={{color:'rgba(255,214,0,0.25)',fontSize:11,textAlign:'center',fontStyle:'italic',padding:12}}>Nenhuma iniciativa rolada ainda.</p>
              : iniciativas.map((ini,idx)=>(
                <div key={ini.id||idx} className="fadeIn" style={{
                  display:'flex',alignItems:'center',gap:8,padding:'7px 10px',
                  background:idx===0?'rgba(255,214,0,0.08)':ini.isNpc?'rgba(168,85,247,0.06)':'rgba(0,0,0,0.4)',
                  border:'1px solid '+(idx===0?'rgba(255,214,0,0.35)':ini.isNpc?'rgba(168,85,247,0.25)':'rgba(0,229,255,0.12)'),
                  borderRadius:6
                }}>
                  {/* Foto ou emoji NPC */}
                  {ini.foto
                    ? <img src={ini.foto} style={{width:28,height:28,borderRadius:4,objectFit:'cover',border:'1px solid rgba(0,229,255,0.2)',flexShrink:0}} alt="" />
                    : <div style={{width:28,height:28,borderRadius:4,background:ini.isNpc?'rgba(168,85,247,0.1)':'rgba(0,229,255,0.06)',border:'1px solid rgba(0,229,255,0.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,flexShrink:0}}>{ini.isNpc?'👾':'👤'}</div>
                  }
                  {/* Total */}
                  <div style={{fontFamily:'Orbitron',fontSize:18,fontWeight:900,color:idx===0?'#ffd600':ini.isNpc?'#a855f7':'#00e5ff',minWidth:28,textAlign:'center'}}>{ini.total}</div>
                  {/* Info */}
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontFamily:'Orbitron',fontSize:9,color:idx===0?'#ffd600':ini.isNpc?'#a855f7':'#e8f4f8',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                      {idx===0?'👑 ':''}{ini.nome}
                    </div>
                    <div style={{fontSize:8,color:'rgba(0,229,255,0.35)',fontFamily:'Share Tech Mono'}}>
                      {ini.res?.length+'D6+H'+ini.habil+' ['+ini.res?.join(',')+'] +'+ini.habil+' = '+ini.total}
                      {ini.temLuta?' · Luta':''}
                    </div>
                  </div>
                  {(ehMestre||ini.id===myPlayerId.current) && (
                    <button onClick={()=>removerIniciativa(ini.id)} style={{background:'none',border:'none',color:'rgba(255,23,68,0.5)',cursor:'pointer',fontSize:14,padding:'0 2px',lineHeight:1}}>×</button>
                  )}
                </div>
              ))
            }
          </div>
        )}
      </div>

      {/* Modal biblioteca */}
      {showSheetSelector && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,5,15,0.95)',zIndex:400,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
          <div className="panel" style={{width:'100%',maxWidth:400,maxHeight:'80vh',overflowY:'auto',padding:20}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:16}}>
              <span style={{fontFamily:'Orbitron',color:'#a855f7',fontSize:14}}>📚 Selecionar Ficha</span>
              <button onClick={()=>setShowSheetSelector(false)} style={{background:'none',border:'none',color:'#ff1744',fontSize:20,cursor:'pointer'}}>×</button>
            </div>
            {sheets.length===0
              ? <p style={{color:'rgba(0,229,255,0.3)',textAlign:'center'}}>Nenhuma ficha salva na biblioteca.</p>
              : sheets.map(s=>(
                <div key={s.id} onClick={()=>registrarFichaFromSheet(s)} style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(168,85,247,0.3)',borderRadius:6,padding:10,marginBottom:8,cursor:'pointer'}}>
                  <div style={{fontWeight:700,color:'#e8f4f8'}}>{s.nome||'Sem nome'}</div>
                  <div style={{fontSize:10,color:'rgba(168,85,247,0.6)'}}>{s.arquetipo||'—'}</div>
                </div>
              ))
            }
          </div>
        </div>
      )}
    </div>
  );
};

// ── Main App ─────────────────────────────────────────────────────────────────
const App = () => {
  const fileRef = useRef(null);
  const impRef = useRef(null);
  const [char,setChar] = useState({...EMPTY,id:Date.now()});
  const [sheets,setSheets] = useState([]);
  const [sidebar,setSidebar] = useState(false);
  const [dice,setDice] = useState(false);
  const [kitIn,setKitIn] = useState('');
  const [campPanel,setCampPanel] = useState(false);
  const [bestiary,setBestiary] = useState(false);
  useEffect(()=>{
    window._setCampPanel = setCampPanel;
    window._setBestiary  = setBestiary;
    return ()=>{ delete window._setCampPanel; delete window._setBestiary; };
  },[]);
  const [arqPreviewOpen,setArqPreviewOpen] = useState(false);
  const [emCampanha,setEmCampanha] = useState(false);
  const [listTab,setListTab] = useState('pericias'); // mobile: aba ativa das listas
  const isMobile = useIsMobile();

  useEffect(()=>{ setEmCampanha(!!localStorage.getItem('3det_camp')); },[campPanel]);
  useEffect(()=>{
    const s = localStorage.getItem('3det_v2');
    if(s) try{setSheets(JSON.parse(s))}catch(e){}
  },[]);

  const syncToCloud = async () => {
    try {
      let sid = char.syncId;
      if(!sid){ sid=Math.random().toString(36).substring(2,7).toUpperCase(); }
      // Salva ficha completa incluindo foto
      await fbSet(`fichas/${sid}`, {...char, syncId:sid});
      setChar(c=>({...c, syncId:sid}));
      navigator.clipboard.writeText(sid).catch(()=>{});
      alert('☁️ Ficha salva!\nCódigo: '+sid+'\n(Já copiado!)');
    } catch(e){ alert('❌ Erro: '+e.message); }
  };

  // Helper: recalcula bonusPA/PM/PV a partir das vantagens de qualquer ficha
  const recalcBonus = (fichaData) => {
    const vants = fichaData.vantagens || [];
    let bPA=0, bPM=0, bPV=0;
    vants.forEach(v => {
      if(v.nome==='+Ação') bPA+=2;
      if(v.nome==='+Mana') bPM+=10;
      if(v.nome==='+Vida') bPV+=10;
    });
    return {bonusPA:bPA, bonusPM:bPM, bonusPV:bPV};
  };

  const importFromCloud = async () => {
    const code = prompt('Código da ficha (ex: 8F2A1):');
    if(!code) return;
    try {
      const data = await fbGet(`fichas/${code.trim().toUpperCase()}`);
      if(!data || !data.nome) { alert('❌ Nenhuma ficha encontrada.'); return; }

      const l = {...data};
      // Gera novo id local se necessário
      if(!l.id || String(l.id).startsWith('j-')) l.id = Date.now();

      // Normaliza inventário
      if(!l.inventario || typeof l.inventario !== 'object') l.inventario = {itens:[],dinheiro:''};
      if(!Array.isArray(l.inventario.itens)) l.inventario.itens = [];

      // Normaliza arrays — converte qualquer formato para objeto correto
      const normItem = (item, idx, custo='1') => {
        if(!item) return null;
        if(typeof item === 'string') return {id:Date.now()+idx+Math.random(),nome:item,detalhe:'',descricao:'',custo};
        return {
          id: item.id || Date.now()+idx+Math.random(),
          nome: item.nome || '',
          detalhe: item.detalhe || '',
          descricao: item.descricao || '',
          custo: item.custo !== undefined ? item.custo : custo
        };
      };
      l.pericias     = Array.isArray(l.pericias)     ? l.pericias.map((p,i)=>normItem(p,i,'1')).filter(Boolean)  : [];
      l.vantagens    = Array.isArray(l.vantagens)    ? l.vantagens.map((v,i)=>normItem(v,i,'1')).filter(Boolean)  : [];
      l.desvantagens = Array.isArray(l.desvantagens) ? l.desvantagens.map((d,i)=>normItem(d,i,'-1')).filter(Boolean) : [];
      l.tecnicas     = Array.isArray(l.tecnicas)     ? l.tecnicas.map((t,i)=>({
        id: t.id||Date.now()+i+Math.random(), nome:t.nome||'', custo:t.custo||'', descricao:t.descricao||''
      })) : [];
      l.kits = Array.isArray(l.kits) ? l.kits.map((k,i)=>{
        if(typeof k === 'string') return {id:Date.now()+i+Math.random(), nome:k};
        return {id:k.id||Date.now()+i+Math.random(), nome:k.nome||''};
      }) : [];
      if(!l.atributos || typeof l.atributos !== 'object') l.atributos = {poder:0,habilidade:0,resistencia:0};
      if(!l.recursos  || typeof l.recursos  !== 'object') l.recursos  = {pa:1,pm:1,pv:1};

      const novaFicha = {...EMPTY, ...l, ...recalcBonus(l)};

      // Salva na biblioteca (sem foto se necessário para não estourar localStorage)
      const fichaParaBiblioteca = {...novaFicha};
      setSheets(p => {
        const sem = p.filter(x => x.id !== novaFicha.id);
        const arr = [...sem, fichaParaBiblioteca];
        try {
          localStorage.setItem('3det_v2', JSON.stringify(arr));
        } catch(e) {
          // foto base64 muito grande — salva sem foto
          const arrSemFoto = arr.map(f=>({...f, foto:null}));
          try { localStorage.setItem('3det_v2', JSON.stringify(arrSemFoto)); } catch(e2){}
        }
        return arr;
      });

      // Carrega na ficha ativa COM foto
      setChar(novaFicha);
      alert('☁️ Ficha "' + novaFicha.nome + '" carregada!');
    } catch(e) {
      console.error('importFromCloud erro:', e);
      alert('❌ Erro ao importar: ' + e.message);
    }
  };

  const save = () => {
    const ns = {...char,id:char.id||Date.now(),saved:new Date().toISOString()};
    try {
      const idx = sheets.findIndex(s=>s.id===ns.id);
      const arr = [...sheets];
      if(idx>=0) arr[idx]=ns; else arr.push(ns);
      localStorage.setItem('3det_v2',JSON.stringify(arr));
      setSheets(arr); setChar(ns); alert('Ficha salva!');
    } catch(e){alert('Erro ao salvar. Tente remover a foto.');}
  };

  // ── MUDANÇA: Pontos = soma total, pontosMax = máximo definido pelo jogador ──
  const pts = useMemo(()=>{
    const a = (char.atributos.poder||0)+(char.atributos.habilidade||0)+(char.atributos.resistencia||0);
    const v = char.vantagens.reduce((x,i)=>x+(parseInt(i.custo)||0),0);
    const d = char.desvantagens.reduce((x,i)=>{
      const obrig = i.detalhe&&(i.detalhe.includes('(Kit:')||i.detalhe.includes('(Arquétipo:'));
      return obrig?x:x+(parseInt(i.custo)||0);
    },0);
    const p = char.pericias.reduce((x,i)=>x+(parseInt(i.custo)||0),0);
    const n = (char.kits||[]).length; const k = n*(n+1)/2;
    return a+v+d+p+k+(parseInt(char.arquetipoCusto)||0);
  },[char.atributos,char.vantagens,char.desvantagens,char.pericias,char.kits,char.arquetipoCusto]);

  const pontosMax = parseInt(char.pontosMax)||10;
  const pontosExcedido = pts > pontosMax;

  const addKit = () => {
    if(!kitIn.trim()) return;
    const name = kitIn.trim();
    const kit = KITS[name];
    if(!kit) return;
    setChar(c => {
      // Verifica se kit já foi adicionado
      if((c.kits||[]).some(k=>k.nome===name)) return c;
      const newV = [...c.vantagens,...(kit.poderes||[]).map((p,i)=>({
        id:Date.now()+i+Math.random(),nome:p.nome,detalhe:'(Kit: '+name+')',descricao:p.desc||'',custo:'0'
      }))];
      let newD = [...c.desvantagens];
      if(kit.desv&&!newD.some(d=>d.nome===kit.desv.nome)){
        newD.push({id:Date.now()+Math.random(),nome:kit.desv.nome,detalhe:'(Kit: '+name+')',descricao:kit.desv.desc||'',custo:kit.desv.custo||'-1'});
      }
      return {...c, kits:[...(c.kits||[]),{id:Date.now(),nome:name}], vantagens:newV, desvantagens:newD};
    });
    setKitIn('');
  };

  const addItem = list => setChar(c=>({...c,[list]:[...(c[list]||[]),{id:Date.now(),nome:'',detalhe:'',descricao:'',custo:list==='pericias'?'1':''}]}));
  // Adiciona item já construído (usado pelos modais de vantagens/desvantagens)
  const addItemDirect = (list, item) => setChar(c=>{
    const nl = [...(c[list]||[]), item];
    const bonus = list==='vantagens' ? calcBonus(nl) : {};
    const recursos = list==='vantagens' ? sincRecursos(c, bonus) : null;
    return {...c, [list]:nl, ...bonus, ...(recursos ? {recursos} : {})};
  });

  // Recalcula bônus de +Ação/+Mana/+Vida a partir da lista de vantagens
  const calcBonus = (vantagens) => {
    let bPA=0, bPM=0, bPV=0;
    vantagens.forEach(v=>{
      if(v.nome==='+Ação') bPA+=2;
      if(v.nome==='+Mana') bPM+=10;
      if(v.nome==='+Vida') bPV+=10;
    });
    return {bonusPA:bPA, bonusPM:bPM, bonusPV:bPV};
  };

  // Recalcula recursos: ao ganhar bônus sobe o atual junto; ao perder bônus apenas corta se necessário
  const sincRecursos = (c, bonus) => {
    const bPV = bonus.bonusPV ?? c.bonusPV ?? 0;
    const bPM = bonus.bonusPM ?? c.bonusPM ?? 0;
    const bPA = bonus.bonusPA ?? c.bonusPA ?? 0;
    const maxPVnovo = Math.max(1, (c.atributos?.resistencia||0)*5) + bPV;
    const maxPMnovo = Math.max(1, (c.atributos?.habilidade||0)*5) + bPM;
    const maxPAnovo = Math.max(1, (c.atributos?.poder||0)) + bPA;
    // Diferença de bônus: se aumentou, sobe o atual; se diminuiu, corta no novo máximo
    const deltaPV = bPV - (c.bonusPV||0);
    const deltaPM = bPM - (c.bonusPM||0);
    const deltaPA = bPA - (c.bonusPA||0);
    const pvAtual = deltaPV > 0 ? (c.recursos?.pv||0) + deltaPV : Math.min(c.recursos?.pv||0, maxPVnovo);
    const pmAtual = deltaPM > 0 ? (c.recursos?.pm||0) + deltaPM : Math.min(c.recursos?.pm||0, maxPMnovo);
    const paAtual = deltaPA > 0 ? (c.recursos?.pa||0) + deltaPA : Math.min(c.recursos?.pa||0, maxPAnovo);
    return {pv: pvAtual, pm: pmAtual, pa: paAtual};
  };

  const updItem = (list,id,f,v) => setChar(c=>{
    const nl = c[list].map(item=>{
      if(item.id!==id) return item;
      const u = {...item,[f]:v};
      if(f==='nome'){
        const info = list==='vantagens'?VANTAGENS[v]:list==='desvantagens'?DESVANTAGENS[v]:null;
        if(info){if(!u.custo||u.custo==='')u.custo=(info.c.match(/-?\d+/)||[''])[0]; u.descricao=info.d;}
        // Auto-preenche descrição da perícia ao selecionar
        if(list==='pericias'){
          const pd = PERICIAS_DESC[v];
          if(pd) u.descricao = pd;
        }
        // Auto-preenche técnica ao selecionar nome da lista
        if(list==='tecnicas'){
          const tec = TECNICAS_DATA[v];
          if(tec){
            u.custo = tec.custo + ' | ' + tec.alcance + ' | ' + tec.duracao;
            u.descricao = '[' + tec.tipo + '] Req: ' + tec.req + '\n' + tec.desc;
          }
        }
        u.detalhe='';
      }
      // Atualiza descrição ao escolher sub-opção (ex: Ataque Especial → Preciso)
      if(f==='detalhe' && v){
        const sub = SUBOPCOES[item.nome] && SUBOPCOES[item.nome][v];
        if(sub) u.descricao = sub;
      }
      return u;
    });
    const bonus = list==='vantagens' ? calcBonus(nl) : {};
    const recursos = list==='vantagens' ? sincRecursos(c, bonus) : null;
    return {...c,[list]:nl,...bonus,...(recursos ? {recursos} : {})};
  });

  const remItem = (list,id) => setChar(c=>{
    const nl = c[list].filter(i=>i.id!==id);
    const bonus = list==='vantagens' ? calcBonus(nl) : {};
    const recursos = list==='vantagens' ? sincRecursos(c, bonus) : null;
    return {...c,[list]:nl,...bonus,...(recursos ? {recursos} : {})};
  });

  const maxPA = (char.atributos.poder||1) + (char.bonusPA||0);
  const maxPM = (char.atributos.habilidade===0?1:char.atributos.habilidade*5) + (char.bonusPM||0);
  const maxPV = (char.atributos.resistencia===0?1:char.atributos.resistencia*5) + (char.bonusPV||0);

  const exportJ = () => {
    const d="data:text/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(char));
    const a=document.createElement('a');a.href=d;a.download=(char.nome||'personagem')+'_3det.json';
    document.body.appendChild(a);a.click();a.remove();
  };
  const importJ = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const l = JSON.parse(ev.target.result);

        // Normaliza id — Firebase usa "j-xxx", localmente usamos número
        if (!l.id || String(l.id).startsWith('j-')) l.id = Date.now();

        // Garante inventário
        if (!l.inventario || typeof l.inventario !== 'object') l.inventario = {itens:[],dinheiro:''};
        if (!Array.isArray(l.inventario.itens)) l.inventario.itens = [];

        // Normaliza arrays de itens — cada um precisa ter id, nome, detalhe, descricao, custo
        const normItem = (item, idx, custo='1') => {
          if (typeof item === 'string') return {id:Date.now()+idx+Math.random(),nome:item,detalhe:'',descricao:'',custo};
          return {id:item.id||Date.now()+idx+Math.random(),nome:item.nome||'',detalhe:item.detalhe||'',descricao:item.descricao||'',custo:item.custo||custo};
        };
        l.pericias = Array.isArray(l.pericias) ? l.pericias.map((p,i)=>normItem(p,i,'1')) : [];
        l.vantagens = Array.isArray(l.vantagens) ? l.vantagens.map((v,i)=>normItem(v,i,'1')) : [];
        l.desvantagens = Array.isArray(l.desvantagens) ? l.desvantagens.map((d,i)=>normItem(d,i,'-1')) : [];

        // Técnicas têm estrutura diferente (custo em vez de custo pts)
        l.tecnicas = Array.isArray(l.tecnicas) ? l.tecnicas.map((t,i)=>({
          id:t.id||Date.now()+i+Math.random(),
          nome:t.nome||'',
          custo:t.custo||'',
          descricao:t.descricao||''
        })) : [];

        // Kits
        if (!Array.isArray(l.kits)) l.kits = [];
        l.kits = l.kits.map((k,i) => {
          if (typeof k === 'string') return {id:Date.now()+i+Math.random(),nome:k};
          return {id:k.id||Date.now()+i+Math.random(),nome:k.nome||''};
        });

        // Atributos e recursos
        if (!l.atributos || typeof l.atributos !== 'object') l.atributos = {poder:0,habilidade:0,resistencia:0};
        if (!l.recursos || typeof l.recursos !== 'object') l.recursos = {pa:0,pm:5,pv:5};

        const novaFicha = {...EMPTY, ...l, ...recalcBonus(l)};
        setChar(novaFicha);

        // Salva na biblioteca automaticamente
        setSheets(prev => {
          const sem = prev.filter(s => s.id !== novaFicha.id);
          const arr = [...sem, novaFicha];
          localStorage.setItem('3det_v2', JSON.stringify(arr));
          return arr;
        });

        alert('✅ Ficha "' + (l.nome||'sem nome') + '" importada com sucesso!');
      } catch(err) {
        alert('❌ Erro ao importar: ' + err.message);
        console.error(err);
      }
      e.target.value = null;
    };
    reader.readAsText(file);
  };

  // ── Inventário simplificado ──
  const inv = char.inventario || {itens:[],dinheiro:''};
  const addInvItem = () => setChar(c=>({...c,inventario:{...inv,itens:[...inv.itens,{id:Date.now(),nome:'',desc:''}]}}));
  const updInvItem = (id,campo,val) => setChar(c=>({...c,inventario:{...inv,itens:inv.itens.map(i=>i.id===id?{...i,[campo]:val}:i)}}));
  const remInvItem = (id) => setChar(c=>({...c,inventario:{...inv,itens:inv.itens.filter(i=>i.id!==id)}}));
  const setDinheiro = (v) => setChar(c=>({...c,inventario:{...inv,dinheiro:v}}));

  return (
    <div style={{minHeight:'100vh',background:'var(--cb)',color:'var(--ct)',position:'relative',zIndex:1}}>

      {/* TOP BAR */}
      <div className="no-print" style={{position:'sticky',top:0,zIndex:100,background:'linear-gradient(90deg,var(--cb),var(--cp),var(--cb))',borderBottom:'1px solid var(--ca)',boxShadow:'0 0 20px var(--cg2)',padding:isMobile?'8px 12px':'10px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:6,flexWrap:'wrap'}}>
        <Btn onClick={()=>setSidebar(true)} style={{padding:'6px 10px',fontSize:10,flexShrink:0}}>☰</Btn>
        <div style={{textAlign:'center',flex:1,minWidth:80}}>
          <div className="flicker orb" style={{color:'#00e5ff',textShadow:'0 0 10px var(--cg)',fontSize:isMobile?'clamp(9px,4vw,14px)':'clamp(10px,3vw,18px)',fontWeight:900,letterSpacing:isMobile?2:4,textTransform:'uppercase'}}>PLUS DISTOPHYA</div>
          {!isMobile && <div className="mono" style={{color:'rgba(0,229,255,0.4)',fontSize:8,letterSpacing:3}}>◆ FICHA 3DeT VICTORY ◆</div>}
        </div>
        <div style={{display:'flex',gap:6,justifyContent:'flex-end',flexShrink:0,alignItems:'center'}}>
          {!isMobile && <button onClick={syncToCloud} style={{background:'rgba(168,85,247,0.15)',border:'1px solid rgba(168,85,247,0.4)',color:'#a855f7',borderRadius:8,padding:'8px 14px',cursor:'pointer',fontSize:11,fontFamily:'Orbitron',textTransform:'uppercase',letterSpacing:1,display:'flex',alignItems:'center',gap:5}}>☁️ SYNC</button>}
          {!isMobile && <button onClick={importFromCloud} style={{background:'rgba(236,72,153,0.15)',border:'1px solid rgba(236,72,153,0.4)',color:'#ec4899',borderRadius:8,padding:'8px 14px',cursor:'pointer',fontSize:11,fontFamily:'Orbitron',textTransform:'uppercase',letterSpacing:1}}>📥 IMPORT</button>}
          {isMobile && <button onClick={syncToCloud} style={{background:'rgba(168,85,247,0.15)',border:'1px solid rgba(168,85,247,0.4)',color:'#a855f7',borderRadius:8,padding:'8px 10px',cursor:'pointer',fontSize:16}}>☁️</button>}
          <button onClick={()=>setCampPanel(!campPanel)} style={{
            background:emCampanha?'rgba(0,229,255,0.12)':'rgba(255,214,0,0.12)',
            border:'1px solid '+(emCampanha?'rgba(0,229,255,0.4)':'rgba(255,214,0,0.4)'),
            color:emCampanha?'#00e5ff':'#ffd600',
            borderRadius:8,padding:'8px 14px',cursor:'pointer',
            fontSize:isMobile?16:11,fontFamily:'Orbitron',textTransform:'uppercase',
            letterSpacing:1,position:'relative',display:'flex',alignItems:'center',gap:5
          }}>
            {isMobile ? '⚔' : '⚔ MESA'}
