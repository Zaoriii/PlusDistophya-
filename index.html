<script type="text/babel">

const uid = () => Math.random().toString(36).substring(2, 9);

async function fbGet(path) {
  const r = await fetch(`${FIREBASE}/${path}.json`);
  if (r.status === 401) throw new Error('REGRAS_FIREBASE');
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}
async function fbSet(path, data) {
  const r = await fetch(`${FIREBASE}/${path}.json`, {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });
  if (r.status === 401) throw new Error('REGRAS_FIREBASE');
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}
async function fbPush(path, data) {
  const r = await fetch(`${FIREBASE}/${path}.json`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });
  if (r.status === 401) throw new Error('REGRAS_FIREBASE');
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}
async function fbDelete(path) {
  const r = await fetch(`${FIREBASE}/${path}.json`, { method: 'DELETE' });
  if (r.status === 401) throw new Error('REGRAS_FIREBASE');
}

// ── Small UI Components ───────────────────────────────────────────────────────
const Icon = ({n,s='16'}) => {
  const ref = useRef(null);
  useLayoutEffect(() => {
    if(ref.current && window.lucide) {
      ref.current.innerHTML = `<i data-lucide="${n}" style="width:${s}px;height:${s}px"></i>`;
      window.lucide.createIcons({root:ref.current});
    }
  });
  return <span ref={ref} style={{display:'inline-flex',alignItems:'center',justifyContent:'center'}} />;
};

const Btn = ({onClick,children,style={},className='',disabled=false}) => (
  <button onClick={onClick} disabled={disabled} className={'cbtn '+className} style={{...style,opacity:disabled?0.5:1,cursor:disabled?'not-allowed':'pointer'}}>{children}</button>
);

const Stepper = ({value,onChange,min=0}) => (
  <div style={{display:'flex',alignItems:'center',gap:4}}>
    <Btn onClick={()=>onChange(Math.max(min,value-1))} style={{padding:'2px 8px',fontSize:14}}>−</Btn>

      style={{width:50,textAlign:'center',fontSize:20,fontWeight:900}} />
    <Btn onClick={()=>onChange(value+1)} style={{padding:'2px 8px',fontSize:14}}>+</Btn>
  </div>
);

  const bg = color==='red' ? 'linear-gradient(90deg,#ff1744,#ff5252)' : 'linear-gradient(90deg,#00b8d4,#00e5ff)';
  const glow = color==='red' ? '0 0 10px rgba(255,23,68,0.6)' : '0 0 10px rgba(0,229,255,0.6)';

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>

const ListSection = ({title,color,items,suggestions,onAdd,onUpdate,onRemove}) => {
  const listId = 'dl-'+title.replace(/\s/g,'-');
  const total = items.reduce((a,i)=>a+(parseInt(i.custo)||0),0);
  const borderColor = color==='red'?'rgba(255,23,68,0.3)':color==='green'?'rgba(0,230,118,0.3)':'rgba(0,229,255,0.3)';
  const titleColor = color==='red'?'#ff5252':color==='green'?'#00e676':'#00e5ff';
  return (
    <div className="panel" style={{padding:16,borderColor}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,borderBottom:'1px solid rgba(0,229,255,0.15)',paddingBottom:8}}>
        <span style={{fontFamily:'Orbitron',fontSize:12,color:titleColor,textTransform:'uppercase',letterSpacing:1}}>
          {title} <span style={{color:'rgba(0,229,255,0.4)',fontSize:10}}>({total>0?'+'+total:total}pts)</span>

        {items.map(item => {

          const subId = 'sub-'+item.id;
          return (
            <div key={item.id} style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.12)',borderRadius:6,padding:8,position:'relative'}}>
              <div style={{display:'flex',gap:6,marginBottom:6,flexWrap:'wrap'}}>

                  onChange={e=>onUpdate(item.id,'nome',e.target.value)}
                  style={{flex:'2 1 120px',fontSize:13,fontWeight:700,padding:'3px 6px'}} />

                <input list={subOpts?subId:undefined} placeholder="Detalhe/Opção" value={item.detalhe||''}
                  onChange={e=>onUpdate(item.id,'detalhe',e.target.value)}
                  style={{flex:'2 1 100px',fontSize:12,padding:'3px 6px',fontStyle:'italic'}} />

                  onChange={e=>onUpdate(item.id,'custo',e.target.value)}
                  style={{width:44,textAlign:'center',fontSize:13,fontWeight:700,padding:'3px 4px'}} />

};

// ── Dice Modal ────────────────────────────────────────────────────────────────
const DiceModal = ({onClose,attrs,onRoll}) => {
  const [attr,setAttr] = useState('poder');
  const [skill,setSkill] = useState(false);
  const [gain,setGain] = useState(0);
  const [loss,setLoss] = useState(0);
  const [crit,setCrit] = useState(6);
  const [mod,setMod] = useState(0);
  const [roll,setRoll] = useState(null);
  const [rolling,setRolling] = useState(false);
  const [hist,setHist] = useState([]);
  const dice = Math.max(1,Math.min(3,1+(skill?1:0)+gain-loss));
  const doRoll = () => {
    if(rolling) return;
    setRolling(true);
    setTimeout(()=>{
      const res = Array.from({length:dice},()=>Math.floor(Math.random()*6)+1);
      const av = attrs[attr]||0;
      const crits = res.filter(r=>r>=crit).length;
      const fail = res.every(r=>r===1);
      const total = res.reduce((a,b)=>a+b,0)+av+(crits*av)+mod;
      const nr = {id:Date.now(),attr,dice,res,total,av,crits,fail,mod,crit};
      setRoll(nr); setHist(p=>[nr,...p].slice(0,8)); setRolling(false);
      if(onRoll) onRoll(nr);
    },500);
  };
  const colors = {poder:'#ff1744',habilidade:'#00e5ff',resistencia:'#00e676'};
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,5,15,0.92)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
      <div className="panel" style={{width:'100%',maxWidth:480,maxHeight:'90vh',overflowY:'auto',padding:20}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <span style={{fontFamily:'Orbitron',color:'#00e5ff',fontSize:14}}>🎲 TESTE 3DeT</span>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#ff1744',fontSize:20,cursor:'pointer'}}>×</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:16}}>
          {['poder','habilidade','resistencia'].map(a=>(
            <button key={a} onClick={()=>setAttr(a)} style={{
              background:attr===a?colors[a]+'22':'rgba(0,0,0,0.4)',
              border:`1px solid ${attr===a?colors[a]:'rgba(0,229,255,0.2)'}`,
              color:attr===a?colors[a]:'rgba(0,229,255,0.5)',
              borderRadius:6,padding:'10px 4px',cursor:'pointer',
              fontFamily:'Orbitron',fontSize:9,textTransform:'uppercase',letterSpacing:0.5
            }}>
              <div style={{fontSize:11,marginBottom:2}}>{a.slice(0,3).toUpperCase()}</div>
              <div style={{fontSize:16,fontWeight:900}}>{attrs[a]}</div>
            </button>
          ))}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
          <button onClick={()=>setSkill(!skill)} style={{
            background:skill?'rgba(0,229,255,0.12)':'rgba(0,0,0,0.4)',
            border:`1px solid ${skill?'#00e5ff':'rgba(0,229,255,0.2)'}`,
            color:skill?'#00e5ff':'rgba(0,229,255,0.4)',
            borderRadius:6,padding:8,cursor:'pointer',fontFamily:'Orbitron',fontSize:9
          }}>{skill?'COM PERÍCIA':'SEM PERÍCIA'}</button>
          <div style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.2)',borderRadius:6,padding:8,textAlign:'center'}}>
            <div style={{fontFamily:'Orbitron',fontSize:9,color:'rgba(0,229,255,0.4)',marginBottom:4}}>DADOS</div>
            <span style={{fontFamily:'Orbitron',fontSize:18,color:'#00e5ff',fontWeight:900}}>{dice}D</span>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:12}}>
          {[['Ganhos',gain,setGain,'#00e676'],['Perdas',loss,setLoss,'#ff1744'],['Mod',mod,setMod,'#00e5ff']].map(([label,val,setter,c])=>(
            <div key={label} style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.15)',borderRadius:6,padding:8,textAlign:'center'}}>
              <div style={{fontSize:9,color:'rgba(0,229,255,0.4)',marginBottom:4,fontFamily:'Orbitron'}}>{label.toUpperCase()}</div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                <button onClick={()=>setter(label==='Mod'?val-1:Math.max(0,val-1))} style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.2)',color:'#fff',borderRadius:3,width:20,height:20,cursor:'pointer',fontSize:12}}>−</button>
                <span style={{fontFamily:'Orbitron',color:c,fontWeight:900,minWidth:20,textAlign:'center'}}>{val>0?'+'+val:val}</span>
                <button onClick={()=>setter(val+1)} style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.2)',color:'#fff',borderRadius:3,width:20,height:20,cursor:'pointer',fontSize:12}}>+</button>
              </div>
            </div>
          ))}
        </div>
        <label style={{display:'flex',alignItems:'center',gap:6,marginBottom:12,fontSize:11,color:'rgba(0,229,255,0.5)'}}>
          <input type="checkbox" checked={crit===5} onChange={()=>setCrit(crit===6?5:6)} />
          Crítico também com 5 (Maestria)
        </label>
        <button onClick={doRoll} disabled={rolling} style={{
          width:'100%',padding:14,background:'rgba(0,229,255,0.1)',border:'1px solid #00e5ff',
          color:'#00e5ff',fontFamily:'Orbitron',fontSize:12,letterSpacing:2,cursor:'pointer',
          borderRadius:6,marginBottom:12,textTransform:'uppercase'
        }}>{rolling?'ROLANDO...':`ROLAR ${dice}D + ${attrs[attr]||0}`}</button>
        <div style={{background:'rgba(0,0,0,0.6)',border:'1px solid rgba(0,229,255,0.15)',borderRadius:6,minHeight:100,padding:12,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
          {rolling && <div style={{width:32,height:32,border:'3px solid rgba(0,229,255,0.2)',borderTop:'3px solid #00e5ff',borderRadius:'50%',animation:'roll 0.6s linear infinite'}} />}
          {!rolling && roll && (
            <div style={{textAlign:'center',width:'100%'}}>
              {roll.fail && <div style={{background:'#ff1744',color:'#fff',fontSize:10,fontFamily:'Orbitron',padding:'2px 8px',borderRadius:3,marginBottom:8}}>FALHA CRÍTICA!</div>}
              <div style={{display:'flex',justifyContent:'center',gap:8,marginBottom:8}}>
                {roll.res.map((v,i)=>{
                  const isCrit=v>=roll.crit;
                  return <div key={i} style={{
                    width:44,height:44,display:'flex',alignItems:'center',justifyContent:'center',
                    borderRadius:8,border:'2px solid',fontSize:22,fontWeight:900,
                    background:isCrit?'rgba(255,214,0,0.2)':roll.fail?'rgba(255,23,68,0.2)':'rgba(0,229,255,0.08)',
                    borderColor:isCrit?'#ffd600':roll.fail?'#ff1744':'rgba(0,229,255,0.3)',
                    color:isCrit?'#ffd600':roll.fail?'#ff5252':'#00e5ff'
                  }}>{v}</div>;
                })}
              </div>
              {!roll.fail && <div style={{background:'rgba(0,229,255,0.1)',border:'1px solid rgba(0,229,255,0.3)',borderRadius:20,padding:'6px 20px',display:'inline-flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:10,color:'rgba(0,229,255,0.5)',fontFamily:'Orbitron'}}>RESULTADO</span>
                <span style={{fontSize:26,fontWeight:900,color:'#00e5ff',fontFamily:'Orbitron'}}>{roll.total}</span>
              </div>}
            </div>
          )}
          {!rolling && !roll && <p style={{color:'rgba(0,229,255,0.25)',fontSize:11}}>Configure e role os dados...</p>}
        </div>
        {hist.length>0 && (
          <div style={{marginTop:12}}>
            <div style={{fontFamily:'Orbitron',fontSize:9,color:'rgba(0,229,255,0.4)',marginBottom:6,textTransform:'uppercase'}}>Histórico</div>
            <div style={{display:'flex',flexDirection:'column',gap:4,maxHeight:100,overflowY:'auto'}}>
              {hist.map(h=>(
                <div key={h.id} style={{display:'flex',justifyContent:'space-between',fontSize:10,padding:'3px 6px',background:'rgba(0,0,0,0.3)',borderRadius:4}}>
                  <span style={{color:'rgba(0,229,255,0.5)',fontFamily:'Orbitron'}}>{h.attr.slice(0,3).toUpperCase()} ({h.dice}D)</span>
                  <span style={{color:'rgba(0,229,255,0.4)'}}>[{h.res.join(',')}]</span>
                  <span style={{color:h.fail?'#ff1744':'#00e5ff',fontWeight:700}}>{h.fail?'FALHA':'= '+h.total}</span>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

// ── Campaign Panel ────────────────────────────────────────────────────────────
const CampaignPanel = ({char, onClose}) => {
  const [mode, setMode] = useState('menu'); // menu | criar | entrar | sala
  const [campNome, setCampNome] = useState('');
  const [campCode, setCampCode] = useState('');
  const [joinCode, setJoinCode] = useState('');
  const [loading, setLoading] = useState(false);
  const [erro, setErro] = useState('');
  const [campData, setCampData] = useState(null); // dados da campanha atual
  const [fichas, setFichas] = useState({});
  const [rolls, setRolls] = useState([]);
  const [iniciativas, setIniciativas] = useState([]);
  const [fichaAberta, setFichaAberta] = useState(null);
  const [npcNome, setNpcNome] = useState('');
  const [npcHabil, setNpcHabil] = useState(0);
  const [diceOpen, setDiceOpen] = useState(false);
  const [tab, setTab] = useState('fichas'); // fichas | rolagens | iniciativa
  const pollingRef = useRef(null);
  const myPlayerId = useRef(char.id ? 'j-'+char.id : 'j-'+uid());

  const [fbErro, setFbErro] = useState(false);

  // Carrega campanha do localStorage ao montar
  useEffect(() => {
    try {
      const s = localStorage.getItem('3det_camp');
      if(s) {
        const d = JSON.parse(s);
        setCampData(d);
        setCampCode(d.code);
        setMode('sala');
        iniciarPolling(d.code);
      }
    } catch(e) {}
    return () => pararPolling();
  }, []);

  const pararPolling = () => {
    if(pollingRef.current) clearInterval(pollingRef.current);
  };

  const iniciarPolling = (code) => {
    pararPolling();
    buscarTudo(code);
    pollingRef.current = setInterval(() => buscarTudo(code), 4000);
  };

  const buscarTudo = async (code) => {
    try {
      const [fichasData, rollsData, initData] = await Promise.all([
        fbGet(`campanhas/${code}/fichas`).catch(e=>{if(e.message==='REGRAS_FIREBASE')setFbErro(true);return null;}),
        fbGet(`campanhas/${code}/rolls`).catch(()=>null),
        fbGet(`campanhas/${code}/iniciativas`).catch(()=>null),
      ]);
      setFbErro(false);
      if(fichasData) setFichas(fichasData);
      if(rollsData) {
        const arr = Object.entries(rollsData)
          .map(([k,v])=>({...v,_fbKey:k}))
          .sort((a,b)=>b.ts-a.ts)
          .slice(0,30);
        setRolls(arr);
      } else setRolls([]);
      if(initData) {
        const arr = Object.entries(initData)
          .map(([k,v])=>({...v,_fbKey:k}))
          .sort((a,b)=>b.total-a.total);
        setIniciativas(arr);
      } else setIniciativas([]);
    } catch(e) {}
  };

  const criarCampanha = async () => {
    if(!campNome.trim()){setErro('Digite o nome da campanha.');return;}
    setLoading(true); setErro('');
    try {
      const code = gerarCodCamp();
      const data = {code, nome:campNome.trim(), mestre:char.nome||'Mestre', criadoEm:Date.now()};
      await fbSet(`campanhas/${code}/info`, data);
      localStorage.setItem('3det_camp', JSON.stringify(data));
      setCampData(data); setCampCode(code); setMode('sala');
      iniciarPolling(code);
      navigator.clipboard.writeText(code).catch(()=>{});
      alert('✅ Campanha criada!\nCódigo: '+code+'\n(Já copiado para a área de transferência)');
    } catch(e){
      if(e.message==='REGRAS_FIREBASE') { alert(MSG_REGRAS); setErro('🔒 Banco bloqueado — veja as instruções acima.'); }
      else setErro('Erro ao criar campanha: '+e.message);
    }
    setLoading(false);
  };

  const entrarCampanha = async () => {
    const code = joinCode.trim().toUpperCase();
    if(!code){setErro('Digite o código.');return;}
    setLoading(true); setErro('');
    try {
      const data = await fbGet(`campanhas/${code}/info`);
      if(!data || !data.code){setErro('❌ Campanha não encontrada. Verifique o código.');setLoading(false);return;}
      localStorage.setItem('3det_camp', JSON.stringify(data));
      setCampData(data); setCampCode(code); setMode('sala');
      iniciarPolling(code);
    } catch(e){
      if(e.message==='REGRAS_FIREBASE') { alert(MSG_REGRAS); setErro('🔒 Banco bloqueado — veja as instruções acima.'); }
      else setErro('❌ Erro ao buscar campanha. Código correto?');
    }
    setLoading(false);
  };

  const registrarFicha = async () => {
    if(!char.nome){alert('Sua ficha precisa ter um nome primeiro.');return;}
    setLoading(true);
    try {
      const payload = {
        id: myPlayerId.current,
        nome: char.nome,
        arquetipo: char.arquetipo,
        atributos: char.atributos,
        recursos: char.recursos,
        kits: (char.kits||[]).map(k=>k.nome),
        pericias: char.pericias.slice(0,30),
        vantagens: char.vantagens.slice(0,30),
        desvantagens: char.desvantagens.slice(0,30),
        tecnicas: char.tecnicas.slice(0,20),
        inventario: char.inventario,
        anotacoes: char.anotacoes,
        historia: char.historia,
        atualizadoEm: Date.now()
      };
      await fbSet(`campanhas/${campCode}/fichas/${myPlayerId.current}`, payload);
      await buscarTudo(campCode);
      alert('✅ Ficha de "'+char.nome+'" registrada!');
    } catch(e){
      if(e.message==='REGRAS_FIREBASE') alert(MSG_REGRAS);
      else alert('Erro ao registrar ficha: '+e.message);
    }
    setLoading(false);
  };

  const publicarRolagem = async (rollObj, nomeJogador) => {
    if(!campCode) return;
    try {
      await fbPush(`campanhas/${campCode}/rolls`, {
        player: nomeJogador || char.nome || 'Jogador',
        roll: rollObj,
        ts: Date.now(),
        time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})
      });
      buscarTudo(campCode);
    } catch(e){}
  };

  const rolarIniciativa = async () => {
    const h = char.atributos.habilidade||0;
    const dados = Math.max(1,Math.min(3,1+h));
    const res = Array.from({length:dados},()=>Math.floor(Math.random()*6)+1);
    const total = res.reduce((a,b)=>a+b,0)+h;
    try {
      await fbSet(`campanhas/${campCode}/iniciativas/${myPlayerId.current}`, {
        id: myPlayerId.current,
        nome: char.nome||'Jogador',
        total, res, habil:h, ts:Date.now(), isNpc:false
      });
      buscarTudo(campCode);
    } catch(e){}
  };

  const rolarIniciativaNpc = async () => {
    if(!npcNome.trim()) return;
    const h = parseInt(npcHabil)||0;
    const dados = Math.max(1,Math.min(3,1+h));
    const res = Array.from({length:dados},()=>Math.floor(Math.random()*6)+1);
    const total = res.reduce((a,b)=>a+b,0)+h;
    const npcId = 'npc-'+uid();
    try {
      await fbSet(`campanhas/${campCode}/iniciativas/${npcId}`, {
        id: npcId,
        nome: '[NPC] '+npcNome.trim(),
        total, res, habil:h, ts:Date.now(), isNpc:true
      });
      setNpcNome(''); buscarTudo(campCode);
    } catch(e){}
  };

  const removerIniciativa = async (id) => {
    try {
      await fbDelete(`campanhas/${campCode}/iniciativas/${id}`);
      buscarTudo(campCode);
    } catch(e){}
  };

  const limparIniciativas = async () => {
    try {
      await fbDelete(`campanhas/${campCode}/iniciativas`);
      setIniciativas([]);
    } catch(e){}
  };

  const removerFicha = async (fichaId) => {
    if(!window.confirm('Remover esta ficha da campanha?')) return;
    try {
      await fbDelete(`campanhas/${campCode}/fichas/${fichaId}`);
      buscarTudo(campCode);
    } catch(e){}
  };

  const sairCampanha = () => {
    pararPolling();
    localStorage.removeItem('3det_camp');
    setCampData(null); setCampCode(''); setFichas({}); setRolls([]);
    setIniciativas([]); setMode('menu'); setFichaAberta(null);
  };

  // ── Render: Tela de menu ──
  if(mode === 'menu') return (
    <div style={{display:'flex',flexDirection:'column',gap:12,padding:16}}>
      <p style={{color:'rgba(0,229,255,0.5)',fontSize:12,lineHeight:1.6,margin:0}}>
        Crie ou entre em uma campanha. Ao entrar, a <strong style={{color:'#00e5ff'}}>sala de rolagens</strong> e a <strong style={{color:'#00e5ff'}}>iniciativa</strong> ficam disponíveis para todos automaticamente.
      </p>
      <button onClick={()=>setMode('criar')} style={{padding:'12px 16px',background:'rgba(255,214,0,0.08)',border:'1px solid rgba(255,214,0,0.35)',color:'#ffd600',borderRadius:8,cursor:'pointer',fontFamily:'Orbitron',fontSize:11,textTransform:'uppercase',letterSpacing:1}}>
        👑 Criar Nova Campanha (Mestre)
      </button>
      <button onClick={()=>setMode('entrar')} style={{padding:'12px 16px',background:'rgba(0,229,255,0.06)',border:'1px solid rgba(0,229,255,0.25)',color:'#00e5ff',borderRadius:8,cursor:'pointer',fontFamily:'Orbitron',fontSize:11,textTransform:'uppercase',letterSpacing:1}}>
        ⚡ Entrar em Campanha (Jogador)
      </button>
    </div>
  );

  if(mode === 'criar') return (
    <div style={{display:'flex',flexDirection:'column',gap:10,padding:16}}>
      <button onClick={()=>{setMode('menu');setErro('');}} style={{background:'none',border:'none',color:'rgba(0,229,255,0.5)',cursor:'pointer',fontSize:11,fontFamily:'Orbitron',textAlign:'left',padding:0,marginBottom:4}}>← Voltar</button>
      <div style={{fontFamily:'Orbitron',fontSize:12,color:'#ffd600',marginBottom:4}}>👑 CRIAR CAMPANHA</div>
      <input value={campNome} onChange={e=>setCampNome(e.target.value)} placeholder="Nome da campanha..."
        style={{fontSize:14,padding:'8px 10px'}}
        onKeyDown={e=>e.key==='Enter'&&criarCampanha()} />
      {erro && <div style={{color:'#ff5252',fontSize:11,fontFamily:'Share Tech Mono'}}>{erro}</div>}
      <button onClick={criarCampanha} disabled={loading} style={{padding:'10px',background:'rgba(255,214,0,0.12)',border:'1px solid #ffd600',color:'#ffd600',borderRadius:6,cursor:'pointer',fontFamily:'Orbitron',fontSize:11,textTransform:'uppercase',opacity:loading?0.6:1}}>
        {loading?'Criando...':'✦ Criar'}
      </button>
    </div>
  );

  if(mode === 'entrar') return (
    <div style={{display:'flex',flexDirection:'column',gap:10,padding:16}}>
      <button onClick={()=>{setMode('menu');setErro('');}} style={{background:'none',border:'none',color:'rgba(0,229,255,0.5)',cursor:'pointer',fontSize:11,fontFamily:'Orbitron',textAlign:'left',padding:0,marginBottom:4}}>← Voltar</button>
      <div style={{fontFamily:'Orbitron',fontSize:12,color:'#00e5ff',marginBottom:4}}>⚡ ENTRAR NA CAMPANHA</div>
      <input value={joinCode} onChange={e=>setJoinCode(e.target.value.toUpperCase())}
        placeholder="Código: CAMP-XXXX"
        style={{fontSize:14,padding:'8px 10px',fontFamily:'Share Tech Mono'}}
        onKeyDown={e=>e.key==='Enter'&&entrarCampanha()} />
      {erro && <div style={{color:'#ff5252',fontSize:11,fontFamily:'Share Tech Mono',padding:'4px 0'}}>{erro}</div>}
      <button onClick={entrarCampanha} disabled={loading} style={{padding:'10px',background:'rgba(0,229,255,0.1)',border:'1px solid #00e5ff',color:'#00e5ff',borderRadius:6,cursor:'pointer',fontFamily:'Orbitron',fontSize:11,textTransform:'uppercase',opacity:loading?0.6:1}}>
        {loading?'Buscando...':'⚡ Entrar'}
      </button>
    </div>
  );

  // ── Render: Sala (modo principal) ──
  const fichasArr = Object.values(fichas);
  const ehMestre = campData && (campData.mestre === char.nome);

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      {/* Banner de erro de regras */}
      {fbErro && (
        <div style={{background:'rgba(255,23,68,0.12)',border:'1px solid rgba(255,23,68,0.4)',margin:'8px 12px',borderRadius:8,padding:'10px 12px',flexShrink:0}}>
          <div style={{fontFamily:'Orbitron',fontSize:10,color:'#ff5252',marginBottom:4}}>🔒 BANCO DE DADOS BLOQUEADO (401)</div>
          <div style={{fontSize:10,color:'rgba(255,82,82,0.8)',lineHeight:1.5,marginBottom:6}}>
            As regras do Firebase estão bloqueando o acesso. Para corrigir:
          </div>
          <ol style={{fontSize:10,color:'rgba(255,82,82,0.7)',lineHeight:1.7,paddingLeft:16,margin:0}}>
            <li>Abra <strong style={{color:'#ff5252'}}>console.firebase.google.com</strong></li>
            <li>Projeto <strong style={{color:'#ff5252'}}>plusdistophya</strong> → Realtime Database → Regras</li>
            <li>Substitua o conteúdo por: <code style={{background:'rgba(0,0,0,0.4)',padding:'1px 5px',borderRadius:3,color:'#ffd600',fontSize:9}}>{"{ \"rules\": { \".read\": true, \".write\": true } }"}</code></li>
            <li>Clique em <strong style={{color:'#ff5252'}}>Publicar</strong></li>
          </ol>
          <button onClick={()=>buscarTudo(campCode)} style={{marginTop:8,padding:'4px 10px',background:'rgba(255,23,68,0.1)',border:'1px solid rgba(255,23,68,0.4)',color:'#ff5252',borderRadius:4,cursor:'pointer',fontFamily:'Orbitron',fontSize:8,textTransform:'uppercase'}}>
            🔄 Tentar novamente
          </button>
        </div>
      )}
      {/* Cabeçalho da campanha */}
      <div style={{padding:'10px 14px',background:'rgba(0,0,0,0.5)',borderBottom:'1px solid rgba(0,229,255,0.15)',flexShrink:0}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
          <div>
            <div style={{fontFamily:'Orbitron',fontSize:13,color:'#ffd600',fontWeight:700}}>{campData?.nome}</div>
            <div style={{fontSize:9,color:'rgba(0,229,255,0.4)',fontFamily:'Share Tech Mono',marginTop:1}}>Mestre: {campData?.mestre}</div>
          </div>
          <button onClick={()=>{navigator.clipboard.writeText(campCode).catch(()=>{});alert('Código copiado: '+campCode);}}
            style={{background:'rgba(255,214,0,0.08)',border:'1px solid rgba(255,214,0,0.3)',color:'#ffd600',borderRadius:4,padding:'3px 8px',cursor:'pointer',fontSize:9,fontFamily:'Orbitron',flexShrink:0}}>
            📋 {campCode}
          </button>
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          <button onClick={registrarFicha} disabled={loading} style={{flex:1,padding:'5px 6px',background:'rgba(0,229,255,0.06)',border:'1px solid rgba(0,229,255,0.25)',color:'#00e5ff',borderRadius:5,cursor:'pointer',fontFamily:'Orbitron',fontSize:8,textTransform:'uppercase',opacity:loading?0.6:1}}>
            {loading?'..':'📤 Registrar Minha Ficha'}
          </button>
          <button onClick={()=>buscarTudo(campCode)} style={{padding:'5px 8px',background:'rgba(0,229,255,0.04)',border:'1px solid rgba(0,229,255,0.15)',color:'rgba(0,229,255,0.5)',borderRadius:5,cursor:'pointer',fontSize:10}}>🔄</button>
          <button onClick={sairCampanha} style={{padding:'5px 6px',background:'rgba(255,23,68,0.06)',border:'1px solid rgba(255,23,68,0.2)',color:'#ff5252',borderRadius:5,cursor:'pointer',fontFamily:'Orbitron',fontSize:8,textTransform:'uppercase'}}>Sair</button>
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:'flex',borderBottom:'1px solid rgba(0,229,255,0.15)',flexShrink:0}}>
        {[
          {id:'fichas',label:'👥 Fichas',count:fichasArr.length},
          {id:'rolagens',label:'🎲 Rolagens',count:rolls.length},
          {id:'iniciativa',label:'⚔ Turno',count:iniciativas.length},
        ].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            flex:1,padding:'8px 4px',background:tab===t.id?'rgba(0,229,255,0.08)':'transparent',
            border:'none',borderBottom:tab===t.id?'2px solid #00e5ff':'2px solid transparent',
            color:tab===t.id?'#00e5ff':'rgba(0,229,255,0.4)',
            cursor:'pointer',fontFamily:'Orbitron',fontSize:8,textTransform:'uppercase',
            transition:'all 0.2s'
          }}>
            {t.label}{t.count>0?` (${t.count})`:''}
          </button>
        ))}
      </div>

      {/* Conteúdo das tabs */}
      <div style={{flex:1,overflowY:'auto',padding:12}}>

        {/* ── TAB: FICHAS ── */}
        {tab==='fichas' && (
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {fichasArr.length===0
              ? <p style={{color:'rgba(0,229,255,0.25)',fontSize:11,textAlign:'center',fontStyle:'italic',padding:16}}>
                  Nenhuma ficha registrada ainda.<br/>Clique em "Registrar Minha Ficha" acima.
                </p>
              : fichasArr.map(f=>(
                <div key={f.id} style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.18)',borderRadius:8,overflow:'hidden'}}>
                  {/* Header da ficha */}
                  <div style={{padding:'8px 12px',display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}
                    onClick={()=>setFichaAberta(fichaAberta===f.id?null:f.id)}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontFamily:'Orbitron',fontSize:11,color:'#e8f4f8',fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.nome||'Sem nome'}</div>
                      <div style={{fontSize:9,color:'rgba(0,229,255,0.4)',marginTop:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                        {f.arquetipo||'—'}{f.kits&&f.kits.length>0?' · '+f.kits.join(', '):''}
                      </div>
                    </div>
                    <div style={{display:'flex',gap:4,fontSize:9,fontFamily:'Share Tech Mono',flexShrink:0}}>
                      <span style={{color:'#ff5252',background:'rgba(255,23,68,0.1)',padding:'1px 4px',borderRadius:3}}>♥{f.recursos?.pv??'?'}</span>
                      <span style={{color:'#00e5ff',background:'rgba(0,229,255,0.08)',padding:'1px 4px',borderRadius:3}}>⚡{f.recursos?.pm??'?'}</span>
                    </div>
                    <span style={{color:'rgba(0,229,255,0.3)',fontSize:10}}>{fichaAberta===f.id?'▲':'▼'}</span>
                  </div>

                  {/* Ficha expandida */}
                  {fichaAberta===f.id && (
                    <div style={{padding:'0 12px 12px',borderTop:'1px solid rgba(0,229,255,0.1)',fontSize:11,display:'flex',flexDirection:'column',gap:8,paddingTop:10}}>
                      {/* Atributos */}
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:5}}>
                        {[['POD',f.atributos?.poder,'#ff5252'],['HAB',f.atributos?.habilidade,'#00e5ff'],['RES',f.atributos?.resistencia,'#00e676']].map(([n,v,c])=>(
                          <div key={n} style={{background:'rgba(0,0,0,0.4)',border:'1px solid '+c+'33',borderRadius:5,padding:'4px 6px',textAlign:'center'}}>
                            <div style={{fontFamily:'Orbitron',fontSize:7,color:c,marginBottom:1}}>{n}</div>
                            <div style={{fontFamily:'Orbitron',fontSize:16,fontWeight:900,color:c}}>{v??0}</div>
                          </div>
                        ))}
                      </div>
                      {/* Barras */}
                      {[
                        {l:'PV',cur:f.recursos?.pv,max:(f.atributos?.resistencia||0)*5||1,c:'#ff5252'},
                        {l:'PM',cur:f.recursos?.pm,max:(f.atributos?.habilidade||0)*5||1,c:'#00e5ff'},
                      ].map(r=>(
                        <div key={r.l}>
                          <div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>
                            <span style={{fontFamily:'Orbitron',fontSize:8,color:r.c}}>{r.l}</span>
                            <span style={{fontSize:8,color:'rgba(0,229,255,0.4)',fontFamily:'Share Tech Mono'}}>{r.cur??'?'}/{r.max}</span>
                          </div>
                          <div style={{height:4,background:'rgba(0,0,0,0.6)',borderRadius:2,overflow:'hidden'}}>
                            <div style={{height:'100%',width:(r.max>0?Math.min(100,((r.cur||0)/r.max)*100):0)+'%',background:r.c}} />
                          </div>
                        </div>
                      ))}
                      {/* Perícias */}
                      {f.pericias?.length>0 && (
                        <div>
                          <div style={{fontFamily:'Orbitron',fontSize:8,color:'rgba(0,229,255,0.4)',marginBottom:3,textTransform:'uppercase'}}>Perícias</div>
                          <div style={{display:'flex',flexWrap:'wrap',gap:3}}>
                            {f.pericias.map((p,i)=><span key={i} style={{fontSize:9,background:'rgba(0,229,255,0.06)',border:'1px solid rgba(0,229,255,0.15)',borderRadius:3,padding:'1px 5px',color:'rgba(0,229,255,0.6)'}}>{p.nome}</span>)}
                          </div>
                        </div>
                      )}
                      {/* Vantagens */}
                      {f.vantagens?.length>0 && (
                        <div>
                          <div style={{fontFamily:'Orbitron',fontSize:8,color:'#00e676',marginBottom:3,textTransform:'uppercase'}}>Vantagens</div>
                          <div style={{display:'flex',flexDirection:'column',gap:2}}>
                            {f.vantagens.map((v,i)=>(
                              <div key={i} style={{fontSize:9,padding:'2px 5px',background:'rgba(0,230,118,0.04)',border:'1px solid rgba(0,230,118,0.1)',borderRadius:3}}>
                                <span style={{color:'#00e676',fontWeight:700}}>{v.nome}</span>
                                {v.detalhe&&<span style={{color:'rgba(0,229,255,0.35)',fontSize:8}}> — {v.detalhe}</span>}
                              </div>
                            ))}
                          </div>
                        </div>
                      )}
                      {/* Anotações */}
                      {f.anotacoes && (
                        <div>
                          <div style={{fontFamily:'Orbitron',fontSize:8,color:'rgba(0,229,255,0.4)',marginBottom:3,textTransform:'uppercase'}}>Anotações</div>
                          <div style={{fontSize:9,color:'rgba(0,229,255,0.5)',background:'rgba(0,0,0,0.3)',borderRadius:4,padding:'5px 7px',lineHeight:1.5}}>{f.anotacoes}</div>
                        </div>
                      )}
                      {/* Remover (mestre) */}
                      {ehMestre && f.id !== myPlayerId.current && (
                        <button onClick={()=>removerFicha(f.id)} style={{padding:'4px 0',background:'rgba(255,23,68,0.05)',border:'1px solid rgba(255,23,68,0.18)',color:'#ff5252',borderRadius:4,cursor:'pointer',fontFamily:'Orbitron',fontSize:8,textTransform:'uppercase'}}>
                          × Remover da campanha
                        </button>
                      )}
                    </div>
                  )}
                </div>
              ))
            }
          </div>
        )}

        {/* ── TAB: ROLAGENS ── */}
        {tab==='rolagens' && (
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {/* Botão rolar dado */}
            <button onClick={()=>setDiceOpen(true)} style={{
              width:'100%',padding:'10px',background:'rgba(0,229,255,0.08)',border:'1px solid rgba(0,229,255,0.35)',
              color:'#00e5ff',borderRadius:8,cursor:'pointer',fontFamily:'Orbitron',fontSize:10,
              textTransform:'uppercase',letterSpacing:1,marginBottom:4
            }}>🎲 Abrir Dados — Resultado vai para a sala</button>

            {diceOpen && (
              <DiceModal
                onClose={()=>setDiceOpen(false)}
                attrs={char.atributos}
                onRoll={(r)=>{publicarRolagem(r,char.nome);setDiceOpen(false);}}
              />
            )}

            {rolls.length===0
              ? <p style={{color:'rgba(0,229,255,0.2)',fontSize:11,textAlign:'center',fontStyle:'italic',padding:12}}>
                  Nenhuma rolagem ainda. Role os dados!
                </p>
              : rolls.map((r,idx)=>(
                <div key={r._fbKey||idx} className="fadeIn" style={{background:'rgba(0,0,0,0.45)',border:'1px solid rgba(0,229,255,0.13)',borderRadius:6,padding:'8px 10px'}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                    <span style={{fontFamily:'Orbitron',fontSize:9,color:'#00e5ff',fontWeight:700}}>{r.player}</span>
                    <span style={{fontSize:8,color:'rgba(0,229,255,0.3)',fontFamily:'Share Tech Mono'}}>{r.time}</span>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <span style={{fontFamily:'Orbitron',fontSize:22,fontWeight:900,color:r.roll?.fail?'#ff1744':'#00e5ff'}}>
                      {r.roll?.fail?'FALHA':r.roll?.total}
                    </span>
                    <div>
                      <div style={{fontSize:8,color:'rgba(0,229,255,0.4)',fontFamily:'Orbitron',textTransform:'uppercase'}}>{r.roll?.attr} ({r.roll?.dice}D)</div>
                      <div style={{display:'flex',gap:2,marginTop:2}}>
                        {r.roll?.res?.map((v,i)=>(
                          <span key={i} style={{width:14,height:14,display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:8,fontWeight:700,borderRadius:2,
                            background:v>=(r.roll?.crit||6)?'rgba(255,214,0,0.2)':'rgba(0,229,255,0.08)',
                            color:v>=(r.roll?.crit||6)?'#ffd600':'#00e5ff',
                            border:'1px solid rgba(0,229,255,0.15)'}}>{v}</span>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>
              ))
            }
          </div>
        )}

        {/* ── TAB: INICIATIVA ── */}
        {tab==='iniciativa' && (
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {/* Meu botão de iniciativa */}
            <button onClick={rolarIniciativa} style={{
              width:'100%',padding:'10px',background:'rgba(255,214,0,0.08)',border:'1px solid rgba(255,214,0,0.35)',
              color:'#ffd600',borderRadius:8,cursor:'pointer',fontFamily:'Orbitron',fontSize:10,
              textTransform:'uppercase',letterSpacing:1
            }}>🎲 Rolar Minha Iniciativa</button>

            {/* Adicionar NPC — só mestre */}
            {ehMestre && (
              <div style={{background:'rgba(168,85,247,0.06)',border:'1px solid rgba(168,85,247,0.2)',borderRadius:6,padding:8}}>
                <div style={{fontFamily:'Orbitron',fontSize:8,color:'#a855f7',marginBottom:5,textTransform:'uppercase'}}>+ NPC (Mestre)</div>
                <div style={{display:'flex',gap:5,marginBottom:5}}>
                  <input value={npcNome} onChange={e=>setNpcNome(e.target.value)} placeholder="Nome do NPC..."
                    style={{flex:1,fontSize:11,padding:'4px 7px'}}
                    onKeyDown={e=>e.key==='Enter'&&rolarIniciativaNpc()} />
                  <input type="number" value={npcHabil} onChange={e=>setNpcHabil(e.target.value)} min={0} max={5}
                    style={{width:36,textAlign:'center',fontSize:11,padding:'4px'}} title="Habilidade" />
                </div>
                <div style={{display:'flex',gap:5}}>
                  <button onClick={rolarIniciativaNpc} style={{flex:1,background:'rgba(168,85,247,0.1)',border:'1px solid rgba(168,85,247,0.3)',color:'#a855f7',borderRadius:4,padding:'4px 0',cursor:'pointer',fontSize:8,fontFamily:'Orbitron',textTransform:'uppercase'}}>
                    🎲 Rolar NPC
                  </button>
                  <button onClick={limparIniciativas} style={{flex:1,background:'rgba(255,23,68,0.06)',border:'1px solid rgba(255,23,68,0.2)',color:'#ff5252',borderRadius:4,padding:'4px 0',cursor:'pointer',fontSize:8,fontFamily:'Orbitron',textTransform:'uppercase'}}>
                    ✕ Limpar Tudo
                  </button>
                </div>
              </div>
            )}

            {iniciativas.length===0
              ? <p style={{color:'rgba(255,214,0,0.25)',fontSize:11,textAlign:'center',fontStyle:'italic',padding:12}}>
                  Nenhuma iniciativa. Clique em "Rolar Minha Iniciativa".
                </p>
              : iniciativas.map((ini,idx)=>(
                <div key={ini.id||idx} className="fadeIn" style={{
                  display:'flex',alignItems:'center',gap:8,padding:'7px 10px',
                  background:idx===0?'rgba(255,214,0,0.08)':ini.isNpc?'rgba(168,85,247,0.06)':'rgba(0,0,0,0.4)',
                  border:'1px solid '+(idx===0?'rgba(255,214,0,0.35)':ini.isNpc?'rgba(168,85,247,0.25)':'rgba(0,229,255,0.12)'),
                  borderRadius:6
                }}>
                  <div style={{fontFamily:'Orbitron',fontSize:16,fontWeight:900,color:idx===0?'#ffd600':ini.isNpc?'#a855f7':'#00e5ff',minWidth:28,textAlign:'center'}}>{ini.total}</div>
                  <div style={{flex:1}}>
                    <div style={{fontFamily:'Orbitron',fontSize:9,color:idx===0?'#ffd600':ini.isNpc?'#a855f7':'#e8f4f8'}}>
                      {idx===0?'👑 ':''}{ini.nome}
                    </div>
                    <div style={{fontSize:8,color:'rgba(0,229,255,0.35)',fontFamily:'Share Tech Mono'}}>[{ini.res?.join(',')}] +H{ini.habil}</div>
                  </div>
                  {(ehMestre || ini.id===myPlayerId.current) && (
                    <button onClick={()=>removerIniciativa(ini.id)} style={{background:'none',border:'none',color:'rgba(255,23,68,0.5)',cursor:'pointer',fontSize:14,padding:'0 2px',lineHeight:1}} title="Remover">×</button>
                  )}
                </div>
              ))
            }
          </div>
        )}
      </div>
    </div>
  );
};

// ── Main App ──────────────────────────────────────────────────────────────────
const App = () => {
  const fileRef = useRef(null);
  const impRef = useRef(null);
  const [char,setChar] = useState({...EMPTY,id:Date.now()});
  const [sheets,setSheets] = useState([]);
  const [sidebar,setSidebar] = useState(false);
  const [dice,setDice] = useState(false);
  const [kitIn,setKitIn] = useState('');
  const [campPanel,setCampPanel] = useState(false);
  const [arqPreviewOpen,setArqPreviewOpen] = useState(false);
  // Indicador se está na campanha (para badge no botão)
  const [emCampanha,setEmCampanha] = useState(false);

  useEffect(()=>{
    setEmCampanha(!!localStorage.getItem('3det_camp'));
  },[campPanel]);

  useEffect(()=>{
    const s = localStorage.getItem('3det_v2');
    if(s) try{setSheets(JSON.parse(s))}catch(e){}
  },[]);

  const syncToCloud = async () => {
    try {
      let sid = char.syncId;
      if(!sid){sid=Math.random().toString(36).substring(2,7).toUpperCase();setChar(c=>({...c,syncId:sid}));}
      await fbSet(`fichas/${sid}`,{...char,syncId:sid});
      navigator.clipboard.writeText(sid).catch(()=>{});
      alert('☁️ Ficha salva!\nCódigo: '+sid+'\n(Já copiado!)');
    } catch(e){alert('❌ Erro ao salvar: '+e.message);}
  };

  const importFromCloud = async () => {
    const code = prompt('Código da ficha (ex: 8F2A1):');
    if(!code) return;
    try {
      const data = await fbGet(`fichas/${code.trim().toUpperCase()}`);
      if(data&&data.id){
        const s={...EMPTY,...data,pericias:data.pericias||[],vantagens:data.vantagens||[],desvantagens:data.desvantagens||[],kits:data.kits||[],tecnicas:data.tecnicas||[],inventario:{...EMPTY.inventario,...(data.inventario||{})}};
        setSheets(p=>{const f=p.filter(x=>x.id!==s.id);return [...f,s];});
        alert('☁️ Ficha importada!');
      } else alert('❌ Nenhuma ficha encontrada.');
    } catch(e){alert('❌ Erro: '+e.message);}
  };

  const save = () => {
    const ns = {...char,id:char.id||Date.now(),saved:new Date().toISOString()};
    try {
      const idx = sheets.findIndex(s=>s.id===ns.id);
      const arr = [...sheets];
      if(idx>=0) arr[idx]=ns; else arr.push(ns);
      localStorage.setItem('3det_v2',JSON.stringify(arr));
      setSheets(arr); setChar(ns); alert('Ficha salva!');
    } catch(e){alert('Erro ao salvar. Tente remover a foto.');}
  };

  const pts = useMemo(()=>{
    const a = (char.atributos.poder||0)+(char.atributos.habilidade||0)+(char.atributos.resistencia||0);
    const v = char.vantagens.reduce((x,i)=>x+(parseInt(i.custo)||0),0);
    const d = char.desvantagens.reduce((x,i)=>{
      const obrig = i.detalhe&&(i.detalhe.includes('(Kit:')||i.detalhe.includes('(Arquétipo:'));
      return obrig?x:x+(parseInt(i.custo)||0);
    },0);
    const p = char.pericias.reduce((x,i)=>x+(parseInt(i.custo)||0),0);
    const n = (char.kits||[]).length; const k = n*(n+1)/2;
    return a+v+d+p+k+(parseInt(char.arquetipoCusto)||0);
  },[char.atributos,char.vantagens,char.desvantagens,char.pericias,char.kits,char.arquetipoCusto]);

  const addKit = () => {
    if(!kitIn.trim()) return;
    const name = kitIn.trim();
    const kit = KITS[name];
    if(!kit) return;
    const newV = [...char.vantagens,...(kit.poderes||[]).map((p,i)=>({
      id:Date.now()+i+Math.random(),nome:p.nome,detalhe:'(Kit: '+name+')',descricao:p.desc||'',custo:'0'
    }))];
    let newD = [...char.desvantagens];
    if(kit.desv){
      if(!newD.some(d=>d.nome===kit.desv.nome)){
        newD.push({id:Date.now()+Math.random(),nome:kit.desv.nome,detalhe:'(Kit: '+name+')',descricao:kit.desv.desc||'',custo:kit.desv.custo||'-1'});
      }
    }
    setChar(c=>({...c,kits:[...(c.kits||[]),{id:Date.now(),nome:name}],vantagens:newV,desvantagens:newD}));
    setKitIn('');
  };

  const addItem = list => setChar(c=>({...c,[list]:[...(c[list]||[]),{id:Date.now(),nome:'',detalhe:'',descricao:'',custo:list==='pericias'?'1':''}]}));
  const updItem = (list,id,f,v) => setChar(c=>{
    const nl = c[list].map(item=>{
      if(item.id!==id) return item;
      const u = {...item,[f]:v};
      if(f==='nome'){
        const info = list==='vantagens'?VANTAGENS[v]:list==='desvantagens'?DESVANTAGENS[v]:null;
        if(info){if(!u.custo||u.custo==='')u.custo=(info.c.match(/-?\d+/)||[''])[0]; u.descricao=info.d;}
        u.detalhe='';
      }
      return u;
    });
    return {...c,[list]:nl};
  });
  const remItem = (list,id) => setChar(c=>({...c,[list]:c[list].filter(i=>i.id!==id)}));
  const addInv = cat => setChar(c=>({...c,inventario:{...c.inventario,[cat]:[...c.inventario[cat],{id:Date.now(),nome:'',qtd:1,desc:''}]}}));
  const updInv = (cat,id,f,v) => setChar(c=>({...c,inventario:{...c.inventario,[cat]:c.inventario[cat].map(i=>i.id===id?{...i,[f]:v}:i)}}));
  const remInv = (cat,id) => setChar(c=>({...c,inventario:{...c.inventario,[cat]:c.inventario[cat].filter(i=>i.id!==id)}}));

  const maxPA = char.atributos.poder||1;
  const maxPM = char.atributos.habilidade===0?1:char.atributos.habilidade*5;
  const maxPV = char.atributos.resistencia===0?1:char.atributos.resistencia*5;

  const hasPatr = char.vantagens.some(v=>v.nome.toLowerCase().includes('patrono'));
  const getLimits = (lvl,tr) => {
    let l={comuns:2,incomuns:0,raros:0,lendarios:0};
    if(lvl>=1){l.comuns=3;l.incomuns=1;}
    if(lvl>=2){l.comuns=5;l.incomuns=2;}
    if(lvl>=3){l.incomuns=4;l.raros=1;l.lendarios=1;}
    if(hasPatr){if(l.comuns>0)l.comuns++;if(l.incomuns>0)l.incomuns++;if(l.raros>0)l.raros++;if(l.lendarios>0)l.lendarios++;}
    l.comuns-=(tr.ci||0)*3;l.incomuns+=(tr.ci||0);l.incomuns-=(tr.ir||0)*3;l.raros+=(tr.ir||0);l.raros-=(tr.rl||0)*3;l.lendarios+=(tr.rl||0);
    return l;
  };
  const tr = char.trocas||{ci:0,ir:0,rl:0};
  const lim = getLimits(char.nivelInv||0,tr);

  const exportJ = () => {const d="data:text/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(char));const a=document.createElement('a');a.href=d;a.download=(char.nome||'personagem')+'_3det.json';document.body.appendChild(a);a.click();a.remove();};
  const importJ = e => {const f=e.target.files[0];if(f){const r=new FileReader();r.onload=ev=>{try{const l=JSON.parse(ev.target.result);if(!l.inventario)l.inventario=EMPTY.inventario;if(!l.kits)l.kits=[];if(!l.id)l.id=Date.now();setChar({...EMPTY,...l});alert('Ficha carregada!');}catch(err){alert('Erro ao ler arquivo.');}e.target.value=null;};r.readAsText(f);}};

  return (
    <div style={{minHeight:'100vh',background:'var(--cb)',color:'var(--ct)',position:'relative',zIndex:1}}>

      {/* TOP BAR */}
      <div className="no-print" style={{position:'sticky',top:0,zIndex:100,background:'linear-gradient(90deg,var(--cb),var(--cp),var(--cb))',borderBottom:'1px solid var(--ca)',boxShadow:'0 0 20px var(--cg2)',padding:'10px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,flexWrap:'wrap'}}>
        <Btn onClick={()=>setSidebar(true)} style={{padding:'6px 10px',fontSize:10,flexShrink:0}}>☰ FICHAS</Btn>
        <div style={{textAlign:'center',flex:1,minWidth:120}}>
          <div className="flicker orb" style={{color:'#00e5ff',textShadow:'0 0 10px var(--cg)',fontSize:'clamp(10px,3vw,18px)',fontWeight:900,letterSpacing:4,textTransform:'uppercase'}}>PLUS DISTOPHYA</div>
          <div className="mono" style={{color:'rgba(0,229,255,0.4)',fontSize:8,letterSpacing:3}}>◆ FICHA 3DeT VICTORY ◆</div>
        </div>
        <div style={{display:'flex',gap:5,flexWrap:'wrap',justifyContent:'flex-end',flexShrink:0}}>
          <button onClick={syncToCloud} style={{background:'rgba(168,85,247,0.15)',border:'1px solid rgba(168,85,247,0.4)',color:'#a855f7',borderRadius:6,padding:'5px 8px',cursor:'pointer',fontSize:9,fontFamily:'Orbitron',textTransform:'uppercase'}}>☁️ SYNC</button>
          <button onClick={importFromCloud} style={{background:'rgba(236,72,153,0.15)',border:'1px solid rgba(236,72,153,0.4)',color:'#ec4899',borderRadius:6,padding:'5px 8px',cursor:'pointer',fontSize:9,fontFamily:'Orbitron',textTransform:'uppercase'}}>📥</button>
          <button onClick={()=>{setCampPanel(!campPanel);}} style={{
            background:emCampanha?'rgba(0,229,255,0.12)':'rgba(255,214,0,0.12)',
            border:'1px solid '+(emCampanha?'rgba(0,229,255,0.4)':'rgba(255,214,0,0.4)'),
            color:emCampanha?'#00e5ff':'#ffd600',
            borderRadius:6,padding:'5px 8px',cursor:'pointer',fontSize:9,fontFamily:'Orbitron',textTransform:'uppercase',
            position:'relative'
          }}>
            {emCampanha?'⚔ MESA':'⚔ MESA'}
            {emCampanha && <span style={{position:'absolute',top:-3,right:-3,width:7,height:7,background:'#00e676',borderRadius:'50%',border:'1px solid var(--cb)'}}/>}
          </button>
          <Btn onClick={save} style={{padding:'5px 8px',fontSize:9}}>💾 SALVAR</Btn>
        </div>
      </div>

      {/* DICE FAB */}
      <button className="no-print pulse" onClick={()=>setDice(true)} style={{position:'fixed',bottom:24,right:24,zIndex:150,width:52,height:52,borderRadius:'50%',background:'var(--cp)',border:'2px solid var(--ca)',color:'var(--ca)',fontSize:20,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}} title="Rolar Dados">🎲</button>

      {dice && <DiceModal onClose={()=>setDice(false)} attrs={char.atributos} onRoll={()=>{}} />}

      {/* CAMPAIGN PANEL (slide-in) */}
      {campPanel && (
        <>
          <div onClick={()=>setCampPanel(false)} style={{position:'fixed',inset:0,background:'rgba(0,5,15,0.6)',zIndex:200}} />
          <div style={{position:'fixed',top:0,left:0,bottom:0,width:'min(500px,100vw)',background:'var(--cp)',borderRight:'1px solid rgba(0,229,255,0.3)',boxShadow:'0 0 40px rgba(0,229,255,0.12)',zIndex:201,display:'flex',flexDirection:'column'}}>
            {/* Header */}
            <div style={{padding:'14px 16px',borderBottom:'1px solid rgba(0,229,255,0.2)',display:'flex',justifyContent:'space-between',alignItems:'center',background:'rgba(0,0,0,0.4)',flexShrink:0}}>
              <div>
                <div style={{fontFamily:'Orbitron',color:'#ffd600',fontSize:13,letterSpacing:2}}>⚔ MESA DE CAMPANHA</div>
                <div style={{fontSize:9,color:'rgba(0,229,255,0.3)',marginTop:1}}>Fichas · Rolagens · Iniciativa</div>
              </div>
              <button onClick={()=>setCampPanel(false)} style={{background:'none',border:'none',color:'#ff1744',fontSize:22,cursor:'pointer'}}>×</button>
            </div>
            <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
              <CampaignPanel char={char} onClose={()=>setCampPanel(false)} />
            </div>
          </div>
        </>
      )}

      {/* SIDEBAR */}
      {sidebar && (
        <div>
          <div onClick={()=>setSidebar(false)} style={{position:'fixed',inset:0,background:'rgba(0,5,15,0.85)',zIndex:200}} />
          <div style={{position:'fixed',top:0,left:0,bottom:0,width:300,background:'var(--cp)',borderRight:'1px solid var(--ca)',boxShadow:'0 0 30px var(--cg)',zIndex:201,display:'flex',flexDirection:'column'}}>
            <div style={{padding:16,borderBottom:'1px solid rgba(0,229,255,0.2)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontFamily:'Orbitron',color:'#00e5ff',fontSize:13}}>BIBLIOTECA</span>
              <button onClick={()=>setSidebar(false)} style={{background:'none',border:'none',color:'#ff1744',fontSize:20,cursor:'pointer'}}>×</button>
            </div>
            <div style={{padding:12,borderBottom:'1px solid rgba(0,229,255,0.1)',display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              <Btn onClick={()=>{if(window.confirm('Nova ficha?')){setChar({...EMPTY,id:Date.now()});setSidebar(false);}}} style={{fontSize:10,padding:'6px 8px'}}>+ Nova</Btn>
              <Btn onClick={()=>impRef.current.click()} style={{fontSize:10,padding:'6px 8px'}}>📂 Importar</Btn>
              <input ref={impRef} type="file" accept=".json" onChange={importJ} style={{display:'none'}} />
            </div>
            <div style={{flex:1,overflowY:'auto',padding:12,display:'flex',flexDirection:'column',gap:8}}>
              {sheets.length===0
                ? <p style={{color:'rgba(0,229,255,0.3)',textAlign:'center',fontSize:12,marginTop:20}}>Nenhuma ficha salva.</p>
                : sheets.map(sh=>(
                  <div key={sh.id} onClick={()=>{setChar({...EMPTY,...sh,kits:sh.kits||[]});setSidebar(false);}}
                    style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.2)',borderRadius:6,padding:10,cursor:'pointer',display:'flex',alignItems:'center',gap:10,position:'relative'}}>
                    {sh.foto && <img src={sh.foto} style={{width:36,height:36,borderRadius:4,objectFit:'cover'}} alt="" />}
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:700,fontSize:13,color:'#e8f4f8',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{sh.nome||'Sem Nome'}</div>
                      <div style={{fontSize:10,color:'rgba(0,229,255,0.4)'}}>{sh.arquetipo||'—'}</div>
                    </div>
                    <button onClick={e=>{e.stopPropagation();if(window.confirm('Remover?')){const n=sheets.filter(s=>s.id!==sh.id);localStorage.setItem('3det_v2',JSON.stringify(n));setSheets(n);}}}
                      style={{background:'none',border:'none',color:'#ff1744',cursor:'pointer',fontSize:14}}>×</button>
                  </div>
                ))
              }
            </div>
          </div>
        </div>
      )}

      {/* MAIN CONTENT */}
      <div style={{maxWidth:1100,margin:'0 auto',padding:'24px 16px',position:'relative',zIndex:1}}>

        {/* HEADER CARD */}
        <div className="panel" style={{padding:20,marginBottom:20}}>
          <div style={{display:'flex',gap:20,flexWrap:'wrap'}}>
            {/* Foto */}
            <div onClick={()=>fileRef.current.click()} style={{width:130,height:130,borderRadius:8,background:'rgba(0,0,0,0.6)',border:'2px dashed rgba(0,229,255,0.25)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0,overflow:'hidden'}}>
              {char.foto
                ? <img src={char.foto} style={{width:'100%',height:'100%',objectFit:'cover'}} alt="" />
                : <div style={{textAlign:'center',color:'rgba(0,229,255,0.3)'}}>
                    <div style={{fontSize:28,marginBottom:4}}>📷</div>
                    <div style={{fontFamily:'Orbitron',fontSize:9,textTransform:'uppercase'}}>Foto</div>
                  </div>
              }
            </div>
            <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onloadend=()=>setChar(c=>({...c,foto:r.result}));r.readAsDataURL(f);}}} />

            <div style={{flex:1,minWidth:260,display:'flex',flexDirection:'column',gap:12}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                {/* Nome */}
                <div>
                  <label style={{fontFamily:'Orbitron',fontSize:9,color:'rgba(0,229,255,0.6)',display:'block',marginBottom:4,textTransform:'uppercase',letterSpacing:1}}>Nome</label>
                  <input value={char.nome} onChange={e=>setChar(c=>({...c,nome:e.target.value}))} placeholder="Nome do Personagem" style={{width:'100%',fontSize:18,fontWeight:700,padding:'6px 10px',fontFamily:'Orbitron'}} />
                </div>
                {/* Arquétipo */}
                <div>
                  <label style={{fontFamily:'Orbitron',fontSize:9,color:'rgba(0,229,255,0.6)',display:'block',marginBottom:4,textTransform:'uppercase',letterSpacing:1}}>Arquétipo</label>
                  <div style={{display:'flex',gap:6}}>
                    <input list="arq-list" value={char.arquetipo} onChange={e=>{
                      const v=e.target.value;
                      const arq=ARQUETIPOS[v];
                      if(!arq){setChar(c=>({...c,arquetipo:v}));setArqPreviewOpen(false);return;}
                      let novasDesv = char.desvantagens.filter(d=>!d.detalhe||!d.detalhe.includes('(Arquétipo:'));
                      if(arq.desv&&arq.desv.length>0){
                        arq.desv.forEach((d,i)=>{
                          novasDesv.push({id:Date.now()+i+Math.random(),nome:d.nome,detalhe:'(Arquétipo: '+v+')',descricao:d.desc||'',custo:d.custo||'-1'});
                        });
                      }
                      setChar(c=>({...c,arquetipo:v,arquetipoCusto:arq.custo,desvantagens:novasDesv}));
                      setArqPreviewOpen(true);
                    }} placeholder="Arquétipo..." style={{flex:1,fontSize:14,fontWeight:700,padding:'6px 8px'}} />
                    <datalist id="arq-list">{LISTA_ARQ.map(a=><option key={a} value={a}>{a} ({ARQUETIPOS[a].custo}pt)</option>)}</datalist>
                    <input type="number" value={char.arquetipoCusto} onChange={e=>setChar(c=>({...c,arquetipoCusto:parseInt(e.target.value)||0}))} style={{width:44,textAlign:'center',fontSize:14,fontWeight:700,padding:'6px 4px'}} />
                  </div>
                  {char.arquetipo && ARQUETIPOS[char.arquetipo] && arqPreviewOpen && (
                    <div className="no-print" style={{background:'rgba(0,229,255,0.04)',border:'1px solid rgba(0,229,255,0.2)',borderRadius:6,padding:10,marginTop:6}}>
                      <div style={{fontSize:10,color:'rgba(255,214,0,0.7)',marginBottom:4,fontFamily:'Orbitron'}}>{char.arquetipo} — {ARQUETIPOS[char.arquetipo].custo}pt</div>
                      <div style={{fontSize:11,color:'rgba(0,229,255,0.6)',marginBottom:8,lineHeight:1.4}}>{ARQUETIPOS[char.arquetipo].desc}</div>
                      {ARQUETIPOS[char.arquetipo].poderes.length>0 && (
                        <div style={{marginBottom:6}}>
                          <div style={{fontSize:10,color:'rgba(0,229,255,0.5)',fontFamily:'Orbitron',marginBottom:4,textTransform:'uppercase'}}>Poderes:</div>
                          {ARQUETIPOS[char.arquetipo].poderes.map((p,i)=>(
                            <div key={i} style={{marginBottom:4,paddingLeft:8,borderLeft:'2px solid rgba(0,229,255,0.2)'}}>
                              <span style={{fontSize:11,color:'#00e5ff',fontWeight:700}}>{p.nome}:</span>
                              <span style={{fontSize:11,color:'rgba(0,229,255,0.6)',marginLeft:4}}>{p.desc}</span>
                            </div>
                          ))}
                        </div>
                      )}
                      {ARQUETIPOS[char.arquetipo].desv.length>0 && ARQUETIPOS[char.arquetipo].desv.map((d,i)=>(
                        <div key={i} style={{padding:'4px 8px',background:'rgba(255,23,68,0.06)',border:'1px solid rgba(255,23,68,0.2)',borderRadius:4,marginTop:4}}>
                          <span style={{fontSize:10,color:'#ff5252',fontWeight:700,fontFamily:'Orbitron'}}>{d.nome} ({d.custo}pt):</span>
                          <span style={{fontSize:10,color:'rgba(255,82,82,0.7)',marginLeft:4}}>{d.desc}</span>
                        </div>
                      ))}
                      <button onClick={()=>setArqPreviewOpen(false)} style={{marginTop:10,width:'100%',padding:'6px',background:'rgba(0,229,255,0.12)',border:'1px solid var(--ca)',color:'var(--ca)',borderRadius:6,cursor:'pointer',fontFamily:'Orbitron',fontSize:10,textTransform:'uppercase'}}>✓ Confirmar</button>
                    </div>
                  )}
                </div>
                {/* Marco */}
                <div>
                  <label style={{fontFamily:'Orbitron',fontSize:9,color:'rgba(0,229,255,0.6)',display:'block',marginBottom:4,textTransform:'uppercase',letterSpacing:1}}>Marco</label>
                  <select value={char.marco} onChange={e=>setChar(c=>({...c,marco:e.target.value}))} style={{width:'100%',fontSize:14,fontWeight:700,padding:'6px 8px',appearance:'none'}}>
                    {['Iniciante','Herói','Veterano','Lenda'].map(m=><option key={m} value={m}>{m}</option>)}
                  </select>
                </div>
                {/* Escala */}
                <div>
                  <label style={{fontFamily:'Orbitron',fontSize:9,color:'rgba(0,229,255,0.6)',display:'block',marginBottom:4,textTransform:'uppercase',letterSpacing:1}}>Escala</label>
                  <select value={char.escala} onChange={e=>setChar(c=>({...c,escala:e.target.value}))} style={{width:'100%',fontSize:14,fontWeight:700,padding:'6px 8px',appearance:'none'}}>
                    {['Ningen','Sugoi','Kiodai','Kami'].map(m=><option key={m} value={m}>{m}</option>)}
                  </select>
                </div>
              </div>

              {/* Kits */}
              <div style={{background:'rgba(0,0,0,0.3)',border:'1px solid rgba(0,229,255,0.15)',borderRadius:6,padding:12}}>
                <div style={{fontFamily:'Orbitron',fontSize:10,color:'#00e5ff',marginBottom:8,textTransform:'uppercase'}}>👑 Kits ({(char.kits||[]).length})</div>
                <div className="no-print" style={{display:'flex',gap:8,marginBottom:8}}>
                  <input list="kit-list" value={kitIn} onChange={e=>setKitIn(e.target.value)} placeholder="Selecione um Kit..." style={{flex:1,fontSize:13,padding:'5px 8px'}} />
                  <datalist id="kit-list">{LISTA_KITS.map(k=><option key={k} value={k}/>)}</datalist>
                  <Btn onClick={addKit} style={{padding:'5px 12px',fontSize:11}}>+ ADD</Btn>
                </div>
                {kitIn && KITS[kitIn] && (
                  <div className="no-print" style={{background:'rgba(0,229,255,0.04)',border:'1px solid rgba(0,229,255,0.18)',borderRadius:6,padding:10,marginBottom:8}}>
                    <div style={{fontFamily:'Orbitron',fontSize:10,color:'#00e5ff',marginBottom:2}}>{kitIn}</div>
                    <div style={{fontSize:10,color:'rgba(255,214,0,0.7)',marginBottom:4,fontFamily:'Share Tech Mono'}}>Exig: {KITS[kitIn].exig}</div>
                    <div style={{fontSize:11,color:'rgba(0,229,255,0.6)',marginBottom:6,lineHeight:1.4}}>{KITS[kitIn].desc}</div>
                    {KITS[kitIn].poderes.map((p,i)=>(
                      <div key={i} style={{marginBottom:3,paddingLeft:8,borderLeft:'2px solid rgba(0,229,255,0.2)'}}>
                        <span style={{fontSize:11,color:'#00e5ff',fontWeight:700}}>{p.nome}:</span>
                        <span style={{fontSize:11,color:'rgba(0,229,255,0.6)',marginLeft:4}}>{p.desc}</span>
                      </div>
                    ))}
                    {KITS[kitIn].desv && (
                      <div style={{marginTop:5,padding:'3px 7px',background:'rgba(255,23,68,0.05)',border:'1px solid rgba(255,23,68,0.18)',borderRadius:4}}>
                        <span style={{fontSize:10,color:'#ff5252',fontWeight:700,fontFamily:'Orbitron'}}>{KITS[kitIn].desv.nome} ({KITS[kitIn].desv.custo}pt):</span>
                        <span style={{fontSize:10,color:'rgba(255,82,82,0.7)',marginLeft:4}}>{KITS[kitIn].desv.desc}</span>
                      </div>
                    )}
                  </div>
                )}
                <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                  {(char.kits||[]).map(k=>(
                    <span key={k.id} style={{background:'rgba(0,229,255,0.08)',border:'1px solid rgba(0,229,255,0.3)',borderRadius:4,padding:'3px 8px',fontSize:11,fontFamily:'Orbitron',color:'#00e5ff',display:'flex',alignItems:'center',gap:4}}>
                      {k.nome}
                      <button className="no-print" onClick={()=>setChar(c=>({...c,kits:c.kits.filter(x=>x.id!==k.id)}))} style={{background:'none',border:'none',color:'#ff1744',cursor:'pointer',fontSize:12}}>×</button>
                    </span>
                  ))}
                  {(char.kits||[]).length===0 && <span style={{fontSize:11,color:'rgba(0,229,255,0.25)',fontStyle:'italic'}}>Nenhum kit.</span>}
                </div>
              </div>

              {/* Pontos + XP */}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <div style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.2)',borderRadius:6,padding:12,textAlign:'center'}}>
                  <div style={{fontFamily:'Orbitron',fontSize:9,color:'rgba(0,229,255,0.5)',marginBottom:4,textTransform:'uppercase'}}>Pontos Totais</div>
                  <div style={{fontFamily:'Orbitron',fontSize:28,fontWeight:900,color:'#00e5ff',textShadow:'0 0 15px var(--cg)'}}>{pts}</div>
                </div>
                <div style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.2)',borderRadius:6,padding:12,textAlign:'center'}}>
                  <div style={{fontFamily:'Orbitron',fontSize:9,color:'rgba(0,229,255,0.5)',marginBottom:4,textTransform:'uppercase'}}>XP</div>
                  <input type="number" value={char.experiencia} onChange={e=>setChar(c=>({...c,experiencia:parseInt(e.target.value)||0}))} style={{width:'100%',textAlign:'center',fontSize:24,fontWeight:900,fontFamily:'Orbitron',color:'#00e5ff',background:'transparent',border:'none'}} />
                </div>
              </div>
            </div>
          </div>
        </div>

        {/* ATRIBUTOS + ESTADO */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 2fr',gap:16,marginBottom:20}}>
          <div className="panel" style={{padding:20}}>
            <div style={{fontFamily:'Orbitron',fontSize:12,color:'#00e5ff',borderBottom:'1px solid rgba(0,229,255,0.15)',paddingBottom:8,marginBottom:16,textTransform:'uppercase'}}>⭐ Atributos</div>
            {[['poder','#ff1744'],['habilidade','#00e5ff'],['resistencia','#00e676']].map(([a,c])=>(
              <div key={a} style={{background:'rgba(0,0,0,0.4)',borderLeft:'3px solid '+c,borderRadius:6,padding:'10px 12px',marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontFamily:'Orbitron',fontSize:11,color:c,textTransform:'uppercase'}}>{a.slice(0,1).toUpperCase()+a.slice(1)}</span>
                <Stepper value={char.atributos[a]} onChange={v=>setChar(c=>({...c,atributos:{...c.atributos,[a]:Math.max(0,v)}}))} />
              </div>
            ))}
          </div>
          <div className="panel" style={{padding:20}}>
            <div style={{fontFamily:'Orbitron',fontSize:12,color:'rgba(0,229,255,0.7)',borderBottom:'1px solid rgba(0,229,255,0.15)',paddingBottom:8,marginBottom:16,textTransform:'uppercase'}}>Estado Atual</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
              <Bar label="Vida (Rx5)" current={char.recursos.pv} max={maxPV} color="red" icon="heart" onChange={v=>setChar(c=>({...c,recursos:{...c.recursos,pv:v}}))} />
              <Bar label="Mana (Hx5)" current={char.recursos.pm} max={maxPM} color="blue" icon="zap" onChange={v=>setChar(c=>({...c,recursos:{...c.recursos,pm:v}}))} />
            </div>
            <div style={{background:'rgba(0,0,0,0.5)',border:'1px solid rgba(255,214,0,0.3)',borderRadius:6,padding:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontFamily:'Orbitron',fontSize:11,color:'#ffd600',textTransform:'uppercase'}}>⭐ Pontos de Ação</span>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <Btn onClick={()=>setChar(c=>({...c,recursos:{...c.recursos,pa:Math.max(0,(c.recursos.pa||0)-1)}}))} style={{padding:'2px 8px',fontSize:14,borderColor:'rgba(255,214,0,0.4)',color:'#ffd600'}}>−</Btn>
                <input type="number" value={char.recursos.pa||0} onChange={e=>setChar(c=>({...c,recursos:{...c.recursos,pa:parseInt(e.target.value)||0}}))} style={{width:52,textAlign:'center',fontSize:24,fontWeight:900,fontFamily:'Orbitron',color:'#ffd600',borderColor:'rgba(255,214,0,0.3)'}} />
                <span style={{color:'rgba(255,214,0,0.4)',fontSize:14}}>/ {maxPA}</span>
                <Btn onClick={()=>setChar(c=>({...c,recursos:{...c.recursos,pa:(c.recursos.pa||0)+1}}))} style={{padding:'2px 8px',fontSize:14,borderColor:'rgba(255,214,0,0.4)',color:'#ffd600'}}>+</Btn>
              </div>
            </div>
          </div>
        </div>

        {/* LISTAS */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,marginBottom:20}}>
          <ListSection title="Perícias" color="blue" items={char.pericias} suggestions={PERICIAS} onAdd={()=>addItem('pericias')} onUpdate={(id,f,v)=>updItem('pericias',id,f,v)} onRemove={id=>remItem('pericias',id)} />
          <ListSection title="Vantagens" color="green" items={char.vantagens} suggestions={LISTA_VANT} onAdd={()=>addItem('vantagens')} onUpdate={(id,f,v)=>updItem('vantagens',id,f,v)} onRemove={id=>remItem('vantagens',id)} />
          <ListSection title="Desvantagens" color="red" items={char.desvantagens} suggestions={LISTA_DESV} onAdd={()=>addItem('desvantagens')} onUpdate={(id,f,v)=>updItem('desvantagens',id,f,v)} onRemove={id=>remItem('desvantagens',id)} />
        </div>

        {/* TÉCNICAS */}
        <div className="panel" style={{padding:20,marginBottom:20}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:'1px solid rgba(0,229,255,0.15)',paddingBottom:8,marginBottom:16}}>
            <span style={{fontFamily:'Orbitron',fontSize:12,color:'#00e5ff',textTransform:'uppercase'}}>✨ Técnicas</span>
            <Btn onClick={()=>addItem('tecnicas')} style={{fontSize:10,padding:'4px 10px'}}>+ ADD</Btn>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:12}}>
            {char.tecnicas.map(t=>(
              <div key={t.id} style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.15)',borderRadius:6,padding:10,position:'relative'}}>
                <input placeholder="Nome da Técnica" value={t.nome} onChange={e=>updItem('tecnicas',t.id,'nome',e.target.value)}
                  style={{width:'100%',fontSize:13,fontWeight:700,padding:'3px 6px',marginBottom:6,background:'transparent',border:'none',borderBottom:'1px solid rgba(0,229,255,0.15)',color:'var(--ct)',outline:'none'}} />
                <input placeholder="Custo / Alcance / Duração" value={t.custo} onChange={e=>updItem('tecnicas',t.id,'custo',e.target.value)}
                  style={{width:'100%',fontSize:10,padding:'2px 6px',marginBottom:4}} />
                <textarea placeholder="Descrição do efeito..." value={t.descricao||''} onChange={e=>updItem('tecnicas',t.id,'descricao',e.target.value)}
                  rows={2} style={{width:'100%',fontSize:11,padding:'4px 6px',resize:'none'}} />
                <button className="no-print" onClick={()=>remItem('tecnicas',t.id)} style={{position:'absolute',top:6,right:6,background:'none',border:'none',color:'#ff1744',cursor:'pointer',fontSize:14}}>×</button>
              </div>
            ))}
            {char.tecnicas.length===0 && <p style={{color:'rgba(0,229,255,0.25)',fontSize:11,fontStyle:'italic'}}>Nenhuma técnica.</p>}
          </div>
        </div>

        {/* INVENTÁRIO */}
        <div className="panel" style={{padding:20,marginBottom:20}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:'1px solid rgba(0,229,255,0.15)',paddingBottom:8,marginBottom:16,flexWrap:'wrap',gap:8}}>
            <span style={{fontFamily:'Orbitron',fontSize:12,color:'#00e5ff',textTransform:'uppercase'}}>🎒 Inventário</span>
            <select value={char.nivelInv||0} onChange={e=>setChar(c=>({...c,nivelInv:parseInt(e.target.value)}))} style={{fontSize:12,padding:'4px 8px',fontFamily:'Orbitron'}}>
              <option value={0}>0pt (Padrão)</option>
              <option value={1}>1pt (Pequeno)</option>
              <option value={2}>2pt (Grande)</option>
              <option value={3}>3pt (Supremo)</option>
            </select>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
            <InvCol title="Comuns" color="slate" items={char.inventario.comuns} limit={lim.comuns} onAdd={()=>addInv('comuns')} onUpdate={(id,f,v)=>updInv('comuns',id,f,v)} onRemove={id=>remInv('comuns',id)} />
            <InvCol title="Incomuns" color="blue" items={char.inventario.incomuns} limit={lim.incomuns} onAdd={()=>addInv('incomuns')} onUpdate={(id,f,v)=>updInv('incomuns',id,f,v)} onRemove={id=>remInv('incomuns',id)} />
            <InvCol title="Raros" color="yellow" items={char.inventario.raros} limit={lim.raros} onAdd={()=>addInv('raros')} onUpdate={(id,f,v)=>updInv('raros',id,f,v)} onRemove={id=>remInv('raros',id)} />
            <InvCol title="Lendários" color="purple" items={char.inventario.lendarios} limit={lim.lendarios} onAdd={()=>addInv('lendarios')} onUpdate={(id,f,v)=>updInv('lendarios',id,f,v)} onRemove={id=>remInv('lendarios',id)} />
          </div>
        </div>

        {/* NOTAS */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
          <div className="panel" style={{padding:16}}>
            <div style={{fontFamily:'Orbitron',fontSize:11,color:'rgba(0,229,255,0.6)',marginBottom:8,textTransform:'uppercase'}}>📝 Anotações</div>
            <textarea value={char.anotacoes} onChange={e=>setChar(c=>({...c,anotacoes:e.target.value}))} placeholder="Notas rápidas..." rows={5} style={{width:'100%',resize:'vertical',fontSize:13,padding:8}} />
          </div>
          <div className="panel" style={{padding:16}}>
            <div style={{fontFamily:'Orbitron',fontSize:11,color:'rgba(0,229,255,0.6)',marginBottom:8,textTransform:'uppercase'}}>📖 História</div>
            <textarea value={char.historia} onChange={e=>setChar(c=>({...c,historia:e.target.value}))} placeholder="Biografia do personagem..." rows={5} style={{width:'100%',resize:'vertical',fontSize:13,padding:8}} />
          </div>
        </div>

        {/* FOOTER */}
        <div className="no-print" style={{display:'flex',justifyContent:'center',gap:12,paddingTop:16,borderTop:'1px solid rgba(0,229,255,0.15)',flexWrap:'wrap'}}>
          <Btn onClick={exportJ} style={{padding:'10px 20px'}}>📥 Baixar JSON</Btn>
          <Btn onClick={save} style={{padding:'10px 20px',background:'rgba(0,229,255,0.1)',boxShadow:'0 0 15px var(--cg)'}}>💾 Salvar na Biblioteca</Btn>
          <Btn onClick={()=>window.print()} style={{padding:'10px 20px'}}>🖨️ Imprimir</Btn>
        </div>
      </div>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
