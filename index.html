      const DiceModal = ({ onClose, attributes, onRollBroadcast }) => {
        const [selectedAttribute, setSelectedAttribute] = useState('poder');
        const [hasSkill, setHasSkill] = useState(false);
        const [gainCount, setGainCount] = useState(0);
        const [lossCount, setLossCount] = useState(0);
        const [critRange, setCritRange] = useState(6);
        const [modifier, setModifier] = useState(0);
        const [history, setHistory] = useState([]);
        const [currentRoll, setCurrentRoll] = useState(null);
        const [isRolling, setIsRolling] = useState(false);

        const diceCount = useMemo(() => {
          let count = 1;
          if (hasSkill) count++;
          count += gainCount;
          count -= lossCount;
          return Math.max(1, Math.min(3, count));
        }, [hasSkill, gainCount, lossCount]);

        const roll = () => {
          if (isRolling) return;
          setIsRolling(true);
          setTimeout(() => {
            const results = Array.from({length: diceCount}, () => Math.floor(Math.random()*6)+1);
            const attrValue = attributes[selectedAttribute] || 0;
            const diceSum = results.reduce((a,b) => a+b, 0);
            const criticalHits = results.filter(r => r >= critRange).length;
            const criticalBonus = criticalHits * attrValue;
            const isCriticalFailure = results.every(r => r === 1);
            const total = diceSum + attrValue + criticalBonus + modifier;
            const newRoll = { id: Date.now(), attribute: selectedAttribute, diceCount, results, total, attrValue, criticalBonus, isCriticalFailure, criticalHits, modifier };
            setCurrentRoll(newRoll);
            setHistory(prev => [newRoll, ...prev].slice(0, 10));
            setIsRolling(false);
            if (onRollBroadcast) onRollBroadcast(newRoll);
          }, 600);
        };

        return (
          <div id="dice-modal" className="fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center p-4">
            <div className="bg-slate-900 w-full max-w-lg rounded-2xl border border-slate-700 shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">

                <button onClick={onClose} className="p-1 hover:bg-slate-700 rounded text-slate-400 hover:text-white"><X className="w-6 h-6" /></button>
              </div>
              <div className="p-6 overflow-y-auto space-y-6 flex-1">
                <div>
                  <label className="block text-xs font-bold text-slate-500 uppercase mb-2">1. Escolha o Atributo</label>
                  <div className="grid grid-cols-3 gap-3">
                    <button onClick={() => setSelectedAttribute('poder')} className={`p-3 rounded-xl border flex flex-col items-center gap-1 transition-all ${selectedAttribute==='poder'?'bg-red-500 text-white border-red-400':'bg-slate-800 border-slate-700 text-slate-400 hover:border-slate-500'}`}>
                      <Sword className="w-5 h-5" /><span className="text-xs font-bold uppercase">Poder ({attributes.poder})</span>
                    </button>
                    <button onClick={() => setSelectedAttribute('habilidade')} className={`p-3 rounded-xl border flex flex-col items-center gap-1 transition-all ${selectedAttribute==='habilidade'?'bg-blue-500 text-white border-blue-400':'bg-slate-800 border-slate-700 text-slate-400 hover:border-slate-500'}`}>
                      <Zap className="w-5 h-5" /><span className="text-xs font-bold uppercase">Habilidade ({attributes.habilidade})</span>
                    </button>
                    <button onClick={() => setSelectedAttribute('resistencia')} className={`p-3 rounded-xl border flex flex-col items-center gap-1 transition-all ${selectedAttribute==='resistencia'?'bg-green-500 text-white border-green-400':'bg-slate-800 border-slate-700 text-slate-400 hover:border-slate-500'}`}>
                      <Shield className="w-5 h-5" /><span className="text-xs font-bold uppercase">Resistência ({attributes.resistencia})</span>
                    </button>
                  </div>
                </div>
                <div>
                  <div className="flex justify-between items-end mb-2">
                    <label className="block text-xs font-bold text-slate-500 uppercase">2. Modificadores</label>
                    <span className="text-xs font-mono text-indigo-400 bg-indigo-500/10 px-2 py-0.5 rounded border border-indigo-500/30">Total: {diceCount}D</span>
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <button onClick={() => setHasSkill(!hasSkill)} className={`p-2 rounded-lg border text-xs font-bold transition-all flex flex-col items-center justify-center gap-1 ${hasSkill?'bg-indigo-600 border-indigo-500 text-white':'bg-slate-800 border-slate-700 text-slate-400'}`}>
                      {hasSkill ? 'Com Perícia' : 'Sem Perícia'}
                    </button>
                    <div className={`p-2 rounded-lg border flex flex-col items-center justify-between ${modifier!==0?'bg-blue-900/30 border-blue-500/50':'bg-slate-800 border-slate-700'}`}>
                      <span className={`text-[10px] font-bold uppercase mb-1 ${modifier!==0?'text-blue-400':'text-slate-500'}`}>Modificador</span>
                      <div className="flex items-center gap-2 w-full justify-center">
                        <button onClick={() => setModifier(modifier-1)} className="w-6 h-6 flex items-center justify-center rounded bg-slate-700 hover:bg-slate-600 text-slate-300 font-bold">-</button>
                        <span className={`font-mono font-bold text-lg w-6 text-center ${modifier!==0?'text-blue-400':'text-slate-500'}`}>{modifier>0?`+${modifier}`:modifier}</span>
                        <button onClick={() => setModifier(modifier+1)} className="w-6 h-6 flex items-center justify-center rounded bg-blue-600 hover:bg-blue-500 text-white font-bold">+</button>
                      </div>
                    </div>
                    <div className={`p-2 rounded-lg border flex flex-col items-center justify-between ${gainCount>0?'bg-emerald-900/30 border-emerald-500/50':'bg-slate-800 border-slate-700'}`}>
                      <span className={`text-[10px] font-bold uppercase mb-1 ${gainCount>0?'text-emerald-400':'text-slate-500'}`}>Ganhos (+1D)</span>
                      <div className="flex items-center gap-2 w-full justify-center">
                        <button onClick={() => setGainCount(Math.max(0,gainCount-1))} className="w-6 h-6 flex items-center justify-center rounded bg-slate-700 hover:bg-slate-600 text-slate-300 font-bold">-</button>
                        <span className={`font-mono font-bold text-lg w-4 text-center ${gainCount>0?'text-emerald-400':'text-slate-500'}`}>{gainCount}</span>
                        <button onClick={() => setGainCount(gainCount+1)} className="w-6 h-6 flex items-center justify-center rounded bg-emerald-600 hover:bg-emerald-500 text-white font-bold">+</button>
                      </div>
                    </div>
                    <div className={`p-2 rounded-lg border flex flex-col items-center justify-between ${lossCount>0?'bg-rose-900/30 border-rose-500/50':'bg-slate-800 border-slate-700'}`}>
                      <span className={`text-[10px] font-bold uppercase mb-1 ${lossCount>0?'text-rose-400':'text-slate-500'}`}>Perdas (-1D)</span>
                      <div className="flex items-center gap-2 w-full justify-center">
                        <button onClick={() => setLossCount(Math.max(0,lossCount-1))} className="w-6 h-6 flex items-center justify-center rounded bg-slate-700 hover:bg-slate-600 text-slate-300 font-bold">-</button>
                        <span className={`font-mono font-bold text-lg w-4 text-center ${lossCount>0?'text-rose-400':'text-slate-500'}`}>{lossCount}</span>
                        <button onClick={() => setLossCount(lossCount+1)} className="w-6 h-6 flex items-center justify-center rounded bg-rose-600 hover:bg-rose-500 text-white font-bold">+</button>
                      </div>
                    </div>
                  </div>
                  <div className="mt-3 flex items-center gap-2">
                    <input type="checkbox" id="crit5" checked={critRange===5} onChange={() => setCritRange(critRange===6?5:6)} className="w-4 h-4 rounded" />
                    <label htmlFor="crit5" className="text-xs text-slate-400 select-none cursor-pointer">Crítico também com 5 (Maestria/Vantagem)</label>
                  </div>
                </div>
                <button onClick={roll} disabled={isRolling} className="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-black text-lg shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2 disabled:opacity-50">
                  {isRolling ? 'Rolando...' : `Rolar ${diceCount}D + ${attributes[selectedAttribute]}`}
                </button>
                <div className="min-h-[140px] bg-slate-950/50 rounded-xl border border-slate-800 p-4 flex flex-col items-center justify-center relative overflow-hidden">
                  {isRolling ? (
                    <Dice className="w-16 h-16 text-indigo-500 rolling opacity-50" />
                  ) : currentRoll ? (
                    <div className="w-full text-center">
                      {currentRoll.isCriticalFailure && <div className="absolute top-0 left-0 w-full bg-rose-600 text-white text-xs font-bold uppercase py-1">Falha Crítica!</div>}
                      <div className="flex flex-wrap justify-center gap-3 mb-4 mt-2">
                        {currentRoll.results.map((val,idx) => {
                          const isCrit = val >= critRange;
                          let style = "bg-slate-800 border-slate-600 text-slate-300";
                          if (isCrit) style = "bg-yellow-500 text-slate-900 border-yellow-400 scale-110";
                          if (currentRoll.isCriticalFailure) style = "bg-rose-900 text-rose-200 border-rose-700";
                          return <div key={idx} className={`w-14 h-14 flex items-center justify-center rounded-xl border-2 text-3xl font-black ${style}`}>{val}</div>;
                        })}
                      </div>
                      <div className="text-sm text-slate-400 font-mono mb-2">
                        {currentRoll.isCriticalFailure ? <span className="text-rose-400 font-bold">Erro Automático</span> : (
                          <>{currentRoll.results.reduce((a,b)=>a+b,0)} (Dados) + {currentRoll.attrValue} (Atributo)
                            {currentRoll.criticalBonus>0 && <span className="text-yellow-400"> + {currentRoll.criticalBonus} (Crítico)</span>}
                            {currentRoll.modifier!==0 && <span className={currentRoll.modifier>0?"text-blue-400":"text-rose-400"}>{currentRoll.modifier>0?` + ${currentRoll.modifier}`:` - ${Math.abs(currentRoll.modifier)}`} (Mod)</span>}
                          </>
                        )}
                      </div>
                      {!currentRoll.isCriticalFailure && (
                        <div className="inline-block bg-indigo-600 px-6 py-2 rounded-full shadow-lg">
                          <span className="text-indigo-200 text-xs font-bold uppercase mr-2">Resultado Final</span>
                          <span className="text-2xl font-black text-white">{currentRoll.total}</span>
                        </div>
                      )}
                    </div>
                  ) : (<p className="text-slate-600 italic text-sm">Configure e role os dados...</p>)}
                </div>
                {history.length > 0 && (
                  <div className="border-t border-slate-700 pt-4">
                    <h4 className="text-xs font-bold text-slate-500 uppercase mb-3">Últimas Rolagens</h4>
                    <div className="space-y-2 max-h-[100px] overflow-y-auto pr-1 custom-scrollbar">
                      {history.map(h => (
                        <div key={h.id} className="flex justify-between items-center text-xs p-2 bg-slate-800/50 rounded border border-slate-800">
                          <span className="text-slate-400 uppercase font-bold">{h.attribute.substr(0,3)} ({h.diceCount}D)</span>
                          <div className="flex gap-2">
                            <span className="font-mono text-slate-500">[{h.results.join(', ')}]</span>
                            {h.isCriticalFailure ? <span className="font-bold text-rose-500">Falha</span> : <span className="font-bold text-indigo-400">= {h.total}</span>}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      };

      const App = () => {
        const fileInputRef = useRef(null);
        const importInputRef = useRef(null);
        const [showSidebar, setShowSidebar] = useState(false);
        const [showDiceModal, setShowDiceModal] = useState(false);
        const [savedSheets, setSavedSheets] = useState([]);
        const [kitInput, setKitInput] = useState('');
        const [character, setCharacter] = useState({ ...emptyCharacter, id: Date.now() });

        useLayoutEffect(() => {
          const textareas = document.querySelectorAll('.auto-expand');
          textareas.forEach(t => { t.style.height='auto'; t.style.height=t.scrollHeight+'px'; });
        });

        useEffect(() => {
          const saved = localStorage.getItem('3det_sheets');
          if (saved) { try { setSavedSheets(JSON.parse(saved)); } catch(e) {} }
        }, []);

        const calculatedTotalPoints = useMemo(() => {
          const attrPoints = (character.atributos.poder||0)+(character.atributos.habilidade||0)+(character.atributos.resistencia||0);
          const advPoints = character.vantagens.reduce((acc,item) => acc+(parseInt(item.custo)||0),0);
          const disadvPoints = character.desvantagens.reduce((acc,item) => acc+(parseInt(item.custo)||0),0);
          const skillPoints = character.pericias.reduce((acc,item) => acc+(parseInt(item.custo)||0),0);
          const nKits = (character.kits||[]).length;
          const kitsPoints = (nKits*(nKits+1))/2;
          const archPoints = parseInt(character.arquetipoCusto)||0;
          return attrPoints+advPoints+disadvPoints+skillPoints+archPoints+kitsPoints;
        }, [character.atributos,character.vantagens,character.desvantagens,character.pericias,character.kits,character.arquetipoCusto]);

        const handleAddKit = () => {
          if (!kitInput.trim()) return;
          const kitName = kitInput.trim();
          const newKit = { id: Date.now(), nome: kitName };
          const newKits = [...(character.kits||[]), newKit];
          let newVantagens = [...character.vantagens];
          const kitData = DB_KITS[kitName];
          if (kitData && kitData.poderes) {
            kitData.poderes.forEach((p,idx) => {
              newVantagens.push({ id: Date.now()+idx+Math.random(), nome: p.nome, detalhe:`(Kit: ${kitName})`, descricao:"", custo:"0" });
            });
          }
          setCharacter({ ...character, kits: newKits, vantagens: newVantagens });
          setKitInput('');
        };

        const handleArquetipoChange = (e) => {
          const novoNome = e.target.value;
          const novoCusto = DB_ARQUETIPOS[novoNome] ? DB_ARQUETIPOS[novoNome].custo : character.arquetipoCusto;
          setCharacter({ ...character, arquetipo: novoNome, arquetipoCusto: novoCusto });
        };

        const updateAttr = (attr, val) => setCharacter(prev => ({ ...prev, atributos: { ...prev.atributos, [attr]: Math.max(0, parseInt(val)||0) } }));

        const addListItem = (list) => setCharacter(prev => ({
          ...prev, [list]: [...(prev[list]||[]), { id: Date.now(), nome:'', detalhe:'', descricao:'', custo: list==='pericias'?'1':'' }]
        }));

        const updateListItem = (list, id, field, value) => {
          setCharacter(prev => {
            const newList = prev[list].map(item => {
              if (item.id === id) {
                const updated = { ...item, [field]: value };
                if (field === 'nome') {
                  const info = list==='vantagens' ? DB_VANTAGENS[value] : list==='desvantagens' ? DB_DESVANTAGENS[value] : null;
                  if (info && !updated.custo) { updated.custo = (info.custo.match(/-?\d+/)||[""])[0]; }
                }
                return updated;
              }
              return item;
            });
            return { ...prev, [list]: newList };
          });
        };

        const removeListItem = (list, id) => setCharacter(prev => ({ ...prev, [list]: prev[list].filter(item => item.id !== id) }));
        const addInventoryItem = (cat) => setCharacter(prev => ({ ...prev, inventario: { ...prev.inventario, [cat]: [...prev.inventario[cat], { id: Date.now(), nome:'', qtd:1, desc:'' }] } }));
        const updateInventoryItem = (cat, id, field, value) => setCharacter(prev => ({ ...prev, inventario: { ...prev.inventario, [cat]: prev.inventario[cat].map(item => item.id===id ? { ...item, [field]:value } : item) } }));
        const removeInventoryItem = (cat, id) => setCharacter(prev => ({ ...prev, inventario: { ...prev.inventario, [cat]: prev.inventario[cat].filter(item => item.id!==id) } }));

        const saveToLibrary = () => {
          const newSheet = { ...character, id: character.id||Date.now(), lastModified: new Date().toISOString() };
          try {
            const existingIndex = savedSheets.findIndex(s => s.id === newSheet.id);
            let newSaved = [...savedSheets];
            if (existingIndex >= 0) newSaved[existingIndex] = newSheet; else newSaved.push(newSheet);
            localStorage.setItem('3det_sheets', JSON.stringify(newSaved));
            setSavedSheets(newSaved);
            setCharacter(newSheet);
            alert('Ficha salva na biblioteca!');
          } catch(e) { alert('Erro ao salvar. Tente remover a foto.'); }
        };

        const loadFromLibrary = (sheet) => { setCharacter({ ...emptyCharacter, ...sheet, kits: sheet.kits||[], escala: sheet.escala||'Ningen', marco: sheet.marco||'Iniciante' }); setShowSidebar(false); };
        const deleteFromLibrary = (e, id) => { e.stopPropagation(); if(window.confirm('Remover ficha?')) { const n=savedSheets.filter(s=>s.id!==id); localStorage.setItem('3det_sheets',JSON.stringify(n)); setSavedSheets(n); } };
        const createNewSheet = () => { if(window.confirm('Criar nova ficha?')) { setCharacter({ ...emptyCharacter, id: Date.now() }); setShowSidebar(false); } };
        const exportFile = () => { const d="data:text/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(character)); const a=document.createElement('a'); a.setAttribute('href',d); a.setAttribute('download',`${character.nome||'personagem'}_3det.json`); document.body.appendChild(a); a.click(); a.remove(); };
        const importFile = (e) => {
          const file = e.target.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
              try {
                const loaded = JSON.parse(ev.target.result);
                if (!loaded.inventario) loaded.inventario = emptyCharacter.inventario;
                if (!loaded.kits) loaded.kits = [];
                if (!loaded.id) loaded.id = Date.now();
                setCharacter({ ...emptyCharacter, ...loaded });
                alert('Ficha carregada!');
              } catch(err) { alert('Erro ao ler arquivo.'); }
              e.target.value = null;
            };
            reader.readAsText(file);
          }
        };
        const handleImageUpload = (e) => { const file=e.target.files[0]; if(file) { const r=new FileReader(); r.onloadend=()=>setCharacter(p=>({...p,foto:r.result})); r.readAsDataURL(file); } };

        const hasPatrono = character.vantagens.some(v => v.nome.toLowerCase().includes('patrono'));
        const getInventoryLimits = (level, trades) => {
          let limits = { comuns:2, incomuns:0, raros:0, lendarios:0 };
          if (level>=1) { limits.comuns=3; limits.incomuns=1; }
          if (level>=2) { limits.comuns=5; limits.incomuns=2; }
          if (level>=3) { limits.incomuns=4; limits.raros=1; limits.lendarios=1; }
          if (hasPatrono) { if(limits.comuns>0)limits.comuns+=1; if(limits.incomuns>0)limits.incomuns+=1; if(limits.raros>0)limits.raros+=1; if(limits.lendarios>0)limits.lendarios+=1; }
          limits.comuns -= trades.comumParaIncomum*3; limits.incomuns += trades.comumParaIncomum;
          limits.incomuns -= trades.incomumParaRaro*3; limits.raros += trades.incomumParaRaro;
          limits.raros -= trades.raroParaLendario*3; limits.lendarios += trades.raroParaLendario;
          return limits;
        };
        const limits = getInventoryLimits(character.nivelInventario, character.trocas||{comumParaIncomum:0,incomumParaRaro:0,raroParaLendario:0});
        const performTrade = (type, dir) => setCharacter(prev => { const t=prev.trocas||{comumParaIncomum:0,incomumParaRaro:0,raroParaLendario:0}; const nv=t[type]+dir; if(nv<0)return prev; return {...prev,trocas:{...t,[type]:nv}}; });

        const maxPA = character.atributos.poder||1;
        const maxPM = (character.atributos.habilidade||0)*5||5;
        const maxPV = (character.atributos.resistencia||0)*5||5;

        return (
          <div className="min-h-screen w-full bg-slate-900 text-slate-100 font-sans print:bg-white print:text-black">
            {/* TOP BAR */}
            <div className="sticky top-0 left-0 w-full bg-slate-950/90 backdrop-blur-md border-b border-slate-800 p-3 flex justify-between items-center z-40 no-print">
              <button onClick={() => setShowSidebar(true)} className="p-2 hover:bg-slate-800 rounded-lg text-slate-300 hover:text-white transition-colors flex items-center gap-2">
                <Menu className="w-6 h-6" /><span className="font-bold text-sm uppercase tracking-wide hidden md:inline">Minhas Fichas</span>
              </button>
              <h1 className="text-sm font-bold text-slate-500 uppercase tracking-widest">3DeT Victory</h1>
              <div className="flex gap-2">
                <button onClick={saveToLibrary} className="p-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-white transition-colors flex items-center gap-1"><Save className="w-5 h-5" /><span className="text-xs font-bold hidden md:inline">Salvar</span></button>
              </div>
            </div>

            {/* DICE BUTTON */}
            <button onClick={() => setShowDiceModal(true)} className="fixed bottom-8 right-8 z-[100] p-4 bg-indigo-600 text-white rounded-full shadow-xl hover:scale-110 hover:bg-indigo-500 transition-all duration-200 flex items-center justify-center cursor-pointer no-print" title="Rolar Dados">
              <Dice className="w-8 h-8" />
            </button>

            {showDiceModal && <DiceModal onClose={() => setShowDiceModal(false)} attributes={character.atributos} />}

            {/* SIDEBAR */}
            {showSidebar && (
              <>
                <div className="fixed inset-0 bg-black/60 z-40 backdrop-blur-sm no-print" onClick={() => setShowSidebar(false)}></div>
                <div className="fixed inset-y-0 left-0 w-80 bg-slate-900 border-r border-slate-700 shadow-2xl z-50 no-print flex flex-col">
                  <div className="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-950">
                    <h2 className="font-bold text-lg text-white flex items-center gap-2"><BookOpen className="w-5 h-5 text-indigo-400" /> Biblioteca</h2>
                    <button onClick={() => setShowSidebar(false)} className="text-slate-400 hover:text-white"><X className="w-6 h-6" /></button>
                  </div>
                  <div className="p-4 border-b border-slate-800 grid grid-cols-2 gap-2">
                    <button onClick={createNewSheet} className="flex flex-col items-center justify-center p-2 bg-slate-800 hover:bg-slate-700 rounded-xl border border-slate-700 text-[10px] font-bold text-slate-300 gap-1"><PlusCircle className="w-5 h-5 text-green-400" /> Nova Ficha</button>
                    <button onClick={() => importInputRef.current.click()} className="flex flex-col items-center justify-center p-2 bg-slate-800 hover:bg-slate-700 rounded-xl border border-slate-700 text-[10px] font-bold text-slate-300 gap-1"><Upload className="w-5 h-5 text-blue-400" /> Importar</button>
                    <input type="file" ref={importInputRef} onChange={importFile} accept=".json" className="hidden" />
                  </div>
                  <div className="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar">
                    {savedSheets.length === 0 ? (
                      <div className="text-center py-8 text-slate-600 text-sm">Nenhuma ficha salva.</div>
                    ) : (
                      savedSheets.map(sheet => (
                        <div key={sheet.id} onClick={() => loadFromLibrary(sheet)} className="group bg-slate-800 p-3 rounded-xl border border-slate-700 hover:border-indigo-500 cursor-pointer transition-all relative">
                          <div className="flex items-start gap-3">
                            <div className="w-10 h-10 rounded-lg bg-slate-900 overflow-hidden flex-shrink-0 border border-slate-700">
                              {sheet.foto ? <img src={sheet.foto} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-slate-600"><FileText className="w-5 h-5" /></div>}
                            </div>
                            <div className="flex-1 min-w-0">
                              <h4 className="font-bold text-slate-200 truncate">{sheet.nome||'Sem Nome'}</h4>
                              <p className="text-xs text-slate-500 truncate">{sheet.arquetipo||'Sem Arquétipo'} • {sheet.pontos}pts</p>
                            </div>
                          </div>
                          <button onClick={(e) => deleteFromLibrary(e,sheet.id)} className="absolute top-2 right-2 p-1.5 text-slate-600 hover:text-rose-500 hover:bg-rose-500/10 rounded-md opacity-0 group-hover:opacity-100"><Trash2 className="w-4 h-4" /></button>
                        </div>
                      ))
                    )}
                  </div>
                  <div className="p-3 bg-slate-950 text-[10px] text-center text-slate-600">Armazenado no navegador</div>
                </div>
              </>
            )}

            {/* MAIN CONTENT */}
            <div className="pt-6 pb-10 px-4 md:px-8 print:pt-0 print:pb-0">
              <div className="max-w-6xl mx-auto space-y-6 print:space-y-4">

                {/* HEADER */}
                <div className="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700 print:border-black print:shadow-none print:bg-transparent">
                  <div className="flex flex-col md:flex-row gap-6">
                    <div className="flex-shrink-0 flex flex-col items-center gap-2 mx-auto md:mx-0">
                      <div className="w-40 h-40 rounded-2xl bg-slate-900 border-2 border-dashed border-slate-600 flex items-center justify-center overflow-hidden relative group cursor-pointer print:border-black" onClick={() => fileInputRef.current?.click()}>
                        {character.foto ? <img src={character.foto} alt="Personagem" className="w-full h-full object-cover" /> : (
                          <div className="text-center p-4 text-slate-500 hover:text-slate-300 transition-colors"><ImageIcon className="w-8 h-8 mx-auto mb-2" /><span className="text-xs font-bold uppercase">Adicionar Foto</span></div>
                        )}
                        <div className="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center no-print"><Upload className="text-white w-6 h-6" /></div>
                      </div>
                      <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={handleImageUpload} />
                      {character.foto && <button onClick={(e) => { e.stopPropagation(); setCharacter(p=>({...p,foto:null})); }} className="text-xs text-rose-400 hover:text-rose-300 no-print flex items-center gap-1"><Trash2 className="w-3 h-3" /> Remover</button>}
                    </div>

                    <div className="flex-1 space-y-4">
                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div className="space-y-1 lg:col-span-2">
                          <label className="text-xs font-bold uppercase tracking-wider text-blue-400 print:text-black">Nome</label>
                          <input className="w-full bg-slate-900 border-none rounded-lg p-3 text-2xl font-bold focus:ring-2 focus:ring-blue-500 outline-none print:bg-transparent print:border-b print:border-black print:rounded-none print:p-1 text-white" placeholder="Nome do Personagem" value={character.nome} onChange={(e) => setCharacter({ ...character, nome: e.target.value })} />
                        </div>
                        <div className="space-y-1 lg:col-span-2">
                          <label className="text-xs font-bold uppercase tracking-wider text-blue-400 print:text-black">Arquétipo</label>
                          <div className="flex gap-2">
                            <input list="lista-arquetipos" className="flex-1 bg-slate-900 border-none rounded-lg p-3 text-xl font-bold focus:ring-2 focus:ring-blue-500 outline-none print:bg-transparent print:border-b print:border-black print:rounded-none print:p-1 text-white" placeholder="Selecione ou digite..." value={character.arquetipo} onChange={handleArquetipoChange} />
                            <div className="flex flex-col items-center justify-center bg-slate-900 rounded-lg p-1 w-16 border border-slate-700">
                              <span className="text-[10px] text-slate-500 uppercase print:hidden">Pts</span>
                              <input type="number" className="w-full bg-transparent text-center font-bold text-lg outline-none text-white" value={character.arquetipoCusto} onChange={(e) => setCharacter({ ...character, arquetipoCusto: parseInt(e.target.value)||0 })} />
                            </div>
                          </div>
                          <datalist id="lista-arquetipos">{LISTA_ARQUETIPOS.map(arq => <option key={arq} value={arq}>{arq} ({DB_ARQUETIPOS[arq].custo}pt)</option>)}</datalist>
                        </div>
                        <div className="space-y-1 lg:col-span-2">
                          <label className="text-xs font-bold uppercase tracking-wider text-blue-400 print:text-black">Marco</label>
                          <select className="w-full bg-slate-900 border-none rounded-lg p-3 text-xl font-bold focus:ring-2 focus:ring-blue-500 outline-none print:bg-transparent print:border-b print:border-black text-white cursor-pointer" value={character.marco} onChange={(e) => setCharacter({ ...character, marco: e.target.value })}>
                            <option className="bg-slate-900" value="Iniciante">Iniciante</option>
                            <option className="bg-slate-900" value="Herói">Herói</option>
                            <option className="bg-slate-900" value="Veterano">Veterano</option>
                            <option className="bg-slate-900" value="Lenda">Lenda</option>
                          </select>
                        </div>
                        <div className="space-y-1 lg:col-span-2">
                          <label className="text-xs font-bold uppercase tracking-wider text-blue-400 print:text-black">Escala</label>
                          <select className="w-full bg-slate-900 border-none rounded-lg p-3 text-xl font-bold focus:ring-2 focus:ring-blue-500 outline-none print:bg-transparent print:border-b print:border-black text-white cursor-pointer" value={character.escala} onChange={(e) => setCharacter({ ...character, escala: e.target.value })}>
                            <option className="bg-slate-900" value="Ningen">Ningen</option>
                            <option className="bg-slate-900" value="Sugoi">Sugoi</option>
                            <option className="bg-slate-900" value="Kiodai">Kiodai</option>
                            <option className="bg-slate-900" value="Kami">Kami</option>
                          </select>
                        </div>
                      </div>

                      {/* KITS */}
                      <div className="bg-slate-900/50 p-4 rounded-xl border border-slate-700 mt-4">
                        <label className="text-xs font-bold uppercase tracking-wider text-amber-400 print:text-black mb-3 flex items-center gap-1"><Crown className="w-4 h-4" /> Kits ({character.kits?.length||0})</label>
                        <div className="flex gap-2 items-center mb-3 no-print">
                          <input list="lista-kits" value={kitInput} onChange={(e) => setKitInput(e.target.value)} className="flex-1 bg-slate-800 border border-slate-700 rounded-lg p-2 text-base text-white focus:ring-2 focus:ring-amber-500 outline-none font-bold" placeholder="Digite ou selecione um Kit..." />
                          <button onClick={handleAddKit} className="p-2 bg-amber-600 hover:bg-amber-500 rounded-lg text-white font-bold text-sm transition-colors flex items-center gap-1"><Plus className="w-4 h-4" /> Adicionar</button>
                          <datalist id="lista-kits">{LISTA_KITS.map(k => <option key={k} value={k} />)}</datalist>
                        </div>
                        <div className="flex flex-wrap gap-2">
                          {(character.kits||[]).map(kit => (
                            <span key={kit.id} className="bg-amber-900/40 border border-amber-500/50 text-amber-300 px-3 py-1.5 rounded-full text-sm font-bold flex items-center gap-2">
                              {kit.nome}
                              <button onClick={() => setCharacter({ ...character, kits: character.kits.filter(k => k.id !== kit.id) })} className="text-amber-500 hover:text-amber-200 no-print"><X className="w-4 h-4" /></button>
                            </span>
                          ))}
                          {(!character.kits||character.kits.length===0) && <span className="text-xs text-slate-500 italic print:hidden">Nenhum kit selecionado.</span>}
                        </div>
                        <p className="text-[10px] text-slate-500 mt-2 print:hidden italic">*O custo é calculado automaticamente (1º=1pt, 2º=2pt, etc).</p>
                      </div>

                      <div className="grid grid-cols-2 gap-4 pt-2">
                        <div className="bg-slate-900 p-3 rounded-xl border border-slate-700 text-center print:border-black print:bg-transparent flex flex-col justify-center">
                          <span className="block text-xs text-slate-400 uppercase print:text-black mb-1">Pontos Totais</span>
                          <span className="text-3xl font-black text-white print:text-black block">{calculatedTotalPoints}</span>
                        </div>
                        <div className="bg-slate-900 p-3 rounded-xl border border-slate-700 text-center print:border-black print:bg-transparent flex flex-col justify-center">
                          <span className="block text-xs text-slate-400 uppercase print:text-black mb-1">XP (Experiência)</span>
                          <input type="number" className="bg-transparent text-center text-3xl font-black w-full outline-none print:text-black text-white" value={character.experiencia} onChange={(e) => setCharacter({ ...character, experiencia: parseInt(e.target.value)||0 })} />
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                {/* ATTRIBUTES */}
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 print:gap-4">
                  <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 space-y-6 print:bg-transparent print:border-black print:p-4">
                    <h3 className="flex items-center gap-2 text-lg font-bold border-b border-slate-700 pb-2 uppercase tracking-tighter print:border-black"><Star className="w-5 h-5 text-yellow-400 print:text-black" /> Atributos</h3>
                    <div className="space-y-4">
                      <AttributeRow icon={<Sword className="text-red-500 print:text-black" />} label="Poder" color="red" value={character.atributos.poder} onChange={(v) => updateAttr('poder',v)} />
                      <AttributeRow icon={<Zap className="text-blue-500 print:text-black" />} label="Habilidade" color="blue" value={character.atributos.habilidade} onChange={(v) => updateAttr('habilidade',v)} />
                      <AttributeRow icon={<Shield className="text-green-500 print:text-black" />} label="Resistência" color="green" value={character.atributos.resistencia} onChange={(v) => updateAttr('resistencia',v)} />
                    </div>
                  </div>

                  <div className="lg:col-span-2 bg-slate-800 p-6 rounded-2xl border border-slate-700 space-y-6 print:bg-transparent print:border-black print:p-4">
                    <h3 className="flex items-center gap-2 text-lg font-bold border-b border-slate-700 pb-2 uppercase tracking-tighter text-slate-400 print:text-black print:border-black">Estado Atual</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 print:gap-4">
                      <ResourceBar label="Vida (Rx5)" current={character.recursos.pv_atual} max={maxPV} color="red" icon={<Heart className="w-4 h-4" />} onChange={(val) => setCharacter({ ...character, recursos: { ...character.recursos, pv_atual: val } })} />
                      <ResourceBar label="Mana (Hx5)" current={character.recursos.pm_atual} max={maxPM} color="blue" icon={<Zap className="w-4 h-4" />} onChange={(val) => setCharacter({ ...character, recursos: { ...character.recursos, pm_atual: val } })} />
                    </div>
                    <div className="mt-4 flex items-center justify-between bg-slate-900 p-4 rounded-xl border border-amber-500/30 print:bg-transparent print:border-black">
                      <div className="flex items-center gap-3">
                        <div className="p-2 bg-amber-500 rounded-lg text-slate-900"><Star className="w-6 h-6 fill-current" /></div>
                        <span className="font-bold text-amber-500 uppercase print:text-black">Pontos de Ação</span>
                      </div>
                      <div className="flex items-center gap-3">
                        <button onClick={() => setCharacter({ ...character, recursos: { ...character.recursos, pa_atual: Math.max(0,(character.recursos.pa_atual||0)-1) } })} className="w-8 h-8 flex items-center justify-center bg-slate-800 hover:bg-slate-700 rounded text-slate-400 hover:text-white no-print border border-slate-700"><Minus className="w-4 h-4" /></button>
                        <div className="flex items-center gap-2">
                          <input type="number" className="w-16 text-center bg-slate-800 border border-slate-700 rounded text-3xl font-black text-amber-500 outline-none print:bg-transparent print:text-black" value={character.recursos.pa_atual} onChange={(e) => setCharacter({ ...character, recursos: { ...character.recursos, pa_atual: parseInt(e.target.value)||0 } })} />
                          <span className="text-slate-500 font-bold text-xl print:text-black">/ {maxPA}</span>
                        </div>
                        <button onClick={() => setCharacter({ ...character, recursos: { ...character.recursos, pa_atual: (character.recursos.pa_atual||0)+1 } })} className="w-8 h-8 flex items-center justify-center bg-slate-800 hover:bg-slate-700 rounded text-slate-400 hover:text-white no-print border border-slate-700"><Plus className="w-4 h-4" /></button>
                      </div>
                    </div>
                  </div>
                </div>

                {/* LISTS */}
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 print:gap-4 print:block print:space-y-4">
                  <Section title="Perícias" icon={<BookOpen className="text-cyan-400 print:text-black" />} items={character.pericias} suggestionList={LISTA_PERICIAS} onAdd={() => addListItem('pericias')} onUpdate={(id,f,v) => updateListItem('pericias',id,f,v)} onRemove={(id) => removeListItem('pericias',id)} color="cyan" />
                  <Section title="Vantagens" icon={<Plus className="text-emerald-400 print:text-black" />} items={character.vantagens} suggestionList={LISTA_VANTAGENS} onAdd={() => addListItem('vantagens')} onUpdate={(id,f,v) => updateListItem('vantagens',id,f,v)} onRemove={(id) => removeListItem('vantagens',id)} color="emerald" />
                  <Section title="Desvantagens" icon={<Skull className="text-rose-400 print:text-black" />} items={character.desvantagens} suggestionList={LISTA_DESVANTAGENS} onAdd={() => addListItem('desvantagens')} onUpdate={(id,f,v) => updateListItem('desvantagens',id,f,v)} onRemove={(id) => removeListItem('desvantagens',id)} color="rose" />
                </div>

                {/* TECHNIQUES */}
                <div className="bg-slate-800 p-6 rounded-2xl border border-indigo-500/30 print:bg-transparent print:border-black print:p-4 print:break-inside-avoid">
                  <div className="flex justify-between items-center border-b border-slate-700 pb-2 mb-4 print:border-black">
                    <h3 className="flex items-center gap-2 text-lg font-bold uppercase tracking-tighter print:text-black"><Wand2 className="w-5 h-5 text-indigo-400 print:text-black" /> Técnicas</h3>
                    <button onClick={() => addListItem('tecnicas')} className="p-1.5 bg-indigo-500/10 hover:bg-indigo-500/20 text-indigo-400 rounded-lg transition-colors no-print flex items-center gap-1 text-xs"><Plus className="w-4 h-4" /> Adicionar</button>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    {character.tecnicas.map(tecnica => (
                      <div key={tecnica.id} className="group bg-slate-900 p-2 rounded-lg border border-slate-700 relative print:bg-transparent print:border-black">
                        <div className="flex-1 space-y-1">
                          <input placeholder="Nome da Técnica" className="w-full bg-transparent border-b border-slate-800 focus:border-indigo-500 outline-none font-bold text-sm print:text-black text-white" value={tecnica.nome} onChange={(e) => updateListItem('tecnicas',tecnica.id,'nome',e.target.value)} />
                          <input placeholder="Custo / Alcance / Duração" className="w-full bg-transparent text-[10px] text-slate-400 outline-none print:text-black uppercase font-bold tracking-wide" value={tecnica.custo} onChange={(e) => updateListItem('tecnicas',tecnica.id,'custo',e.target.value)} />
                          <textarea placeholder="Descrição do efeito..." className="w-full bg-transparent text-[11px] text-slate-300 outline-none resize-none min-h-[2rem] leading-relaxed auto-expand print:text-black mt-1" rows={1} onInput={(e) => { e.target.style.height="auto"; e.target.style.height=e.target.scrollHeight+"px" }} value={tecnica.descricao||''} onChange={(e) => updateListItem('tecnicas',tecnica.id,'descricao',e.target.value)} />
                        </div>
                        <button onClick={() => removeListItem('tecnicas',tecnica.id)} className="absolute top-2 right-2 text-rose-500 opacity-0 group-hover:opacity-100 transition-opacity no-print"><Trash2 className="w-4 h-4" /></button>
                      </div>
                    ))}
                    {character.tecnicas.length === 0 && <p className="col-span-full text-center text-slate-600 text-xs py-2 italic print:hidden">Nenhuma técnica aprendida.</p>}
                  </div>
                </div>

                {/* INVENTORY */}
                <div className="bg-slate-800 p-6 rounded-2xl border border-orange-500/30 print:bg-transparent print:border-black print:p-4 print:break-inside-avoid">
                  <div className="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4 border-b border-slate-700 pb-4 print:border-black">
                    <div className="flex items-center gap-3">
                      <div className="p-2 bg-orange-500/10 rounded-lg"><Backpack className="w-6 h-6 text-orange-400 print:text-black" /></div>
                      <div>
                        <h3 className="text-xl font-bold uppercase tracking-tighter print:text-black">Inventário</h3>
                        {hasPatrono && <span className="text-yellow-400 flex items-center gap-1 text-xs"><Crown className="w-3 h-3" /> Bônus de Patrono Ativo</span>}
                      </div>
                    </div>
                    <div className="flex items-center gap-2 bg-slate-900 p-2 rounded-lg border border-slate-700 print:border-black print:bg-transparent">
                      <span className="text-xs font-bold uppercase text-slate-400 print:text-black">Nível da Vantagem:</span>
                      <select className="bg-slate-800 text-sm font-bold rounded px-2 py-1 outline-none border border-slate-600 focus:border-orange-500 print:bg-transparent print:text-black text-white cursor-pointer" value={character.nivelInventario} onChange={(e) => setCharacter({ ...character, nivelInventario: parseInt(e.target.value) })}>
                        <option value={0}>0 Pontos (Padrão)</option>
                        <option value={1}>1 Ponto (Pequeno)</option>
                        <option value={2}>2 Pontos (Grande)</option>
                        <option value={3}>3 Pontos (Supremo)</option>
                      </select>
                    </div>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    <InventoryColumn title="Comuns" items={character.inventario.comuns} limit={limits.comuns} onAdd={() => addInventoryItem('comuns')} onUpdate={(id,f,v) => updateInventoryItem('comuns',id,f,v)} onRemove={(id) => removeInventoryItem('comuns',id)} color="slate" />
                    <InventoryColumn title="Incomuns" items={character.inventario.incomuns} limit={limits.incomuns} onAdd={() => addInventoryItem('incomuns')} onUpdate={(id,f,v) => updateInventoryItem('incomuns',id,f,v)} onRemove={(id) => removeInventoryItem('incomuns',id)} color="blue" />
                    <InventoryColumn title="Raros" items={character.inventario.raros} limit={limits.raros} onAdd={() => addInventoryItem('raros')} onUpdate={(id,f,v) => updateInventoryItem('raros',id,f,v)} onRemove={(id) => removeInventoryItem('raros',id)} color="yellow" />
                    <InventoryColumn title="Lendários" items={character.inventario.lendarios} limit={limits.lendarios} onAdd={() => addInventoryItem('lendarios')} onUpdate={(id,f,v) => updateInventoryItem('lendarios',id,f,v)} onRemove={(id) => removeInventoryItem('lendarios',id)} color="purple" />
                  </div>
                  <div className="mt-6 p-4 bg-slate-900/50 rounded-xl border border-slate-700/50 print:hidden">
                    <div className="flex items-center gap-2 mb-3 text-slate-400 text-sm font-bold uppercase tracking-wider"><ArrowRightLeft className="w-4 h-4" /> Troca de Itens</div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                      <TradePanel from="3 Comuns" to="1 Incomum" type="comumParaIncomum" limitFrom={limits.comuns} limitTo={limits.incomuns} tradeCount={character.trocas?.comumParaIncomum} onTrade={performTrade} fromColor="text-slate-200" toColor="text-blue-400" />
                      <TradePanel from="3 Incomuns" to="1 Raro" type="incomumParaRaro" limitFrom={limits.incomuns} limitTo={limits.raros} tradeCount={character.trocas?.incomumParaRaro} onTrade={performTrade} fromColor="text-blue-400" toColor="text-yellow-400" />
                      <TradePanel from="3 Raros" to="1 Lendário" type="raroParaLendario" limitFrom={limits.raros} limitTo={limits.lendarios} tradeCount={character.trocas?.raroParaLendario} onTrade={performTrade} fromColor="text-yellow-400" toColor="text-purple-400" />
                    </div>
                  </div>
                  <div className="mt-4 p-3 bg-slate-900/50 rounded-lg text-xs text-slate-400 flex items-start gap-2 border border-slate-700/50 print:hidden">
                    <AlertCircle className="w-4 h-4 flex-shrink-0" />
                    <p><strong>Regra "Na Hora":</strong> Slots vazios podem ser preenchidos durante a aventura.</p>
                  </div>
                </div>

                {/* NOTES */}
                <div className="grid grid-cols-1 gap-6 print:break-inside-avoid">
                  <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 print:bg-transparent print:border-black print:p-4">
                    <h3 className="flex items-center gap-2 text-lg font-bold border-b border-slate-700 pb-2 uppercase mb-4 text-slate-400 print:text-black print:border-black"><Info className="w-5 h-5" /> Anotações Rápidas</h3>
                    <textarea className="w-full bg-slate-900 border-none rounded-xl p-4 min-h-[100px] focus:ring-2 focus:ring-indigo-500 outline-none resize-none print:bg-transparent print:border print:border-black print:text-black auto-expand text-white" placeholder="Notas gerais, lembretes..." value={character.anotacoes} onChange={(e) => setCharacter({ ...character, anotacoes: e.target.value })}></textarea>
                  </div>
                  <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 print:bg-transparent print:border-black print:p-4">
                    <h3 className="flex items-center gap-2 text-lg font-bold border-b border-slate-700 pb-2 uppercase mb-4 text-slate-400 print:text-black print:border-black"><BookOpen className="w-5 h-5" /> História do Personagem</h3>
                    <textarea className="w-full bg-slate-900 border-none rounded-xl p-4 min-h-[200px] focus:ring-2 focus:ring-indigo-500 outline-none resize-y print:bg-transparent print:border print:border-black print:text-black auto-expand text-white" placeholder="Escreva aqui a biografia, origens e objetivos do seu herói..." value={character.historia} onChange={(e) => setCharacter({ ...character, historia: e.target.value })}></textarea>
                  </div>
                </div>

                {/* FOOTER */}
                <div className="flex flex-wrap justify-center gap-4 py-8 no-print border-t border-slate-800 mt-8">
                  <button onClick={exportFile} className="flex items-center gap-2 bg-slate-700 hover:bg-slate-600 px-6 py-3 rounded-full font-bold transition-all"><FileJson className="w-5 h-5" /> Baixar Arquivo (.JSON)</button>
                  <button onClick={saveToLibrary} className="flex items-center gap-2 bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-full font-bold transition-all shadow-lg hover:scale-105"><Save className="w-5 h-5" /> Salvar na Biblioteca</button>
                  <button onClick={() => window.print()} className="flex items-center gap-2 bg-slate-700 hover:bg-slate-600 px-6 py-3 rounded-full font-bold transition-all"><Printer className="w-5 h-5" /> Imprimir / PDF</button>
                </div>
              </div>
            </div>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
