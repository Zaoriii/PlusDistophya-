es de Sobrevivência."},"Mentor":{"Animais":"1x por cena: Ganho em Animais. Técnicas com Animais gastam -1PM.","Arte":"1x por cena: Ganho em Arte. Técnicas com Arte gastam -1PM.","Esporte":"1x por cena: Ganho em Esporte. Técnicas com Esporte gastam -1PM.","Influência":"1x por cena: Ganho em Influência. Técnicas com Influência gastam -1PM.","Luta":"1x por cena: Ganho em Luta. Técnicas com Luta gastam -1PM.","Manha":"1x por cena: Ganho em Manha. Técnicas com Manha gastam -1PM.","Máquinas":"1x por cena: Ganho em Máquinas. Técnicas com Máquinas gastam -1PM.","Medicina":"1x por cena: Ganho em Medicina. Técnicas com Medicina gastam -1PM.","Mística":"1x por cena: Ganho em Mística. Técnicas com Mística gastam -1PM.","Percepção":"1x por cena: Ganho em Percepção. Técnicas com Percepção gastam -1PM.","Saber":"1x por cena: Ganho em Saber. Técnicas com Saber gastam -1PM.","Sobrevivência":"1x por cena: Ganho em Sobrevivência. Técnicas com Sobrevivência gastam -1PM."},"Código":{"Asimov 1ª":"Jamais causar mal a um ser humano ou, por omissão, permitir que um humano sofra qualquer mal.","Asimov 2ª":"Sempre obedecer a seres humanos, exceto quando suas ordens violam outro Código que você tenha.","Caçador":"Nunca matar (apenas derrotar) filhotes ou gestantes. Nunca abandonar uma caça abatida. Sempre escolher como oponente o inimigo mais perigoso na cena. Nunca permitir a fuga de um oponente.","Combate":"Nunca atacar um oponente em condição desfavorável (em Perda) ou de escala inferior.","Derrota":"Nunca seguir lutando depois de derrotado. Aceitar qualquer condição do vitorioso — pode ser dever um favor, tornar-se seu servo/aliado, ou tirar sua vida.","Gratidão":"Sempre que alguém presta um grande favor (salvar sua vida, libertá-lo de cativeiro...) a você ou um ente querido, você fica a serviço dessa pessoa até devolver o favor de forma equivalente.","Heróis":"Sempre cumprir sua palavra. Sempre proteger qualquer pessoa ou criatura mais fraca que você. Jamais recusar um pedido de ajuda.","Honestidade":"Nunca mentir, roubar, trapacear ou desobedecer às leis locais, nem permitir que seus companheiros o façam.","Redenção":"Nunca atacar primeiro. Sempre aceitar um pedido de rendição. Sempre poupar oponentes derrotados."},"Transtorno":{"Cleptomania":"Você rouba coisas de que não precisa, não por seu valor, apenas por serem interessantes. Sempre que surgir a chance de roubar algo, deve fazer um teste de Resistência (9) para evitar. Um cleptomaníaco nunca devolve o produto de seus roubos e lutará para evitar que isso aconteça.","Compulsão":"Existe algo que você precisa fazer várias vezes por dia: tomar banho, lavar roupa, comer lasanha, tocar harpa, roer as unhas... Cada vez que uma cena começa, você tem Perda em todos os testes até gastar uma rodada cumprindo sua compulsão.","Distração":"Você não consegue se concentrar em algo que não o interessa (qualquer coisa não relacionada a Devoto ou Código). Nestas situações você não consegue acertos críticos.","Fantasia":"Você acredita ser alguém ou alguma coisa que não é, ou acha que pode fazer algo de que não é capaz. Você fala de si mesmo o tempo todo anunciando sua fantasia para todos. Perda em todos os testes sociais.","Fobia":"Você tem medo terrível de alguma coisa (lugares altos, insetos, água, sangue...). Sempre que essa coisa está Perto, você não consegue fazer ações — apenas movimentos. Só consegue fazer uma ação se antes passar em um teste de Resistência (9).","Megalomania":"Você acredita ser invencível, imortal, destinado a realizar um grande objetivo, e ninguém conseguirá detê-lo! Você nunca se rende e segue lutando mesmo após ser derrotado.","Mitomania":"Você nunca diz a verdade sobre coisa alguma, mesmo quando quer. Precisa de um teste de Resistência (9) para dizer algo verdadeiro, até para seus aliados.","Paranoia":"Você não confia em ninguém, nem em seus aliados. Precisa de um teste de Resistência (9) para aceitar qualquer ajuda (até cura!). Além disso, não dorme direito: sua recuperação de recursos com descanso é metade do normal."},"Inapto":{"Animais":"Perda e falhas críticas em testes de Animais.","Arte":"Perda e falhas críticas em testes de Arte.","Esporte":"Perda e falhas críticas em testes de Esporte.","Influência":"Perda e falhas críticas em testes de Influência.","Luta":"Perda e falhas críticas em testes de Luta.","Manha":"Perda e falhas críticas em testes de Manha.","Máquinas":"Perda e falhas críticas em testes de Máquinas.","Medicina":"Perda e falhas críticas em testes de Medicina.","Mística":"Perda e falhas críticas em testes de Mística.","Percepção":"Perda e falhas críticas em testes de Percepção.","Saber":"Perda e falhas críticas em testes de Saber.","Sobrevivência":"Perda e falhas críticas em testes de Sobrevivência."},

  useEffect(()=>{

    return ()=>window.removeEventListener('resize',fn);

};

async function fbGet(path) {
  const r = await fetch(`${FIREBASE}/${path}.json`);
  if (r.status === 401) throw new Error('REGRAS_FIREBASE');
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}
async function fbSet(path, data) {
  const r = await fetch(`${FIREBASE}/${path}.json`, {
    method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data)
  });
  if (r.status === 401) throw new Error('REGRAS_FIREBASE');
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}
async function fbPush(path, data) {
  const r = await fetch(`${FIREBASE}/${path}.json`, {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data)
  });
  if (r.status === 401) throw new Error('REGRAS_FIREBASE');
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}
async function fbDelete(path) {
  const r = await fetch(`${FIREBASE}/${path}.json`, { method: 'DELETE' });
  if (r.status === 401) throw new Error('REGRAS_FIREBASE');
}

const Btn = ({onClick,children,style={},className='',disabled=false}) => (

);

const Stepper = ({value,onChange,min=0}) => (
  <div style={{display:'flex',alignItems:'center',gap:4}}>
    <button onClick={()=>onChange(Math.max(min,value-1))} className="cbtn" style={{padding:'4px 12px',fontSize:18,minWidth:36,minHeight:36}}>−</button>

// ── Modal de Adicionar Vantagem/Desvantagem ───────────────────────────────────
const AddVantModal = ({type, onClose, onConfirm}) => {
  const isDesv = type === 'desvantagens';
  const lista = isDesv ? LISTA_DESV : LISTA_VANT;
  const dados = isDesv ? DESVANTAGENS : VANTAGENS;
  const cor = isDesv ? '#ff5252' : '#00e676';
  const corBg = isDesv ? 'rgba(255,23,68,' : 'rgba(0,230,118,';

  const [busca, setBusca] = useState('');
  const [sel, setSel] = useState(null);       // nome selecionado
  const [detalhe, setDetalhe] = useState('');
  const [custo, setCusto] = useState('');
  const [desc, setDesc] = useState('');

  const filtrados = lista.filter(n => n.toLowerCase().includes(busca.toLowerCase()));

  const escolher = (nome) => {
    setSel(nome);
    const info = dados[nome];
    if (info) {
      setDesc(info.d || '');
      const c = (info.c||'').match(/-?\d+/);
      setCusto(c ? c[0] : '');
    }
    setDetalhe('');
  };

  const subOpts = sel ? OPCOES[sel] : null;
  const subDesc = sel && detalhe && SUBOPCOES[sel] ? SUBOPCOES[sel][detalhe] : null;

  useEffect(() => {
    if (subDesc) setDesc(subDesc);
  }, [subDesc]);

  const confirmar = () => {
    if (!sel) return;
    onConfirm({ id: Date.now()+Math.random(), nome: sel, detalhe, custo, descricao: desc });
    onClose();
  };

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,5,15,0.92)',zIndex:400,display:'flex',alignItems:'center',justifyContent:'center',padding:12}}>
      <div className="panel" style={{width:'100%',maxWidth:480,maxHeight:'90vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* Header */}
        <div style={{padding:'12px 16px',borderBottom:'1px solid '+corBg+'0.2)',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
          <span style={{fontFamily:'Orbitron',fontSize:12,color:cor,textTransform:'uppercase',letterSpacing:1}}>
            {sel ? '✓ '+sel : (isDesv ? '➕ Adicionar Desvantagem' : '➕ Adicionar Vantagem')}
          </span>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#ff1744',fontSize:20,cursor:'pointer'}}>×</button>
        </div>

        {!sel ? (
          /* ── LISTA DE ESCOLHA ── */
          <div style={{display:'flex',flexDirection:'column',flex:1,overflow:'hidden'}}>
            <div style={{padding:'8px 12px',borderBottom:'1px solid rgba(0,229,255,0.1)',flexShrink:0}}>
              <input
                autoFocus
                value={busca} onChange={e=>setBusca(e.target.value)}
                placeholder="Buscar..."
                style={{width:'100%',fontSize:14,padding:'6px 10px'}}
              />
            </div>
            <div style={{overflowY:'auto',flex:1,padding:8,display:'flex',flexDirection:'column',gap:4}}>
              {filtrados.map(nome => {
                const info = dados[nome];
                return (
                  <button key={nome} onClick={()=>escolher(nome)} style={{
                    background:'rgba(0,0,0,0.4)',border:'1px solid '+corBg+'0.15)',borderRadius:6,
                    padding:'8px 12px',textAlign:'left',cursor:'pointer',
                    transition:'border-color 0.15s, background 0.15s'
                  }}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=cor;e.currentTarget.style.background=corBg+'0.08)';}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor=corBg+'0.15)';e.currentTarget.style.background='rgba(0,0,0,0.4)';}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:2}}>
                      <span style={{fontFamily:'Orbitron',fontSize:11,color:cor,fontWeight:700}}>{nome}</span>
                      <span style={{fontSize:10,color:'rgba(0,229,255,0.4)',fontFamily:'Share Tech Mono'}}>{info?.c}</span>
                    </div>
                    <div style={{fontSize:10,color:'rgba(0,229,255,0.5)',lineHeight:1.4,overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{info?.d}</div>
                  </button>
                );
              })}
              {filtrados.length===0 && <p style={{color:'rgba(0,229,255,0.25)',textAlign:'center',fontSize:12,padding:16}}>Nenhum resultado</p>}
            </div>
          </div>
        ) : (
          /* ── FORMULÁRIO DE CONFIRMAÇÃO ── */
          <div style={{overflowY:'auto',flex:1,padding:16,display:'flex',flexDirection:'column',gap:12}}>
            {/* Custo */}
            <div>
              <label style={{fontFamily:'Orbitron',fontSize:9,color:'rgba(0,229,255,0.5)',display:'block',marginBottom:4,textTransform:'uppercase'}}>Custo (pts)</label>
              <input value={custo} onChange={e=>setCusto(e.target.value)} placeholder="ex: 1 ou -1"
                style={{width:'100%',fontSize:16,padding:'6px 10px',fontWeight:700,color:cor}} />
            </div>
            {/* Detalhe/Opção */}
            {subOpts ? (
              <div>
                <label style={{fontFamily:'Orbitron',fontSize:9,color:'rgba(0,229,255,0.5)',display:'block',marginBottom:4,textTransform:'uppercase'}}>Opção / Detalhe</label>
                <select value={detalhe} onChange={e=>setDetalhe(e.target.value)}
                  style={{width:'100%',fontSize:14,padding:'6px 10px'}}>
                  <option value="">— escolha uma opção —</option>
                  {subOpts.map(o=><option key={o} value={o}>{o}</option>)}
                </select>
              </div>
            ) : (
              <div>
                <label style={{fontFamily:'Orbitron',fontSize:9,color:'rgba(0,229,255,0.5)',display:'block',marginBottom:4,textTransform:'uppercase'}}>Detalhe (opcional)</label>
                <input value={detalhe} onChange={e=>setDetalhe(e.target.value)} placeholder="ex: Luta, Fobia de aranhas..."
                  style={{width:'100%',fontSize:14,padding:'6px 10px'}} />
              </div>
            )}
            {/* Descrição */}
            <div>
              <label style={{fontFamily:'Orbitron',fontSize:9,color:'rgba(0,229,255,0.5)',display:'block',marginBottom:4,textTransform:'uppercase'}}>Descrição</label>
              <textarea value={desc} onChange={e=>setDesc(e.target.value)} rows={5}
                style={{width:'100%',fontSize:11,padding:'6px 10px',lineHeight:1.5,resize:'vertical'}} />
            </div>
            {/* Botões */}
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>setSel(null)} style={{flex:1,padding:'10px',background:'rgba(0,0,0,0.4)',border:'1px solid rgba(0,229,255,0.2)',color:'rgba(0,229,255,0.5)',borderRadius:6,cursor:'pointer',fontFamily:'Orbitron',fontSize:10,textTransform:'uppercase'}}>← Voltar</button>
              <button onClick={confirmar} style={{flex:2,padding:'10px',background:corBg+'0.15)',border:'1px solid '+cor,color:cor,borderRadius:6,cursor:'pointer',fontFamily:'Orbitron',fontSize:11,textTransform:'uppercase',fontWeight:700}}>✓ Confirmar</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

// ── Modal de Visualizar/Editar item ──────────────────────────────────────────
const EditItemModal = ({item, type, onClose, onUpdate, onRemove}) => {
  const isDesv = type === 'desvantagens';
  const cor = isDesv ? '#ff5252' : '#00e676';
  const corBg = isDesv ? 'rgba(255,23,68,' : 'rgba(0,230,118,';
  const subOpts = OPCOES[item.nome];

  const handleDetalhe = (v) => {
    onUpdate(item.id, 'detalhe', v);
    if (SUBOPCOES[item.nome]?.[v]) {
      onUpdate(item.id, 'descricao', SUBOPCOES[item.nome][v]);
    }
  };

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,5,15,0.92)',zIndex:400,display:'flex',alignItems:'center',justifyContent:'center',padding:12}}>
      <div className="panel" style={{width:'100%',maxWidth:460,maxHeight:'90vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{padding:'12px 16px',borderBottom:'1px solid '+corBg+'0.2)',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
          <span style={{fontFamily:'Orbitron',fontSize:12,color:cor,fontWeight:700}}>{item.nome}</span>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <button onClick={()=>{if(window.confirm('Remover "'+item.nome+'"?')){onRemove(item.id);onClose();}}}
              style={{background:'rgba(255,23,68,0.1)',border:'1px solid rgba(255,23,68,0.4)',color:'#ff5252',borderRadius:4,padding:'3px 8px',cursor:'pointer',fontFamily:'Orbitron',fontSize:9,textTransform:'uppercase'}}>
              🗑 Remover
            </button>
            <button onClick={onClose} style={{background:'none',border:'none',color:'#ff1744',fontSize:20,cursor:'pointer'}}>×</button>
          </div>
        </div>
        <div style={{overflowY:'auto',flex:1,padding:16,display:'flex',flexDirection:'column',gap:12}}>
          {/* Custo */}
          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            <label style={{fontFamily:'Orbitron',fontSize:9,color:'rgba(0,229,255,0.5)',textTransform:'uppercase',flexShrink:0}}>Custo</label>
            <input value={item.custo||''} onChange={e=>onUpdate(item.id,'custo',e.target.value)}
              style={{width:80,fontSize:16,padding:'4px 8px',fontWeight:700,color:cor,textAlign:'center'}} />
          </div>
          {/* Detalhe */}
          <div>
            <label style={{fontFamily:'Orbitron',fontSize:9,color:'rgba(0,229,255,0.5)',display:'block',marginBottom:4,textTransform:'uppercase'}}>Opção / Detalhe</label>
            {subOpts ? (
              <select value={item.detalhe||''} onChange={e=>handleDetalhe(e.target.value)}
                style={{width:'100%',fontSize:13,padding:'6px 10px'}}>
                <option value="">— escolha uma opção —</option>
                {subOpts.map(o=><option key={o} value={o}>{o}</option>)}
              </select>
            ) : (
              <input value={item.detalhe||''} onChange={e=>onUpdate(item.id,'detalhe',e.target.value)}
                placeholder="ex: Luta, Fobia de aranhas..." style={{width:'100%',fontSize:13,padding:'6px 10px'}} />
            )}
          </div>
          {/* Descrição */}
          <div>
            <label style={{fontFamily:'Orbitron',fontSize:9,color:'rgba(0,229,255,0.5)',display:'block',marginBottom:4,textTransform:'uppercase'}}>Descrição</label>
            <textarea value={item.descricao||''} onChange={e=>onUpdate(item.id,'descricao',e.target.value)}
              rows={6} style={{width:'100%',fontSize:11,padding:'6px 10px',lineHeight:1.5,resize:'vertical'}} />
          </div>
          <button onClick={onClose} style={{padding:'10px',background:'rgba(0,229,255,0.08)',border:'1px solid rgba(0,229,255,0.3)',color:'#00e5ff',borderRadius:6,cursor:'pointer',fontFamily:'Orbitron',fontSize:10,textTransform:'uppercase'}}>✓ Fechar</button>

// ── PericiaSection — chips com modal de seleção ───────────────────────────────

  const [editItem, setEditItem] = useState(null);
  const [busca, setBusca] = useState('');

    const desc = PERICIAS_DESC[nome] || '';
    onAdd({id:Date.now()+Math.random(), nome, detalhe:'', descricao:desc, custo:'1'});
    setAddOpen(false);
    setBusca('');

              onMouseEnter={e=>e.currentTarget.style.background='rgba(0,229,255,0.2)'}
              onMouseLeave={e=>e.currentTarget.style.background='rgba(0,229,255,0.1)'}>

                ? <p style={{color:'rgba(0,229,255,0.25)',textAlign:'center',fontSize:12,padding:16}}>
                    {items.length===PERICIAS.length ? 'Todas as perícias já foram adicionadas!' : 'Nenhum resultado'}

};

// ── TecnicaSection — chips com modal de seleção e edição ─────────────────────
const TecnicaSection = ({items, onAdd, onUpdate, onRemove}) => {
  const [addOpen, setAddOpen] = useState(false);
  const [editItem, setEditItem] = useState(null);
  const [busca, setBusca] = useState('');

  const filtradas = LISTA_TEC.filter(n => n.toLowerCase().includes(busca.toLowerCase()));

  const escolher = (nome) => {
    const tec = TECNICAS_DATA[nome];
    const novo = {
      id: Date.now()+Math.random(),
      nome,
      custo: tec ? tec.custo+' | '+tec.alcance+' | '+tec.duracao : '',
      descricao: tec ? '['+tec.tipo+'] Req: '+tec.req+'\n'+tec.desc : ''
    };
    onAdd(novo);
    setAddOpen(false);
    setBusca('');
  };

  // cor por tipo
  const tipoCor = (nome) => {
    const t = TECNICAS_DATA[nome]?.tipo;
    return t==='Truque' ? '#a855f7' : t==='Técnica Comum' ? '#00e5ff' : '#ffd600';
  };

  return (
    <>
      <div className="panel" style={{padding:14,marginBottom:20,borderColor:'rgba(168,85,247,0.3)'}}>

            const c = tipoCor(item.nome);
            return (
              <button key={item.id} onClick={()=>setEditItem(item)}

                onMouseEnter={e=>e.currentTarget.style.background=c+'28'}
                onMouseLeave={e=>e.currentTarget.style.background=c+'14'}>
                {item.nome}
              </button>
            );

          {items.length===0 && <span style={{color:'rgba(0,229,255,0.2)',fontSize:11,fontStyle:'italic',padding:'4px 0'}}>Nenhuma. Clique em + ADD</span>}

        <div style={{position:'fixed',inset:0,background:'rgba(0,5,15,0.92)',zIndex:400,display:'flex',alignItems:'center',justifyContent:'center',padding:12}}>
          <div className="panel" style={{width:'100%',maxWidth:480,maxHeight:'88vh',display:'flex',flexDirection:'column',overflow:'hidden',borderColor:'rgba(168,85,247,0.35)'}}>
            <div style={{padding:'12px 16px',borderBottom:'1px solid rgba(168,85,247,0.2)',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
              <span style={{fontFamily:'Orbitron',fontSize:12,color:'#a855f7',textTransform:'uppercase'}}>✨ Adicionar Técnica</span>
              <button onClick={()=>{setAddOpen(false);setBusca('');}} style={{background:'none',border:'none',color:'#ff1744',fontSize:20,cursor:'pointer'}}>×</button>
            </div>
            <div style={{padding:'8px 12px',borderBottom:'1px solid rgba(168,85,247,0.1)',flexShrink:0}}>
              <input autoFocus value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Buscar técnica ou truque..."
                style={{width:'100%',fontSize:14,padding:'6px 10px'}} />
            </div>
            <div style={{overflowY:'auto',flex:1,padding:8,display:'flex',flexDirection:'column',gap:4}}>
              {/* Técnica personalizada */}

                background:'rgba(255,214,0,0.06)',border:'1px dashed rgba(255,214,0,0.3)',borderRadius:6,padding:'8px 12px',textAlign:'left',cursor:'pointer'
              }}>
                <span style={{fontFamily:'Orbitron',fontSize:10,color:'#ffd600'}}>+ Técnica Personalizada</span>
                <div style={{fontSize:10,color:'rgba(255,214,0,0.4)',marginTop:2}}>Criar técnica própria (homebrew)</div>
              </button>
              {filtradas.map(nome=>{
                const tec = TECNICAS_DATA[nome];
                const c = tipoCor(nome);

// ── VantSection — lista compacta com chips clicáveis ─────────────────────────
const VantSection = ({type, title, color, items, onAdd, onUpdate, onRemove}) => {
  const [addOpen, setAddOpen] = useState(false);
  const [editItem, setEditItem] = useState(null);
  const isDesv = type === 'desvantagens';
  const borderColor = color==='red'?'rgba(255,23,68,0.3)':color==='green'?'rgba(0,230,118,0.3)':'rgba(0,229,255,0.3)';
  const titleColor = color==='red'?'#ff5252':color==='green'?'#00e676':'#00e5ff';
  const chipBg = color==='red'?'rgba(255,23,68,0.1)':color==='green'?'rgba(0,230,118,0.1)':'rgba(0,229,255,0.1)';
  const total = items.reduce((a,i)=>a+(parseInt(i.custo)||0),0);

  const handleConfirm = (newItem) => {
    onAdd(newItem);
  };

  return (
    <>
      <div className="panel" style={{padding:14,borderColor}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,borderBottom:'1px solid rgba(0,229,255,0.12)',paddingBottom:8}}>
          <span style={{fontFamily:'Orbitron',fontSize:11,color:titleColor,textTransform:'uppercase',letterSpacing:1}}>
            {title} <span style={{color:'rgba(0,229,255,0.35)',fontSize:9}}>({total>0?'+'+total:total}pts)</span>
          </span>
          <Btn onClick={()=>setAddOpen(true)} style={{padding:'2px 10px',fontSize:11}}>+ ADD</Btn>
        </div>
        {/* Chips */}
        <div style={{display:'flex',flexWrap:'wrap',gap:6,minHeight:32}}>
          {items.map(item=>{
            const isKit  = item.detalhe && item.detalhe.includes('(Kit:');
            const isArq  = item.detalhe && item.detalhe.includes('(Arquétipo:');
            const cChip  = isKit ? '#ffd600' : isArq ? '#a855f7' : titleColor;
            const bgChip = isKit ? 'rgba(255,214,0,0.1)' : isArq ? 'rgba(168,85,247,0.1)' : chipBg;
            const bdChip = isKit ? 'rgba(255,214,0,0.4)' : isArq ? 'rgba(168,85,247,0.4)' : borderColor;
            const bgHover= isKit ? 'rgba(255,214,0,0.2)' : isArq ? 'rgba(168,85,247,0.2)' : (color==='red'?'rgba(255,23,68,0.2)':color==='green'?'rgba(0,230,118,0.2)':'rgba(0,229,255,0.2)');
            return (
              <button key={item.id} onClick={()=>setEditItem(item)}
                style={{
                  background:bgChip, border:'1px solid '+bdChip,
                  borderRadius:20, padding:'4px 12px', cursor:'pointer',
                  fontFamily:'Orbitron', fontSize:10, color:cChip,
                  textTransform:'uppercase', letterSpacing:0.5,
                  display:'flex', alignItems:'center', gap:5,
                  transition:'all 0.15s',
                }}
                onMouseEnter={e=>{e.currentTarget.style.background=bgHover;}}
                onMouseLeave={e=>{e.currentTarget.style.background=bgChip;}}>
                {isKit  && <span style={{fontSize:8,opacity:0.7}}>⚔</span>}
                {isArq  && <span style={{fontSize:8,opacity:0.7}}>★</span>}
                <span>{item.nome}</span>
                {item.detalhe && !isKit && !isArq && <span style={{fontSize:8,opacity:0.6,fontStyle:'italic',textTransform:'none'}}>({item.detalhe})</span>}
                {item.custo && <span style={{fontSize:9,opacity:0.7,fontFamily:'Share Tech Mono'}}>{parseInt(item.custo)>0?'+':''}{item.custo}</span>}
              </button>
            );
          })}
          {items.length===0 && <span style={{color:'rgba(0,229,255,0.2)',fontSize:11,fontStyle:'italic',padding:'4px 0'}}>Nenhuma. Clique em + ADD</span>}
        </div>
      </div>

      {/* Modal Adicionar */}
      {addOpen && (
        <AddVantModal
          type={type}
          onClose={()=>setAddOpen(false)}
          onConfirm={handleConfirm}
        />
      )}

      {/* Modal Editar */}
      {editItem && (
        <EditItemModal
          item={items.find(i=>i.id===editItem.id)||editItem}
          type={type}
          onClose={()=>setEditItem(null)}
          onUpdate={(id,f,v)=>{onUpdate(id,f,v);}}
          onRemove={(id)=>{onRemove(id);setEditItem(null);}}
        />
      )}
    </>
  );
};
